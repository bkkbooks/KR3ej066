front:
  text: 痘疹世醫心法自序家世業醫方脈悉有異傳吾奉先子之訓凡醫者流按圖索驥未免多歧亡羊也吾乃本之素難求之脈經考之本草參之長沙河間東垣丹溪諸家之書抽關啓鑰探玄鉤隱頗得其趣日録所見積久成軼如素問則有淺解本草則有拾珠脈訣則有約旨傷寒則有蠡測又如醫門摘錦保嬰家祕皆恃井蛙之識梧鼠之能不敢自售以買笑也惟痘疹一科錢氏用涼瀉陳氏用溫補立法不同執偏門之説者無以白二先生之心先子為吾剖析發明仲陽之用涼瀉因其煩躁大小便不通也文仲之用溫補因其瀉渴手足冷也虛則補之實則瀉之所謂無伐天和無翼其勝也吾謹識之但遇斑疹如教施治多所全活乃嘆古人立法之善先子用法之精非滯隅之能及如是搜輯家教匯成歌括命曰世醫心法用壽諸梓與天下後世共之庶先子之仁術與錢陳二家同芳不徒泯泯已焉耳先子諱筐字恭叔行三菊軒號也時嘉靖二十又八年歲己酉冬十二月既生魄後學楚萬全拜手書痘疹格致要論自序先子菊軒翁豫章人也成化庚子客遊於羅以醫鳴小方脈為最及生不肖乃家焉嘗語全曰吾活人多矣爾後必昌時玉泉張子柳溪鬍子悉羅之巨儒命全受業於二先生之門業幾成而先子歿矣孤弱不能自致自經書子史律歷以逮百家各有著述暇則取先子方脈手教讀之諸方脈中惟天行斑瘡為毒最酷古人論治略相異同怪其教外有別傳也沉潛祕旨發揮奧義如胎毒之論歸腎之辨皆昔人所未及者筆而成帙自願痘論至藥性凡十一卷猶恐識之不精語之不切未敢輕以示人鬍子三溪肖子楚梧萬子賓蘭見而説之強豫梓刻命曰格致要論豫不能咈並世醫心法付書肆刻之玩是書者念吾心之獨苦或有取焉爾孫應鰲痘診心要序隆慶紀元豫轄楚藩以女病諸醫用藥皆不效聞羅田有萬生療小兒有神驗亟延至之命之診治女病果愈豫政暇時時與萬生卮談乃萬生非如他醫但了一方一脈自售其術其為業自素難下級近代醫書靡不究悉源委剖別是非又能溯諸六經性理根於吾儒之道信有本矣蓋萬生少嘗從事科舉以不得志遂隱於醫宜其世之為醫者不能望而及也萬生著有痘疹心要一書豫為梓之俾表見於世以豫愛女求醫之心推之則為父母之保赤子者斯心犬略皆同而赤子之最難保莫過痘疹得是書審察之劑量調攝之萬生之術溥而大行安謂其不得志耶淮海山人孫應鰲書重刻痘疹心要自序蓋有不知而作者自用自專愚孰甚焉孔子表章六經垂憲萬世猶曰述而不作信而好古示不敢專以自用也豫謂孔子徒亦惟多聞多見擇而識之雖百家衆技之書可以利諸人者靡不玩索況醫術之仁為斯民立命者乎又乃先子專門之業所當記述者乎竊思方脈之中保嬰最難嬰孺之疾痘疹最酷不敢自用自專考諸前言往行廣詢博訪不拘偏見迂説務約於中間亦附以己意著為痘疹心要凡三易稿其初本擇焉未精語焉未詳意淺辭俚有好事者剽竊以為己述刻之南贛次乃改作撫治鄖陽右中丞孫公淮海取其改本刻於行都司黃州守孫公懷堂又取鄖本刻之載歸四明其書既出視初本雖頗精祥然有未盡之證未立之法恐不足以活矢殤廣仁愛垂久遠也於是補其闕略附以醫案屬望有力者鋟諸梓焉庶天下後世之習幼科者無滄海遺珠之嘆為得魚兔之筌蹄云爾若夫不知而作者之罪豫弗敢辭陳允升刻痘疹心要序醫之難莫如小兒小兒醫之難則莫如痘疹余初得子女痘皆險甚賴醫藥以生於是科特究心焉在楚時到處求方書至均州而得萬氏所著痘疹書前為世醫心法者卷十二後為格致要論者卷十一合而名之曰心要其辨症最核而參方最精根極於素難微旨而人人可以與知是痘科指南也攜歸四歲而少女痘發惡候並見醫莫措手余但按是書扶起之則益敬重若神人授矣均州本舊多舛訛余手校成善本常置篋中大兒執之以請曰兒常憶痘劇時祖不食父亦不食凡為人父子者情皆然也梓是書以傳世於孝慈寧不廣哉余善其言而從之萬曆癸未夏六月吉賜進士第督學使者吳門陳允升識曹繼孝重刻痘疹心要序不佞孝至會稽之三月日夕以劻勷不逮為懼遂謁慈溪懷堂孫公而請教焉公昔在吾郡曾刻痘疹心要貽不佞因懇致謝公曰何為謝也不佞孝曰往年旅食金臺值豚兒患痘其症甚劇於是遍諸善醫者視之及痘已布而善醫者先後引去亦危矣乃為無聊計據是書按方投劑焉計數日遂奏效此其惠胡可弗謝而其書又胡可弗傳也行將梓之以廣公惠公曰君可以語政矣保赤子者心誠求之則靡不少中幼吾幼以及人之幼蓋王道也君之愛其子如此惟恐醫之弗善而方之不良也推是以概一邑之人孰非吾之子乎不務德惠而專務一切苛慘以繩之雖可薄收精核之名然民不得遇國醫而飲良劑亦失國家命醫之意矣以君之惓惓欲廣其書知君之必為此不為彼也故曰可以語政因次第其語付王生鍾瑞王生傑校刻之司理陳公舊得督學陳霽岩善本請以互證大得其益夫上一書也霽岩曾刻於蘇懷堂曾刻於黃孫淮海先生又曾刻於鄖陽固不能使是書之家給人足也則是刻亦非贅矣況由是廣之使越之嬰稚得是書以取效於十之六七其於不佞孝保民素餐之咎亦藉以少釋不猶愈刻詩文者乎萬曆十三年秋月曹繼孝識張鶴鳴刻痘疹心要後序衡南曹君欲刻痘疹心要謀於余余覽其書目嘆曰誠仁書也古方書如丹溪東垣諸名家備矣或且稱其各成一家説善醫者務神其意無執其方也若痘疹之倏忽異症至難執矣其能出此刻之外而有異説更以意加損其治方者耶往余見時氣偶值以痘疹殤者比屋皆然蓋誤於庸醫之手者不少也茲刻也窮本源之妙析症候之微歌章便誦習而不忘方類易檢閲而可據豈直業醫者定執此以往稱善也凡有愛子之心如衡南君之按方投劑罔不奏效矣夫人而病孰不需醫顧醫所語症種種人自有病有不病者痘疹一症其誰能免焉要之人之生坐此症而殤強半也君今愛其子以及天下之子直欲廣是刻家傳而人誦之固其仁天下之心也其真為民之父母哉繼自今獲藉以全活者何限罔非君仁之所錫矣仁者之後必昌正覩君家嗣偉然令器也前痘症亦何慮之過也越數月書已校正於王生鍾瑞王生傑矣於其成也問序於余遂書之萬曆乙酉秋山陰令彭城張鶴鳴書丁此呂重鍥痘疹心要序余兄弟少未布痘先大夫日惟是為兢兢執友汪公慕仙專門國手也先大夫居常以孺子為屬汪公亦慨然任之曰是誠在我逮歲辛酉嘉靖四十年餘年十二家兄十五且受室矣餘一日對客方構思為文忽稱腰痛甚至不能任坐起先大夫亟命人掖之入夜半渴甚飲水盡一石猶索飲不置時醫二三人環視咸謂是傷寒劇症耳汪公至稍一察之獨不言而退私謂先大夫次郎布痘矣兩輔間業已隱隱起君獨不見乎其盡謝諸醫令我得展布不爾我且去矣惟君慎圖之先大夫素神汪公惟其言而莫之違也始終惟公所調劑不敢揉他醫一語余痘未結痂家兄復布兄既長而且新受室日委頓酬應間先大夫大懼不勝痘乃痘色復不佳汪公愈益狎視之謂可旬日愈耳已而一一符其言大都余主瀉家兄主補公未嘗執一治也而幸並無恙先大夫與公固稱平生歡公亦自謂全二子以付先公可無負生平矣乃余猶能倣佛憒憒時記公所論説率根極脈理而深探其源然後因時以通其變故投之輒效是年所手起危證不下數十人不獨余兄弟倆也間常問公痘科有奇方乎公曰豈其無之乃所謂奇者偶一幸中耳非能正正奇奇而要以本源勝者也時醫猥不察而偶有聽睹輒寶之如靈蛇至殺人無悔蓋亦重可哀矣余幸不即填溝壑尚圖有所論著與寓內有識者一印證焉吾子識之余比別公赴楚臬二三稚子復相繼布痘公廨中以道遠無由得公一審視方用恐恐既乃得郡大夫蕭君所授此書余召醫按書而求酌方以治二兒並次第愈是書不必言言與汪公合要以大指則公所謂以本源勝非如世之約一方一藥為奇者可同日語也原刻固在楚久而駸湮余因重付剞劂以奓其傳書不必自汪公出而余之刻此書則師公意也且藉此以報公不然世豈乏方書而好以是勤梓人哉萬曆戊子上巳西昌丁此呂識大兒立先書
