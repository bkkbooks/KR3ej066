body:
  text: 萬全痘疹碎金賦題跋嘉靖丙午豫嘗手作小兒及痘疹賦西江月以教豚犬至己酉冬又著痘疹心要久藏於家不知有交相傳録者更剽竊為己作刊之彼時見亦未定信筆草草安可示人今特改正以補前之罅漏耳隆慶戊辰秋九月全自述萬全痘疹心要改刻始末贛本痘疹骨髓賦及西江月乃嘉靖丙午丁未二年所作以教諸子故其意淺其辭俚使之易曉且易於記誦也其世醫心法歌括又嘉靖己酉庚戌二年所作欲以傳後未敢示人右前四年所作乃吾長男萬邦忠私授於喻朝憲憲授於王濂王濂得之以為己述刻於贛州軍門鄖本痘疹心法格致要論吾於嘉靖壬子癸丑二年所作其書雖成久藏於篋未敢示人恐為木災至隆慶己巳年欽差撫治鄖陽等處右僉都御史孫取而刻之於行都司臨刻時豫取骨髓賦改之曰碎金賦黃本乃隆慶辛未年黃州太守孫所刻與鄖本同重刻也今本吾因刻過世醫心法尚有未盡之證未立之法闕略頗多未為全書況吾歷年已老嘗事且久故取其往日所治之證經驗之法因案以立括因括以附案補其闕略凡百餘條非曰盡之如有未備者以俟後之君子孫光祖讀世醫心法敘豫嘗謂仁者以天地為一體孔子之志在安老信友懷少聖人豈能必天下無一物不得其所哉願其心欲使天下物各得所苟可以安老信友懷少聖人所必為也此其心天地萬物一體之心也豫友父岡秦君新元初年子多痘疹不育後得楚黃人黃廉痘疹書閲其實實虛虛之辨解毒補療之法分門別症因病用藥井然有條因録發歸遍授諸兒醫多所全活己巳夏豫守黃過梓里以書黃本且素與豫同志以其詳語豫欲得原本廣傳斯固仁人一體之念也豫以郡事未逮今年夏覲回得羅田萬全痘疹心法數卷即萬密齋痘疹世醫心法故付梓而廣之遍授諸醫使因病溯源隨方投劑海內生得其少而壯壯而老其有補於世豈淺淺哉豫治黃逾二年即未能扶摩教育悉除民苛毒出民疾苦得是盡而傳布之俾黃少有長壯有養老有終以復於隆古之治則是刻也所以體懷少之仁者在是而於夫子之教可撫悖矣遂漫筆書之令業醫者知取衷云歲癸酉秋九月黃守四明孫光祖書於懷古草堂秦大夔重刻痘疹心要引是編實餘江右攜歸江右人共珍之而珍之亦不獨江右余亦因而珍之未試也及余兒京天行增劇諸國手輒望卻引余家侄位從旁袖出一編是刻也於以試諸孫子無不應手輒驗豫若夢醒遂檢方為藥計日頓愈豫益因而珍之且時時向侍御梅公大參朱公道及兩公更時時攜去試驗亦足珍矣奈家有和璧什襲藏之謂生齒何乃相謀公諸梓梓成豫覽竟笑曰秦越人飲長桑君上池水垣視一方人則戶喻家至寧任疲耶樣成無脛而馳人持一荊山瑜矣是梓也豫與家侄辨其璞大參侍御公賞其鑑則思庵龔善人而鉤鐵畫銀及之矣萬曆辛丑夏秦大夔舜卿識龔景福跋不佞雅嗜方書獲善方輒修餌施焉無何自念曰夫疴也人所時有施之能幾無若以方傳之之為慱也業有外科雜集等刻廉憲朱公序之詳矣一日適侍御柳公所睹其案頭痘疹一書詢之乃大參秦公宦遊攜來者治法精備此外不再得侍御公曰痘疹凡厥育嬰者不免而醫藥比他科尤稱難盍以是書公之令多所全活乎遂授不佞以歸付之剞劂氏刻再閲月而告竣竊自喜曰是刻也庶可為人間廣嗣者之一助云時萬曆辛丑中秋日清源龔景福汝承父識
