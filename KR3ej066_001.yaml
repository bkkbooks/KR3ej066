body:
  text: 卷之一痘疹碎金賦二首賦上痘本胎毒俗曰天瘡雖癘氣之傳染實殺機之顯彰變遷莫測酷惡難當肌肉潰脫兮若蛇蛻皮龍蛻骨精神困頓兮如蚓在灰蟺在湯瘡有疏密兮疏者輕而密者重毒有微甚兮微則祥而甚則殃笑彼拘於日數者未達遲速之變悲夫惑於鬼神者不求醫藥之良乾坤妙合震巽分張受氣於父兮得陽精而凝結成形於母兮賴陰血以資養民多嗜欲氣匪淳龐淫火熾於衽席食穢蓄於膏粱精血稟其毒氣兮甚於射罔形體負其殺氣兮險於鋒鋩或謂去其口血兮不過脫空之語或謂解其胎毒兮未見抵聖之方五運統於南北兮有太有少六氣分於主客兮曰陰曰陽變化各正勝復靡常得其序而氣治兮國無疵癘失其序而氣亂兮民有疹瘍應至而不至兮其氣徐貴迎之以奪其勢未應至而至兮其氣暴姑持之以避其強不知此而妄作兮違時者敗能審此而慎動兮順天者昌春令溫和而升生夏令暑熱而浮長秋令清冷而降收冬令寒冽而沉藏是得四時之正不為萬物之傷冬反燠暖兮勾萌早發春反栗冽兮蟄蟲且藏夏反清肅兮涼風襲肉秋反蒸褥兮暑汗沾裳若此逆氣兮染之者即成疫癘又有虛風兮中之者必致夭傷受父母之穢毒兮隱於黝僻觸天地之癘氣兮發其伏藏自內而出兮布於四體自外而散兮根於五臟肝主淚而為水疱肺主涕而作膿囊心則斑而且赤脾則疹而又黃腎乃封藏之本變則黑陷之象可喜者苗而秀秀而實如鳥之脫距所惡者枯而陷陷而伏如虎之負岡東赤南白西黃北黑各分布而有定春生夏長秋收冬藏自流行而無疆初出血點兮紅鮮得生之氣次化水液兮白瑩漸長之狀膿成而色黃兮欲收之候痂結而色黑兮已藏之象謂腎無證者似去冬不能成歲謂黑為逆者如廢北何以調陽方其發生兮春夏為順而秋冬非吉及其收斂兮秋冬為順而春夏不藏應發生而反收斂者謂之陷伏應收斂而反發生者謂之爛洋順者不必治兮待其平復逆者不可治兮避其怨謗若逢險症必在奇方治不乖方兮險變順而春回幽谷藥不對病兮險變逆如火烈崑岡病似順而反逆兮認之要慣病似逆而反順兮察之貴祥似粟堆聚堅硬兮孰若磊落而稠密如丹豔赤嬌嫩兮不如淡白而老蒼初出現而亟水乍起發而戴漿膿未成而乾黑囊未滿而萎黃早發先萎兮如園林之花蕊暴長遽消兮似溝澗之潦潢是謂奪命之症休誇折肱之良輕或變重兮誤服藥而或犯禁忌重或變輕兮得遇醫而且善調養蚊迹蚤斑兮不旋踵而告變蛇皮蠶殼兮惟束手以待亡夾斑夾疹兮斑疹消而足喜頂平頂陷者平陷起而莫忙切戒臨病揮霍最宜用藥審詳病有標本兮視急緩以立法藥有補瀉兮因虛實而立方噫嘻兮醫無定法迷亂兮藥有定方大率賤攻而貴補故多喜溫而惡涼設若病遇虛寒兮溫補有效假如證屬實熱兮辛香敢嘗辛熱下咽陽之盛者必困苦寒入胃陰之盛者乃戕戒汗下於首尾兮惡攻之説補脾土以制腎水兮喜補之常不知補者之短奚論攻者之長形尖圓而光壯兮氣之充拓色鮮明而潤澤兮血之涵養可以勿藥是謂無恙灰白平陷兮氣血虛而補之以溫紅豔焮腫兮氣血熱而瀉之以涼氣至而血不足兮雖起發根窠不肥血至而氣不足兮雖明潤郛郭不長泥章句以舉一隅者守株安可得兔馳辨説而執兩端者多岐必然亡羊脾為水穀之本固不可以不補腎為津液之源尤不可以不漿土雖為水之坊水能制火之亢腎主骨髓兮倒陷入於骨髓者莫救腎司閉藏兮變黑至於閉藏者可防是皆歸腎之害豈可謂腎之強毒火燔灼兮腎水且涸營氣敗壞兮脾土亦傷故補脾不如救腎而養陰所以濟陽炅則氣血淖澤而不斂寒則氣血凝澀而不章氣血失養痘疹受傷或受於熱兮為煩躁為赤為痛或受於寒兮為振栗為白為癢順時令之寒暄禁人畜之來往勿動溷廁之臭勿燒檀麝之香恐乘虛而易入反助毒以為殃痘雖吉而犯多凶屢經怪變症雖惡而調則善終見安康若夫痘疹之熱相似內外之傷邪火煊赫兮玉石俱焚真水靜順兮波浪不揚噴嚏咳嗽兮肺金流鑠項急頓悶兮肝木披創呵欠驚悸兮心雖君主而不寧吐瀉昏睡兮脾則倉廩而不藏各臟有證惟腎無象不受穢毒之火獨見耳骩之涼熱微兮毒少熱甚兮火旺大熱安靜兮毒隨熱出而無慮小熱煩躁兮毒與熱留而可防凶災莫測兮又熱又渴輕疏可許兮乍熱乍涼吐瀉勿止兮便毒得越而無遏驚悸不定兮惡毒深入而反藏血妄泄於空竅兮死期速於彈指語妄涉於鬼神兮變候易於反掌形證定其疏密部位決其存亡如痘分布兮且顆粒而其疏已定如麻堆聚兮更模糊而其密堪傷挨頰繞口兮庚戊陽明之位顴間額上兮壬丙太陽之鄉頭為元首之尊最怕矇頭項乃關津之要偏嫌鎖項鼻準初出兮淫毒犯於天根耳輪先現兮邪火侵乎玉堂漸次出兮吉兆齊湧出兮凶狀痘將出而熱減兮藥勿妄服痘正出而熱劇兮醫宜早防解其火毒兮恐郁遏而乾枯養其氣血兮欲流行而舒暢遠寒熱之犯兮損之益之而必使和平助春夏之令兮達之發之而必使長旺治其未亂兮徹桑土於逮雨知其必漸兮戒堅冰於履霜出欲盡而不留發欲穩定而齊長苗漸成窠兮氣之所詬血漸化水兮血之所養疏則毒少兮頭面不腫而休怕密則毒多兮氣血不充而莫慌時日既足兮自翹翹而雜起表裡無邪兮勿汲汲以作湯所謂良將用兵善攻不如善守又云上農治田勿助生於勿忘咽喉急痛兮勿違時而早治頭面預腫兮但引日以必亡小便欲清兮大便卻欲其堅實淡味可食兮厚味不可以啖嘗茹淡者胃氣不損養厚者火邪益亢或見黑黯兮點之速以胭脂或遇乾枯兮浴之貴以水楊瘙癢忽生兮取茵陳以熏燎爬搔不寧兮雖盧扁而倣徨痘長滿水毒化成漿愛其稠濃兮惡其清淡取其滿足兮舍其虛洋欲知透與不透兮於手足而細察欲知足與不足兮於輔頰以端詳設四末之未透取脾胃而服藥如一方之未足視經絡以求方譬如為山兮勿功虧於簣土又如執熱兮寧濯洗於探湯面頰最嫌破頂肩背尤怕焦囊腫忽消兮氣脫語忽妄兮神亡食谷則嘔兮胃爛飲水則嗆兮咽傷咬牙兮肝火熾而腎敗寒戰兮陽氣弱而陰強膿反干兮倒陷膿不成兮伏藏叫哭不止兮毒攻腸胃悶亂不寧兮火烈膈肓倉廩不藏兮魂魄歸於溟漠水泉不出兮姻親泣於北邙膿血已化收靨相當兆自唇吻兮漿吐結如珠粒斷自人中兮部分發默以意量令行秋冬兮依先後而不亂氣別陰陽兮循上下而有常顴上平干兮應乎倒靨額間先收兮謂之不祥痂不落而壅腫兮由榮血之淖溢瘡盡裂而皺揭兮此衛氣之殘傷當靨不靨當藏不藏便祕未通兮裡氣熱而涼導便溏不實兮中氣虛而溫養熱傷皮毛兮怪肺金不收餘氣溫傷肌肉兮責脾土不燥殘漿頭瘡堆膿不平兮孤陽似鰥而不生足瘡包水不幹兮純陰如寡而不長飲食減少兮迤邐引日而斃煩熱增劇兮倏忽絶命而亡若問痂皮之不脫其間病氣之相妨痘若敗壞兮補空痘勿疑番次瘡如潰爛兮成潰瘡莫壓膿漿遍身浸淫兮黏被席而最苦正面腫灌兮息腥臭而再妨利多水液兮此蓄水之病也水去盡而自止便多膿血兮此倒靨之症也膿去盡而可詳瘢痕凹凸兮陷者虛而突者實痂皮嫩薄兮里則固而外則瘍邪氣盡而正復痂皮脫而身康苟幼軀之多病定餘毒之有藏出或未盡兮無空痘須防卒暴發或未透兮無潰膿必發疽瘍不及期兮早收毒火焰而可怕或過期兮不靨邪氣留而堪悵身熱審其虛羸咽啞觀乎嘔嗆忽灑淅而肌熱兮知風寒之外感暴吐瀉而腹痛兮必飲食之內傷病有苦而眩暈兮凶多吉少之占身無邪而昏瞀兮否去泰來之象聲音不出兮求諸肺腎之經斑疹復現兮責其心脾之臟疳蝕出血者難治洞泄完穀者莫講勿謂痘收而縱馳勿謂毒去而逮遑正氣浸長而未復邪氣方消而未殃特犯禁忌兮今即生變恣食肥甘兮後必有殃疥癩腐潰兮一面黥瘢而似鬼癰疽流注兮四肢殘廢而如尪目腫赤痛兮冷痘入而成翳齒宣黑爛兮熱毒浸而潰床雖曰餘毒之為害抑皆定數之莫防形容頓改兮令人駭愕調治悔遲兮空自惆悵謂人不能勝天兮何以立乎醫藥謂醫不如用巫兮安能格乎窮蒼但逢出痘之歲多求解毒之方重者必輕兮輕者不出凶者變吉兮吉者何妨其方則有其效未嘗與其先事而輕妄孰若臨時以消詳審天氣之災祥兮必解其鬱視形氣之勇怯兮各平其臟欲避癘氣傳染兮必先擇地之善欲仗藥力調護兮尤要識醫之良惺惺參蘇乃發散之妙劑惺惺散參蘇散人參通聖誠疫癘之奇方人參敗毒散防風通聖散熱而驚悸兮導赤瀉青合用導赤散瀉青丸熱而焦渴兮柴胡葛根作湯小柴胡湯升麻葛根湯自利兮黃芩黃芩芍藥湯不便兮清涼四順清涼飲腹痛毒攻兮勻氣散再加枳實腰痛病劇兮敗毒散更入木香調元可補兮表裡實者勿飲調元湯承氣可攻兮脾胃弱者莫嘗小承氣湯養正兮黃耆人參甘草解毒兮連翹山豆牛蒡咽喉痛苦兮甘桔湯中加大力斑疹夾出兮防風散內去硝黃防風通聖散小便赤澀兮連翹導赤連翹飲導赤散大便滑泄兮豆蔻木香豆蔻丸木香散瘡若干枯兮四物合乎涼膈四物湯東垣涼膈散痘如黑陷兮奪命助以水楊奪命丹水楊浴法赤豔焮腫兮解毒入生黃歸芍黃連解毒湯灰白平塌兮異功用桂枝耆防錢氏異功散氣虛而毒盛者無價四君枳實無價散四君子湯血虛而毒盛者無價四物牛蒡四物湯氣血兩虛兮十全無價十全大補湯便溺俱阻兮八正三黃八正散三黃丸再用膽導之法以泄毒氣之藏黑陷審其虛實虛者大補實者涼膈十全大補湯河間涼膈散癢塌分其急緩急者異功而緩者調陽陳氏異功散調陽即調元湯昏悶譫妄兮龍腦膏孰知其妙虛煩迷亂兮抱龍丸莫及其良滿面燥痛兮百花調水百花膏遍身潰爛兮敗草鋪床敗草膏蟬蛻去目中之膚翳蟬蛻散苦參治身上之淫瘡苦參丸虛熱多汗兮調元湯引用浮麥食積腸痛兮脾積丸飲以原湯飢不喜食兮異功宜久錢氏異功散渴欲飲水兮白朮可嘗白朮散敗毒通聖允矣沖陳之先鋒人參敗毒散防風通聖散調元異功信乎殿後之大將調元湯錢氏異功散大抵醫要識症藥不執方專行溫補者則宗乎文中喜用涼瀉者則師乎仲陽不解其書兮似瞽冥行於溪徑未會其神兮如矮仰望乎宮牆嘆吾年之耄兮欲深造而力不足懼斯道乎晦兮特發明而言不章嘔盡心肺兮非欲立異勞費頰舌兮豈敢恃長幸取正於巨眼徒見笑於大方賦下疹屬君火氣本少陰傳於其子兮故為脾胃之症乘於其妻兮現乎皮毛之分亦胎毒之所發因疫癘而成咳嗽噴嚏兮辛金爍於丁火頓悶泣出兮君主御乎將軍迎而奪之兮其鋒易挫隨而擊之兮其鋭難勝如折勾萌兮斧斤不用苟得燎原兮玉石俱焚其色如斑兮摸之有迹其形似痘兮視之無津朝出暮收兮發之於陽暮出朝收兮發之於陰變化莫測出沒靡定大抵愛赤而惡黑治者喜涼而忌溫赤如點朱兮火明彰顯之象黑如灑墨兮火鬱曛昧之甚制以酸涼兮收炎光於麗澤投以辛熱兮縱赫曦於重明敗毒防風開發斬關之將人參敗毒散防風通聖散解毒連翹制伏降虜之兵黃連解毒湯連翹飲如錦爛熳兮服化斑而豔斂化斑湯似火熏蒸兮飲涼膈而熱清東垣涼膈散咽痛兮甘桔牛蒡止咳嗽更能潤肺甘桔湯溺澀兮導赤芍藥定驚悸又可涼心導赤散一名火府湯便祕兮承氣膽導調元承氣湯膽導法便泄兮黃芩豬苓黃芩芍藥湯豬苓湯大渴兮膈焦置瓜蔞於白虎白虎湯苦煩兮裡熱加山梔於安神安神丸無伐天和兮使陰陽之適調勿犯胃氣兮雖攻補之不盡痘欲盡發而不留疹欲盡出而無病或邪氣之郁遏兮留而不去或正氣之損傷兮困而未伸毒歸五臟變有四症毒歸脾胃兮泄瀉不止而變痢毒歸心肝兮煩熱不退而發驚咳嗽久而血出兮毒歸於肺牙齒爛而疳餂兮毒歸於腎輕者從制以向善平之有功重者拒敵而肆惡攻之不勝熱不除者調元湯加麥冬知母作搐兮藥以抱龍溫驚琥珀抱龍丸錢氏溫驚丸咳不止者阿膠散小阿膠散加杏仁枳實帶血兮專以補肺太平錢氏補肺阿膠散十藥神書太平丸注下兮異功豬苓澤瀉錢氏異功散虛滑者大作參苓參苓白朮散滯下者異功當歸芍藥休息者少與真人真人養臟湯惟有牙疳之病原呼走馬之名初息臭而腐肉漸血出而穿齦內服地黃兮制其火怪地黃丸外擦蚊蛤兮殺其𧈟精蚊蛤散牙若脫落兮崩砂之狀可畏聲若啞嗄兮狐惑之證難明應出不出兮發之初惺惺次通聖奪命大發而有準惺惺散防風通聖散奪命丹應收不收兮解之初葛根次化斑涼膈大解而最靈升麻葛根湯化斑湯河間涼膈散色淡白兮為虛四物去川芎加紅花桂枝四物湯色紫黑兮血熱化斑去人參加玄參燒糞化斑湯奪命發斑疹之聖奪命丹無價解疫癘之神無價散發不出而煩躁兮虞不能臘黑不變而譫妄兮食不及新熱蒸蒸兮色赤痢滴滴兮氣腥羸瘦骨肉之脫瘈瘲神識之昏喘急兮胸高肩聳疳爛兮漏腮缺唇休誇三世之妙手難留一息之遊魂豈不聞誤服湯丸兮不如勿藥又不見特犯禁忌兮可以自省愛吃鹹酸兮咳嗽連綿而未已喜啖辛燥兮火熱燔灼而不寧甘甜過而齒齲生冷多而糞清雞則生風之畜魚則動火之鱗雞魚貪而亂食風火併而起釁邪反滋甚兮為斑疹而不息毒反深入兮值疫癘而再經斯則疹之遺毒亦若痘之餘症欲決內傷須詳外症目常赤痛兮青童抱火鼻常鼽血兮素女臥薪病牙齒以終身兮玄武困於湯鑊發癲癇而連年兮朱雀驚於燒林溲數短澀兮乃州都之遭火便溏垢蠱兮必倉廩之被焚哮喘炎上之象丹瘤赤熛之形唇舌多瘡兮門戶殘煙未熄咽喉常腫兮管籥餘燼猶存敬求其故兮則一言之可盡欲撥其本兮豈一旦之能平噫此賦之作效蛙之鳴詞雖鄙俚兮積如磊石法則珍祕兮故曰碎金原痘論上古之時未聞瘡之症素難之文鮮有及者豈其人淳龐朴野積精全神虛邪苛毒莫之能害歟或云自建武徵虜遂染其毒流布中國謂之虜瘡或曰聖瘡言其變化莫測也或曰天瘡言為天行疫癘也或曰百歲瘡言人自少至老必作一番也或曰豌豆瘡言其形之相似也故病此者如蛇蛻皮如龍蛻骨死生存於呼吸之間夫上古所無而末世有之抑時世異耶抑人將失之耶豫思其由天地之氣春夏生養之紀也其物熙熙秋冬殺戮之紀也其物黟黟時逮末世已非泰和之景不可謂非時世之異然人日習偽不知持滿御神之道七損八益之數務快其心以散其真不可謂非人自失之也有論穢毒者有論淫火者有論時行正病者靡有定論將謂穢毒淫火邪則一歲之中大而郡縣小而村落病者相似而死相繼比屋哭聲穢毒淫火未必人人若此之甚也將謂時行正病邪何以自少至老但作一度厥後再無傳染也蓋父母於子一體而分精血之毒已蓄於陽施陰化之始固不待誕生之頃咽其血而後有是毒也況男子惜其氣以養其精女子耗其氣以養其血苟失所養即貽他日之患子之受於父母者雖殊其為毒則一也豈有男子淫火起於氣為陽毒而易治女子淫火起於血為陰毒而難治之理耶至於天行正病亦有其時但遇天年之所加及有四時不正之氣即知有是正病也然則待時而發者胎毒也或速而危或徐而持或暴而死者氣之微甚所使也發則其毒泄矣所以終身但作一度後有其氣不復傳染焉痘為胎毒昭昭矣其間或疏而輕或密而重或重變輕或輕變重變化叵測是又有説焉疏而輕者始終如一密而重者變怪百出或因父母相傳而然或因疫癘相染而然或因鬼疰相著而然杳冥恍惚出於聞見思慮之所不及此與智者道之癡人前不必説夢也何者蓋痘疹之毒父母原自有之雖嘗作過一番而臟腑經絡皮毛肌肉骨髓之間餘毒猶有存者一旦分形化氣注之於子其毒亦隨之泄矣所以子之瘡瘢多肖親也加之調攝失宜放恣無忌其毒益甚瘡痘之候沉因危篤者未必非父母之所致也凡子之侏儒跛躄必肖於親況疹痘之毒乎且人受天地之氣以生天地之氣變人之氣亦變或遇遷正失守淫勝郁復之紀德令乖常異災迭見自然癘氣傳染證候相似所以輕則俱輕重則俱重若有主之者是則疫癘之所為也故人之疫癘而死者精靈不散遊魂往來隨氣而行常以其氣疰於平人而為之疾如瘵癘之傳染然形質龐厚福澤悠遠者不能相及苟體虛福薄之人陰為舛亂之歲則膏肓之豎臺駘之祟互相染著反復變化術不能禁工不能治也此非鬼疰之害乎夫治此三者當奈何曰必為之豫解其毒平其氣遷其處庶乎可免矣胎毒論易曰大哉乾元萬物資始又曰至哉坤元萬物資生夫乾稱父資始者氣之始也坤稱母資生者形之始也人之有生受氣於父成形於母是以毛髮皮膚肌肉筋骨四肢百骸其來固有自矣然則胚胎造化之始精施血受之候輔翊調養抑豈無道耶奈何為父者以酒為漿以妄為常以欲竭其精以耗散其真命門衰敗陽道勿興乃服助陽之劑至於陽火益熾陰水益枯失其乾道此父遺毒於氣之始也為母者褊急妒忌以致衝任氣逆月事不時乃服暖宮之劑煎熬真陰血中伏火失其坤道此母遺毒於形之始也且古之男子必待婦人月水時下之後與之交媾以成其胎婦人有孕則居側室以保其胎而又不妄作勞飲食必謹今之夫婦不知此理情欲妄動飲食妄嗜此父母之遺毒又不特一朝一夕而已也況子喘息呼吸氣通於親故蓄毒於腸胃膈膜皮毛筋骨之間待時而發或為瘡瘧或為驚忤或為丹瘤胎毒之間惟痘最酷加以天地肅煞之氣歲運乖戾之變水土之不齊疫癘之交作則夭昏稚殪難以枚舉是雖氣數抑人之所自致歟誠使為父母者以繼嗣為重以無後為慮節其嗜欲守其禁忌父之有疾責而治之母之有疾責而治之必使精血和平則陽施陰化氣清形粹子亦不攖其毒復何夭殤之恫耶或曰兒在胎之時其母不畏禁忌恣意所欲加添滋味好啖辛酸或食毒物其氣搏於胞胎之中所以兒受此毒發為瘡疹也殊不知人之有生受氣於父成形於母胞胎之毒父當分任其咎未可專責母也如東垣所論紅絲瘤是也又曰胎在腹中食母穢液至生之時啼聲一發口中所含惡血隨吸而下寄於右腎胞絡之中瘡疹之發乃下焦相火熾也蓋兒在胞中賴母氣以養其形母懷胎之時天食以五氣各有所湊也如臊氣湊肝焦氣湊心香氣湊脾腥氣湊肺腐氣湊腎之類地食以五味各有所入也如酸味入肝苦味入心甘味入脾辛味入肺鹹味入腎之類至於五志之動各有所傷如怒傷肝喜傷心思傷脾憂傷肺恐傷腎之類兒之受病於母者不特始生咽血一事而然也又曰小兒瘡疹五臟之中惟腎無候以在腑下不能受穢故也夫腎有兩枚左為腎右為命門男子以藏精女子以系胞胎胚之初精血混合設有其毒腎先受之豈有腎在腑下而不受毒者哉況肝生筋心生血脈脾生肌肉肺生皮毛腎生骨設使腎無所受何以能生骨也既瘡疹諸症起於右腎之下行足太陽之經足太陽膀胱腎之腑也安得為腎無候乎或曰諸痛癢瘡瘍皆屬心火今謂起於右腎者君火在相火之右但立名於君位而天氣不加相火者守位而奉天之命以宣行君火之氣所以心者君火也欲彰其德右腎為命門相火代君之令而行之耳故曰起於右腎之下也昔人謂兒在胞中飢則食母之血渴則飲母之漿豫獨謂其不然蓋兒始受氣之時一月胚二月胎不過一點精血凝結中涵生意也至三月以後其形漸成在胞之中譬諸禽鳥雛在卵殼中渾融變化熏蒸滋養惟所受太初之氣漸自生長日月既足乃破其胎卵而出矣何以能飲食耶必謂有所飲食則胚胎之初形象未具何飲何食耶且血者渣滓之物入則有出十月之前所飲所食之血又從何道出耶若生下口含惡血乃母臨蓐之時血穢流溢入兒口中未必便是先在腹中所食之血也但云兒在胎中滋養形體長育變化培根蒂者則在母之血液也瘡疹惟腎無候論錢氏曰痘疹始出之時五臟證見惟腎無候但見平證耳骩尾觚骨也涼耳涼是也骩耳俱屬於腎其居北有主冷也後人不知腎獨無候之理遽謂腎在府下不受穢毒所以無候欲專補脾土以制腎水又欲虛其腎以免黑陷之變內經曰君火之下陰精承之五氣不可以偏勝苟失其平則為災孽今瘡毒之火起於三焦煎熬臟腑燔灼皮肉非腎水有以制之則慓悍之勢莫之能御惟腎無候者所以存生生之源見陰陽造化之妙也又腎在下而主骨腎獨無侯者此瘡疹之毒升浮發散而出於外不然則反陷伏入於內矣觀其但見平者乃耳骩如常不似渾身之熱非謂真冷也蓋腎主骨骩者骨之本也腎通竅於耳故骩涼耳涼為腎不病若反熱則火炎水涸真陰敗絶而死不旋踵矣或欲用四君子湯專補脾土以制腎水者殊不知白朮之燥腎之所惡茯苓淡滲腎中津液腎本無侯而又伐之所謂誅罰無罪也或見錢氏用百祥丸以下腎之實者又欲虛其腎以防黑陷之變不知百祥丸正謂黑陷為毒氣入腎故以百祥丸下若不煩躁大小便祕安可下之乎謂之實者邪氣實也苟無黑陷而下之寧不反虛其里自取陷伏之變乎或云以瀉膀胱非瀉腎也此文飾之詞不足信也然則保脾土以制腎水者非歟曰察其虛實如果內虛泄瀉則補脾土使裡氣實瘡疹不至於陷伏若內實則補脾之説正犯實實之戒但云補脾土使毒不陷伏而歸於腎則可謂補脾土以制腎水則不可腎主痘中之水論論者皆曰痘瘡惟腎無證腎不可實腎實則為黑陷有欲虛其腎之意是未知五行生化之理也蓋心肝脾肺腎五行之所屬也聲色臭味液五行之所化也難經云肝色青其臭臊其味酸其聲呼其液泣心色赤其臭焦其味苦其聲言其液汗脾色黃其臭香其味甘其聲歌其液涎肺色白其臭腥其味辛其聲哭其液涕腎色黑其臭腐其味鹹其聲呻其液唾此五臟之中各具一五行也然肝主色五色之變在乎木也心主臭五臭之變在乎火也脾主味五味之變在乎土也肺主聲五聲之變在乎金也腎主液五液之變在乎水也此一臟之中統體一五行也既曰肝為水疱以淚出如水淚則腎之液也肺為膿疱以涕出稠濁涕則腎之液也心為斑以血色赤而小血則腎之液也在內為血在外為汗夫五臟之液皆本於腎如此然則痘中之水腎乃主之至於結痂則土來制水而干較所以脾主結痂其色微黃也腎又為封藏之本痘之痂靨腎又主之觀乎此不可謂腎無證亦不可使之虛也雖曰腎主黑陷乃火太過水不能勝津液枯萎而變矣痘疹五臟證見論凡病發於一臟惟痘疹之症五臟悉見蓋兒受父母之氣以成形屬毛離裡喘息畢通肝氣通於筋心氣通於血脈脾氣通於肌肉肺氣通於皮毛腎氣通於骨髓至發痘疹之時內連臟腑外達百骸所以五臟悉具也故發熱之初呵欠頓悶肝證也乍涼乍熱手足稍冷多睡脾證也面燥腮赤咳嗽嚏噴肺證也驚悸心證也骩涼耳涼腎之平證也於其證之多寡可以知其臟之主病矣自是之後初出一點血心也諸瘡屬心其毒斬關而出血先受之也血化為水肝也肝主泣水疱者淚出如水也水化為膿肺也肺主涕膿疱者似涕稠濁也膿成毒解而結痂者脾也脾屬土萬物功成於土痂皮微黃者土之色也其所以收斂閉藏者肺與腎也肺主收斂腎主閉藏也如初出一點血隱伏皮下不成顆粒者毒伏於心其死至速出如水珠皮肉染丹者毒伏於肝必加癢塌而死出如灰白皮枯不潤者毒伏於肺必喘呼悶亂而死出於皮下肉先浮腫者毒伏於脾必至灌爛嘔瀉不食而死出多血疱黑陷者毒伏於腎必血妄行而暴死矣如初出成顆漸乾黑者玄府閉塞毒無從出其血先干轉添悶亂而死者心之病也血化為水浮囊嫩薄者肌肉已敗必至癢塌肝之病也脾主肌肉肝木克之脾敗者死皮破復灌飲食能進此脾土尚強肝木不能犯之也水化為膿膿未及成忽然收較痂皮焦黑肺之病也未至而至是謂太過反兼火化也若於空中再出一番此腎不受邪復還於肺從下上者順也以痘疹言之裹束於外者脾也脾虛則易破充拓於裡者氣也肺主氣肺虛則不起發榮於根腳者血也肝主血肝虛則色不榮痘中之水腎也腎虛則乾枯黑陷癢痛者心也心主火實則痛虛則癢以痘之色言之紅活者心也惡其嬌豔中黑者腎也惡其焦陷漿白者肺也惡其灰褐蒼蠟者肝也惡其青干淡黃者脾也惡其肉爛臨病之工審察五臟以施方治無不效矣臟腑主證治肝者罷極之本魂之居也主風惡風其色青屬木其味酸其臭臊其華在爪其充在筋其液為淚其聲為呼在變動為握開竅於目實則目直大叫呵欠頓悶項急虛則咬牙多欠熱則手尋衣領及亂捻物諸風振掉皆屬於肝肝苦急急食甘以緩之甘草欲散急食辛以散之川芎以辛補之生薑以酸瀉之芍藥心者生之本神之變也主驚惡熱其色赤屬火其味苦其臭焦其華在面其充在血脈其液為汗其聲為笑在變動為噫開竅於舌實則叫哭發熱飲水而搐虛則困臥悸動不安熱則合面睡口中氣溫上竄咬牙諸痛癢瘡瘍皆屬於心心苦緩急食酸以收之五味子欲軟急食鹹以軟之芒硝以咸補之炒鹽以甘瀉之甘草脾者倉廩之本營之居也主困惡濕其色黃屬土其味甘其臭香其華在唇四白其充在肉其液為涎其聲為歌開竅於口在變動為噦實則困睡身熱飲水虛則吐瀉生風諸濕腫滿皆屬於脾脾苦濕急食苦以燥之白朮欲緩急食甘以緩之甘草以甘補之人參以苦瀉之黃連肺者氣之本魄之處也主喘惡寒其色白屬金其味辛其臭腥其華在毛其充在皮其液為涕其聲為哭開竅於鼻在變動為咳實則悶亂喘促虛則哽氣長出氣熱則手掐眉目面諸氣憤郁皆屬於肺肺苦氣上逆急食苦以瀉之訶子皮一作黃芩欲收急食酸以收之白芍藥以辛瀉之桑白皮以酸補之五味子腎者主蟄藏之本精之處也主虛惡燥其色黑屬水其味鹹其臭腐其華在發其充在骨其液為唾其聲為呻開竅於二陰又云開竅於耳在變動為栗虛則目無精光畏明然骨重腎怯則猝失音諸寒收引皆屬於腎腎苦燥急食辛以潤之知母黃柏欲堅急食苦以堅之知母以苦補之黃柏六氣十二經所主證治太陽所至為腰痛太陽病發熱腰痛脊強項𠘧𠘧頭痛小便赤澀足太陽膀胱經氣病則腎痛腰似折血病則狂顛疾手太陽小腸經氣病則嗌痛頜腫血病則頰腫寒淫於內治以甘熱佐以苦辛以咸瀉之以辛潤之以苦堅之寒淫所勝平以辛熱佐以苦甘以咸瀉之足太陽經麻黃桂枝澤瀉黃柏手太陽經生地黃赤茯苓二經通用羌活防風藁本陽明所至為皴揭陽明病身熱目赤作渴譫妄大便祕足陽明胃經氣病則喜呻數欠驚妄發狂血病則唇疹喉痹手陽明大腸經氣病則頸腫血病則鼽衄喉痹燥淫於內治以苦溫佐以甘辛以苦下之燥淫所勝平以苦溫佐以酸辛以苦下之足陽明經半夏蒼白朮防風手陽明經連翹秦艽麻仁二經通用升麻葛根白芷石膏大黃少陽所至為嚏嘔瘡瘍惡病暴死少陽病乍寒乍熱胸脅痛乾嘔心煩足少陽膽經氣病則口苦善太息血病則腋下腫手少陽三焦經氣病則嗌腫喉痹血病則目鋭眥痛頰痛火淫於內治以鹹冷佐以苦辛以酸收之以苦發之火淫所勝平以鹹冷佐以苦辛以酸收之以苦發之以酸復之足少陽經半夏龍膽草連翹手少陽經川芎熟地黃附子細辛黃耆二經通用柴胡青皮太陰所至為中滿吐下太陰病自利四肢逆冷足太陰脾經氣病則舌本強食則嘔善噫血病則溏泄手太陰肺經氣病則喘咳血病則渴煩心濕淫於內治以苦熱佐以酸淡以苦燥之以淡泄之濕淫所勝平以苦熱佐以酸辛以苦燥之以淡泄之足太陰經防風蒼白朮當歸白芍藥吳茱萸黃耆人參甘草砂仁手太陰經升麻白芷桔梗麻黃黃芩梔子石膏天麥門冬桑白皮杏仁少陰所至為瘍疹少陰病咽痛口舌燥足少陰腎經氣病則善恐血病則舌乾咽腫嗜臥手少陰心經氣病則嗌乾渴而欲飲血病則衄蔑血汗熱淫於內治以鹹寒佐以甘苦以酸收之以苦發之熱淫所勝平以酸寒佐以苦甘以酸收之足少陰經附子丁香桂黃耆手少陰經麻黃桂心生地黃黃連當歸二經通用獨活細辛厥陰所至為嘔泄厥陰病四肢厥冷時作搐搦舌卷卵縮足厥陰肝經氣病則腰痛嗌乾血病則嘔逆飧泄遺溺閉癃手厥陰心包絡氣病則臂肘攣急腋腫脅痛血病則煩心掌中熱風淫於內治以辛涼佐以苦甘以甘緩之以辛散之風淫所勝平以辛涼佐以苦甘以甘緩之以酸瀉之足厥陰經羌活吳茱萸甘草當歸龍膽草手厥陰經熟地黃牡丹皮二經通用柴胡青皮凡痘疹發於三陽者可治發於三陰者不可治
