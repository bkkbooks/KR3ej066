body:
  text: 卷之二氣運瘡疹之候或間數年而發或發則連年不已何也經曰不知年之所加氣之盛衰虛實之所起不可以為工矣蓋司天者主行天之令上之位也歲運者主天地之間人物化生之氣中之位也在泉者主地之化行乎地中下之位也一歲之中有此上中下三氣各行化令氣偶符會而同者則通其化其中於人則病矣所以瘡疹必待其年而發也六十年中天符十二年戊子戊午己丑己未戊寅戊申乙卯乙酉丙辰丙戍丁巳丁亥其中有四年為太乙天符戊午己丑己未乙酉謂之天符者司天與運同也太乙天符者司天與運及辰之同也歲會八年丙子己丑丁卯甲辰甲戍戊午己未乙酉謂之歲會者運與支同也同天符六年甲辰甲戍庚子庚午壬寅壬申同歲會者六年癸卯癸酉癸巳癸亥辛丑辛未謂之同者謂歲運與在泉合其氣化陽年曰同天符陰年曰同歲會也五者雜而言之共三十六年合而言之止有二十六年經曰天符為執法歲運為行令太乙天符為貴人邪之中人則執法者其病速而危行令者其病徐而持貴人者其病暴而死也又子午之歲少陰君火主之寅申之歲少陽相火主之經曰少陰所至為瘍疹少陽所至為嚏嘔瘡瘍惡病暴死凡此數年剛柔失守升降窒抑舊者不退新者不遷則連年發而不已也疫癘瘡疹雖胎毒必待時令不正之氣相傳染而發蓋春氣溫和夏氣暑熱秋氣清涼冬氣冷冽此四時正氣之序若春應暖而反寒夏應熱而反清秋應涼而反熱冬應寒而反溫此非其時而有其氣為不正之令也夫人感之或為寒熱或為瘧痢或為喉痹或為腫或為斑疹謂之天行正病又云疫癘是以一歲之中彼此傳染大小相似又若冬溫陽氣暴泄至於來歲必發瘡疹何也蓋小雪以後為終之氣太陽寒水主之水德不彰使厥陰少陰木火之氣反來乘之陽氣早發奉生者少故來春民多病也況瘡疹之毒藏於至陰之下發於太陽之經當其時而動其氣毒乃發矣此冬溫之後必發瘡疹也凡此不正之氣發之泄之解之平之勿犯歲氣是謂良工故治疫癘者以解毒為急部位諸瘡皆屬心火心之華在面瘡病之候但以面之部各位占之思過半矣且痘疹陽毒諸陽皆聚於面吉凶善惡尤易見也額屬心火如印堂以上髮際以下橫兩日月角位先見紅點先作漿先結靨者此惡候也蓋心為君主毒發於心故先見於其位君危則十二官皆危其死速矣左臉屬肝木右臉屬肺金如兩臉先見紅點磊落者吉如相聚作塊其肉硬腫者死蓋肝藏魂肺藏魄生意既絶魂魄將離故不治也頰屬腎承漿橫抵兩頰先見紅點先發先靨者吉此位雖屬腎然三陽三陰之脈皆聚於此陰陽和故可治也鼻屬脾土若準頭先出先靨者凶蓋脾屬土四臟稟命於脾毒發於脾土敗則四臟相隨而敗故綿延日久後斃也腎之竅在耳又云心開竅於耳心腎皆少陰君火也又少陽相火之脈行耳之前後凡在耳輪先現紅點者凶蓋君相二火用事燔灼之勢難以撲滅也惟口唇四圍先出先起先靨者大吉蓋陽明之脈挾口環唇胃與大腸主之無物不受故也脈候痘疹有形之證無所用診又歲氣主之似不必診經曰微妙在脈不可不察察之有紀從陰陽始是則不可不診也先哲有言曰瘡痘脈靜身涼者生脈躁身熱者死可見瘡疹亦用診矣故小兒七歲以上四至為平脈七歲以下六至為平脈或云八至者非也大抵小兒之脈多帶緊數玉函經云自然緊數甚分明都緣未散精華氣又瘡毒之脈多浮大而數傷寒論云浮為風虛大為氣強風氣相搏必成癮疹又云數脈不時則生惡瘡也脈六至為數如過於本脈為太數邪氣實也不及本脈為遲遲則正氣虛也診脈之法浮以候表沉以候里浮而數表熱也浮而遲陽氣衰也沉而緊裡熱也沉而細元氣脫也痘疹之陽脈浮沉宜帶洪實弱而無力為陽病見陰脈仲景曰陽病見陰脈者死凡診得浮而無根瞥瞥如羹上之肥數而急疾連來如雀之啄細而欲散榮榮如蛛之絲遲而欲絶滴滴如屋之漏沉而時見如魚之躍皆死脈也氣血人之一身本乎榮衛衛者陽氣所以開闔橐籥運動樞機者也榮者陰血所以充溢臟腑灌溉肢體者也故氣虛則神氣息血虛則化源絶二者不可偏勝也痘疹之毒本於五臟之液各隨經絡部位直犯榮衛而出氣血從之觀其裹束堅厚窠囊充長者氣之足也根牙紅活形色潤澤者血之足也氣血既足則痘易發易靨不須施治以蹈實實之戒如平陷嫩薄者氣之病也乾枯紫黑者血之病者責而治之不可因循以貽後悔然脾胃者氣血之父也心腎者氣血之母也肝肺者氣血之舍也脾納水穀其悍氣注於腎而為氣腎舍於肺而為衛以溫分肉充皮毛肥腠理司開闔也衛氣虛則瘡不起發其毒乘氣之虛而入於肺肺受之則為陷伏而歸於腎矣脾納水穀其精氣注於心而為血心舍於肝而為榮以走九竅注六經朝百脈也榮血虛則瘡不光澤其毒乘血之虛而入於肝肝受之則為癢痛而歸於心矣凡治此者氣病治氣血病治血寒則溫之熱則清之虛則補之實則從之仍以脾胃為主不可犯之也陰陽內經曰陰在內陽之守也陽在外陰之使也陰者血也陽者氣也難經曰氣以詬之血以濡之言氣以行其血血以濡其氣也痘瘡之出其浮沉聚散使於外者陽之德也灌注滋潤守於內者陰之德也陽守乎陰陰使乎陽互為其用所以易發易收也若陰不足則陽不長而枯萎之變出焉陽不足是陰不生而陷伏之變出焉必陰陽相濟毒化而解矣故治此者春夏養陽秋冬養陰辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽陰病治陽陽病治陰從陰引陽從陽引陰寒之而熱者取之陰熱之而寒者取之陽形不足者溫之以氣陽也精不足者益之以味陰也是皆素難之所祕能達陰陽之理可以為人司命矣標本病有標本治有後先有從標者有從本者有先標後本者有先本後標者有標本兼治者視其急緩其法不同也痘瘡之候自人身而言氣血為本瘡疹為標自瘡疹而言瘡疹為本別證為標如瘡子稠密在標之病也視其氣之不勻血之不周以勻氣活血兼行解毒此則標本兼治也瘡若起發氣或虛者補其氣血或虛者補其血此緩則專治其本也氣血充實瘡或壅遏者單行托裡解毒之劑此急則專治其標也瘡勢太甚咽喉腫痛者以治咽喉為主此急則治其標也瘡熱太甚自利不止者以止利為主此急則治其標也利久不止漸成壞瘍救里發表兼而行之此亦標本兼治也先救其里後攻其表此則先標後本也大小便祕煩躁喘呼者急利之此急則治其標也瘡熱太甚煩渴不止以解毒為主兼治其渴此先本而後標也凡此之類擴而充之以盡其余則治不紊矣形色或云痘瘡之候無以脈診言形色可辨也謂之形者痘之形也故尖圓堅厚始出之形發榮滋長欲壯之形飽滿充足成漿之形斂束完固收靨之形與大豆豌豆緑豆相似者皆正形也或平或陷形之變也如初出時空若蠶種之蛻隱如蚊蚤之迹薄如麩片密如針頭若熱之痱寒之粟者不能起發而死黏聚模糊肌肉虛浮溶軟嫩薄皮膚潰爛者不能收靨而死謂之色者痘之色也喜鮮明而惡昏暗喜潤澤而惡乾枯喜蒼蠟而惡嬌嫩紅不欲焰焰則易破白不欲灰灰則難靨由紅而白白而黃黃而黑者此出形起發成漿結痂之正色也出形而帶紫起發而灰白此色之變惟辨痘之形色可知死生之期疏密痘欲其疏疏則毒少不欲密密則毒甚此古今確論也疏密之分各有喜忌如頭面欲疏元氣不可犯也頸項欲疏管籥不可塞也胸背欲疏臟腑俞募之所附也若夫手足不忌其密矣謂之疏者非但稀少也鋪排磊落大小勻淨亦可以言疏謂之密者非必盛多也攢聚黏連片復亦片雖只數處亦可以言密疏而凶者亦有數等如初出時才見紅點三兩處其熱便退可以語其疏也苟大熱不解唇口燥裂大小便祕煩躁不寧或身無熱但增煩渴者此由毒甚郁遏於中不能遽出日復漸出漸加稠密一也又如初出一兩點頂尖焦黑或三四粒作一堆者僅見數處他無所出喜睡不食煩渴大小便澀此由毒伏於中加譫妄者不待起發而死若能起發後必發癰毒也二也亦有出現實疏遂生玩忽之心禁忌不守風寒不避飲食所傷湯丸之試變生不測三也設有密而吉者治之早衛之嚴里無病而瘡悉成也輕重痘有輕重輕者不須服藥但加保護而已重而未成壞瘡者可急治之重而且壞不可治也何謂之輕輕者作三四次出大小不一等根窠紅肥澤充滿頭面稀少眼中與喉舌無瘡能食大小便如常此毒之輕也重者一齊出起發收靨如期能食其重之可治者若頭面頸項胸背喉舌皆瘡稠密無縫或灰白色或青紫陷下或外白里黑或外黑裡赤食谷則噦飲水則嗆或自利不止或大便不通此重之不可治者也然有輕變重者以犯房室觸穢汙食生冷冒風寒惑於鬼神誤投湯藥此人事之失也有重變輕者以避風寒節飲食忌生冷遠人物醫不乖方此人事之得也籲本輕本重者諉之於命變輕變重者非人所自致歟順逆古人謂瘡疹春夏為順秋冬為逆春三月謂之發陳萬物以生夏三月謂之蕃秀萬物以長得其時所以順也秋三月謂之容平草木萎落冬三月謂之閉藏蟄蟲坯戶違其時所以逆也此亦語其生長收藏之理豈有春夏皆順而吉秋冬皆逆而凶者乎如春失養生夏失養長則春夏亦逆秋能養收冬能養藏則秋冬亦順也惟痘出一般疏密得所不愆其期症之順也痘出來雜帶斑帶疹稠密無縫常失其期症之逆也噫春夏為順秋冬為逆古人之言豈真拘拘於時令之説耶蓋春夏發生之令也秋冬殺伐之令也痘瘡之出起發者得春夏之令所以為順陷伏者得秋冬之令所以為逆其斯之謂歟春膿疱金剋木夏黑陷水剋火秋斑火剋金冬疹土剋水為之逆者此不經之談黑陷一症四時不治何但在於夏耶故非其時而有是症者氣血和平臟腑充實莫不皆順如其時而有是症者氣血衰弱臟虛憊者莫不皆逆痘有怪變夫痘曰聖瘡者謂之變化莫測也若正而順者自然苗而秀秀而實以成造化之功被邪而逆則有許多怪變焉一曰試痘初發熱兩三日面上報出紅點磊落稀疏十分可喜也不起發也不灌膿至五六日後都不見了其人面多青黑精神困倦再過兩三日後遍身發熱其痘一齊湧出善醫者能保其一二其實不可治者多矣二曰痘母初發熱四五日後其痘不出或肩背上或胸前忽然腫起一塊小者如杯大者如盤又有發熱二三日後面上遍身其痘盡出至起發時中間有痘瘡三五糊塗根腳頑硬但見此症多不可治三曰鬼痘發熱三日出痘又三日磊落稀疏十分可喜至起發時痘頂作膿如緑豆色根腳紅圈戴豔至六七日後其瘡自破個個深孔如錢鏨中心之狀必不可救又有一等起發之時忽有瘡頂變黑撫之則痛者急以法救之以待傳開不可活矣四曰爛痘初出之時十分可喜至於起發作膿之時自然潰爛破損此病甚危五曰干痘出形之後細密混雜如疹如疥皮膚乾燥瘡頭焦黑不能起發而死六曰空痘出現時好起發時好只到灌膿之時卻不作膿一片空殼此症若不死必發癰毒大抵不可活者多矣七曰生痘痘瘡之出即如枝頭之果以漸成熟今起發之時中心平陷再不滿頂至於作膿之時四圍紅紫尤是生血不化膿漿其期已過不見成熟之色此症必死虛實不知虛實者不可以為工經曰無虛虛無實實虛實之分不可不知也經曰必先度其形之肥瘠以調其氣之虛實此以形體別虛實也又曰谷盛氣盛谷虛氣虛此以飲食別虛實也又曰脈實血實脈虛血虛此以血脈別虛實也又曰邪氣盛則實精氣奪則虛此以邪正別虛實也大抵實者邪氣實也虛者正氣虛也經曰邪之所湊其氣必虛留而不去其病則實是也又云五實死者謂邪氣之實也五虛死者謂正氣之虛也瘡痘之症其人形體肥健飲食能多六脈洪實素無疾病大便如常瘡色紅潤者此表裡正氣俱實也不須服藥若形體羸怯素多疾病飲食減少六脈微弱吐利頻頻瘡色淡嫩若此表裡正氣俱虛也陳氏溫補之法可用如瘡熱太盛焮腫痛脹大熱不退煩渴昏睡大小便祕此表裡邪氣俱實也錢氏涼瀉之法可用如瘡本稠密焮發紅活吐利不食者此表虛里實也於補湯中加解毒藥如瘡色淡白發不透滿大小便祕浩飲大嚼者此裡實表虛也於解利中加發散藥又如瘡痛者邪氣實也當活血以開其鬱若痛如刀剜悶亂大叫者勿治瘡癢者正氣虛也當補氣以燥其濕如爬搔不定破爛皮脫者勿治灰白者氣虛也參耆之功為大乾燥者血虛也歸芎之力宜多虛則補之實則瀉之中病則已無過其制此治之權衡也若本實而反補之則毒氣彌盛或為潰爛或為癰腫或為目病或為咽瘡或為失血皆補之過也如本虛而反瀉之則正氣益虛或為吐為利為厥逆皆瀉之過也經曰毋致邪毋失正絶人長命其此之謂歟動靜凡物得其平則靜失其平則動經曰陽氣者靜則養神柔則養筋又曰陰氣者靜則神藏躁則消亡夫患痘者陰陽俱病息欲其勻語欲其少寐欲其定寤欲其寧飢則索食渴則少飲觸其瘡則吟拂其欲則鳴此平人之候神清氣定謂之靜而吉也如呻者身有苦也自語者神不清也喘粗者內熱也腸鳴者瀉也坐臥不定者心煩也啼叫不止者痛也搖頭者風也指欲搔者癢也咽物難者咽痛也咬牙者必肝熱也若悶亂躁擾譫妄昏眩如見鬼狀搖頭扭項手舞足擲目睛上翻寒戰咬牙語音不出則皆死候矣如病向靜忽作擾動者異也以法求之如瘡色變無他候者此戾氣所觸也如瘡色不變又無他症此必有因但俟自定其有目瞑息微四肢僵直口噤瘡壞昏睡不醒者此真氣將脫魂魄欲離之兆又不可作靜論也痛癢諸痛為實諸癢為虛謂之實者邪氣實也謂之虛者正氣虛也又瘡疹為火火盛則痛火微則癢故常作痛者此邪氣之實也蓋痘瘡之毒發於皮膚肌肉之間氣以束之血以潤之醞釀其毒以抵於化正氣周旋而不捨毒氣變化而未成鬱而作痛此其常也毒化膿成其痛自止若肉如刀割膚如錐刺一向痛而不止大叫多哭此則皮傷肉敗不勝其毒又痛之變也常作癢者此正氣之虛也經曰胃者水穀之海六腑之大原也五味入口藏於胃以養五臟胃氣既虛則水穀不化津液內竭不能輸精於皮毛氣失其衛血失其榮不能醞釀毒氣以至於成使毒氣浮沉隱伏聚散倏忽灼於皮毛所以癢也此其為異補其氣血和中托裡其癢必止若一向瘙癢時甚一時爬抓破壞皮脫肉坑者此毒氣內陷正氣外脫不旋踵而告變矣如先痛後癢此常候也蓋先則毒未解化其火正盛宜爾作痛厥後膿成毒解火氣漸微宜爾作癢也老嫩嘗觀朝華之草夕而零落松柏之堅凌冬不凋夫以草木堅脆不同堅者難壞脆者易傷況於人質有厚薄氣有強弱耶彼瘡痘之毒喜老而惡嫩蒼蠟嬌紅色之老嫩也緊實虛浮形之老嫩也濃濁清淡漿之老嫩也堅厚軟薄痂之老嫩也老嫩之故衛氣主之經曰衛氣者所以溫分肉充皮膚肥腠理司開闔者也是故衛氣強則分肉堅皮膚厚腠理密而開闔得也所以收斂禁束制其毒而使不得以放肆故色蒼而形緊而實漿濃而濁痂厚而堅自然易壯易靨雖有邪風穢毒弗能害也如衛氣弱則分肉脆皮膚薄腠理疏而開闔失也所以不勝其毒而毒得以恣其猖狂之性故色嬌而紅形虛而浮漿清而淡痂軟而薄易破難靨不待邪風穢氣而先敗害矣觀夫瘡之老嫩則氣不可不養也榮枯夫物濕則潤澤燥則乾枯榮枯之分血實主之故血者所以榮陰陽濡皮毛流關節也瘡本疏者血不在多而易充足瘡本稠密貴乎血之有餘矣苟血有餘則經脈流行淪於肌膚浹於皮毛灌溉滋潤肥澤長養自然形色鮮明根窠紅活也如血不足則經脈壅遏窠囊空虛黑燥而不鮮明也枯萎而不肥澤也皮膚皴揭而啓裂也經曰諸澀枯涸幹徑皴揭皆屬於燥又曰燥勝則乾由其人血常不足加之以毒火熏灼反兼燥金之化精血並竭是以有此症也法宜活血養液散火解毒清金潤燥則乾涸可回觀夫瘡之榮枯而得養血之理其或濕氣太過瘡本浸淫犯之則破潰爛難靨者此又火極而兼水化也脾強則生脾弱則死善惡夫良工者必知瘡之善惡善則就之惡則去之瘡痘之症有五善有七惡五善者飲食如常一善也大小便調二善也瘡紅活堅實三善也脈靜身涼手足和暖四善也語聲清亮動止安寧五善也五善之證不能悉俱但得一二自然清吉七惡者煩躁悶亂譫妄恍惚者一惡也嘔啘瀉利飲食不能者二惡也瘡青乾黑陷癢塌破爛者三惡也頭面預腫鼻塞目閉唇裂者四惡也喉舌潰爛食入則咳水入則嗆者五惡也寒戰咬牙聲啞色黯者六惡也腹脹喘促四肢逆冷者七惡也七惡之中但見一症勢不可為七惡之外復有渾身血泡心腹刺痛陷伏不出便溺皆血尋衣撮空者是又卒死之候也始終治痘之法貴乎謹之於始而慮其所終庶無後日之悔經曰上工治未病中工治將病下工治已病未病施治十全八九治將病者十全四五治已病者功莫能施發熱之初大熱渴煩大便祕腹痛腰痛鼻乾唇燥驚悸譫妄此毒氣鬱遏於內即當防其伏而不出也吐利不止即防其中氣虛弱不能助瘡成就或致倒陷也故熱則解之便祕則利之驚則平之吐利則止之且如初出一點血此春之氣發生之令也至於起發此夏之氣長養之令也水化為漿此秋之氣成實之令也膿乾結靨此冬之氣閉藏之令也初出而便有水將發而便戴漿膿未成而便收靨此未至而至謂之太過必有陷伏發表托裡解毒切不可緩應出不出應起不起應收不收此當至而不至謂之不及必責以氣衰血微而勻氣活血解毒之法不可不急施也又如初出色豔者皮嫩皮嫩則易破當防其癢塌也相聚成塊者不可謂之疏此有伏也殼空無水者後必發癰頭面預腫者防其易消而倒陷咽痛者急解之防其失聲嗆喉也中多水泡者後必自利目澀淚出者防其有膚翳也頻更衣者防其倒靨瘡破不結痂此倒靨也堯夫云與其病後才服藥孰若病前能自防其此之謂歟
