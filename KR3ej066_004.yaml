body:
  text: 卷之四驗頭面論曰輕者頭面稀少又胡荽酒法不欲噴頭面以諸陽之會在於頭心之華在於面痘為陽毒而必主之故痘瘡頭面稠密者重頭面預腫者凶頭面瘡破爛腥臭者凶欲占瘡之輕重吉凶莫如頭面也人之一身內則心為君主外則頭為元首言病有真心痛頭痛見難輕犯也經曰精明之府頭傾視深精神棄矣故占人之生死者亦莫如頭凡瘡初出從他處先見漸登於頭起發收靨皆然他處皆有瘡而頭獨稀此佳兆也若於頭額之間先出先戴漿先干收先破損其瘡稠密無縫肉下浮腫皮上濺起粗膚者皆凶惟瘡遍身俱收而頭上不收或熟自破或膿出結如堆積者不須怪蓋天地之化孤陽不生孤陰不長陽變陰合彼此相成頭者諸陽之會無陰相濟所以難收也又病閉目搖頭者死此陽脈不治謂心絶也經曰十二經脈三百六十五絡其氣皆上走於面而走空竅又肝開竅於目肺開竅於鼻脾開竅於口心腎開竅於耳又修真家云面有七竅內應乎心又相術但觀人之面以知禍福可見面不可敗也凡瘡稠密七竅閉塞敗面者凶以臟腑經絡之氣皆病也又諸陽皆聚於面痘為陽毒初出之時必先於面然面有部位其候不同額屬心離火之位火性急烈不可冒犯凡瘡出現泡漿干收先從額上起者凶左頰屬肝震木之位右頰屬肺兌金之位二處不論先後但瘡欲磊落堅厚若模糊成塊浮嫩易破潰爛灌腫者凶蓋肝藏魂肺藏魄肝肺俱敗魂魄以離故凡病痘兩腮冷或木硬者死頦屬腎坎水之位此處先出先壯先靨者吉瘡疹出於腎則吉入於腎則凶也鼻屬脾坤土之位亦不論前後但不欲模糊早干收也若未成漿鼻頭先干黃色凶此脾土將敗真臟色見人中為陰陽之分故南村輟耕録以泰卦象之人中而上分為三部人中而下變分為三部髮際之上陽之上也兩眉之間陽之中也山根以下陽之下也自口至兩乳間陰之上也自心蔽骨至陰毛際陰之中也自陰而下陰之下也凡瘡之出現起發收靨自人中而分上下循序陰陽和暢雖多且密亦可言吉若或舛差雖是稀少亦可言凶此有伏也發熱之時面色明瑩者吉面赤若塗朱者重此邪氣拂鬱於陽明胃與大腸也陽明之經上循於面故面赤色宜以清涼解毒之藥少通利之面垢慘黯者凶瘡疹之火發自少陽面垢者少陽候見也針經云少陽病甚則面微塵宜表裡雙解蓋少陽從中治也驗耳目鼻經曰腎通竅於耳耳者腎之外候也腎之為臟水臟也天一生水受氣之初先生兩腎而一陰藏焉又有相火存乎命門之中瘡疹發熱耳獨涼者瘡疹為火痛不受邪存水之主以制陽光也如耳反熱則水不勝火將有歸腎之變痘瘡之候先觀耳後有紅縷者蓋手少陽三焦之脈從膻中上出缺盆系耳後直上出耳角紅者火色也此瘡疹之火發自少陽自見於其經也凡瘡自耳先出未及成漿耳輪先靨者漸萌歸腎之勢矣目者心之使也神所寓焉發熱之初觀其兩目神倦不欲開者痘也目中汪汪若水者疹也諸瘡皆發於心故候見於目也目赤者熱甚也心惡熱急解之經曰肝通竅於目瘡疹發熱目連眨者肝有風也風入於目上下左右如風吹不輕不重兒不能任故目連眨也目直視者肝有熱也熱入於目牽其筋脈兩眥俱緊不能轉盼故目直也得心熱則搐者風火相搏也痘瘡發搐此其常候但瀉心肝之火搐止則吉搐不止則凶針經曰五臟六腑之氣皆上注於目而為之精精之窠為眼骨之精為瞳子筋之精為黑睛血之精為絡氣之精為白睛肉之精為瀆束裹擷痘瘡之毒發於五臟六腑毒之甚者眼必受之古人留護眼之法其意深矣凡瘡出太甚兩眼常出淚者肝熱也此時眼中無瘡但內服瀉肝火之藥蓋眼中之痘常在收靨不齊之後有之如瘡入目成膚翳者切不可用點藥損睛破瞳成廢人矣痘瘡收後目不可開者肝熱則目澀不敢開明暗皆然心熱是明則合暗處則開謂之羞明此有餘熱在心肝也如瘡未成膿腫去目閉者瘡已過期收靨不齊目閉不開者瘡壞欲變目上竄者心絶也直視不轉者腎絶也非泣而淚自出者肝絶也微瞑者氣脫也血灌瞳子者火勝水竭皆死候也經曰肺通竅於鼻瘡疹發熱之初噴嚏者火邪上干於肺外應於鼻而癢則嚏鼻乾黑燥者火刑于金金體本燥得火反甚急宜清金瀉火以解其毒鼻衄者血得熱而妄行故衄出於鼻急與涼血瀉火以解其毒鼻流清涕者疹也疹發於心心肺相連以火鍊金熱極而反化為水也瘡出之後鼻塞不通者熱也火主䐜脹瘡已成漿收靨之時鼻塞不得息者此鼻內有瘡膿涕沾結可用金銀小簪以通之如瘡未成漿鼻端先乾者凶經曰臟真高於肺以行營衛陰陽也邪火刑肺肺敗不能輸精於皮毛故皮毛焦枯先見於鼻營衛不行陰陽不續以漸遍身皆乾枯而死矣凡瘡變壞鼻中血出者涕自流出者鼻孔開張喘急者肺絶之候皆死症也驗唇口牙齒脾之竅通於口其華在唇四白脈訣云應唇通口氣瘡疹發熱之初口中和唇色紅潤者吉如口燥唇裂其毒必甚急解之瘡出稠密唇口瘡子相黏諸瘡未發此瘡先已戴漿諸瘡未收此瘡先已焦黑者凶面瘡腫灌唇上瘡裂成塊干濺者重如瘡出太密口中臭氣者臟腑敗壞故息出於口也瘡欲變壞唇上縮者脾絶也唇下自呷者魚口也口中涎如膠黏者脾津竭也皆不可治疹家唇口生瘡聲啞者狐惑症也不急治之殺人上片牙隸於坤土乃足陽明胃脈之貫絡也下片牙隸於乾金乃手陽明大腸脈之貫絡也瘡疹發熱之初口開前板齒燥者裡熱也宜以清涼之劑微解之咬牙者牙乃骨之餘腎主骨寒戰咬牙毒歸於腎必死如發熱咬牙者有欠則為肝熱目上竄則為心熱此欲作搐也瘡已收靨牙齦潰爛者此內瘡未得平復也勿作走馬疳瘡治之疹後牙齦潰爛血出肉黑氣臭者此乃是走馬疳也驗喉舌咽者胃之系主內而不出所以司飲食也喉者肺之系主出而不內所以司呼吸也人之咽喉乃緊要橐籥門戶也經曰一陰一陽結謂之喉痹一陰者手少陰君火心主之脈氣也一陽者手少陽相火三焦之脈氣也二脈並絡於喉瘡疹之毒君相二火主之其火上蒸咽喉最為先受故發熱與出形之初必問其咽喉痛與不痛先與發散解利之令毒得出不留連於咽喉間也若不知此義以解利於先則咽喉腫塞飲食不入呼吸不能死在旦夕矣如瘡出太甚審察咽喉若內無瘡又不痛者此毒已盡出不須慮之如內多瘡又加痛苦者切防收靨之時嗆水吐食失聲之變如病益甚喉中氣響汩汩如水聲者死舌者心之候脈訣曰外應舌將榮又脾之脈絡於舌舌之在人延納飲食主持聲音其用亦大矣瘡疹發熱其舌紅潤者吉舌燥如芒刺者裡熱甚也急解之針經曰熱病口乾舌黑者死吐舌者脾有熱也脾微熱則舌絡微緊時時舒舌勿用冷藥及下之或飲水者醫疑為熱而下之誤也飲水者脾胃虛津液少故耳瘡出之後舌上稠密出如堆粟破如蜂窠者危更加飲水則嗆食物則噦聲啞不出者必死之症瘡出太甚弄舌者凶驗頸項經曰東風生於春病在肝俞在頸項頸項者生氣之本也又曰天氣通於肺地氣通於嗌天食人以五氣喉者氣之所由也故喉主天氣地食人以五味咽者味之所由也故咽主地氣頸項者咽喉之管束也又三陽之脈自頸而上三陰之脈自頸而還頸項者陰陽之道路也痘瘡之候頸項欲疏若纏項而出稠密太甚者謂之鎖項廢其管束阻其道路上不得降下不得升內者不出外者不入經曰出入廢則神機化減升降止則氣力孤危此死之徵也凡病深項軟者死骨敗也驗胸腹經曰凡刺胸腹者必避五臟胸腹者臟腑之郭也又曰鬲盲之上中有父母蓋言心肺也故痘瘡輕者胸前無胸腹出太甚者必重也其中於臟各有期日凡病深喘急胸骨扇動者肺焦脹也左乳下動脈突出者宗脈絶也皆不可治瘡疹腹痛者毒未盡也更宜詳審驗手足四肢者諸陽之本瘡出欲疏其發欲透其靨欲齊如應出不出應發不發應收不收此脾胃氣虛不能旁達四肢也發熱手尋衣領亂捻物者肝熱也手掐眉目鼻口者肺熱也手足搐搦者心肝風火相搏也各隨其臟而瀉之足涼者此常候也瘡疹腎不受邪腎主足故足宜涼手足冷者脾臟怯也四肢皆稟氣於胃而不得至經必因於脾乃得稟也脾怯不能為胃行其津液故冷耳宜溫之瘡已出現手足多水泡者此肝勝脾衰為鬼賊宜亟治之不久便生癢塌也如遍身皆發手足不透是空殼者此脾胃虛弱津液耗竭榮衛凝沍故其毒亦鬱而不發也不能食者死能食者必發癰疽瘡熱太甚手足冷者不治瘡未成漿手足皮脫者必死瘡已正靨惟足不收者足為純陰無陽相濟所以收遲玉函經曰孤陽寡陰即不中譬諸鰥夫及寡婦如瘡始成漿他處未收手足心先靨者其後必生怪疾也瘡靨之後手足關節腫痛者必發癰也瘡癢手足搔亂者凶驗寢臥夫衛氣者晝則行陽夜則行陰得陽則寤行陰則寐人之常也瘡疹發熱便昏睡者心主熱脾主困心受氣於脾故發熱昏睡此常候也起臥不時者人有熱也必多陷伏之變合面睡者裡熱也大抵瘡疹始終安寢者吉蓋氣血強盛榮衛流行邪氣出於表而不在裡則神安神安則志定是以得安寢也若氣血衰弱榮衛滯澀邪在於里而熱心惡熱則神不安神不安則志不寧是以煩躁悶亂譫妄而不得眠也亦有毒伏於中神喪氣脫僵臥如尸呼之不應飲食不知者不可以嗜臥論乃死痘也驗飲食經曰人以水穀為本故人絶水穀則死仲景曰水入於經其血乃成谷入於胃脈道乃行可見水穀之悍氣為衛精氣為榮水去則榮散谷消則衛亡矣凡痘瘡能食者雖重亦吉不能食者雖輕亦危矣然有不能食而生能食而死者何也蓋不能飲食者臟腑內實大便不行有平日之穀氣為主瘡成之後自消穀氣而思食矣其能飲食者邪氣殺穀即叔和所謂口乾饒飲水多食亦飢虛者是也將不久而變生焉惟疹家多不能食以口中不和不思飲食也
