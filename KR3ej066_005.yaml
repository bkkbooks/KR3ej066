body:
  text: 卷之五治痘要略嘗讀漢史高祖踞洗以待英布而輟洗進酈其武帝登廁以召衛青而不冠不見汲黯蓋於甲胄之士狎嫚以折其猛悍之氣於縉紳之士廉恭以勵其耿介之操甚有似於醫之治病也故毒藥攻邪武夫之狎嫚也菖陽引年文士之謙恭也抑其過裨其不及約之於中而已矣夫治痘者必先視其人之勇怯次審其邪之盛衰又參以時之寒暖逐日淺深臨時消息而施方治無不效矣黃帝與四方之問岐伯舉四治之能厥旨淵矣經曰形不足者溫之以氣精不足者補之以味此因人之勇怯而施方治者也蓋形者氣之充也形不足者氣必虛氣為陽而以之補氣如參耆之屬是矣精者血之化也精不足者血必弱味為陰而以之補血如歸芎之屬是已經曰其在皮者汗而發之其實者散而瀉之此因邪之盛衰而施方治者也蓋邪在表則留連肌肉壅塞經絡以輕劑發之輕可去實麻黃葛根之屬是已邪在裡則三焦凝滯五內郁遏以泄劑瀉之泄可去閉如大黃牽牛之屬是已經曰春夏養陽秋冬養陰此因時之寒燠而施之治者也蓋春夏乃歲半之前天氣主之治在心肺心肺為陽故宜心肺之藥為多如芩連荊防之屬是已秋冬乃歲半之後地氣主之治在腎肝腎肝為陰故宜腎肝之藥為多如丁桂薑附之屬是已此亦論其凡例耳故用寒遠寒用熱遠熱者語其常也發表不遠熱攻裡不遠寒者語其變也治熱以寒溫而行之治寒以熱涼而行之虛則補之實則瀉之折其鬱氣滋其化原以平為期治之要也世俗治痘者偏執首尾不可汗下之說喜補而畏攻取溫而舍涼不知形之盛衰邪之表裡時之寒燠而妄施治習以成俗莫之救正也久矣經曰諸痛癢瘡皆屬心火又曰少陽所至為瘍疹則痘為火毒昭昭矣苟皮膚閉密應出不出非用汗劑以微發之則瘡子何以得出耶火鬱則發之是汗劑亦可用也毒伏於裡焚灼腸胃六腑閉結大小便不通非用泄劑以微利之則毒氣何以得解耶是下利亦可用也夫何權貴之家據忌汗下之說任己而不任人無異於教玉人雕琢玉者庸醫之流恐其逆人之意而不己用不若順人之心而可獲利亦任人而不任己無異於僕廝以聽人之役使者幸遭輕疾乃貪天功以為己有病或不救委之於數良可恫哉夫調瑟者必移其柱圍棋者務求其生攻補之法合宜而用繩墨不拘權衡自執則桂附硝黃何妨於合飲參苓芫遂無嫌於並進所以能致中和育萬物參三才也其功豈小小哉攻補利害經曰毒藥攻邪謂之攻者發汗吐下三法也又曰虛則補之實則瀉之謂之虛者正氣虛也謂之實者邪氣實也瀉即攻之謂也痘瘡輕疏更無他苦不須服藥攻補皆勿用也設若邪氣方盛正氣未衰不知攻邪為急而反補之貽禍非淺誠以攻補利害言之如發熱之時煩渴驚妄目赤唇焦大便祕小便不利不以輕劑發其表涼劑攻其里而反用參朮之類以補之則增悶亂昏憒毒伏於內而不出矣如瘡出太甚焮腫紅豔煩渴不止大小便祕結不以涼劑解其表寒劑攻其里而反補之則增潰爛癰腫目病之變凡若此者醫害之耳世俗補者喜用四君子湯不知白朮燥津液茯苓滲津液瘡子乾燥寧不為害耶內虛吐瀉瘡色灰白者則補為利而攻則有害內實能食瘡色紫赤者則攻為利而補之害不小矣譬諸暴寇侵我都鄙擾我人民掠我府庫則必驅而逐之雖至殘害其民亦不為虐寇退之後弔死問孤撫綏其民未為晚也痘疹之毒猶暴寇也人之元氣猶民也攻即驅逐之也補即撫綏之也治痘疹之法必欲發表攻裡使之盡出然後補而調之如元氣素弱者當未出之先補之可也俟其出而補之如寇之來而修城池何濟於事耶今之世不知攻補之理喜補其虛畏攻其實問其用補藥則曰此王道也多飲之而不知戒問其用攻藥則曰此伯道也寧逡巡就死而不敢飲籲知攻之害而不知補之害知補之利而不知攻之利俗之不美抑如是哉故為工者虛實在人攻補在己應變而施合於權衡斯得矣巫醫得失醫為人藥所以寄死生也巫為人祝所以交鬼神也禮曰庖人雖不治庖尸祝不越尊俎而代之言所職不同也今之治痘者率信巫而不信醫猶以庖人代尸祝之事豈不瞶眊也哉曾有龍樹王禁咒科為人治諸疾者彼乃移精變氣之術以我正氣攻彼邪氣非若今之所謂禱也又如葛仙翁許真君嘗以符水救人疾者彼乃全精御氣謂之天人者能奪造化於呼吸之間亦非若今之所謂巫也人之為巫者祕篆靈文不曉其義曾有如龍樹王許旌陽之術者乎今之禱者不過殺牲以遍告於淫祀之神曾有自陳過失昭然惕悟者乎噫作善降之百祥作不善降之百殃福而可祈則富者可以徼福貧者不得以蒙其福利矣況痘疹之毒稟於父母有生之初藏於五臟百骸之內必飲之以湯液攻之以藥石然後能驅而出之使之解化豈尋常符水所能治耶符水且不可治徒以殺牲益見其謬矣或曰周禮季冬大儺旁磔季春九門磔禳皆用牲殺以驅疫癘然則彼皆非歟曰季冬之月日經虛危墳墓四司之氣能為疫癘以害乎民故大儺旁磔以禳除之季春日從胃歷昴有大陵積尸之氣癘鬼隨之而行九門磔禳以畢春氣此君相之事所以燮調陰陽參贊化育為生民立命也又豈若今之所為矯誣上帝褻瀆神明者耶經曰拘於鬼神者不可與言至德惡於針石者不可與言至巧其斯之謂歟雜症宜攻或謂病痘之人臟腑動搖血氣虧損如有雜症戒其峻治殊不知痘之為病貴於榮衛流通血氣充養也調護保愛常恐有雜症以介乎其間人之氣血只有許多苟添一症則虧一分虧一分則於痘上增一分病矣謂之雜症者不過內外傷而已故天地之氣感則害人皮毛謂之外傷外傷則表病表病則或出不快或發不透或靨不齊是因外傷而貽患於瘡也須從外傷之症攻之但發散中兼救表解毒之法水穀之氣感則害人腸胃謂之內傷內傷則里病里病則或吐或利或腹痛或喘滿而致為伏為陷是因內傷而貽患於瘡也須從內傷之症攻之但清導中兼補中托裡之法亦有不因內外傷而生異症者此則毒之所為專從痘症論之亦須急治勿使毒氣滋蔓以成大戾也壞病不治治痘之法常須識症苟有雜病迎而奪之勿使滋蔓致成壞病也病至於壞治之無及如發熱吐利並作者此毒火內攻令其上下得出也勿驟止之瘡出而吐利不止宜急止之恐其內虛毒伏而不出也自此以後吐利不止者壞病也發熱驚妄者內熱也急止之瘡出之後反加譫妄者壞病也發熱腹痛者毒也急攻之攻之不止其瘡乍見乍隱者壞病也瘡出模糊者急攻之顆粒不成但加虛腫者壞病也瘡出皮紅者急解之紅豔不退瘡出嫩薄者壞病也瘡出焦黑者毒深也急攻之紅潤不回反見乾沒者壞病也瘡出帶水者肝病也急解之若生瘙癢壞病也瘡癢破損急治之破者不灌空中無痘壞病也瘡敗成癰急救之痂皮不結深潰出血者壞病也頭面預腫疫毒也急解之其腫忽消者壞病也又於喘急而悶亂不寧者肺絶也直視搖頭心絶也泄利水穀不化脾絶也手足搐搦肝絶也溲便遺失腎絶也寒戰咬牙手足厥冷咽啞失聲皆壞病也飲食所禁經曰飲食自倍腸胃乃傷言平人也病痘之人腸胃先困飲食可不謹歟故五味之入各有所宜各有所禁如芳草之氣美酒之氣盛而慓悍肥者令人內熱甘者令人中滿煎者使人熱中食毒負毒者其毒必發乘氣伏氣者其氣則靈以致偏熱偏寒動風動火一切辛酸炙煿油膩之物不知禁口若貪食之則腸胃僅存沖和之氣不但為之傷而乖戾之渣滓又能助毒為虐矣所可食者糜粥淡菜間以獖豬精肉飼之使腸胃常實血氣常充以助痘之成就仍無太飽無太飢熱無灼灼寒無蒼蒼以傷脾胃也吾見痘中喜飲酒者多目疾喜食甘者多齒疾喜酸鹹者多喘咳之疾貽禍終身詩曰爽口物多終致病邵子豈欺我哉異氣所害夫痘者天行正病也所居欲靜所御欲潔但見真候即當灑掃房室修飾帷帳避風寒遠人物調護保養以待收成若犯異氣之感倏忽變化留連反復未免為壞病也故保痘之法毋太寒寒則血凝沍而氣滯毋太熱熱則血淖澤而氣淫毋焚諸香香氣竄而動火毋掃地毋掘溝恐動塵草糞溺之氣毋使犬豕得人毋使喪孝得近如遇天地卒有風霾雷雨之變宜謹護之毋使乖戾之氣乘空而入也如有病痘死者宜遠避之毋使癘氣得相傳染也所居之室常要明亮毋得太暗使幽陰之氣勝也西山記曰近穢氣而觸真氣觀諸幼孩血氣未足有客忤之症破傷癰疽少犯風寒穢惡之氣即增變異況痘家乎起發不透痘瘡所喜者起發成漿斯無留毒也瘡出疏者亦易起發瘡若稠密則難起發矣然應起發而不起發者氣虛也應作膿而不作膿者血虛也曾未起發作膿一向空虛者謂之伏將欲起發作膿而忽平塌者謂之陷遍身起發手足獨遲者脾胃不足也起發將半不能充頂者元氣素弱也此皆留毒於內日後必有餘毒也惟背瘡平塌不須責之收靨不齊痘瘡膿成之後應結痂而不結痂者氣虛也蓋氣主外虛則不能約束皮毛收斂津液也或因內實便祕不能成痂者或因內虛便泄不能成痂者或因飲水太多濕傷脾胃不能成痂者或因蓋覆不謹沖冒寒熱不能成痂者或因撏搐反復灌爛不能成痂者其候各不同也惟頭足收靨獨後此常症也蓋天地之化生於陽者成於陰生於陰者成於陽頭為諸陽之會自額以上陽之陽也陰氣不達諸陰皆集於足自膝而下陰之陰也陽氣不盈所以收遲如遍身收靨不齊不能成痂者此倒靨也日後必有餘毒手足不能成痂彼此串連成泡此膿已化毒已解外泡未破內膚已生針破之無妨也間有不能收較反增潰爛膿水不幹者此疳蝕瘡也久而不愈必成陷瘻爛見筋骨而死如正面灌爛膿血痂皮結成一片焦裂濺起者能食則吉不能食則凶差後餘症痘瘡已靨其痂不脫此脾胃弱也其人少食血氣不充不能填滿肌肉滋益皮毛令痂不得脫也如痂已落發熱作渴者陰陽俱虛也蓋陽虛則外熱陰虛則內熱由瘡出太甚氣耗血虛津液枯涸故熱而渴也微熱不可妄治甚者以補藥求痊亦不可多用涼藥也痘瘡差後臟腑未實血氣未平瘡瘢未老肌肉尚嫩腠理尚疏風寒易感若出風太早或因澡洗則風寒乘虛而入為寒熱為喘咳為腫於補藥中微發之可也如內傷飲食腸胃新虛不勝水穀穀氣留薄或因內傷或飽悶或煩躁或吐或利或腹中痛於補藥中消導之可也戒勿因循釀成壞病此大虛之後不任病者也痘後餘毒凡痘不分疏密但要其出必盡而無留伏其發以漸而透其收以期而淨若出不能盡發不能透收不能齊未免有餘毒也出之盡者作三四次出大小不一等至成漿收靨之時於疹空中猶出未已若只始出一層後無補空之痘此有伏也發之透者謹於手足候之充拓飽滿可以謂之透蓋手足位遠若只平塌不能成膿此毒雖出不能旁達四肢必復陷而入也收之齊者自面而下痂皮潔淨中無潰爛可以謂之收齊若收太急或不成痂此必有陷收之急者火逼之也凡若此者皆有餘毒須看部位分經絡別臟腑補之利之解之以平為期治之不已此壞病也不須再攻如毒留於肝則為目病或目腫痛或膚翳內障或羞明癮澀難開如毒留於心則為驚搐癲癇為斑瘤為諸血症如毒留於脾則為癰腫出於手足骨節之間如毒留於肺則為喘為咳如毒留於腎則為敗瘡而死為骨節如毒留於腸胃則為利膿血
