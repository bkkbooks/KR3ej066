body:
  text: 卷之六痘疹症似傷寒辨傷寒之邪自表入里也前三日在表可汗而散後三日在裡可下而解瘡疹之邪自里達表也本與傷寒不同先賢謂其相似者蓋恐人審候不明誤作傷寒失於汗下也不特傷寒相似內傷發熱亦相似凡外感之熱熱在表也內傷之熱熱在裡也瘡疹表裡俱熱也外感則汗之得汗熱自平矣內傷則下之物去熱亦去矣瘡疹不可妄汗下雖汗下熱不少減然三者發熱雖同症亦自別外感發熱面赤惡風寒頭疼身重腰重呵缺頓悶昏睡噴嚏喘咳驚悸內傷發熱面黃紅惡飲食腹痛昏睡煩躁則手足熱吐利則手足冷瘡疹發熱腮赤昏睡呵缺噴嚏咳嗽吐利身重腰痠頓悶煩躁驚妄耳涼骩涼手足時冷熱乍進乍退也如值瘡疹大行之時不問外感內傷但發熱不退皆作瘡疹也惟挾外感者兼發散而治挾內傷者兼消導而治無內外因者只從瘡疹治也痘瘡首尾不可汗下辨今之治痘者曰首尾不可汗下聽者和之曰痘宜溫補汗下不可也此亦喜補惡攻之遺弊殊不知痘疹之法莫要於解毒或攻或補務使毒氣得解而已如其氣血和暢榮衛流通表裡無邪其出則盡其發則透其收則時非但不可汗下雖溫補亦不可用也設使外感風寒約束皮膚閉塞腠理瘡出不快此當汗之令陰陽和榮衛通而瘡易出毒得解散可也苟不汗之則毒無從得出留伏於內未免閉門留寇之禍矣如大熱不退煩渴轉增譫妄昏沉便溺阻塞此毒蓄於腸胃之間與穀氣並宜急下之使臟腑疏通陳莝滌去可也苟不下之則藏汙蓄毒煎熬於中無養虎遺患之悔乎故大要曰謹守病機各司其屬有者求之無者求之盛者責之虛者責之必先五勝疏其血氣令其條達而致和平此之謂也痘瘡不可以日期論辨或曰痘發於前七日自現紅點至疱漿也結於後七日自疱漿至結痂也前後以十四日為限此其大略耳蓋人稟賦有厚薄之殊毒氣有淺深之別時有寒暖治有工拙也如壯實之人瘡本稀疏能飲食當和暖守禁忌故有八九日而愈者不待十四日也虛弱之人瘡本稠密飲食俱廢氣候乖常調理失度起發不透收靨不齊或延至一月而愈又不止十四日也治痘之工不可拘於日數苟拘日數則出現未定而先戴漿者有之不可謂其成膿也起發未透而先干陷者有之不可謂其結靨也有收太急而凶者有收遲而吉者有綿延日久而斃者是豈日數可限耶或者取傷寒傳經之日數謂十二日已過其邪傳儘自愈不知傷寒之邪或在表汗而已者或在裡下而已者或過經復傳而不解者亦未可以日期限也痘瘡之邪初出一點血血化成水水化成膿膿成毒解而收矣何必拘以日數也然欲知其易發易靨者莫如以瘡為主如形緊磊落色潤紅活尖圓厚實者自然易發易靨也如稠密黏連平塌灰白嫩薄淫濕者難發難靨更有餘毒也經曰知其要者一言而終不知其要流散無窮故醫莫貴於知要也大人小兒富貴貧賤不同辨瘡疹之症自王公以至庶民莫之能免者天下之人莫有不本於父母均是人則均是毒矣有輕有重有疏有密何也蓋失精血者治合異乎嬰孩粱膏飫者療莫同於藜藿且如小兒變蒸未周之時臟腑尚脆氣血尚少其疾則多胎毒也至於能食則有傷食之症矣大人天癸方動之時欲火未淫天真未耗其疾則多內傷也至於相感則有陰虛之症矣飯藜藿者負飢渴勞役之傷飲膏粱者發痰火積鬱之病一旦有瘡疹之症當相兼而治之也故治嬰孩則急於解毒常恐其不勝而大人則兼氣血之虛以治矣治貧賤則急於解表惟恐其難出而富貴則兼表裡之虛以治矣虛則補之實則瀉之不虛不實守以待之此治痘之要也升麻葛根湯辨或因痘瘡一見紅點便忌葛根湯恐發得表虛也人皆信之愚獨謂其不然按本草升麻解疫毒又升陽於至陰之下以助發生之氣痘乃疫毒得此解之令其升發決無下陷歸腎之症矣葛根能解熱毒疏通榮衛之氣使瘡易起發無伏無陷芍藥養陰陽勝則陰虛痘本陽毒真陰受傷非此不可甘草能解諸毒瀉邪火猶不可缺是皆痘家切要之藥宜常用之豈有發得表虛之理遂置之弗用也耶但謂一見紅點磊落輕疏者為毒少不須再服苟痘稠密其毒太甚安可棄之不用耶瘡疹順逆辨古者著書有泛語其概者有直道其實者以意逆志不以詞害意可也錢氏小方脈之祖醫中之聖無出其右者宜若所著之論更無可議矣然亦有未可盡信者或泛語其要概或後人補之者也如雲先發膿疱後發疹子者順脾肺相生也先疹子後斑子者順心脾相生也先發水疱後發疹子者逆肝克脾也先發膿疱後發斑子者逆心克肺也先發膿疱後發水疱多者順少者逆肝多肺少木乘金衰也先水泡後斑子多者逆少者順子衰母旺則順水衰火乘則逆也此皆泛語其概耳其曰凡痘疹只出一般者善此則直道其實者也夫四毒之發各有其時膿疱最酷疹次之水疱又次之斑為輕分作四番其毒則微一併夾出其毒則甚矣如雲春夏為順秋冬為逆春膿疱金剋木也夏黑陷水剋火也秋斑子火剋金也冬疹子土剋水也此亦泛語其概耳其曰黑者無問何時十難救其一二此則直道其實者也蓋四者之毒常乘天地不正之令而發乃疫癘之氣傳染相似時亦不得主之也又云冬月腎旺又盛寒病多歸腎變黑此則後人因秋冬為逆而杜撰以補之者也錢氏謂春夏為順秋冬為逆者蓋以瘡疹屬陽春夏為陽秋冬為陰從其氣則順違其氣則逆不過欲人常和暖而從春夏之比未常拘定某症必某時為順也即如冬月變黑之說則凡冬月皆屬腎無分輕重皆變黑而死天地之氣必不如是之隘錢氏之意亦不如是之拘也但曰冬盛寒腠理閉塞氣血凝滯非和暖瘡難成就可也何必以變黑歸腎獨生於冬乎彼夏盛熱腠理開張氣血淖澤亦有變黑歸腎而死何不云夏有黑陷乎設云夏火旺腎不主事則夏黑陷為逆之言又何自而取乎況黑陷為逆四時皆然亦不獨在於夏也吾固知非錢氏之言孟子曰盡信書則不如無書信哉瘡疹變黑歸腎辨水火者陰陽之跡也坎離者水火之位也心腎者坎離之配也故水陰也而生於陽離中之陰乃真水也火陽也而生於陰坎中之陽乃真火也陰根於陽陽根於陰互為其根此所以能變合而生萬物也孔子贊易以坎為血卦為赤離為鱉為蟹為螺為蚌為龜其義可見以人身言之血陰也氣陽也心配離而生血陽中有陰乃真陰也腎配坎而生氣陰中有陽乃真陽也故心中之血即腎中之真水也灌溉滋濡水之德也腎中之氣即心中之真火也詬噓鼓動火之象也然水善而火惡老子曰上善若水下惡如火善惡之分也況人之兩腎左為水右為火經曰七節之旁中有小心小心者命門相火也以其為君之相故云小心行君之令故云命門也夫以一水立乎二火之間其不勝也明矣運之於中而使火不赫曦水不涸流者有神以主之也所謂神者何物也太虛之中神之棲也然水火不並立各有所勝盛衰之變此其常也故盛則薄所不勝而乘所勝也命曰氣淫衰則所勝妄行而所生受病所不勝薄之也命曰氣迫瘡疹之火起於命門之下二火相合所謂得助者強也相火復挾君火之勢肆其狂獗銷鑠燔灼無所不至可恃者心中之真水尚有以制之奈何陽道常饒陰道常乏赫曦者其氣淫涸流者其氣迫並真水亦亡之而已矣經曰成敗倚伏生乎動動而不已則變作焉真水既亡津液暴絶其氣滯其發燥槁不能潤乎皮毛滋乎腠理而瘡中之血亦干而黑矣是則變黑者血色本赤而干則變黑也謂之歸腎者血本腎中之陰血乾則腎水亦干矣此腎虛之症豈有腎實為邪之理乎痘瘡變黑有順逆辨邵子觀物篇曰東赤南白西黃北黑此正色也驗之於曉午暮夜之時可見之矣由是推之嬰兒始生而赤長稍變而白病則黃老死而黑物生地下而赤稍長而白萎落而黃枯槁而黑凡物皆資一陽之氣以生此四色者乃一陽之氣色之逆變者夫痘瘡由出現而起發起發而成漿成漿而結痂亦人身中一陽之氣之流行也其出現而赤起發稍變而白成漿則黃結痂則黑此亦色之遞變自然而然者乃症之順未可全以變黑為不正之色也夫以變黑為逆者以四時言之春主生夏主長秋主收冬主藏此自然之序遞相成功者也痘瘡出現猶春之生也起發猶夏之長也成漿猶秋之收也結痂猶冬之藏也亦自然之序苟出現而黑色是春行冬令矣起發而黑色是夏行冬令矣成漿而黑色是秋行冬令矣不循遞變之次故謂之逆黑者腎之色也為啓蟄封藏之本故以變黑為歸腎也又肺主皮毛心主血脈脾主肌肉肝主筋腎主骨髓瘡疹之毒由內而外為順內者不出曰伏已出復入曰陷不能成漿謂之倒陷不能結痂謂之倒靨曰伏曰陷曰倒皆由外而內入於骨髓故曰歸腎為逆也諸痛癢瘡皆屬於心辨經曰少陰所至為瘍疹又曰諸痛癢瘡皆屬於心夫瘡疹之毒發於五臟六腑之液各隨其經絡部位而出視其疏密知其毒之多寡不但少陰心臟專主之而經專以心言者何蓋火之為物微則癢近則痛灼之則成瘡心者火也故諸痛癢瘡惟心主之又心為君主之官經曰主不明則十二官危使道閉塞而不通形乃火傷瘡疹之毒雖出於五臟六腑而其能為形病者實君不務德使邪火得逞也周禮曰夏時有癢疥病亦此意也過飲冷水變生諸症辨痘瘡發渴切不可與冷水俗夫不知謂水可勝火習以與之病者適中其欲亦貪而不止設值天時暄熱氣血強盛者猶或可勝若精神痿弱脾胃虛憊者水寒相搏未有不成壞病者矣有飲水而黑陷癢塌者脾虛不能勝水水氣寒反從腎化故歸腎也有飲水而不發不靨者脾惡濕為水所淫不能生肌肉布散血氣也有飲水而渴轉增者水停心下而不行則腎氣燥腎惡燥故咽乾渴不止而死也有飲水而喘或咳者飲冷傷肺故也有飲水而吐者胃本虛虛寒相搏食入不納也有飲水而利者胃為倉廩之官水漬入胃濕多成五泄也有飲水而腹痛者腹為陰水寒犯之故痛也有飲水而咳逆者中焦虛寒又得冷水使中焦之氣不行故氣逆而咳也其病曰䭇凡若此者皆飲水之過臨病之工當須識此勿令誤也錢氏陳氏立法用藥同異辨世之論治痘者皆曰錢氏治痘專用涼瀉陳氏治痘專用溫補遂喜用陳氏之方不惟不知錢氏立方之意而陳氏急救之法亦並不知而已矣姑摘取二公之言參互考核而後知二公之治未嘗不同也嘗觀錢氏曰凡瘡疹當乳母慎口不可令飢及受風寒陳曰子母當須慎口首尾不宜與吃是同一調養也錢曰瘡疹始出未有他症不可下也陳曰若無他症不宜服藥是同一禁忌也錢曰瘡疹屬陽故春夏為順陳曰遇春而生髮至夏而長成乃陽氣熏蒸自然易出易靨是同一喜好也錢曰惡寒不已身冷出汗耳骩反熱者腎氣太旺脾虛不能制也陳曰其瘡癢瘍寒戰咬牙是脾胃肌肉虛也是同一歸重於脾也錢曰惟用溫涼藥治之是錢亦有用溫補之時矣陳曰如六七日身壯熱不大便與三味消毒散微得利即住是陳亦有用涼瀉之時矣錢曰更看時月陳曰須分表裡虛實是二公之法因時制宜未必如今人一偏之說也其不同者惟於黑陷癢塌錢則主大戟之寒以下之陳則主丁桂之熱以補之人見其偏寒偏熱之不同即謂錢專用涼瀉陳專用溫補殊不知錢之所下者乃邪氣在裡裡實之症也觀其煩躁大小便不通是已陳之所補乃邪在表表虛之症也觀其泄渴手足冷是已虛則補之即錢氏之惟用溫涼藥治之法也實則瀉之即陳氏所謂與三味消毒散得微利即住法也各因一症而發其實未嘗不同也然錢急於解毒攻邪氣也陳重於和中補正氣也邪氣解則正氣自平正氣實邪氣未有不去者矣是又二公之異而同也二公立法之善未始不同如此至用二公之法乃有效者有不效者此不善用法者之過非製法者之弊也噫醫者意也為上者不惟其法惟其意則二公法外不傳之意自得於神會之下矣補脾土瀉腎水辨楊氏曰痘瘡毒根在裡妄下之則毒氣得以深入土不勝水而成黑陷胡氏曰若其救瘡痘於黑陷之後孰若保脾土於未下之先由二公之言觀之因其妄下而虛其里以致黑陷此醫責虛取實之過非腎之疾也故戒之若救黑陷於妄下之後孰若保脾土而不下之為善耶錢氏曰凡瘡疹當乳母慎口不可令飢及受風寒必歸腎而變黑難治也又曰治之宜解毒不可妄下下則內虛多歸於腎上言即保脾土之法下言即不可妄下而成黑陷之說也蓋痘瘡始終以脾胃為主經曰脾者土也治中央常以四時長四藏各十八日寄治若飲食失節寒溫不適脾胃乃傷所以不可令飢及受風冷也瘡疹之邪自內而外苟壯熱煩躁大渴大小便不通目赤唇焦此毒伏在內而不即出下之可也若瘡盡發於外清便自調不煩不渴此里無邪不須服藥如妄下之則誅罰無過反虛其里所以歸於腎矣然則變黑歸腎皆由外受風冷內傷飲食及妄下之所致非腎本有之疾也其曰土不勝水者經曰穀氣通於脾六經為川腸胃為海又曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行可見水入於胃必待脾為轉化而達於川海也今脾虛則不能轉化使之四布而渚蓄於胃脾惡濕為水所漬則土益敗故曰土不勝水也腎雖主水乃天元真一之氣道之本也非此水則天地之生意息矣若土所不勝之水乃飲食形質之物非腎之真水也既非腎水而曰歸腎者腎主骨髓又主閉藏言妄下則裡氣虛瘡疹之毒復自外陷入於裡其外黑陷者腎之化也其里入於骨髓腎之主也況汗之則亡陽亡陽則心先受之下之則亡陰亡陰則腎先受之所以歸於腎也其曰保脾土於未下之先者謂不可妄下也謂適其寒溫節其飲食也時俗不識此理乃謂四君子湯保脾土之要藥宜常服之以防變黑歸腎之症陳氏曰凡療瘡疹先分表裡虛實若虛實不分則無所治又曰若無他症不宜服藥如裡氣果虛四君子湯要藥也裡實可以服之乎蓋參朮補陽芎歸補陰陰陽不可偏勝偏陰偏陽則病矣經曰久而增氣物化之常也氣增而久夭之由也又曰無盛盛無虛虛而遺人夭殃脾胃素實又服實補之藥正所謂盛盛也常服之則久而增氣兩實相軋而變生焉謂之變者經云陽盛則外熱陰虛則內熱外內皆熱則喘渴又曰陰不盛其陽則脈流薄疾並乃狂又曰陰氣少而陽氣勝故熱而煩悶也又曰兩陽相得而陰氣虛少水不能滅勝火而陽獨治獨治者不能生長也又曰陽勝則身熱腠理閉喘粗為之俯仰汗不出而熱齒乾以煩竟腹滿死又曰榮氣不從逆於肉理乃生癰腫又曰脾移熱於肝則為驚衄凡若此者皆妄補之過也夫妄下則脾虛而歸腎妄補則脾實而乘腎經曰歲土太過雨濕流行腎乃受邪乘之謂也惜乎人但知妄下之則脾虛變黑而歸腎不知妄補之則脾實反增潰爛倒靨而亦歸於腎也然則百祥丸之所下者何邪也錢氏曰青乾紫陷睡昏汗出不止煩躁熱渴腹脹啼喘大小便不通者困也若黑紫干陷者百祥丸下之不黑者慎勿下蓋左腎水也右腎命門相火也相火相挾君火之勢以侮腎相火者腎水之賊也水火不並立一勝則一負瘡疹之火起於命門之下因相火之勢假君火之威煎熬真陰津液內涸腎不能制反為所勝毒邪留連於內而不肯出所以黑紫干陷也其症昏睡汗煩燥渴腹脹喘啼大小便祕皆裡實之症故宜以百祥丸下之苟無是症必不可下也錢曰所用百祥丸以瀉膀胱之腑腑若不實臟自不盛也何以不瀉腎曰腎主虛不受瀉噫錢氏一則曰妄下不可一則曰腎主虛不受瀉其惓惓立命之心抑何深長也哉夫腎主虛不受瀉如此安得妄補脾土以為腎水之賊歟其瀉膀胱之腑又有深意存焉蓋脾輸精於肺肺下輸於膀胱膀胱之水乃是平日所飲渣滓之物非腎之真水也膀胱又是太陽之經為十二經之屬四通五達之衢也凡有邪氣必先經此而傳瘡疹之邪由膀胱之經上風府至巔下額會手太陽小腸之經於面小腸者丙火也亦挾君主丁火之勢而不受邪其毒留於足太陽膀胱之經而不得散膀胱者壬水也為火所迫不免自附於腎引癸水以自救錢氏恐其毒歸於腎先於膀胱中瀉之即迎而奪之之意二服不效而作寒戰則毒入於腎矣腎變動為慓真臟症見故知死也曰腑不實者邪氣去也臟自不盛者不入於臟也不實不盛悉邪氣也豈有瀉正氣之理乎可見由膀胱受邪而黑陷者裡實也宜以百祥丸下之由脾受邪而黑陷者裡虛也不可以百祥丸下之不審虛實之症概以百祥丸下之謂之裡虛經曰候邪不審大氣已過瀉之則真氣脫此之謂也其曰下之復惡寒不已身冷出汗耳骩反熱者死腎水太旺脾虛不能治也此即所謂無里症而妄下之者也無里症而下之則脾土無故而被轉下之藥腎未受瀉脾已先傷陰氣內盛陽氣外絶故惡寒不已身冷汗出耳骩反熱也腎何以旺陰氣盛也陰陽相離則受傷之脾安能復為之主而使之再合耶故曰脾不能治也其曰下後氣溫身熱欲飲水者可治以脾旺勝腎寒去而溫熱也治之宜解毒此即所謂有里症而宜下之者也蓋先則煩躁熱渴腹脹啼喘大小便不通今下之身熱氣溫者火氣去也欲飲冷水者餘邪未盡也故又曰治之宜解毒脾旺勝腎者大戟主行十二水脾土本強能運其物注於下焦以泄下焦之邪此脾旺勝腎也寒去而溫熱者太陽寒水之邪已去布散於經小腸熱火承之故溫熱也大抵陽並於陰則陰實而陽虛外寒內必熱也陰並於陽則陽實而陰虛邪自內而外外熱里必平也故曰可治不但痘瘡惡變黑如陽毒發斑內傷發斑黑者皆不可治抑豈腎水為邪乎故病瘡病蟲皆惡黑者北方屬水其色黑入通於腎居亥子之位萬物生於子而死於亥腎者生死之戶也變黑而死歸根覆命之時也此天地之道陰陽之化生長收藏之機非知道者不足以語此噫此實出吾肝鬲之要非有蹈襲亦非好辨以亂人聽但恐世之曲學者不知虛實之理補所不當補瀉所不當瀉盛盛虛虛遺人夭殤無異於操刃之殺人也借使錢氏復生必謂吾言為信觀此者不主先人之言亦必謂吾言之不誣也瀉膿血痂皮水穀辨錢氏曰瘡黑而忽瀉便膿血痂皮者順水穀不消者逆夫痘瘡自內而外謂之正出自外而內謂之倒陷從外收者謂之正靨從內收者謂之倒靨倒陷倒靨內穿膈膜壞臟腑皆惡候也倒陷者十無一生倒靨者十或救三錢氏謂瘡黑而忽瀉其倒靨之類乎蓋瘡黑本是死症裡實者可下之忽然作瀉則不必下毒氣由外入內臟腑之氣不通榮衛之氣不行表裡俱病不急下之轉增煩悶而死故主百祥丸下之若自利則火性急速不少停於腸胃之間腸胃熱甚亦自失其轉化之常故暴注而瀉瀉則毒從利滅亦若下之義當時暴瀉未必便膿血痂皮也抑將淹延數日而後是膿血痂皮也何以有是膿血痂皮者痘瘡內陷則臟腑鬲膜之間亦如外出之狀瀉膿血者內潰之症也瀉痂皮者內靨之症也瀉膿血痂皮為順者邪在腑也在腑得由腸胃而出故順瀉水穀者臟也邪在臟不得由腸胃而出所去者腸胃之水穀耳人絶水穀則死故逆然其水穀不化不可誤認為寒仲景曰邪熱不殺水穀水穀不化者火迫而出也錢氏謂瀉痂皮者是脾氣得實腎雖用事脾可制之瀉水穀者是脾虛不能制腎故自泄也讀者不識此義即謂脾土可以制腎水有欲專補脾土之意殊不知脾胃者倉廩之官以納水穀者也腎開竅於二陰以司開闔者也火氣不迫腎必受之開闔不利不能禁固便溺所以暴瀉也曰腎用事者腎為火所役也若自用事則能封閉約束而不瀉矣脾可制之者言門戶雖弛倉廩猶藏能制其水不為濕所勝也至於水穀不化則泌別無統幽闌不關脾亦不能自勝其濕故自泄也然五虛之中泄瀉為甚痘瘡自利不止鮮有痊者豫以言斷之曰能食者吉不能食者凶故經云漿粥入口泄住止則虛者活此其驗也斑疹論斑疹之症布在方冊者或謂心為疹或謂心為斑脾為疹或謂胃為斑者何也經曰少陰所至為瘍疹少陰者心與腎也心配離離中之陰己土也丁己同生於酉酉者肺金帝旺也腎配坎坎中之陽戊土也戊癸化火而生於寅寅者三焦火長生也斑隱隱在於皮膚中大者成片小者狀如蚊蚤所咬點點赤色疹則成顆粒見於皮膚之外如疥子然有形可摸俗名麻子者是已斑之方萌又與蚊跡相類發斑多見於胸腹病人昏憒先紅後赤者是也傷寒熱病多有之蚊跡只在於手足病人安靜先紅後黃者是也內傷熱病多有之此二症發斑人常有之非由胎毒乃時行熱症也至於疹子則與痘瘡相似彼此傳染但發過不再作也乃心移熱於脾脾移熱於肺發而為疹凡病疹者必咳嗽火刑肺也丁心火己脾土辛肺金皆隸於酉造化之理同一位謂疹為心者語其本也謂疹為脾者語其標也語心脾而肺在其中矣腎主二陰司開闔三焦之火亢甚妻從夫化合於胃而為斑凡病斑者必自利或大便結燥也癸腎水戊胃土與寅三焦相火同位者亦造化之理語三焦而心在其中矣故發斑見於胸腹者三焦之位也蚊跡見於手足者胃主四肢也疹者母傳子也斑者妻從夫也知造化之理而治斑疹不難矣五行生死論按五行之理生於陽者死於陰生於陰者死於陽抑隔別損益之數歟夫五臟六腑者所以配五行也腑為陽臟為陰腑生於陰臟生於陽根陰根陽之義也腑死於陽髒死於陰分陰分陽之義也陽之所死陰之所生陰之所死陽之所生陽極而生陰陰極則生陽之義也自子至巳為陽而統乎足自午至亥為陰而統乎手亦陰陽互為其根也以腑言之水火者南北之對也壬膀胱水生於申申者手少陽三焦位也經曰三焦者決瀆之官水道出焉故壬水生於申死於卯者水月象也生於西死於東矣丙小腸火生於寅寅者足少陽膽位也膽為甲木甲祿在寅故丙火生於寅死於酉者火日象也生於東沒於西矣金木者東西之對也甲膽木生於亥者風木之分經曰風生木故甲木生於亥死於午者木陽也午則陰生而陽死矣庚大腸金生於巳巳者六陽之位卦應乎乾乾為金故庚金生於巳死於子者金陰也子則陽生而陰死矣此四腑生死之理也然木主於東而生於北者水流趨東以生木也火主於南而生於東者鑽木取火木所生也金主於西而生於南者金曰從革火所出也水主於北而生於西者水西而東金所生也以五臟言之丁心火生於酉酉者肺旺之位也坎中之陽乃火之原坎位於子辛金所生不能再生丁火故丁火乘辛金生旺之氣而生於酉所以心與肺相運而位乎上也死於寅者寅乃顯明之地丁為陰火其光自伏矣癸腎水生於卯卯者肝旺位也離中之陰乃水之原離位於午乙水所生不能再生癸水故癸水乘乙木生旺之氣而生於卯所以腎與肝相連而位乎下也死於申者申手少陽相火所謂一水不能勝二火也又水生於一一者天元初動之氣也於卦為震在卯之中所以癸水生於卯而震初爻為子水也火生於二二者地元初動之氣也於卦為巽陽自下而上陰自上而下兌為少陰巽之反也在酉之中所以丁火生於酉而先初爻為丁火也乙肝木生於午者乙震木也青龍之象寄生於午龍從火里出也死於亥者午為一陰至於亥而極陰老不能生乙木也辛肺金生於子者辛兌金也白虎之象寄生於子虎向水中生也死於巳者子為一陽至於巳而極陽老不能生辛金也又肝在下陰也陰生於午肺在上陽也陽生於子此四臟生死之理也夫陽則順者陽道常饒故左行而有餘此六腑之氣常盛而病在腑易已也陰則逆者陰道常乏故右行而不足此五臟之氣常弱而病在臟難愈也若夫脾者己土也離中之陰是已故離納己胃土戊土也坎中之陽是已故坎納戊己土生於酉死於寅者心象離而生己土故己與丁同生死也戊土生於寅死於酉者腎配坎腎有二枚左為水不能生土右為相火能生土故戊與相火同生死也然脾得心之氣多而喜熱從火化也胃得腎之氣多而喜寒從水化也食熱則損胃食寒則損脾養生之道所以貴適其寒溫熱無灼灼寒無滄滄也故傷風冷則胃強而脾弱脾不主事胃與右腎相火相合而同歸於火所以戊癸化火也傷熱則脾強而胃弱胃失清化之令脾與心火相得而致敦阜所以火炎則上益燥也苟得其養則脾胃稟中和之氣而陰陽無偏勝之疾苟失其養則脾氣歸於心而成潰爛癢塌之瘡胃氣歸於腎而成陷伏青黑之變知乎此可以語瘡疹之治矣
