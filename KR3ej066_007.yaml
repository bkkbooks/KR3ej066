body:
  text: 卷之七先哲格言凡一十八家錢氏仲陽曰痘疹侯面燥腮赤目胞亦赤呵缺頓悶乍涼乍熱咳嗽噴嚏手足梢冷夜臥驚悸多睡並瘡疹症此天行之病也惟用溫涼藥治之不可妄下及妄攻發凡痘疹若出辨視輕重者一發便出盡者必重也瘡夾疹者半輕半重也出稀者輕裡外肥紅者輕外黑裡赤者微重也外白里黑大重也瘡端里黑暗如針孔者勢劇也青乾黑陷睡昏汗出不止煩躁熱渴腹脹啼喘大小便不通者困也凡瘡疹當乳母慎口不可令飢及受風冷必歸腎而變黑難治也有大熱者當利小便有小熱者宜解毒若黑紫干陷者百祥丸下之不黑慎勿下更看時月輕重大抵瘡疹屬陽出則為順治之宜解毒不可妄下下則內虛多歸於腎若能食而痂頭焦起或未焦而喘實者可下之身熱煩渴腹滿而喘大小便澀面赤悶絶大吐此當利小便不瘥者宣風散下之若五七日痂不焦是內發熱熱氣蒸於皮中故瘡不得焦痂也宜宣風散導之用生犀磨汁解之使熱不生必著痂矣惟斑疹能作搐疹為脾所生脾虛而肝旺乘之木來勝土熱氣相擊動於心神心喜為熱神氣不安因搐成癇斑子為心所生心生熱熱則生風風屬於肝二臟相搏風火相爭故搐也治之當瀉心肝瘡疹始出未有他症不可下也但當平和藥頻與乳食不受風冷可也如瘡疹三日不出或不快即微發之發之不出即加藥加藥不出即大發之如大發後及脈平無症者即瘡本稀不可更發也有大熱當利小便小熱者當解毒若出快勿發勿下陳氏文中曰小兒瘡疹已出未出之間有類傷寒之狀其瘡疹病症突然增寒壯熱身體疼痛大便黃色此乃正病也若無他疾不宜服藥凡瘡疹先分表裡虛實不分則無所治小兒神氣軟弱瘡疹自初出兩三日至十三日當忌外人恐有卒暴風寒穢惡之氣觸兒瘡疹小兒瘡疹始出一日至十日渾身壯熱大便黃稠是表裡俱實也其瘡必光澤必起發必肥滿必易靨而不致損傷也其瘡不光澤不起發根窠不紅或腹脹或瀉渴或氣促是表裡俱虛也其瘡不光澤不起發根窠不紅謂之表虛也或瀉渴或腹脹或氣促謂之裡虛也若瀉頻多津液內耗血氣不榮其瘡雖是起發亦不能靨也龐氏安常曰若身疼壯熱頭痛不與小汗何由表散六腑久閉毒攻腰脅或心腹脹悶不與微利何由釋去故當消息汗下然則寒藥固不當行溫藥又增熱毒若熱勢太甚脈候浮遲則溫性之藥不阻表裡之氣者可冀冰釋云不可汗下寒熱之藥只可紫草一味者乃滯隅之流天行發斑瘡須臾遍身皆戴白漿此惡毒凡覺冬溫至春夏必發斑痘此患小便澀有血者中壞也瘡黑陷無膿十死不治斑痘已出不可正爾發表更增斑爛以表虛故也河間劉氏曰斑疹之病其狀各異瘡發掀腫於外者屬少陽三焦相火也謂之斑小紅點行於皮膚之中不出者屬少陰君火也謂之疹凡顯斑症若自吐瀉者慎勿亂治則多吉謂邪氣上下皆出也大凡瘡疹首尾皆不可下恐妄動而生變此謂少陽通表裡宜和之也當先安其里以解毒次微發之如大小便不祕者雖微發之大便過祕宜微利之首尾不可下者首曰上焦尾曰下焦若已吐利不可下也便宜安里藥三五服如能食大便祕者宜微疏利之若內虛而利者宜安里藥三五服末後一服調微發之藥服之大抵安里之藥多發表之藥少祕則微疏之令邪氣不壅並而能作番次使兒易禁也大凡小兒斑疹已發有瘡有聲者乃形病氣不病也無瘡無聲者乃氣病形不病也有瘡而無聲者是形氣俱病者斑子者是相火行於三焦真陽氣之所作也若氣入肺變膿疱入肝為水疱自病為斑心乃君心入於脾作癮疹為肺主皮毛心不害肺金此乃君德也已發便稠密形勢如針頭者當輕發其表涼其內連翹升麻湯若斑已發稠密甚而微喘飲水有熱症當以去風藥微下之若出不快清便自調知為在表不在裡當微發之升麻葛根湯若清乾黑陷身不熱大小便澀則知熱在內大黃湯下宣風散身表大熱者表症未罷不可利大便若斑疹已出見小熱小便不利者當利小便已發後有餘毒不散為復有身熱癰瘡之類當用解毒之藥也劉提點曰痘疹最要大小腑分曉所以錢氏四聖散用木通枳殼極妙若大小腑自流利則不必苦泥痘疹發未透宜用四君子湯加黃耆紫草煎方醫云百病不可損其胃氣故多用四君子湯及糯米等助其胃氣劉洙小兒痘子訣中雲疹子瘡發如膿窠不肯靨者但調沙糖水與吃亦曾試用但吃沙糖水後多是爬搔了瘡子成片去結瘢不好發斑用人齒散但錢氏方中用麝香及酒調難用蓋瘡痘家怕麝香與酒氣觸了若用只是紫草煎湯自好東垣李氏曰其子在腹中十月之間隨母呼吸呼吸者陽氣也而生動作滋益精氣神兒隨日長皮肉筋骨血脈形氣俱足十月降生口中尚有惡血啼聲一發隨吸而下此惡血復歸命門胞中僻於一隅伏而不發直因內傷乳食溫熱之氣下流合於腎中二火交攻致榮氣不從逆於肉裡惡血乃發諸斑疹皆出於膀胱壬水其瘍後聚肉理歸於陽明故始顯之症皆足太陽壬膀胱克丙小腸其始出皆見於面終歸於陽明肉理熱化為膿者也二火熾盛反勝寒水遍身俱出此皆從足太陽傳變中來也當外發寒邪使令消散內瀉二火不令交攻其中令濕氣上歸復其本位此內經之法覽者詳之夫斑疹出者皆因內傷必出斑榮氣逆故也大禁牽牛巴豆凡生膿疱小水斑疹癮三色皆榮氣逆而寒復其表宜以四味升麻湯中加當歸身連翹此定法也如肺成膿斑先嗽喘或氣高而喘但加人參少加黃芩以瀉伏火而補元氣如心出小紅斑必先見嗌乾驚悸身熱肌肉腫脈弦洪少加黃連如命門出癮疹必先骨疼身熱小加生地又加黃柏如斑已出時時與桔梗湯寬胸膈利咽喉不可計服數海藏王氏曰夫斑之為病皆由子在母腹中時浸漬食母血液蘊而成毒皆太陰濕土壅滯君相二火之所作也因而真氣既盛正氣又旺邪無所容或因傷寒或因傷食斑由是而生焉治當何如外者外治內者內治中外皆和其斑自出至於惡寒者發之表大熱者奪之渴者清之大便祕結者下之小便不通者利之驚者安之瀉者分之可以執一為哉前人言首尾俱不可下者何也曰首不可下者為斑未顯於表下則邪氣不得伸越此脈症有表而無里故禁首不可下也尾不可下者為斑毒已顯於外內於根蒂大便不實無一切里證下之則斑氣陷故禁尾不可下也又如所言溫暖蓋復不令通風以其斑未出或身表涼而惡寒或天令寒而惡冷溫暖蓋復不令通風可也斑若已出身熱天暄何必用蓋覆而不使之通風乎後人執此二句首尾俱不可下溫暖不令通風不知天令之所加人身之所感致使誤人多矣噫首尾不可下者以其終始臟腑原無凝滯也若有一切里症及大便結者安得不下溫暖不使之通風以其發在冬時故如此也若在夏時斑雖未出亦不用於此也丹溪朱氏曰調護之法首尾俱不可汗下但溫涼之劑兼而濟之解毒和里安表而已虛者益之實者損之冷者溫之熱者平之是為權度借喻而言亦如庖人籠蒸之法但欲其松耳蓋毒發於表如苟妄汗則榮衛一虛重令開泄轉增瘡爛由是風邪乘間變症者有之毒根於裡如苟妄下則內氣一虛毒不能出而反入焉由是土不勝水變黑歸腎身體振寒耳耳九反熱眼合肚脹其瘡黑陷十無一生凡熱不可驟遏但輕解之若無熱則瘡又不能發也初起時自汗不妨蓋溫熱熏蒸而然故也疏則無毒密則有毒宜涼藥解之雖數帖亦不妨庶無害眼之患爐灰色白靜者作寒看齊湧者燥者掀發者作熱看黑屬血熱涼血為主白屬氣虛補氣為主中黑陷而外白起得遲者則相兼而治凡痘瘡分表裡虛實吐瀉少食為裡虛不吐瀉能食為裡實裡實而補則結癰腫陷伏倒靨為表虛灰白者亦表虛紅活綻凸為表實表實而補則潰爛不結痂痘瘡分氣虛血虛用補藥氣虛者人參白朮加解毒藥血虛者四物湯中加解毒藥調解之法活血調氣安表和中輕清消毒溫涼之劑兼而治之溫如當歸黃耆木香輩涼如前胡乾葛升麻輩佐之以川芎白芍枳殼桔梗羌活木通紫草之屬則可以調適矣黑塌二種因氣虛而毒氣不能盡出者酒炒黃耆紫草人參輩黑陷甚亦用燒人屎癢塌者於形色脈上分虛實實則脈有力氣壯虛則無力虛癢以實表之劑加涼血藥實癢如大便不通以大黃寒冷之藥少與之下其結糞瘡乾者宜退火只用輕劑荊芥升麻葛根之類溫者用瀉溫乃肌表間熱宜用風藥白芷防風之類上引用升麻葛根下引用檳榔牛膝助以貝母忍冬草白芷瓜蔞之類顏色正者為上將欲成就卻色淡者宜助血藥用當歸川芎酒洗芍藥之類或加紅花將成就之際卻紫色者屬熱用涼藥解其毒升麻葛根酒炒芩連及連翹之類將靨時如豆殼者蓋因初起時飲水多其靨不齊俗呼倒靨不好但服實表之劑消息他大小便如大便祕通大便小便祕通小便痘疹用藥固有權度大小二便不可不通其大便自所下黃黑則毒氣已成不必多與湯劑若大小二便一或祕焉則腸胃壅遏脈絡凝滯毒氣無從發泄眼閉聲啞肌肉黧黑不旋踵而告變矣近時小兒痘瘡止宗陳文中木香散異功散殊不知彼立方之時為運氣在水運司天時令又值嚴冬大寒為寒氣鬱遏痘瘡不紅綻故用辛熱之劑發之今人不分時令寒熱一概施治誤人多矣陳氏亦可謂善求病情者矣大率歸重於太陰一經蓋以手太陰屬肺主皮毛足太陰屬脾主手足肺金惡寒而易於外感脾土惡濕而無物不受其用丁香薑桂所以治其肺之寒用附子半夏所以治其脾之濕使脾與肺果有寒與濕而兼有虛也中病則已何傷之有今徒見出遲者身熱者泄利者驚悸者氣急者渴思飲者例與木香散異功散間有偶中之效不思一偏之禍若錢氏方固未嘗廢細辛丁香白朮參耆輩率有監製輔佐之藥但其用寒涼者多而於補助一法略示端緒錢氏意深矣亦將俟觀者而擴充之夫渴者用溫涼藥癢塌者用補藥自陳氏發之迥出前古然其間多用燥熱或未適中恐其造方之際必有夾寒而痘者滄州呂氏曰凡乳嬰之與童草當歧為兩頭以治之乳嬰當兼治乳母俾其氣血清和飲食有節投以調氣通榮之劑以釀其乳使兒飲之則其瘡必肥滿光澤無陷伏之憂童草之子必當備切其脈審其表裡虛實以汗下之苟不實不虛則但保其中和使脾氣流暢則肺金藉母之助易於灌膿速於成痂無倒陷之患或至壯盛而膚腠厚密尤須預為汗解或大便結與溲澀者猶宜下之利之庶無患也足脛熱兩腮紅大便祕小便澀渴不止上氣急脈洪數者已上七症不宜服熱藥足脛冷腹虛脹糞青色面㿠白嘔乳食目睛青脈沉微者以上七症不宜服寒藥肺主氣氣不足則致後三症自汗聲不出瘡頂陷塌不綻肥並宜十奇散自汗倍黃耆聲不出倍桔梗心主血血不足則致後三症灰白色根窠不紅不光澤並宜芎歸湯加芍藥紫草紅花良驗凡值天時不正鄉鄰痘瘡盛發宜服禁方不出方凡覺痘瘡欲發當先解利與傷寒相類疑似之間兼用解毒胡氏曰非微汗則表不解解表當於紅斑未見之時宜用凡痘疹出不快者有五症臨病審而調之一症天時嚴寒為寒所折不能起發宜解寒溫表一症炎暑隆盛煩渴昏迷瘡出不快宜解暑一症服涼藥損傷脾胃或胃虛吐利當溫中益氣一症或成血疱一半尚是紅點此毒氣發越不透必不能食大便如常者宜半溫里半助養之劑一症外實之人皮膚厚肉腠密毒氣難以發泄因出不快宜解毒身體溫暖者順寒涼者逆能食大便實者順不能食大便利者逆夫痘瘡之毒最怕穢惡之氣觸犯切不可信僧道看經解穢況無纖毫之力而反恐被其穢惡之氣觸犯亦不可恃其能解而不預防戒之戒之張氏煥曰痘子氣勻則出快蓋血隨氣行氣逆則血滯石壁胡氏曰小兒難任非常之熱亦不可任非常之冷如熱藥太過輕則吐利腹脹重則陷伏倒靨宜溫涼適中可也仁齊楊氏曰諸熱不可驟去宜輕解之蓋痘瘡無熱則不能起發痘瘡發於肌肉陽明胃氣主之脾土一溫胃氣隨暢決無陷伏之患李氏曰比之種豆值天時暄暖則易生節齊王氏曰若痘瘡虛怯淡白色癢塌此屬虛寒宜用陳文中方若發壯盛齊湧紅紫色躁癢此屬熱毒急宜涼血解毒自陳文中方盛行後屬虛寒者率得生屬熱毒者悉不救痘是胎毒古人法治只解毒然氣血虛則送毒氣不出及不能成就故陳文中之法亦千載妙訣補前人之未備者但溫補之法既行而解毒之旨遂隱故救得一邊又害了一邊痘是胎毒自內出外一二三日方出齊毒氣尚在內出至六日則當盡發於表七八九日成膿而結痂矣若毒氣盛不能盡出過六日毒反內入臟腑故須於六日以前毒氣該出之時急服涼血解毒之藥以驅出之六日以後醫無及矣痘瘡多者是毒氣多便先宜解毒然多則恐氣血周貫不足故隨後亦宜兼用補藥以助成膿血鰲峰熊氏曰人有虛實之不同病有淺深之各異壯實之人病無諸症或瘡發而輕者皆得依期而愈倘氣候乖常寒暄失度毒氣彌盛當作血疱而不疱當結膿窠而不結遂生諸症稽延日數難以定期矣慈溪趙氏曰痘瘡灰白不發者作寒看紅凸齊綻者作熱看其要在解毒和氣活血溫中安表而已寒者溫之熱者減之減之不可多蓋痘瘡非熱則不能發也宜溫和之劑扶而濟之桂岩魏氏曰夫氣血盛斯毒易解氣血損則毒難愈惟氣血少弱者雖毒不能頓解然生意未始不出乎其中故必加以補益扶持之功治所當治順所當順斯其悔吝無不平矣先翁菊軒公曰痘瘡不怕稠密只要能食無不痊者丸用藥不可犯其胃氣蓋人以胃氣為本
