body:
  text: 卷之八或問凡三十七問或曰痘瘡之名何義曰古人謂之斑瘡後人因其形似痘故曰痘瘡又曰豌豆瘡今又呼為珍珠痘者以其形圓緊而小也又呼為大痘者以其形圓充實而大也有呼茱萸痘者以其二三成叢中心落陷也有呼為蛇皮者因其空殼無水如蛇蛻之皮也有呼為錫面者以其成餅帶灰白色也是皆因象取名無別義理但珍珠痘最輕大痘次之茱萸痘最重錫面蛇皮則死症也或曰痘瘡發熱何以能預識其輕重而解之耶曰凡發熱乍進乍退氣色明瑩精神如常大小便調能食不渴目清神潤此毒輕也痘必稀疏縱出多亦自易發易靨也如壯熱不減氣色慘暗精神昏悶大便或祕或瀉不能食目赤唇焦此毒重也痘必稠密宜預解之其出疏者防其有伏未可便許其疏但看熱減渴止精神爽快清便自調能食更無他苦是真疏且輕也或曰既識其候如痘稠密何以解之曰諸瘡皆屬於心心之華在面如初發熱青筋現露目中淚出此毒發於肝肝木生心火從後來者為實邪肝為水疱風火相煽必作瘙癢宜先解肝之毒面赤如錦額上紅筋露現譫妄多驚此毒發於心心火自旺為正邪君主不明必有陷伏不治口乾唇焦面黃而燥此毒發於脾心火生脾土從前來者為虛邪脾為斑心為疹必有夾斑夾疹又脾主肌肉為火所灼必作潰爛宜先解心脾之毒面色㿠白鼻中乾燥或流清涕或衄出此毒發於肺心火刑肺金乘其所勝為微邪宜略解肺之毒面色黑氣如煙目中見鬼頭熱足冷此毒發於腎腎水克心火為賊邪必成黑陷不治或曰痘子出形輕重吉凶何以別之曰痘子出形其熱便退三五磊落相去位遠其瘡圓淨以火燭之皮中無復紅點此候必疏而輕如瘡大出熱不少減細碎叢聚無有空膚以火燭之皮下通紅此必密而重也或曰古方預解痘毒謂重者能令出疏輕者能令不出其言信乎曰痘之疏密本毒之多寡毒之所受本於父母始生之初區區藥石豈能解之而使重者必疏輕者不出耶但謂解之使無郁遏陷伏之患則可謂解之使重者必疏輕者不出吾不知也或曰解毒之方若是不必用歟曰何可廢也蓋解毒之法要分三治一則視其父母平日有餘不足之病而解之一則視其年氣運疫癘之變而解之一則視其人所見氣色所稟虛實而解之稱物平施因時制宜豈有定方耶如代天宣化丸只解得氣運疫癘之變或曰痘瘡始終何以能吉何以能凶請詳言之曰瘡子之出不問疏密但其出必盡其發必透其靨必齊不徐不疾適如其期能食大小便調此可言吉如一齊湧出其發不透其靨不齊或太急或太遲不能如期食少大便自利此可言凶與之期日出不能盡而伏者四五日死起發不透而枯萎癢塌者七八日死收靨不齊而灌爛者常在一旬之外綿延日久而斃也或曰何謂其出不盡曰作三四次出大小不一等收靨之時空中猶有出者俗呼為落零痘子者是也必有此候方無餘毒或曰何謂其發必透曰初出一點血以漸長大血化為水水化為膿其頂圓其腳潤其膿稠充實飽滿審察手足莫下皆然可謂透矣蓋手足位遠一時難透脾主四肢脾胃氣虛者手足瘡子常發不透至於靨後多成癰毒也或曰何謂其靨必齊曰自上而下循次收斂無有潰爛痂皮堅厚是已或曰何謂不疾不徐適如其期曰自出現而起發起發而成漿成漿而收靨先後循次上下周匝輕者七八日重者十二三日此其期也若出未定而先㴠水將起發而便戴漿膿未成而就干收此失之太疾由毒火併迫氣血奔騰未至而至謂之太過也如應出不出應發不發應收不收此失之太緩由毒火鬱遏氣血即當至而不至謂之不及也過與不及皆死症也或曰痘瘡何以取能食與大小便曰痘子之出惟資氣血以助其成欲表裡無邪也人能食則氣血自充大小便調則里無邪或曰亦有不能食而愈者何曰大便必實數日不更衣賴平日之穀氣以養之雖不食無苦也然起發收斂落痂終不及能食者之易焉耳或曰痘瘡痛癢何以別之曰出現之初無有痛癢至於起發養漿其瘡始痛痛者毒欲出也膿成毒解其瘡則癢癢者邪去而正氣復也如此痛癢痘家常候若當出現起發膿水未成之時忽然瘙癢者此惡候亦須分其虛實如掀發紅嫩大熱煩渴大便祕小便少此邪太甚而癢也形色灰白平陷大便自利此正氣不足而癢也其云諸癢為虛諸痛為實者亦大略之言耳或曰凡視痘子先能識其作癢否曰凡痘子初出色嬌皮嫩肉紅者瘡子起發多成水疱者其後皆癢塌死也或曰瘡子皮嫩色嬌必作癢何也曰皮膚者皮在內約束經脈膚在外分布腠理皮深厚或膚淺薄瘡子之出皮厚色老者皮膚堅者毒有約束不得肆其猖狂之性故能漸次成熟以致收斂也皮嫩色嬌者皮肉已虛但層薄膚以包於外不能約製毒邪風火相煽遊散往來故癢易破也或曰嘗見瘡子有干癢者有濕癢者何也曰干癢者火甚也其治在心濕癢者火濕並也其治在脾譬之火炙湯沃皆能作癢然瘡干而癢者必死心為君主不可犯也瘡濕而癢者或有可治脾屬土無定位故也或曰瘡子作癢爬搔潰爛而不死者何也曰其人能食瘡之破者復加腫灌膿血稠濁痂皮潤落原無痘處補出一番語音清亮此為裡實表虛毒不能入故潰爛而不死也若不能食飯入則嘔水入則嗆聲啞言微面瘡臭爛痂皮焦起大便不固此為表裡俱虛也淹延引日而盡矣或曰何謂陷伏曰內者不出謂之伏外者復入謂之陷如應出不出應發不發伏也謂毒氣留伏於中而不出也陷有二種起發有水不能成膿而遽乾者或已成膿復化成水者謂之倒陷膿已成就不即結痂而潰爛者謂之倒靨皆陷也謂裡虛毒氣乘虛而陷入也或曰痘瘡何以能發渴曰初發熱便渴者火邪內蒸焦膈熏嗌故渴也宜以清涼之劑解之痘出稠密而渴者此氣血分散津液虛耗故渴也宜以滋補之劑收之自利渴者此脾胃虛津液少宜以補中之劑升而潤之若瘡細密不起發不光澤不收靨好飲冷水不能食或大便瀉邪火益熾真水已枯不治之症也或曰痘疹咽痛者何曰火性炎上瘡疹邪火熏灼於中咽喉先受宜急解之不然咽喉受傷腫塞灌爛嘔食嗆水暴啞失聲治之無及矣或曰痘瘡嗆食失聲有生有死者何曰瘡子之出失於早治咽喉都有外者未成內者先熱一旦收靨飲食則噴而出乃咽傷痛不能直入也語音不清乃咽乾而語不能出也但觀瘡子是屬正靨則生非正靨則死能食則生飲食俱廢則死或曰痘疹自利者何曰腸胃受熱傳化失常也大凡瘡疹發熱類多吐瀉不須遽止令毒邪上下得出也待瘡出定裡氣和而利止利不止者中氣被傷不能禁固也宜急止之恐表虛復生他變或曰痘瘡煩躁者何曰痘家喜靜毒氣外出中無留邪臟腑和平心神安泰如多寤少寐啼哭不止此內熱也心惡熱不能安眠而哭謂之熱煩痘瘡掀發光壯欲待成漿而哭此瘡作痛不能忍謂之疼煩皆常候也待瘡平熱退而安若昏憒躁擾循摸悶亂此謂喪神失志十無一生或曰痘瘡寒戰咬牙有生有死者何曰以瘡為主無變候則生瘡壞則死若瘡密甚掀腫身體搖動者此轉移艱難主持不定不可謂之寒戰時渴思飲吞嚼牙鳴者不可謂之咬牙或曰痘後發癰毒者何曰瘡至成膿則毒化而解如未成膿倏爾干收則毒不化故重發癰毒也或曰痘後目中膚翳此初出現便有痘子乎曰初出那得便有只緣收靨不齊面瘡腫爛毒氣攻眼而後有之也或因誤服辛熱之藥喜食炙煿之物亦能令目腫痛今人但見瘡子初出目中流淚便謂眼有痘殊不知肝熱則淚出於目肺熱涕出於鼻脾熱則涎出於口心熱則汗出於面大熱液出造化之理也目中膚翳乃瘡瘢也惟內服藥久自退去不可妄用點割自取損睛之患或曰痘子收後忽無故而暴死者何曰非正靨也於收太速太迫之耳毒氣復入真氣先敗不死何為或曰瘡毒內陷亦有不死者何曰或發癰腫則毒得泄更審毒歸何臟也如毒歸脾肺則為癰腫甚則爛見筋骨而死毒歸肝則為目病甚則筋骨不固而死毒歸心腎則無疾而暴死或曰痘瘡治法皆言發表和中解毒而已不識三者何先曰發表最先大凡痘疹只要發出得盡不使伏於中發表須兼解毒非發表自發表解毒自解毒也瘡疹已出表裡無邪不須服藥如瘡發太甚裡實能食者解毒之法可單用也瘡出已甚裡氣不和或吐或利於和中法內略兼解毒可也若瘡疹無邪惟裡氣虛者只用和中不必解毒或曰發表和中解毒以何藥為主治曰發表須辛甘清陽之劑如羌活防風升麻白芷桂枝之類蓋辛甘發散清陽發腠理也和中須甘溫濁陰之劑如人參當歸甘草芍藥之類蓋中不足者以甘補之又濁陰走五臟歸六腑也解毒須苦寒之劑如牛蒡連翹葛根芩連梔柏之類蓋毒者火也若能瀉火故耳但解毒藥須酒炒而用之勿令犯胃氣也或曰古人云痘瘡首尾不可妄下信乎曰不可妄三字最宜詳味蓋治痘之方當時必有不問虛實一概輕用巴豆牽牛之屬以下之故戒之首尾不可妄下苟可下而下之非妄也可下之症巴豆牽牛亦不可輕用況不可下者乎如曰首尾不可汗下乃拘泥之見非通變之術矣或曰疹愛清涼痘愛溫其然乎曰此亦拘泥之説疹愛清涼設使天氣大寒氣血凝沍不用溫復何以能出痘愛溫設使暑熱之時氣血淖澤更加溫暖寧不潰爛乎故治疹者宜專用清涼解毒之劑治痘者宜溫涼解毒之劑兼而用之可也或曰陳文中治痘之法行之久矣人或喜而取之或畏而舍之何也曰舍之不敢用者固不知文中立法之善取而用之者亦不知文中制方之本旨胥失之矣文中有言曰熱則氣血和暢自然出快又曰表裡俱實則不致癢塌此發前人所未發乃千古不刊之祕也觀其痘瘡引證或因泄瀉或因寒戰咬牙足指冷或因癢塌或因瀉渴不止皆脾胃肌肉虛氣血衰津液少故用木香散異功散再加丁香官桂以治之今則不審虛實於起發光壯表裡皆實者概而用之可乎或曰人有終身不出痘者何也曰痘乃胎毒又名百歲瘡天下之人豈有無父母而生能逃於造化之外者哉但云受天地之清氣稟父母之清氣氣清質粹無有穢毒當天令種痘之年亦曾發熱只出一兩點而不覺也豈真終身不出乎或曰世俗保養痘子者習用僧道灑水誦咒以解魘可乎曰世俗已久不能遽改用與不用從其所好不可阻止設有變怪歸咎於醫而悔僧道之未用矣或曰痘子收後表裡無邪復作昏暈者何曰邪氣已去正氣方生乃否極泰來之兆
