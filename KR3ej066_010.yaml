body:
  text: 卷之十藥性主治及修製法痘疹之法其要在分氣血虛實及發表和中解毒三治而已經曰辛甘發散為陽酸苦湧泄為陰又曰清陽發腠理濁陰走五臟清陽入四肢濁陰歸六腑又曰形不足者溫之以氣精不足者補之以味味歸精氣歸神可見藥有寒熱溫涼之性酸苦辛鹹甘淡之味浮沉升降補瀉之用各有所宜不可不知也今將痘疹合用之藥分氣血解毒三類各具性味主用修制於下以便觀覽檢閲之暇未必無小助也氣類凡四十五品人參味甘氣溫氣味俱薄浮而升陽也入手太陰肺經足太陰脾經補上焦元氣升麻為之使補下焦元氣瀉腎中之火邪茯苓為之使主補五臟生津液止渴治脾肺陽氣不足胃中冷吐利擇堅實白淨者佳去蘆用肺熱咳甚者少用以苦茶湯浸過無妨黃耆味甘氣溫平氣薄味厚可升可降陰中陽也入手少陽三焦手太陰肺經足太陰脾經性畏防風黃耆得防風其功愈大蓋相畏而相使也補胃氣實皮毛蓋治脾胃虛弱瘡瘍血脈不行內托必用之藥也止虛汗去肌熱止消渴止腹痛瀉利擇柔韌皮微黃肉中白者佳痘家宜生用補虛宜炙用痘子不發宜酒炙透用手足瘡不起以桂枝煎酒浸過炙用白朮味甘氣溫味厚氣薄可升可降陰中陽也入手太陽小腸手少陰心主足陽明胃足太陰脾足少陰腎足厥陰肝經主溫中強脾胃進食止下泄利小便和中益氣生津止渴擇內白而堅者去蘆刮去外黃皮用有油者中腐者勿用瘡乾者禁用燥濕故也止泄用東陳壁土炒過用蒼朮味苦甘辛氣溫味厚氣薄可升可降陰中陽也入足陽明胃足太陰脾經主除惡氣闢疫癘氣健胃安脾寬中進食發汗故蒼朮發汗白朮止汗擇堅實中白淨者刮去外粗皮令白切片以糯米濃泔浸透摝出曬乾取向東陳壁土炒黃色用瘡濕癢者及下結痂宜用之痘家常宜燒之以闢不正之氣勿制陳皮味辛苦氣溫味厚氣薄浮而升陽也導滯氣止嘔咳吐逆去白理肺氣降痰留白理脾胃消食擇紅黃色陳久者佳用溫水洗淨去白者去白留白者略去筋膜切曬乾用止吐者以向東陳壁土炒過用青皮味苦辛氣寒氣味俱厚沉而降陰也入手少陽三焦足厥陰肝經散滯氣瀉肝氣消食破積擇小而皮薄陳久者佳用溫水洗浸切開去中穰與白令淨銼碎曬乾此痘瘡必用之藥能瀉肝令不成水疱而作癢也又起發遲者癢塌者並不可缺石菖蒲味辛苦氣溫通九竅出音聲主癰腫疥瘙遍身熱毒痛癢于山澗中取之不聞人聲及不露生者擇節密者佳刮去外粗皮瘡疹驚癇神妄譫妄者必用之瘡後不著痂潰爛成瘡疥者宜入丸用五味子味酸氣溫味厚氣輕陰中微陽降也入手太陰肺足少陰腎經主咳逆上氣生津止渴擇肥大潤澤者佳去梗酒洗淨曬乾痘家咳甚者宜用貝母味辛苦氣平微寒主咳嗽上氣消痰又敷惡瘡能斂瘡口擇白而肥大生者佳去心溫水洗過切曬乾用細辛味大辛氣溫氣厚於味陽也少陰經藥散水寒治內寒消死肌又主喉痹擇細莖氣烈者佳去蘆並葉以溫水洗過曬乾宜少用痘子初發表及癢塌者用之良乾薑味辛氣大熱氣味俱厚半沉半浮可升可降陽中陽也能溫脾理中止吐瀉去臟腑沉寒生用發諸經之寒其餘炮用擇新者溫水洗浸火炙令胖松用惟內虛泄利不可缺內實者戒用生薑味辛氣微溫氣味俱輕陽也益脾胃散風寒治痰嗽止嘔吐能殺半夏之毒擇老者水洗去泥勿去皮用痘瘡不起發灰白色者宜用之如起發光壯紅綻者不可用若止嘔吐須去皮紙包慢火中煨過用麻黃味苦甘氣溫氣味俱薄陽也輕清而浮升也手太陰肺之藥入足太陽膀胱手少陰心陽明大腸經榮衛藥也發散風寒泄衛實去榮中寒又消赤黑斑毒衍義云病瘡疱倒靨黑者麻黃去節半兩以蜜一匙同炒良久以水半升煎去上沫再煎去三分之一乘熱盡服之避風伺其瘡復出一法用無灰酒煎但小兒不能飲酒者難服然其效更速擇陳久者佳摘去根節先用沸湯泡過三次曬乾細切又以蜜酒各半浸良久再曬乾用瓦器炒令焦黑色凡痘疹出遲及痘子黑陷者倒靨者並宜用之白芷味辛氣溫氣味俱輕陽也通行手足陽明經主一切瘡疥排膿止痛內託生肌擇白而堅實者去蛀者內青黑者不用凡痘瘡發表及潰爛者手足發癰毒者並宜先用之附子味辛甘氣大熱其性走而不守可升可降陽也補助陽氣不足溫熱脾胃治四肢厥逆擇頂平而圓重一兩者佳先以童便浸過紙包慢火中炮令極熱去皮臍切片再用防風甘草煎湯乘熱浸過曬乾用之惟痘疹泄瀉內虛手足冷寒戰咬牙灰白色或癢塌者可用之其餘不可妄用半夏味辛苦氣平沉而降陽中陰也入足陽明胃太陰脾少陽膽經化痰止嘔吐益脾胃之氣擇白淨臍正而圓者佳用沸湯泡洗令滑盡切片曬乾若止咳化痰再用生薑自然汁浸過凡渴者禁用燥津液故也木香味辛苦氣溫味厚於氣陰中之陽也沉而降主邪氣闢疫毒能調氣和胃散肺中滯氣止瀉渴傷寒類要云天行熱病若發赤黑斑木香二兩水二升煮取一升頓服擇形如枯骨黏牙者佳不宜見火諸湯中宜磨服之此與青皮乃痘疹切要之藥以其能行氣也惟泄利藥宜煎服肉豆蔻味辛苦氣溫入手陽明大腸經主調中下氣止瀉利開胃消食皮外絡下氣解酒毒治霍亂擇油色肥實者佳用麵包裹慢火中煨熟乘熱以重紙包捶去油入丸藥內用乃內虛泄瀉之要藥非此勿用砂仁味辛苦氣溫入手足太陰經主虛冷泄痢治脾胃氣血結滯不散擇無殼米堅實者佳研碎入藥凡痘瘡內虛瀉利者宜用傷食者不可缺若婦人妊娠出痘疹者又宜用帶殼者炒過研碎入藥乃安胎之聖藥也桂味辛甘氣熱氣味俱薄體輕而上行浮而升陽也入手少陰經桂枝入足太陽經通榮衛開腠理和氣血散風寒痘瘡不起發不光壯非此不可乃發表要藥也擇薄而味厚者佳刮去粗皮用手足痘子發不透者宜此引經若瘡癢塌寒戰咬牙者宜加用之若內虛腹脹用厚而味辛者刮取內肉名桂心惟妊婦出瘡不可用能墮胎故也茯苓味甘淡氣平氣味俱薄能升降陽也白者入手太陰足太陽少陽赤者入足太陰手少陽少陰抱根生者名茯神調胃氣伐腎邪降肺火益氣力止瀉利小便生津液凡補中氣不足用白欲利小便用赤蓋白者能補赤者能利也並削去皮用如心熱神昏者用茯神去皮與中木用丁香味辛氣溫純陽入手太陰肺足陽明胃少陰腎主溫脾胃止嘔逆去胃中寒凡痘瘡泄瀉脾胃虛弱不足者必用之若癢塌寒戰咬牙足冷者此與桂並宜加用之蓋丁香救里官桂發表也非此症不可用藿香味辛氣微溫氣厚味薄浮而升陽也入手足太陰經助脾開胃溫中快氣治吐逆為最要之藥葉擇取真者帶芳香之氣者佳去枝莖以水洗去曬乾用入烏藥順氣散則理氣入黃耆四君子湯則理脾檳榔味辛苦氣溫氣薄味厚沉而降陰中陽也消穀逐水除痰癖破滯氣泄胸中至高之氣能合藥口擇形若雞心正穩尖長心不虛中有錦紋者佳痘疹家惟利藥內用之研細末入藥能墜諸藥至於極下也枳殼味苦酸辛氣微寒氣厚味薄浮而升微降陰中陽也主胸膈痞塞散結氣逐水消脹滿安胃化痰涎消食又治遍身風疥去風在皮膚中如麻豆苦癢通利關節主皮毛胸膈之病擇陳久堅厚不爛不蛀者佳以溫水洗浸刮去穰白麩炒令熟用此痘瘡必用之藥故四聖散有枳殼以能治遍身風疹苦癢又能開胃消食利五臟通關節也枳實味苦酸氣寒大抵與枳殼同枳殼大性平而緩治高高者主氣治在胸膈枳實小性酷而速治下下者主血治在心腹故有高下緩急之分消食散敗血化心胸痰主風癢痹通利關節逐停水消脹滿擇陳久肉厚不蛀不爛者佳以溫水洗浸去穰白麩炒令熟用厚朴味苦辛氣溫氣厚味厚體重濁而漸降陰中陽也溫中益氣厚腸胃走冷氣消宿食治腹痛脹滿散結之神藥擇肉厚紫色者佳削去粗皮以生薑自然汁塗之慢火上炙令透銼用凡痘瘡脹非此不除烏藥味辛氣溫主中惡心腹痛蟲毒疰忤鬼氣宿食不消天行疫瘴治一切氣擇肉白者佳刮去外粗去蘆用乃發表中藥巴豆味辛氣溫此斬關奪命之將不可輕用蕩滌五臟六腑開通閉塞利水穀道去殼擇取肉白者去皮膜與心以銀石器慢火炒令黃色搗爛如膏又以重紙捶去油自散如霜入丸藥中惟傷食腹脹作痛可用大腹皮味辛氣微溫下一切氣健脾開胃鴆鳥多棲此樹上細分開先以酒挼洗去濁仍以大豆汁洗之曬乾用吳茱萸味辛苦氣溫大熱氣味俱厚陽中陰也入足太陰少陰厥陰經主溫中下氣治脾胃傷冷嘔逆胸滿擇粒小者去枝梗先以沸湯浸去苦汁凡六七遍曬乾於瓦器內慢火炒過惟痘瘡飲冷傷胃嘔逆不止者用之紫蘇味辛甘氣溫解肌發表治心腹脹滿開胃下食用葉惟發表湯藥用之手挼令碎大棗味甘氣平溫氣厚陽也安中養脾助十二經平胃氣補少氣少津液身中不足擇肉厚味甘者佳水洗過劈去核凡補藥不可缺若用作丸去皮核搗爛如膏用之牽牛子味苦氣寒善走主下氣利大小便以氣藥引之則入氣以血藥引之則入血大瀉元氣用者戒之不脹滿不大便祕者勿用取黑者炒過研取頭末入丸藥內用痘疹黑陷大小便不通煩躁者宜用之非此症不可妄用也烏梅味酸氣平陽也收肺氣止下痢澀腸止泄去痰止渴擇肉多者以溫水洗去核令淨用杏仁味甘苦氣溫入手太陰經主咳逆上氣下氣定喘潤心肺散肺經風咳嗽消心下急滿痛散結潤燥擇去雙仁者以湯浸去皮尖炒令黃色研如泥用粳米味甘氣平微寒入手太陰少陰經益正氣止煩渴止瀉平和五臟補益胃氣其功莫及杵令精鑿為糜粥常用之良其泔水煮溫止渴猶佳陳倉米味甘鹹酸氣溫除煩渴開胃氣止瀉取多年倉庚中香黃者佳凡痘瘡泄渴甚者可用此炒熟煮湯飲之酒味苦甘辛氣大熱入行藥勢能行諸經凡痘疹解毒藥須酒浸洗炒用可以通行一身之表赤石脂味甘酸氣溫陰中之陽止瀉利澀可主脫赤石脂為收斂之劑也擇赤色細膩者佳研極細入丸藥內用痘瘡泄利者非此不可枯白礬味酸澀氣寒止泄利與赤石脂同功又治疳蝕瘡擇白淨光明者以瓦罐盛之固臍火煅過用入丸藥中單以止泄漿水味甘酸氣涼微溫主調中引氣開胃止渴解煩去脾胃中熱以熟粟米入水洗新鮮白花者佳陳久者不可用痘疹大渴宜飲之龍骨味甘氣平微寒陽也主脫固氣澀腸擇白者研極細入丸痘疹惟滑泄者用之麝香味辛氣溫取當門子痘瘡惟黑陷者用此引發表解毒之劑直入骨髓透臟腑拔除毒氣使之發散也非黑陷與伏切忌妄用穿山甲氣微寒取嘴爪上甲以向東陳壁土拌炒令焦黃色研極細此與麝香同功痘瘡陷伏者藉此引導諸藥非陷者勿用反耗氣血也血類凡一十七品當歸味辛甘氣溫氣味俱輕可升可降陽也入手少陰心足太陰脾厥陰肝經頭止血身和血尾破血全用無效治血通用能使氣血各有所歸故名當歸和血補血破血大補不足擇肥軟者去蘆以酒洗淨曬乾如痘子血熱者用尾血虛者用頭身川芎味辛氣溫氣厚味薄浮而升陽也少陽引經入手足厥陰經上行頭目下行血海通肝經血中之氣藥也散肝經風頭面風不可缺溫中散寒開鬱行氣燥濕擇形塊重實如雀腦色白者佳凡頭面瘡不起發或作癢者非此不可白芷為之使芍藥味苦酸氣微寒氣薄味厚陰也降也陰中之陽入手足太陰經益肝緩中扶陽收陰補血散惡血脾經之藥白者補赤者瀉赤者利小便下氣白者止痛散血冬月減芍藥以避中寒凡痘瘡初發表或血熱或小便不利並用赤如氣血虛脾胃弱及和中並用白俱酒浸透切片曬乾炒過用之如瘡癢塌或手足不起發者此脾虛也只用白者以桂煎酒浸炒用地黃味甘苦氣寒氣薄味厚沉而降陰也生者大寒入手太陽經少陰經涼血生血補腎水真陰不足瀉脾中濕熱及血熱熟者微溫入手足少陰經厥陰經大補血衰擇肥嫩大者水浸驗沉者乃佳陰乾生者名乾地黃凡痘疹血熱者瘡乾枯者身大熱者宜用之酒蒸黑爛者名熟地黃凡血虛者宜用之並須酒洗浸曬乾用天門冬味苦甘氣寒氣薄味厚陰也入手太陰肺足少陰腎經瀉肺火療熱侵肺吐衄妄行定肺氣咳逆喘息促急潤燥止消渴擇肥大者湯浸去皮去心曝乾用肺火甚者非此不除麥門冬味甘微苦氣平微寒陽中微陰入手太陰肺經治心肺熱瀉肺中伏火及治血妄行主口乾燥渴病後虛熱能潤經復脈益血除煩擇肥大者去枝梗湯浸去心用不則令人煩痘疹躁渴最宜多用紅花味辛甘苦氣溫陰中之陽多用則破血少用則入心養血和血與當歸同功子吞數粒主天行瘡子不出汁及胭脂能點黑斑凡痘瘡色紅紫者血熱也用花以酒洗曬乾入藥瘡子黑陷用子以酒浸曬乾慢火微炒研爛入藥牡丹皮味辛苦氣寒陰中微陽入手厥陰足少陰經主驚癇邪氣瀉陰中火除衄血吐血擇肉厚者去心痘瘡血熱者宜之牛膝味苦酸氣平主四肢拘攣不可屈伸活血生血能引諸藥下行腰腿之疾不可缺擇長大而柔潤者佳去蘆酒洗陰乾用蒲黃味甘氣平主利小便止血消瘀血治一切吐衄腸風血痢尿血若破血消腫即生用補血止血則炒用續斷味苦辛氣微溫主傷補不足調血脈止痛生肌擇節節斷皮黃皺者佳酒浸曬乾用茅根味甘氣寒補中益氣利小便除瘀血止消渴解腸胃熱掘取新鮮者擇肥大白淨者搗碎絞取自然汁入藥大小薊梗味甘苦氣溫主養精保血止吐血衄血下血婦人痘疹經血妄行者非此不可香附子味甘氣微寒陽中之陰能下血開鬱又逐去凝血炒黑能止血凡血氣藥必用之能引血藥至氣分而生血婦人之仙藥也石臼中杵淨勿犯鐵以童便浸曬乾炒黑杵末用地骨皮味苦氣寒陰也入足少陰手少陽主五內邪氣熱中消渴及去肌熱涼血涼骨擇肉厚者溫水洗淨去骨曬乾用此與牡丹皮同為解肌熱之劑但牡丹皮解無汗骨蒸地骨皮解有汗骨蒸蘇木味甘酸鹹氣平陽中之陰主破血排膿止痛消癰腫銼細酒浸煮取濃汁入藥桃仁味苦甘氣平陰中陽也入手足厥陰經主瘀血血閉血結血燥通大腸擇去雙仁者以湯浸去皮尖研如泥用此與杏仁同潤大腸但杏仁治氣祕桃仁治血祕
