body:
  text: 卷之十一解毒類凡六十八品甘草味甘氣平生寒熟溫陽也無毒入足厥陰太陰少陰經主五臟六腑寒熱邪氣解毒溫中止渴解百藥毒緩能解諸急熱藥用之緩其熱寒藥用之緩其寒生用大瀉熱火消瘡疽熟用能補三焦元氣健脾和中養血補血梢子生用除胸中積熱去莖中痛節生用消腫導毒刮去皮凡痘疹常用取小者生用惟大補取大者炙熟用若欲解疫癘毒氣於冬至日將甘草刮去皮以竹筒一頭留節盛一頭以物塞之置廁缸中四十九日取出用名人中黃解痘疹惡毒最佳黃芩味苦氣平寒味薄氣厚陽中陰也可升可降入手太陰肺經主諸熱解在肌風熱泄肺中火邪及胃中濕熱主天行熱疾利小腸枯飄者名宿芩入肺經酒炒上行圓實者名子芩入大腸除熱刮去外粗切細以酒浸曬乾再浸再曬酒盡為度瓦器慢火炒焦用如孕婦出瘡疹者擇條實黃芩以水浸試沉者佳生用勿以酒炒清熱降火為安胎聖藥也黃連味苦氣寒味厚氣薄陰中陽也可升可降入手少陰心經解熱毒瀉心火止驚悸止消渴調胃厚腸除脾胃中濕熱主熱氣目痛及諸瘡腫毒必用之梅師方云傷寒病發豌豆瘡未成膿以黃連四兩水三升煎一升去滓分服擇肥大堅實者刮去鬚毛切細以酒浸曬乾再浸再曬酒盡為度瓦器慢火炒焦用暑月出疹生用黃柏味苦微辛氣寒氣味俱厚沉而降陰也足少陰經藥太陽引經藥主五臟腸胃中結熱瀉膀胱清小便降相火擇緊厚鮮黃者刮去粗皮切細酒製如上芩連法梔子味辛氣寒氣薄味厚輕清上行氣浮而味降陽中陰也入手太陰經主五內邪氣胃中熱氣善除心中客氣虛煩不得眠又大病後亡血亡津液臟腑無潤養內生虛熱非此不除又能屈曲下行降火擇七稜及肉鮮紅者去內熱用仁以酒製如上芩連法去肌表熱和皮用如上製法連翹味辛氣平微寒氣味俱薄陽也可升可降手足少陽經陽明經藥入手少陰心經瀉心火降脾胃濕熱除心經客熱主諸癰毒惡瘡有神功去核去穰以酒浸過曬乾研細用山豆根味苦甘氣寒主解諸毒消瘡腫治咽喉腫痛猶解痘毒經驗方患麩豆瘡水研山豆根少許服凡用研水入藥內牛蒡子一名惡實一名鼠黏一名大力子味辛苦氣平主療風毒腫瘡疹喉痹風熱痰壅咽隔不利頭面浮腫王氏博濟治痘疱將出以牛蒡子炒令熟杵為末每服一錢入荊芥穗水一盞同煎至七分放溫服如瘡疹已出更服亦妙以酒淘去砂土又掠去浮面者不用取沉重者曬乾瓦器上炒令聲盡研細用此痘疹必用之藥羌獨活味苦甘辛氣平微溫氣味俱輕浮而升陽也紫色而節密者為羌活手足太陽引經藥又足厥陰少陰經藥黃色而作塊者為獨活足少陰行經之藥俱透關利節乃撥亂反正之主擇去腐爛者痘瘡發表必用之二活皆不可缺升麻味甘苦氣平微寒味薄氣厚浮而升陽也陽明引經藥亦走太陰經主解百毒闢瘟疫邪氣時氣瘡家之聖藥解脾胃肌肉間熱及發散本經風邪若元氣不足陽氣下陷者用此升提陽氣上行聖惠方治小兒斑瘡及豌豆瘡心燥眠臥不安用川升麻一味不拘多少細銼水一盞煎去滓取汁以綿沾汁洗拭瘡上外臺秘要比歲有病天行時病發斑瘡頭面及身須臾周匝狀如火燒瘡皆戴白漿隨決隨生不治數日必死差後瘢點彌歲方滅此惡毒之氣所為以水煮升麻綿沾洗之擇形輕而黑堅實者第一細小皮青綠色者佳謂之雞骨升麻去黑皮及腐爛者如瘡出遲起發遲者以酒洗過用葛根味甘氣平性輕浮陽也足陽明胃行經藥主消渴身大熱解毒解肌發表出汗治脾虛而渴能升提胃氣除胃熱治天行時病壯熱煩渴熱毒擇白淨多粉者佳削去皮凡發表解肌熱切細用若止渴搗碎以糯米泔濾取粉用防風味甘辛氣溫純陽脾胃二經行經藥太陽經本經藥乃卒伍卑賤之役隨所引而至者也瀉肺實散頭目中滯氣除上焦風邪之仙藥擇實而脂潤頭節堅者佳去蘆並叉頭叉尾者不用發表不可缺如瘡癢密者與黃耆同用如手足瘡不起發者與白芍桂枝同用須以酒洗之瘡濕者用之風勝濕也瘡乾者亦用之又藥中潤劑荊芥穗味辛苦氣溫辟邪氣通利血脈傳送五臟能發汗動渴又主瘡瘍破結聚氣取花實成穗者去灰土用凡痘子出發不快不透者皆不可缺桔梗味辛苦氣微溫味厚氣清陽中之陰治鼻塞咽喉痛及喉痹利嗌咽胸膈之氣治肺熱嗽逆消痰涎肺癰又能開提氣血能載諸藥不下沉故名舟楫擇白淨堅實者截去頭及兩畔附枝切片以米泔浸一宿陰乾用柴胡味辛氣平微寒氣味俱輕陽也升也少陰經厥陰經行經之藥主寒熱邪氣推陳致新又有引清氣行陽道升提胃氣上行春令擇獨根柔軟者去蘆叉尾者發表退熱用之前胡味苦氣微寒主心腹結氣治時氣發熱推陳致新去痰實下氣最要擇肥實柔軟獨根者佳去蘆叉尾用石斛味甘氣平治胃中虛熱有功平胃氣長肌肉逐皮膚邪熱痱痛及腳膝軟弱擇取新者去枝節酒洗蒸過用車前子味甘鹹氣寒主利水道小便淋漓雖利小便而不走氣療肝中風熱沖目赤痛擇去沙土研細入藥凡痘疹小便不通最宜白蒺藜味苦辛氣溫微寒治身體風癢去惡血長肌肉明目輕身擇白者炒先搗去刺後研細入藥痘疹瘙癢潰爛者宜此玄參味苦鹹氣微寒足少陰經君藥此乃樞機之氣管領諸氣上下肅清而不獨治空中氤氳之氣無根之火此乃聖藥也擇肥大者去蘆梢勿犯鐵鬱金味辛苦氣寒純陽主血積下氣涼心止血破惡血此芳草也因輕陽之性古人以治郁遏擇圓而長如蟬蛻色赤如薑黃者痘疹陷伏須此發之龍膽草味苦澀氣大寒氣味俱厚沉而降陰也除胃中伏熱時氣溫熱止驚惕治兩目赤腫睛脹疼痛不可忍去蘆酒洗淨再浸曬乾用瘡疹目赤痛非此不除防己味辛苦氣平寒陰也通行十二經主肺氣喘嗽殺癰腫惡結諸蝸疥癬蟲瘡除邪利大小便漢主水氣木主風氣擇紋如車輻堅鮮者佳如治咳生研末入丸用如治痘疹陷伏須酒洗浸曬乾用瓜蔞根味苦氣寒味厚陰也主消渴身熱煩滿大熱唇乾口燥排膿消腫毒生長肌肉新取入地深大而有粉白淨者佳凡痘疹潰爛削去皮用如大渴者削去皮置石缽中擂爛以糯米泔水攪開濾取粉名天花粉陰乾用苦參味苦氣寒沉純陰治時氣惡病大熱及遍身熱細疹癢痛治大風有功削去皮切細酒浸蒸再浸再蒸酒盡為度陰乾凡痘疹癢瘙潰爛如癩以此作丸效如咽喉痛生研細末用茵陳味甘辛氣平微寒陰中微陽入足太陽經解傷寒煩熱行滯氣化痰利膈擇陳久者佳凡夏月痘疹熱甚小便不利者宜用如痘子瘙癢可為熏藥以能去濕熱也知母味苦辛氣寒氣味俱厚沉而降陰也足少陰經本藥主消渴熱中補腎水瀉腎中火消痰止嗽潤心肺患人虛而口乾者多用擇取肥實肉白者去皮毛勿犯鐵惟疹子多用之馬兜鈴味苦氣寒主肺熱咳嗽氣上逆痰結喘促只取向裡面子去殼膜炒用大黃味苦氣大寒氣味俱厚沉而降陰也入手足陽明經盪滌腸胃推陳致新通利水穀性走而不守瀉諸實熱不通心腹脹滿下大便結燥號將軍取其盪滌峻快也擇堅實錦紋者佳切以酒浸蒸九浸九蒸曬乾用痘疹惟大便不通腹脹煩躁者宜之不可妄用聖惠方治時氣發豌豆瘡用川大黃半兩微烘以水一大盞煎服葶藶味辛苦氣大寒治肺壅上氣咳嗽喘促痰飲通利水道走瀉為功大降氣病人虛者宜遠擇味甜者以酒淘淨曬乾紙上微炒研入丸用惟疹子咳不止宜之豬苓味苦甘而淡氣平氣味俱薄升而微降入足太陽少陰經解傷瘟疫大熱除濕利水治渴擇堅實內白者佳去黑皮瘡疹惟小便澀者用之澤瀉味甘鹹氣寒氣味俱厚沉而降陰也入足太陽少陰經治淋閉逐膀胱三焦停水瀉腎邪除濕行水為最要之藥擇白淨者刮去皮毛治與豬苓同木通味辛甘氣平氣味俱薄陽也除脾胃寒熱通利九竅血脈關節治五淋利小便導小腸熱出音聲療耳聾治鼻塞散癰腫諸結不消擇小者去皮用凡痘疹小便不利者最宜之如痘後發癰毒者用木通節酒洗浸曬乾瞿麥味辛苦氣寒陽中微陰治關格諸癃結小便不通決癰腫排膿明目去翳摘去枝梗取實用凡痘疹小便不利與木通同功紫草味苦氣寒治傷寒時疫發瘡不出者利九竅通水道經驗後方治嬰兒童子患疹痘疾用紫草二兩細銼以百沸湯一大盞泡便以物合定勿令氣漏放如人體溫量兒大小服半合至一合服此藥者雖出亦當輕減擇肥嫩者去蘆用之如痘瘡大便滑利者勿用大戟味苦甘氣大寒陰中微陽主行十二水伐腎邪去蘆泔水浸洗曬乾惟痘疹黑陷歸腎大小便不通腹脹煩躁者宜以瀉膀胱之邪非此勿用大青味苦氣大寒主療時氣天行熱疾解一切斑疹熱毒凡出疹子用之痘子勿用射干味苦氣平微溫止喉疼咽痛不得消息散結氣消腫毒行太陰厥陰之積痰使結核自消甚捷勿久服令人虛掘取新者去根切片以甘草水浸曬乾瘡疹咽痛者用之菊花味苦甘氣平寒明目養目血去翳膜擇花黃味甘應候開者佳去枝葉用主痘後目病木賊味甘微苦主目疾退翳膜明目益肝膽去節以酒潤濕火上烘用治痘後目疾穀精草味辛氣溫主明目去膚翳淡竹葉味辛甘氣寒涼心經除煩熱止渴擇節間有白粉者是不可以山谷中生者為之桑白皮味甘辛氣溫入手太陰經瀉肺氣有餘喘嗽唾血消痰止渴去肺中水氣新掘取入土深東行者佳出土上者殺人刮去青黃薄皮勿令皮上涎落細銼以蜜水浸透曬乾再浸如此三次炒黃色用蔓荊子味苦辛甘氣微寒溫陽中之陰太陽經藥主風頭痛腦鳴目淚出散風邪除目睛內痛擇淨以酒浸曬乾痘瘡頭面大腫者宜用密蒙花味甘氣平微寒主青盲膚翳赤澀多哆淚消目中赤脈小兒麩豆及疳氣攻眼擇淨花以酒浸一宿候乾又以蜜合調蒸之曬乾痘後目病用之訶梨勒味苦酸氣溫性急善降開胃澀腸止瀉痢又治肺氣因火極郁遏脹滿喘急咳嗽味酸苦故有收斂降火擇六稜黑色肉厚者佳去核痘瘡內虛泄瀉必用之藥也馬齒莧味酸氣寒性滑肘後方療豌豆瘡馬齒莧燒灰敷瘡根上須臾逐藥出若不出更敷良用葉小者節葉根有水銀入藥去莖節燒灰不去胡荽味辛氣溫療沙疹豌豆瘡不出作酒噴之立出經驗方小兒痘疹不出欲令速出用胡荽二三兩切細以酒二大盞煎令沸沃胡荽便以物合定不令泄氣候冷去滓微微從項以下噴一身令遍除面不噴香薷味辛氣微溫治傷暑除煩熱調中溫胃利小便肺得之則清化行而熱自下用莖穗葉去根以上半夏月出痘疹不可缺清暑故也薄荷味辛苦氣涼氣味俱薄浮而升陽也入手太陰厥陰經主賊風傷寒發汗通利關節又小兒風泛驚風壯熱乃上行之藥能引諸藥入榮衛擇葉小如金錢者佳去莖用葉痘疹發表藥用之山楂子一名球子味甘酸氣溫平陰中陽也消食行結氣健胃又摧瘡瘍消滯血擇色紅肉厚無蟲者佳蒸去核用胡麻一名巨勝子味甘氣平補五內益氣力長肌肉堅節骨療疥癬浸淫惡瘡擇如油麻紫黑色者佳酒淘浸曬乾炒用痘後或爛瘡者最宜生大豆味苦氣平解諸毒除胃中熱五臟結積子母秘錄治小兒斑疹痘瘡熟煮大豆取汁服之擇黑而小者其殼去目中麩翳淡豆豉味苦氣寒治傷寒時疾發汗主寒熱瘴氣惡毒煩躁滿悶痘疹發表解表宜用之擇新者無鹽者佳赤小豆味辛甘酸氣溫平陰中之陽藥也主下水排癰腫膿血熱中消渴止瀉利小便解諸熱毒以此煎湯飲之甚佳綠豆味甘氣寒皮寒肉平治消渴丹毒煩熱風疹解諸毒未出瘡疹者宜煮食勿去皮皮能去目翳丹砂味甘氣微寒痘將出密調服解毒令出少大塊光明者佳細研水飛用此物鎮養心神宜生用朴硝味苦辛鹹氣寒氣薄味厚沉而降陰也主諸寒熱邪氣逐六腑積聚破留血停痰痞滿大小便不通推陳致新治天行熱疾消腫毒排膿軟堅梅師方傷寒發豌豆瘡未成膿研芒硝用豬膽相和塗瘡上立效非大小便秘結煩悶欲死者不可輕用滑石味甘氣寒性沉重入足陽明經主燥濕實六腑化食毒行積滯逐凝血解燥渴補脾胃降妄火之要藥擇白如凝脂軟滑者佳青黑色粗者不可用研細水飛過用痘瘡潰爛宜此敷之良疹毒發渴宜用石膏味辛甘氣微寒氣味俱薄體重而沉降陰也入手太陰少陽足陽明經主時氣肌肉壯熱大渴引飲清金制火潤肺除三焦大熱瀉胃火解肌化斑毒擇細理白澤者佳研極細用惟疹最宜痘家少用臘雪味甘氣寒解一切毒治天行時氣瘟疫臘月取以瓶罌收貯封固埋土中候用密陀僧味鹹辛甘氣平主金瘡口瘡面上瘢靨譚氏小兒方療痘瘡瘢面靨以密陀僧細研水調夜塗之明旦洗云平復矣龍腦味辛苦氣溫屬陽經驗後方治時疾發豌豆瘡及赤瘡心煩狂躁氣喘妄語或見鬼神取一盞細研旋滴豬心血和丸如雞頭肉大每服一丸紫草湯下少時心神便定得睡瘡復發透依舊將息取安犀角味苦酸鹹又云甘辛氣寒主百毒療傷寒瘟疫煩悶大熱丹溪云屬陽性走敗瘡痘後用此散餘毒若無餘毒而血虛者不宜用蜜味甘氣平微溫色白如膏者佳外臺秘要比歲有病天行疹發瘡頭面及身須臾周匝狀如火瘡皆戴白漿隨決隨生不即療之數日必死此惡毒之氣世人云建武中南陽擊虜染惹流入中國呼為虜瘡諸醫參詳治之方取好蜜遍摩瘡上以蜜煎升麻數數拭之蟬蛻治目昏翳又風氣客熱皮膚瘙癢不止又水煎汁治小兒出痘疹不快良凡痘疹出不快或倒陷黑陷者擇完全者以溫酒洗去土勿去爪翅研細入藥調服若去目翳去爪翅研細入湯調服人屎氣寒主療時行大熱狂走解諸毒治瘡疹黑陷燒過服之甚佳於臘月東行取絕乾者以火燒令煙盡研細用人牙齒氣平除癆治痘蟲毒氣入藥燒用忍冬藤一名金銀花一名左纏藤一名鷺鷥藤一名老翁須一名水楊梅味甘氣溫無毒主熱毒蒲公英味甘氣平無毒入陽明經太陰經主化熱毒消惡腫結核者大有奇功蟾酥五月五日取者佳
