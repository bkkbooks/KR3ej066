body:
  text: 卷之十二治痘歌括有引治痘節要諸家論之已詳大抵臨病應變因時制宜其用歸於使人正氣不損邪氣得釋而已後世不知古人制方一以中和為貴曲學偏見滯於一隅喜行溫補者既昧乎解毒之巧專用涼瀉者又失其和中之旨妄投湯餌僥幸成功設遇脈症乖常時勢差異惟束手待斃焉耳況虛虛實實令人夭折者又紛然乎其間哉豫因此懼乃搜輯往哲診治之法及先君經驗之方匯成歌括凡百九十四首序次成書庶臨病之工閲而取之參詳審論斟酌施治以收十全之功幸無得魚而忘筌也萬全識治痘總歌括凡一十九首痘疹原因胎毒成發生須是待天行如逢疫癘將成候預解湯丸最可憑痘疹之病皆由父母胎毒蓄於命門之中命門者右腎相火也為人身生化之本故毒藏焉如遇冬令溫和陽氣暴泄人則感之觸動相火至春夏生長之時其毒乃發傳染相似是謂天行疫癘也未出痘疹者但覺冬溫即當預防宜服解毒之藥如辰砂散八十七消毒保嬰丹十一代天宣化丸十二皆可用也頻與之使瘡疹之毒輕減自然易出易收無陷伏郁遏留連之患其辰砂散消毒保嬰丹代天宣化丸以解時行疫癘之毒則可或因父母精血不足者或其人素有他疾者或發熱之時別臟形症發見者並宜兼而治之不可徒恃解毒而竟忘其本也如脾胃素弱者宜以養脾為重解毒次之養脾丸一六服三之二解毒三之一如因父母奉養過厚精血蓄毒素多胎病者宜二毒並解以溯源解毒湯一百零八代天宣化丸十二相兼服之邑人黃鳳山為陳留丞歸一子五歲請預解痘毒法豫曰令嗣氣色明潤胎稟壯實痘出必疏若更服藥則益疏矣乃與代天宣化丸服之後痘甚疏不藥而安未病先知是上工能言輕重吉和凶不離氣色分清濁臟腑精微阿睹中經云上工治未病者或望而知之或聞而知之或問而知之或切脈而知之是謂神聖工巧瘡疹之毒發於五臟而心主之故曰諸痛癢瘡皆屬於心心之華在面吉凶輕重可望見其氣色之清濁而知之如青氣見者此肝之色肝木生心火為實邪宜先瀉肝羌活湯主之十如赤氣見者此心本經為正邪宜瀉心導赤散三十五主之如黃紅氣見口唇燥者此脾之形色心火生脾土為虛邪宜先瀉脾瀉黃散主之一九弄舌者亦脾熱以導赤散瀉黃散合治之如白色見帶燥鼻中干或清涕出者此肺之色心火克肺金宜瀉肺中之火邪瀉白散五十四加黃芩山梔仁天花粉桔梗主之如黑氣色見者此腎之真臟色見水剋火為賊邪不治預知瘡疹吉凶機氣色都於面部推年上山根尤緊要紅光可喜黯青疑五臟皆屬於面左頰為肝右頰為肺額上為心頦為腎鼻為脾又目為肝之竅鼻為肺之竅口為脾之竅耳為腎之竅舌為心之苗若未出瘡疹之先面部諸位明潤者吉暗燥者凶又相書分山根為命宮年上管疾厄若二宮紅黃光晶者吉青黑者凶故二處尤緊要也凡天行痘疹之時傳染流布男女大小有未出痘疹者視其形色情性可以預言輕重吉凶也此吾家傳祕訣賢於命卜遠矣蓋五臟精華皆見於面而臟氣獨盛者色亦應之故肝氣盛者色青心氣盛者色赤脾氣盛者色黃肺氣盛者色白腎氣盛者色黑但欲明潤不欲枯稿吉凶之兆於此決矣一觀其色紅白明潤與平日同無改變者吉如紅赤而太嬌㿠白而無採頓然改變異於平時者凶又如額有青紋目有赤脈口有黑氣耳有塵痕者大凶之兆也二觀其形精神爽暢動止便利言語清亮者無病也吉如精神衰弱動止遲留言語低微異如平時者凶又原具壽相者吉如有夭相頭破顱解項小不能任元腳細不能任身目無精采或睛露神啼聲斷續笑語無情不由喜引自笑語也聰慧太早肉浮骨軟者凶之兆也三觀其情性未發熱時忽生喜心若與父母愛戀不忍舍者及聞見怪異言語妄誕者凶之兆也邑令公云閣朱公義男一子甫周歲以示全全曰笑無情恐出痘耳訣云喜引才方笑此子不待喜引自笑謂之無情笑者心之聲火之象也經曰諸痛癢瘡瘍皆屬心火故恐出痘也朱公惑次年果痘頭面腫癢死友人胡三溪中年得子項小聲小豫告之曰項者頭之莖名曰天柱項不任元天柱頽矣聲者氣之發聲微不揚元氣弱也誠恐出痘不勝毒果九歲出痘乍見乍隱鼻滴血死邑人李新芳子四歲得驚風豫醫愈乃曰以吾兒托公豫曰令嗣胎稟怯弱精神短少若調理數年胃氣充實出痘無妨但恐痘太急耳次年果痘密甚不成膿死邑人周柳溪止一子五歲未出痘癸丑正月草三日發熱請豫視之見面多青黑色目無神元氣怯弱豫曰當亟治周不喜豫言豫曰邪氣有餘元氣不足若不亟治後發血疱不可為也彼更請醫張鵬作外感治且汗且下至草八日果發血疱卒蘄水周蕙長男婦魯氏新寡二男二女皆未痘請豫視之豫往見二男長女面色嬌赤光太露額有青紋惟小女形實氣充面色明瑩乃告之曰若出痘惟小女吉也魯以言太直不聽半月後長女二男相繼以痘殞小女存蘄水徐長溪三子癸丑春出痘季子先病痘卒次子又卒惟長子存亟延豫治之時未發熱豫觀長溪色憂情苦豫告之曰令嗣當出痘時精神爽健氣色光晶年壽明潤印堂黃光壽相又順候其痘必疏不須醫治毋疑慮也頃之果出痘甚疏未藥愈發散為陽收斂陰始終一氣自流行試觀春夏多蕃秀才到中秋少發榮嘗論痘之症乃人身中一陽之氣始於發生終於收斂流行遞變以至於盡譬諸草木春生夏長秋實冬藏皆此一陽之氣自為始終者也故治痘者先要識得此氣其來不可御其序不可紊盡其裁成輔相之道以左右民然後謂之良醫也所謂道者明於陰陽和於術數也蓋天食人以五氣寒熱溫涼平也地食人以五味辛甘酸苦鹹也天有陰陽故溫熱為陽而寒涼為陰地有陰陽故辛甘為陽而酸苦鹹為陰一物之中亦有陰陽故氣薄者陽中之陽厚者陽中之陰味薄者陰中之陽厚者陰中之陰清陽升浮發腠理而實四肢濁陰降沉走五臟而歸六腑所謂明於陰陽者此也至於立方之旨如辛甘發散為陽則用辛涼甘寒之劑味雖陽而氣則陰也酸苦湧泄為陰則用酸熱苦溫之劑味雖陰而氣則陽也氣味相和陰陽相濟必使陽毒之氣順其流行之勢而不失其遞變之序始於春夏終於秋冬所謂和於術數者此也今之醫痘者辛甘溫熱之群聚偏於陽而不知濟之以陰酸苦寒涼之合同偏於陰而不知濟之以陽使痘之氣有春無秋有冬無夏是皆昧於陰陽之理不知術數之奧以夭人命醫云乎哉首尾汗下謂不宜尋常執著豈通醫若分虛實能權變可奪乾坤造化機首尾不可汗下古人必有所為而發今徒拘執不可汗下之言設若遇外感寒邪腠理閉密其出不快其發不透不與辛甘發散之劑寧無壅遏之患乎又如大小便祕結者不與苦寒泄利之劑寧無脹滿煩躁乎但察其虛實與時權變可汗即汗可下即下中病則已勿過其制然後謂之通醫邑訓導馬公順蜀人也一孫五歲出痘至八九日膿成將靨忽腹痛煩哭大便祕馬駭甚豫曰此結糞也當急下之馬公曰痘瘡首尾不可下今當收靨中氣要實敢下耶豫思不急下加腹脹氣喘且不救乃作桂枝湯暗入酒蒸大黃煎服下燥糞腹痛即止痘靨而安馬公知之謝曰非子通變幾誤此孫痘瘡無病勿服藥實實虛虛不可錯幾多狂瞽昧經文壁上安鼠翻成惡痘瘡一科自始至終如無病者不可服藥古人云無病服藥如壁中安鼠試確論也蓋治病之工只有補瀉二法果虛則補之可也若元氣素厚穀氣素強者而復補之則有實實之變果實而瀉之可也若元氣素薄穀氣素弱者而復瀉之則有虛虛之變如此之類豈不為壁中安鼠者乎今之業醫者但思醫不用藥何以為功而取利也不論虛實妄投藥餌幸而中病則大言以彰其功一有誤焉則掩飾其過而推託於命矣痘疹傷寒疑似間古人分證可相參莫將汗劑先輕試發散惟令表裡安瘡疹發熱與傷寒相似但傷寒只見一經形症若痘瘡則五臟之症皆見如呵欠頓悶肝症也乍涼乍熱手足梢冷多睡脾症也面燥腮赤咳嗽噴嚏肺症也驚悸心症也骩涼耳涼腎之平症也如初發熱疑似之時不可遽用發汗之劑如麻黃桂枝湯類蓋瘡疹表裡俱熱苟輕發汗則腠理開張表氣益虛臟腑陽盛其氣轉增但以升麻葛根湯一人參敗毒散二羌活湯十參蘇飲三之屬解之使表裡氣和凡痘疹五臟見症要察何臟之症為甚即主其臟之毒多如肝症毒多者必發水疱生瘙癢成目疾宜預解肝之毒羌活湯十加青皮柴胡肺症毒多者必增喘嗽煩渴不止手掐眉目鼻面宜預解肺之毒瀉白散五十四合甘桔湯七加牛蒡子天花粉心症毒多者必伏不起譫妄飲水煩哭咬牙宜預解心之毒導赤散三十五加黃連辰砂脾症毒多者必成灰白色癢塌吐利宜預保養脾胃以解其毒四君子湯二十調元湯十八加白芍藥防風連翹腎不見平症耳骩俱熱者死候也痘疹主治解表和中解毒三法也解表兼發散之義使邪氣盡出於外不使留伏於中如防風白芷荊芥穗升麻葛根柴胡桂枝之屬和中專主脾胃兼助血氣使裡氣常實血氣不虧助養痘瘡而待其成不致癢塌倒陷如黃耆人參白芍藥當歸木香陳皮之屬解毒只瀉火涼血清氣使毒邪有制不為正害如山豆根大力子紫草連翹芩連梔子之屬痘疹發熱疑似時傷寒傷食莫辨之試將解發真良劑入口能令解卻疑痘瘡發熱與傷寒傷食相似疑似之間可以解發之藥服之若是痘症則痘子即出不是痘症則熱退而解矣如症似傷寒者面赤柴葛敗毒散主之二附方症似傷寒者面黃香蘇敗毒散主之二附方始終清便自調佳便溺阻艱事可嗟腹脹喘煩多壅遏急施疏導解留邪痘瘡始終要小便長而清大便疏而潤謂之裡氣和若有阻艱則毒邪留伏於裡腸胃壅遏不得運化但見少有阻澀須微利之小便澀者導赤散三十五連翹湯八十八大便硬二三日不更衣者柴胡飲子九十九良膽導法五十一大小便俱不通膽導法五十一柴胡飲子九十九如逡巡不早治以致腹脹喘氣煩躁者治無及矣痘瘡為陽待熱成微微發熱始和平假如大熱身猶火解毒常教小便清痘疹屬陽非熱不能成就故治不可盡除其熱但微發熱不渴大小便自調此肌表瘡本之熱非裡熱也謂之表裡無邪不可妄治身熱如火瘡勢稠密其毒必盛宜解毒兼利小便連翹升麻湯六連翹湯八十八始終能食最為良平日其人脾胃強食少卻防中氣弱淹留引日變瘡瘍痘瘡始終以脾胃為主故人能飲食者氣血充實自然易壯易靨食少者起發收靨不能快易治痘之工於食少者必須詳審若平日能食今因痘出而食頓減或咽痛飢欲食而不能宜解利咽喉甘桔湯七加牛蒡子或咽痛或咽不痛不飢不欲食又得大便何如大便硬此賴平日穀氣以為主雖數日不便無妨不可妄補以增內熱亦不可妄解毒以損脾胃大便一日一行則內之穀氣有限而氣血易衰須用和中四君子湯二十加炙黃耆木香青皮不可解毒者脾胃虛也大便瀉則裡虛宜急止其瀉四君子湯二十黃耆建中湯三十理中湯三十四並加訶子肉合肉豆蔻丸四十三或錢氏異功散四十四益黃散四十五甚則用陳氏木香散二十五異功散二十六此二藥太峻非內虛瀉甚不可輕用若向能食一旦忽減不咽痛但腹中滿或痛此必傷食以養脾丸一六木香大安丸九十消導之甚則以丁香脾積丸三十三原物湯下以微利之復食以四君子湯二十合勻氣散十三或養脾丸一百零六調服之最宜安靜號和平表裡無邪志自寧忽然煩擾宜詳審外怕神亡轉悶昏痘瘡以安靜為貴飲食坐臥如常此表裡無邪號曰和平忽然煩擾不安多哭宜審視瘡勢形色如瘡起發光壯不渴大小便調此瘡正發毒邪散布氣血弸急而痛謂之痛煩不須施治待膿成毒化痛止而煩去矣如瘡正色問之不痛但覺心煩不安此內熱也心惡熱謂之熱煩以導赤散三十五加梔子仁麥門冬或以牛黃清心丸三十六燈心湯下如瘡紅紫乾燥壯熱口渴狂亂昏悶譫語如見鬼狀者退火回生丹一百零五附方如瘡瘙癢此欲陷也瘡乍見乍陷此有伏也目閉妄言謂之神衰不治邑人汪我溪次女丁卯冬出痘延長兒邦忠視之起發灌膿時昏睡不思食豫謂忠曰此心血不足邪火內熏神昏症也命以龍腦安神丸與服有傾蘇痘亦平程希文次子辛未春出痘發熱現形時煩躁譫語來告豫以病症豫授一方用木通山梔仁麥門冬牛蒡子連翹甘草燈心作引水煎調辰砂末連服三劑病退痘出如期愈癢塌方將倒陷時急憑妙劑強扶持空中痘出無番次損處多膿功可施痘瘡喜厚實堅牢尖圓飽滿若頂平皮薄色淡忽然瘙癢損塌者此脾胃弱肌肉虛欲變倒陷也宜十全大補湯三十八加防風荊芥穗服之外用茵陳熏法八十一如痘空中原無痘處復出大小不一等作三四番出其破損處復加腫灌成膿能食大便調者可治若癢不止皮脫瘡干或利或大便祕悶亂者此已陷也不可再治陷伏需分實與虛莫於臨症更躊躇死生倏忽如翻掌幽谷春回慶有餘凡痘疹內者不出謂之伏外者復入謂之陷陷伏之症有實有虛如大熱渴大小便不通煩躁譫語妄有見聞狂亂腹脹者此實也實者邪氣壅遏侵蝕正氣宜內服百祥丸五十二牛李膏五十三或宣風散九十二棗變百祥丸一二六外用水楊湯七十五浴之得利瘡出者佳更以仙聖散六十二加味四聖散六十四並加燒人屎調之如因吐瀉不止渴喜飲水腹脹手足冷或寒戰咬牙者此虛也虛者正氣虛弱不能制伏邪氣令得反復宜內服快斑湯十五合勻氣散十三奪命丹十甚則陳氏木香散二十五異功散二十六外用水楊湯七十五浴之得泄止瘡出者佳更以十全大補湯三十八加燒人屎調之此上二症並用神應奪命丹十七附方如法施治瘡不出反加煩躁昏不知人者死症也大抵看痘之法其出欲盡出不盡者伏也其發欲透發不透反平塌者倒陷也其收欲淨膿潰皮破收不乾淨者倒靨也陷伏之症謂之逆症非衝擊猛峻之劑安能成起死回生之功哉時醫欲以尋常之藥治陷伏之病其猶放雀搏鸇驅羊敵虎其勿克也明矣輕者奪命丹十七甚者神應奪命丹十七附方如倒靨之症氣實者解毒內托散一二二附方氣虛者調元湯十八加白芷桂防風當歸主之服藥之後有三驗法原瘡復腫以成膿者一驗也原瘡已干別於空中復出一層起發養膿但如正痘收靨者二驗也不腫不出只變自利下膿血者三驗也有此三驗者吉無之者凶四時分治候須明暑濕風寒不可輕異氣莫教相觸犯致令翻變亂其真古人養生或治病者常順四時之氣謂之勿伐天和如春夏養陽秋冬養陰飲食起居各有攸宜凡痘疹發熱之時其初發表解肌各有主方春用羌活湯十夏用五苓散二十八秋用參蘇飲三冬用五積散八十六四時通用人參敗毒散二又如春肝旺風木主事調養之法宜四物湯十九加防風黃芩木香青皮羌活以折風木之勝又以四君子湯二十加白芍藥桂心以補脾之受制相間服之夏心旺熱火主事宜黃連解毒湯八十九合天水散九十四以清熱火主事宜以調元湯十八加麥門冬五味子以補肺之不足秋肺旺燥金主事宜瀉白散五十四合甘桔湯七加牛蒡子馬兜鈴以散肺中之邪又以四物湯十九去川芎加天麥門冬天花粉以潤其燥冬腎旺寒水主事宜五積散八十六以散表之寒理中湯三十四加炙黃耆木香丁香以勝里之寒此四時之治法也如天有暴風連日不止恐有風邪桂枝葛根湯五夏日盛暑或非時之熱人參白虎湯二十四冬月嚴寒或非時之寒四君子湯二十加桂枝生薑久雨濕盛五苓散二十八加蒼朮此四候者必瘡變色有異症可依其法治之苟無他候不可妄治惟謹帷幕遠風寒毋令大熱毋令大寒但常和暖更常服蟬蛻膏一五蓋此方能御風邪避惡氣透肌快斑疹也房屋中常燒闢穢香九十三勿得間斷治痘皆言要補脾補中有害少人知一朝陽盛陰先絶到此臨危悔卻遲痘瘡雖以脾胃為主但謂不可攻擊以損中和之氣然亦不可妄補而使之太過也若果吐利飲食少者四君子湯二十聖藥也苟得食大便硬此里本實復以四君子與之則為實實陽勝陰虧不久而生變矣況白朮燥津液茯苓滲津液氣盛血枯者其貽害豈小哉吾見世人勻用補藥者或增煩躁或成潰爛往往不悟良可慨夫痘瘡脈候貴和平胃氣悠長最要清弦數浮洪為實候微沉遲澀是虛因痘瘡之脈中和安平為貴不可躁疾微小故曰脈靜身涼者生脈躁身熱者死又陽病得陰脈者死夫四時以胃氣為本胃氣者弦不弦石不石也故弦數浮洪為太過為實實者邪氣實也沉遲微澀為不及為虛虛者正氣虛也皆死候之脈所以人無胃氣則死痘逆症逆色脈逆此候未聞人救得但觀色脈有可為對病真藥須詳細治痘之法色脈為本病症為標若痘逆如陷伏之類症逆如煩躁悶亂腹脹足冷之類色逆如氣色昏黯皮肉黧黑之類脈逆如躁疾鼓搏謂之陽盛陰虛沉微濡弱謂之陰盛陽虛四逆俱全標本同病表裡皆傷不可治也若只痘逆症逆六脈調勻五色明潤者此標病本不病也急治其標以救其本對病之藥良工得之鄖陽撫院孫公一女七歲己巳四月七日發熱全在幕下見其面赤腮躁知是痘症次日口角旁便見紅點如蚊迹狀不成顆粒一逆也腰痛腹痛二逆也昏睡譫語三逆也乾嘔四逆也初九日公見其狀撫膺大慟全以色脈無恙再三慰之不信但垂淚曰爾痘疹書明言不治何又相誑也全告曰此病在經絡猶可治也但因中氣久虛不能驅毒外出耳公乃命進藥豫用保元湯以補中氣加羌活防風荊芥柴胡發散表邪木香山楂驅逐里邪調辰砂末以解毒初九初十十一日連進三劑十三日午時忽昏暈目閉口噤神色俱變公與夫人皆哭全急告曰此有冒汗來也汗出痘亦隨出謂之冒痘須臾視之果得大汗而痘盡出矣復用錢氏異功散加黃耆白芷調理而愈公拱謝曰不負吾為爾梓痘疹書也壬申春郡人王蒸湘子出痘請豫往治痘已盡出問其詳時有董醫在答曰正月草七日發熱草八日現形自額上起今三日矣豫思額上初出者重三五成叢者重五心俱有者重鎖項者重乃逆痘也及審其症腹脹大而緊腸中汩汩有聲大便如黃金色乃脾敗逆症也因其一子托治甚切設法調治腹脹不減腸鳴如故起發之初心窩中有一痘戴漿者隨即破滅背瘡盡成水疱目中淚出兩拳緊握豫甚恐此脾土敗肝木勝之候也蓋肝為水疱其為變也握不泣而淚出肝絶也未五日而唇瘡乾黑背瘡盡破診其脈濡弱沉細其脈又逆六日而癢作搖頭扭項逆症也且求粥食且急病名除中又逆症也豫思急進保元湯合桂枝湯調獨聖散服之復見紅點蒸湘喜曰此有生意矣豫曰若漸出一層小痘則吉只恐膏之將滅也必大明而後滅果紅點復隱加喘而絶怪痘形容有數般上醫臨症盡須諳謾誇君有如神術縱療何能得保全怪痘者乃逆痘之中最甚者也形症不一宜辨之痘子初出時面胸手足已見紅點卻不起發不成膿水隨即收斂若加悶亂氣喘者即死此內陷症也若無喘煩之症名曰試痘過五七日復發熱出痘者其痘必重痘子出現三兩成叢根腳堅硬成塊者此名痘母不治六七日死痘子將出身上有紅腫結硬處似瘤非瘤似癰非癰亦名痘母不治三五日死痘子初出便成血泡或水泡隨即破壞此名爛痘不治二三日死痘子出後遍身都是空殼不作膿水者此名空痘不治八九日死不死者亦發癰毒難調痘子出現起發之時中陷乾黑者此名鬼痘宜用胭脂水塗勿使蔓延若不急治當靨不靨乍起乍塌多作番次而出連綿日久而死痘子出現起發時中間有痛如刀剜者叫哭不止此名痘疔不治五六日死痘子起發時枯燥不潤塌伏不起皮膚皺揭者此名干痘不治五六日加煩滿喘急而死痘子起發時皮嫩易破摸之濕手者此名濕痘不治六七日癢塌而死痘子起發時瘡色嬌豔皮肉緋紅者此名嫩痘八九日後不能成痂癢塌死痘子起發養漿之時瘡頭有孔漿水漏出者此名漏瘡五六日後癢塌死痘子膿水將成之時其瘡自破有孔而深此名倒陷不治痘子將靨時不能成痂皮脫肉黑者此名倒靨不治痘子將靨之初不能成痂皮肉潰爛膿水淋漓者此名痘癩能食生不能食死
