body:
  text: 卷之十三發熱症治歌括凡一十九首痘疹發熱似傷寒症治分門不一般疏解透肌斑毒出陰陽和暢少留連傷風寒腠理閉密陽氣拂鬱而發熱其症惡寒畏人怕露頭面以溫熱之劑發之邪氣去陽氣舒暢汗出而解再不傳入於裡為痞滿燥實也痘疹毒發於里陽氣熏蒸而熱其症惡熱喜露頭面以溫涼之劑解之使榮衛疏通陰陽和鬯毒由筋骨臟腑而達於肌肉皮毛漸化而解之不留連郁遏於裡也邑令公云閣朱公子九歲庚申三月發熱嘔吐召全視之全曰痘也公曰不然昔在蜀已出過痘跡固在全曰此水痘瘢跡非正痘瘢也公又堅執為傷食全辨之曰痘疹發熱與傷寒傷食相似傷寒發熱則面紅手足微溫傷食則面黃白手足壯熱痘疹發熱男則面黃體涼女則面赤腮燥其足俱涼今公子身熱面黃足涼乃痘疹也經云痘乃胎毒五臟各具一症發熱呵欠驚悸心也項急頓悶肝也咳嗽噴嚏肺也吐瀉昏睡脾也耳涼骩涼足涼腎也以此論之乃痘症非傷食也公又曰未見五臟諸症只嘔吐足涼恐非痘也全曰公子脾胃素弱痘毒乘虛故發在脾但見嘔吐一症熱才三日姑俟明旦再議次日以燈視之皮下隱隱紅點而唇邊已報痘矣公惟一子心甚憂懼全告曰顆粒分明部位正當此順痘也公問宜服何藥全曰痘無病不宜服藥但適寒溫調其飲食期十三日安後果然發表時師少定方古人專主葛根湯能通權變知增損何必多方立紀綱古人治痘以葛根湯為主後世好奇多立方法法愈多而治愈難矣苟能變通自發熱以至收靨葛根湯皆可增損用之不特發表解肌而已今葛根湯一為主治隨症立增損法於後初發熱解表加柴胡羌活白芷桔梗防風口乾渴內熱也加葛粉天花粉麥門冬自利加條實黃芩生用嘔吐加半夏生薑腹中痛加木香青皮枳殼山楂肉腰痛加獨活北細辛頭痛加羌活藁本蔓荊子驚搐加木通生地黃燈心小便少加木通車前子瞿麥大便秘加大黃衄血加山梔仁玄參生地黃發熱三四日熱甚不減加解毒藥大力子連翹紫草桔梗瘡不出加防風蟬蛻荊芥穗紅花子眼痛加密蒙花柴胡龍膽草瘡出後太稠密加人參當歸木香紫草大力子防風桔梗咽痛加桔梗連翹瘡干或帶紫或色太赤者血熱也加當歸梢生地黃紅花地骨皮牡丹皮瘡灰白色平陷者氣虛加人參白朮木香官桂手足瘡不起脾胃不足也加防風官桂人參黃耆瘡太密起發不透又渴者此津液不足加人參麥門冬天花粉泄瀉者裡虛也加人參白朮訶子白茯苓瘡不著痂者濕熱也加黃耆防風官桂白芷解表升麻湯最良紅斑雖見飲何妨時師膠柱無通變才見紅斑不敢嘗古人謂但見紅點便不可服升麻葛根湯恐發得表虛也此蓋為痘疏毒少者言後人不達立言之旨遽謂凡出痘子才見紅點真不可服殊不知升麻葛根湯四味乃發表解毒疏通血氣升降陰陽之劑痘出太密正宜常服以解之令陷者升燥者潤郁者疏過者平陰陽不衰而陽毒不亢也苟謂痘疏毒少者雖他藥不可服況葛根湯乎痘疹未形先發熱吉凶輕重如何別熱微毒少吉堪言熱甚毒多凶可決瘡疹發熱熱氣微者其毒必少痘出自疏易發易靨不須服藥熱氣甚者其毒必多痘發自密難發難靨且多他變宜預解之宜連翹升麻湯六或如聖湯一四解毒快斑湯一四附方併合代天宣化丸十二主之或有熱微痘出反密者其人必口燥渴唇焦裂小便赤少大便秘身雖不大熱卻蒸蒸然此毒深熱亦深故表不大熱而裡熱也宜急解之柴胡飲子九十九或有熱甚痘出反疏者其人必不渴唇潤目無赤脈大小便調身雖大熱但熇熇然此毒淺熱亦淺故表熱裡氣和也只以升麻葛根湯發熱大渴熱在中舌燥唇焦毒火攻莫比尋常些小渴養陰解毒有神功此心經出痘症也痘疹發熱有不渴者熱在表不在裡也有小渴者痘疹之熱生於內心主熱心移熱於肺故渴此常候耳切不宜與冷水紅柿西瓜之屬恐冷傷脾損肺但與陳廩米作湯飲之若大渴嗌乾唇焦舌燥此心火太炎腎水不升毒火妄蒸血枯液耗宜急解之葛根解毒湯二十一大劑飲之不止更加黃連以瀉心火之有餘黃柏知母以滋腎水之不足舌潤則生舌如芒刺則死蓋舌為心之苗少陰之脈榮於舌也如發熱自利而渴者此津液不足也黃芩湯四十一加人參白朮麥門冬主之熱時腹痛陣難禁臟腑之中毒氣侵發熱疏通如痛減切防陷伏變非輕此脾經出痘症也訣云發熱肝中痛斑瘡腹內攻發多防不透發少更防癰可見痘疹腹痛乃惡候也凡發熱腹中便痛者此毒氣內攻也宜發表疏里桂枝大黃湯二十九主之若原無腹痛發熱二三日後大便不通而痛者此燥屎與毒相併而痛也膽導法五十一宣風散九十二擇而用之有譫妄狂亂者內服退火回生丹一百零四附方外用膽導法三十四加桂心或因多食而痛者此冷痛也理中湯三十四加桂心或因多食而痛者此食積痛也微則木香大安丸九十一甚則承氣湯三十丁香脾積丸三十三原物湯下已上諸可下者若脾胃素弱之人不可與下反傷脾胃宜補中順氣湯九十一附方主之原無腹痛自利後痛者此虛痛也黃耆建中湯二十一加木香青皮或化毒湯三十二主之如瘡乍出乍隱此伏也防風通聖散四瘡出盡者再以神應奪命丹十七大發之瘡不出者勿治黃岡索希文為羅田吏一子十三歲發熱腹痛煩渴萬世喬先作傷食治熱不除腹痛甚極復延予予曰此痘也腹痛者毒氣內攻也煩渴者神不得安津液干也法當解毒托裡不可緩也世喬堅執為傷食症五日後其痘一齊湧出未及起發乾枯內陷而卒其母泣曰悔不用萬君之言發熱腰疼最可訝膀胱傳腎變凶邪急宜解散陰中火莫待流殃卻痛嗟此腎與膀胱二經出痘症也痘瘡初發熱便腰痛其後多不可治之症蓋由太陽膀胱而傳小腸乃自下而上自內而外為順今由膀胱傳入於腎乃陷於至陰之下而不得升伏於骨髓之中而不能出故瘡疹歸腎者死但覺腰疼宜急發散令毒化解復出於太陽而行陽道也人參敗毒散二或五苓散二十八加獨活細辛主之英山一富家子年十六患痘發熱腰疼來請予治予問曾婚否曰未也連進人參敗毒散二服痛止痘出而安若曾有房室者不可治也腰痛雖云大不祥女輕男重更消詳未婚可許真元固已娶堪憂相火狂經曰腰者腎之府也乃人身之樞紐諸骨之根柢痘疹腰疼最為大忌女子抱陰而生其中有陽男子抱陽而生其中有陰陽道常饒陰道常乏故男重女輕也男子未婚者腎中真陰未損已娶者則陰水虧而陽火熾矣此又男子輕重凶吉之辨不可不知惟有斑疹能作搐要識病源屬肝木木能勝脾又歸心風火相爭多不足此肝經出痘症也斑疹發熱之初多有作搐者蓋疹為脾所生脾虛而肝旺乘之木來勝土熱氣相擊動於心神心喜為熱神氣不安因搐成癇斑子為心所生心生熱熱則生風風屬於肝二臟相搏風火相爭故發搐也以導赤散三十五加辰砂末與瀉青丸一一合而治之如再不止小便利者可治以導赤散三十五送下牛黃清心丸三十六或粉紅丸一一一小便不利者勿治其有不作搐只多叫哭者肝熱也目必直視瀉青丸一一目不直視煩渴多哭者心熱也導赤散三十五加黃連梔子仁主之邑人胡元溪一子甚珍愛未痘延予視之予曰令嗣五嶽端立三關明潤骨堅肉實神俊氣清出痘必疏壬寅五月末旬發熱作搐元溪夫婦憂惶無措予曰此佳兆也以辰砂散投之搐止痘出予又曰凡痘起脹未有頭面不腫者此痘顆粒緊小必不大腫面貌如常期十二日而安果然予次男邦孝辛卯春方四歲發熱卒驚而絕其母大哭予曰此痘疹也乃掐合谷得蘇與導赤散瀉青丸一服而搐止痘出甚密幸無他病十三日而靨予時制滿起復追崔宗師至棗陽往返半月抵家又出疹愈發熱吐利如並作上下毒出無壅遏三焦火邪熱中求日久不休脾胃弱此脾胃二經出痘症也瘡疹發熱吐利非寒症經曰諸嘔吐暴注皆屬於熱三焦者水穀傳化之道路為熱所迫則傳送失常吐利並作上焦多吐下焦多利中焦吐利俱多不須驟止吐利中有疏通之義邪氣上下得出無壅遏也如欲止之自利者黃芩湯四十一吐利者黃芩加半夏湯四十二吐者茱連散四十八橘皮湯四十九更詳審吐利所出之物如吐酸水者利色黃或青綠者其氣臭者皆熱也若吐清淡之水利下清白不臭未可作熱治之乃內虛也四君子湯二十加訶子肉益黃散四十五利久不止四君子湯二十送下肉豆蔻丸四十三邑人胡玉峰第三子方二歲染痘自利三日不止請予治之彼欲進理中湯加訶子肉豆蔻予曰不可此協熱利也宜用黃芩芍藥湯便觀其形色利當自止不必服藥次日痘出利果止一小兒發熱之時自利大孔如竹筒狀清水流出逆症也予思乃火甚於內肺金不收令也以黃芩芍藥湯加烏梅一服而利止發熱譫妄如見鬼神識不清毒在裡鎮神解毒以平期一向不休病不起此純陽無陰之症初發熱便妄有所見聞妄言如見鬼狀此為惡候蓋毒攻於裡心志昏惑神識不清而然況小兒神氣怯弱鬼魅易侵又厲鬼常乘疫氣而行乘人之虛而疰之故凡痘疹妄見妄聞妄言如見鬼者不可治也須審發於何臟如目直視手尋衣領亂捻物此發於肝為亡魂悶亂喘促手掐眉目鼻面此發於心為喪神困睡手足瘈瘲不思飲食此發於脾為失意目無精光畏明欲墜下而縮身此發於腎為失志故曰真臟見者不治或發熱時無此症因大便秘結卻有之此內熱也先以三黃丸八膽導法五十一解利其熱後以導赤散三十五送下牛黃清心丸三十六或粉紅丸一百一十一以鎮其神病已者可治連作不已者勿治邑人胡三溪子己酉冬痘時常以手自掩其面身下縮頻呼曰我怕若有所見者請予視之予曰逆症也經曰腎敗者失志目中見鬼死不治錢氏云腎病則下竄此痘發於腎不可為也果然一婦人年二十餘發熱五日痘不出常起摸床壁昏不知人口喃喃不休請予視之曰死症也果然本邑周璜子年十三染痘發熱五日痘不出發狂譫語請予治之予往見其族兄周尚貴在亦明醫也乃問曾服藥否曰連進保元湯三劑矣予曰誤矣犯實實之戒也凡治痘者發熱之初驚者平之渴者潤之吐利者和之便秘者利之熱甚者解之如無他症不須服藥今觀此子元氣素厚飲食夙強乃以保元湯助火為邪毒氣鬱遏至於狂妄熱已劇矣宜急下之與三黃湯得利狂止痘出至十七日乃靨蘄水汪沙溪家癸丑年出痘請魯家湖黑神托巫語云爾家十八人六人不可救也初出痘一婢死急請予往又一婢發熱癲狂予見之曰熱劇矣當速解之沙溪曰專為吾孫請公非為此婢也且神言不吉者六人奈何予曰人有貴賤醫無分別僕到當悉治之神言不足信也乃作三黃湯大劑與之得利熱減神清痘出而安餘十七人悉活之身上蒸人手足厥曾多吐利脾虛怯補中發表要兼行莫向人前浪饒舌此純陰無陽之症痘瘡發熱手足卻宜和暖雖云足屬腎要涼涼非冷也只與常人同遍身皆熱而此同常人故稱涼亦和暖之意非真冷也若手足冷由其人曾多吐瀉脾臟虛怯脾主四肢所以冷冷為惡候不可單用發表反損脾胃宜和中發表兼用痘出以脾胃為主又宜急與大補湯以飲之不可因循空淡廢事也先以黃耆建中湯三十一加防風羌活或四君子湯二十加黃耆桂枝防風以發之發後以四君子湯二十加黃耆白芍當歸桂心以補脾胃養氣血而助痘瘡之成就也發熱之時血妄行不知何道血先奔但從鼻出宜涼解別道來時可痛心人身之血不可妄動痘疹發熱有失血者由毒火鬱遏於裡煎熬蒸灼迫血妄行血亦隨火而動但從鼻出者此火刑于肺鼻為肺之竅宜瀉火涼血清肺以玄參地黃湯六十五調鬱金末加茅根自然汁磨京墨汁飲之衄止者佳衄出不止者勿治若從口出者從大小便出者皆卒死之候里中林霄年二十餘染痘初發熱小便血予聞之嘆曰不可為矣或問其故予曰乙未春蘄水桃樹垇徐氏出痘死者十八人皆小便血也霄越三日殞晝夜如蒸熱不已消詳內外分調理假如咽痛食難嘗急解咽喉無後悔乍涼乍熱痘疹常候若遍身如火晝夜不休此心火亢甚脾土益燥為失其常宜消詳表裡症候以施治也如口燥渴目赤唇焦大小便不利此表裡俱熱也雙解散四柴胡飲子九十九膽導法五十一如咽喉痛甘桔湯七加牛蒡子或射干鼠黏子湯六十加桔梗使咽喉爽快胸膈開豁失今不治他日咽喉閉塞水入則嗆谷入則嘔暴啞失聲悔之無及發熱渾身汗漐漐陰陽和暢宜沾濕熱從汗減毒從出汗泄不休須早治痘疹發熱有自汗者此榮衛氣和腠理疏通以漐漐然身常潤濕為貴蓋熱以汗減而無拂鬱毒從汗出而無壅遏也不須治之若汗大出則陽氣暴泄陰氣反弱痘必難發難靨宜急止之調元湯十八聖藥也熱甚汗泄者當歸六黃湯主之六十八壯熱惡寒形似瘧邪正交爭榮衛弱莫將寒戰妄猜疑發熱何曾聞此惡如初發熱時時惡寒身振振搖動如瘧之狀其人衛氣素虛榮血亦弱不能逼毒快出使毒邪留連於經絡之中欲出不出與正相爭故振振者火象也以柴葛桂枝湯八十五加黃耆主之瘡出即愈不可錯認作寒戰妄投陳氏辛熱之劑以誤人也吾長孫祖善邦孝長子二歲時染痘發熱三日內忽寒戰似瘧孝泣曰死矣予笑曰爾為醫救病如篙工然忽遇風浪手足自亂何以渡人此兒元氣充盛毒氣微少邪不勝正故作寒戰而退試觀其痘必少也果只五七粒七日愈發熱之初便咬牙心肝熱壅勢堪嗟早分形症施方法莫向東風恨落花痘疹咬牙乃惡候也如發熱之初便咬牙者此與癢塌吐瀉脾胃弱者不同須審形症分治之若多欠咬牙頓悶者肝臟風熱也羌活湯十目上竄咬牙者心臟熱也導赤散三十五不可妄用陳氏辛熱之劑胡三溪子己酉冬出痘初發熱便咬牙戛戛有聲精神昏憒予見之嘆曰逆症也乃腎虛症蓋腎主骨齒者骨之餘腎水不足則毒火無制火氣煽動故上下相戛而有聲陳氏所謂齒槁者是也果卒發熱之時喘息頻喉中涎響勢堪驚急宜解散真高火勿使炎威爍肺金此肺經出痘症也經曰臟真高於肺又曰諸氣逆喘急皆屬於火如發熱之初便喘急氣逆喉中涎響此惡候也故云喘無善病此毒火內蒸上熏於肺肺焦葉舉所以喘息涎響也火鬱則發之宜清金散火湯主之六十七附方若眼閉口張肩息足冷者不治黃岡程旋溪子未一歲時值家中出痘請予視之予見此兒多笑知其心火有餘乃令蔡朝扆用黃連一錢山梔仁七分辰砂五分水為丸服之三日後笑漸減少時辛未三月十九也廿一日發熱忽作喘喉中涎響汩汩有聲旋溪驚予曰此肺熱症幸不肩息足冷乃作清金散火湯一劑而減半再劑而喘定未發痘瘡先發癰根窠堅硬色鮮紅此名痘母休輕視縱有靈丹也不中凡發熱三五日內痘形未報胸背手足先有團聚成塊者堅硬紅腫似癰非癰此名痘母乃逆症也十發九死真人解毒湯以主之三十九附方麻城周愚齋長媳寡惟一女出痘使使延予予問狀曰發熱五日余未見痘出但背上發一腫毒予曰不可治也非癰乃痘母也三日後果有凶聞發熱時辨生死訣一發熱三日之內用紅紙條蘸麻油點火照心窩間若有一塊紅者或遍身有成紅塊者八九日後決死勿治一發熱三日之內遍身一齊出紅點如蠶種樣摸之不礙手者決死勿治一發熱三日之內腹內大痛又腰疼及痘出乾枯亟痛不止者決死勿治一發熱三日之內面上有一片紅者色如胭脂六日後決死勿治一發熱三日之內不問口鼻大小便但出血者三日後決死勿治一發熱三日之內妄見妄語昏不知人者三日後決死勿治一發熱三日之內腹脹而痛大叫不止者三日後決死勿治一發熱三日之內其熱忽退煩躁悶亂坐臥不安外雖清涼內卻熱也若見悶亂腹脹手足冷氣喘者即死勿治
