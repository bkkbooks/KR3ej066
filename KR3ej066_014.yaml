body:
  text: 卷之十四出見症治歌括凡二十二首凡二十二首熱蒸三日痘現形此為常候不須評過期不及多乖氣論治先分虛實因痘瘡之毒蘊伏在裡非熱蒸則無自而出是以古書云熱蒸三日而斑生發熱三日痘瘡以漸旋出者不論疏密皆吉得常候也疏者不須服藥密者以和中解毒之劑審而調之如才發熱一二日間痘瘡便一齊湧出者須問其數日前曾有熱否如曾數日前進退熱以過期論惟原未發熱至今才熱便斑現此表氣虛榮熱衛弱腠理不密肌肉不實不能約束於外使毒火衝擊故出太驟也宜用實表之劑可已無癢塌無潰爛實表解毒湯主之一一二如發熱四日至五六日後始出者須審視曾有內傷外感否蓋傷風寒傷食之熱久而不去則以蘊瘡痘之毒亦能乘間而出不可以過期論惟無內傷外感之因一向熱而不出此裡氣虛不能驅逐其毒使之即出而毒邪得以留連停伏於臟腑腸胃之間宜先用托裡之劑令其快出次以和中之劑多服之可以無伏無陷無倒靨托裡宜托裡快斑湯一一三或十宣散三十七和中宜四君子湯二十加黃耆或調元湯十八合勻氣散十三主之發熱微微報痘疏未曾起發早先收此名試痘休空喜一湧齊來甚可憂痘曰聖瘡謂變化莫測也有等身無大熱報痘又疏也不灌膿也不結靨三五日後痕迹不見者此名試痘不可誤作輕看再過三五日忽作大熱其痘一齊湧出此有險逆二症宜審治之蘄水李雙溪家出痘長子病痘死次子出痘三四粒未起發而隱身亦無熱幼子病請豫往豫曰小令嗣神采明潤形體充實出痘必輕次令嗣氣色昏黯精神倦怠出痘必重衆皆曰已出過三二粒收矣豫曰不然痘出雖有輕重未有不成膿結痂者先者試痘其症為逆身無熱伏在內也時一日者言次君有大災如豫言衆哂之數日次子作大熱痘齊湧出身無空膚豫用參耆歸芎甘草節以養氣血荊防木通青皮牛蒡子連翹金銀花酒炒芩梔桔梗以解毒作大劑一日一服調理至十三日後遍身潰爛不即收靨豫改用十全大補湯去桂加白芷防風外用敗草散貼襯前後三十餘日而安日者亦抵掌曰豫言如何痘出遲遲有數般皮膚閉密屬風寒內虛自利須分辨毒伏三焦治卻難痘疹之出自有常期如過期應出不出有數症不同不可不辨或內素實之人皮厚肉密毒氣難於發越一旦恃其體厚不怯風寒又為外邪所襲或體素弱者風寒易感以致腠理閉密氣血凝澀故應出不出也其症頭痛四肢拘急偎倚蓋復常惡風寒此類宜發之氣強者用雙解散四氣弱者用參蘇飲三或惺惺散一一四或內虛者脾弱食少宜用補脾之劑加行氣發表藥四君子湯二十調元湯十八並加木香青皮黃耆桂枝或臟腑自利宜用溫里之劑黃耆建中湯三十一益黃散四十五並與奪命丹十七合進利未止者豆蔻丸四十三合進蓋里溫則氣不消削氣不消削則不陷伏矣若依上法分治猶不出者此毒壅伏於三焦不久而變生焉邑人王云野子二歲發熱出紅點一二粒請豫視之見額紋青氣年上赤光乃告之曰此險痘也先出者名試痘中氣不足毒氣隱伏故出不快也以調元湯加防風木香服後其痘旋出喜無他症十三日安數日蒸蒸出不齊欲行疏發意生疑按方加藥觀瘡熱表裡平和痘本稀聞人氏觀云是瘡疹之症熱數日而不發見者進退皆難便欲大發之懼其本稀而成斑爛不發之又無以出其毒氣古人立論始以藥發之微發不出則加藥加藥不出則大發之大發之後所出不多氣候和平無他症者即是治本稀不可更發也以此言之發不至太過守不至不及乃用藥之圓活也愚按古方用發表者升麻葛根湯輕劑也惺惺散重劑也謂微發謂加藥者或先用輕劑後用重劑或只用本劑先小作湯少飲之後漸加大多飲之非謂於本方之外再加辛熱大發之藥也應出不出卻如何發表和中良驗多腹脹屎硬煩躁甚通腸解毒救沉疴凡痘疹過期應出不出者或因外感風寒依上發表之法或因內虛泄瀉依上和中之法如按調治猶不出快熱反甚大渴腹脹滿大便硬結不通煩躁不安者此毒邪壅伏於內三黃湯八柴胡飲子九十九擇而用之甚則三乙承氣湯主之三十並用膽導法五十一聞人氏云且身熱脈數大便祕而腹脹此熱毒壅遏未見形狀者當微下之非微下則熱不減此是始者熱在裡斑未出之時也若斑點隱隱在皮膚中者是已發越在裡瘡正發時則不可妄下也又有結膿窠痂疕之際脈尚洪數能食而大小便祕此表已罷里有熱毒宜微利之大抵臟腑有熱往往利大小便者以其主出而不內故也邑人餘光庭庠生也年十九歲染痘發熱五日不出請豫及韓雨峰治之雨峰佳醫與豫素善豫問其症未更衣三日診其脈細而數雖有下症元氣怯弱不可下也乃謂雨峰使作膽導法不得通病者煩躁家人惶惶豫思發熱日久毒留其中燥糞閉塞肛腸乾枯氣不得行血不得潤膽導力小不能通也自立一法取豬尿胞一枚以豬膽汁半杯清油半杯蜜半杯三物攪勻入胞中如作膽導法取下燥屎二十餘枚氣通熱解神清痘出豫笑曰此法外意也胡三溪初生二子丁酉年入監乃以長子托豫次子托萬紹戊戌春長子先出痘豫守治十一日而安隨次子出痘豫聞其乍熱乍退兩足冷數日不大便痘先出者猶是紅點亦不起發念三溪之常好往視之驚曰此逆痘也紹曰熱微痘亦微熱甚毒亦甚今熱不甚順痘也豫曰不然毒本火毒待熱而發如發熱而不煩不渴大小便如常精神清爽者此熱在表其里無邪毒火發越而痘易出易靨也若煩躁不安大小便艱昏昏喜睡此毒火內蘊不得發越表熱雖微內熱則甚何謂熱微毒亦微也此子乍熱乍退者毒火往來也大小便不通者毒火鬱遏也痘見紅點而不起發者毒火之陷伏也足冷者火之極而兼水化謂之厥逆也紹不以為然至次日紅點俱沒煩躁轉甚紹曰此內收也豫默而不應因嘆曰醫貴同心執己見以誤人命耶此何為者翌日死痘出面須令氣勻更宜和暖氣如春氣勻出快無壅滯偏熱偏寒氣不行張氏從道云瘡痘氣勻即出快蓋氣勻則榮衛無滯勻氣之藥如桂枝防風荊芥穗薄荷葉所以行在表之氣而使之無滯也故凡發表之劑多用之木香青皮枳殼木通所以行在裡之氣而使之無滯也故凡和中之劑皆用之又瘡出之時常宜和暖如三春發生之氣則氣血和暢自然其出快其發透其靨齊若偏於太熱則壯火食氣其氣反虛而不能行偏於太寒則氣凝澀而不得行矣瘡出熱退毒已盡蒸蒸不減毒尤甚番次常出漸加多外邊只怕乖形症痘瘡之症其初不免於發熱者未出毒邪在裡煎熬氣血熏蒸臟腑而然瘡既現形則毒泄而熱解所以瘡出熱退者瘡本必疏若瘡已出熱不少減此毒蘊於中其勢方張其瘡必密宜急解其毒連翹升麻湯六加防風荊芥穗地骨皮或解毒防風湯一一加升麻或東垣鼠黏子湯一七服湯之後瘡或不出或再出其熱頓減者為氣和也熱若不減瘡漸加多再消詳大小便何如大便不通柴胡飲子九十九小便不利連翹湯八十八大小便俱不通八正散四十六自利者黃芩湯四十一加白頭翁酒黃連調赤石脂末裡氣和解毒矣如更加渴煩躁不已或譫妄或腹脹滿氣促或自利不止手足厥冷此乖戾之症勿治麻城鄒清溪一子五歲出痘先請傅醫治之服保元湯熱益甚又請李醫至曰險痘也清溪不安延豫視之曰此順痘也期十八日安不須服藥衆曰今自發熱日計已六日矣何以須十八日況痘不服藥何以得痊今進保元湯三劑尚有一劑未服豫曰痘不可以日期算出已盡發已透膿已滿而後收靨可期也今痘出而熱轉甚者出未盡也由服保元湯犯實實之戒故令出遲靨亦遲矣吾聞善攻不如善守本無他病何以藥為吾為爾保全是子無憂也已而果然出現先於面部中其間凶吉妙難通繞唇夾頦方為吉額角眉心總是凶經曰諸痛癢瘡皆屬心火心之華在面痘瘡之火其出先在於面但觀其出之部位可以知其候之凶吉如先在唇四畔出者吉蓋太陽之邪下傳陽明陽明者胃與大腸積陳受汙氣血俱多又口為水星頦頤屬腎水火為水制不能作虛也如在額角眉心先出者凶蓋太陽足壬膀胱水手丙小腸火丙火獨旺不受壬水之制其毒並於膀胱之經而先自病膀胱多氣少血又正額屬心火火不務德妄行無忌心為君主之官主危則十二官皆危矣凡起發成漿結痂亦如此論頭面呼為元首尊咽喉緊隘譬關津莫叫瘡子多稠密鎖項矇頭總不應經曰頭者精明之府又曰春氣者病在頭可見頭乃人真元會聚之所為發生之本又面列五官分五行而五臟之華皆見於面是頭面者人君之象至尊至貴不可凌犯者也咽者胃脘水穀之道路也主內而不出喉者肺脘呼吸之往來也主出而不內在人之身譬猶關津要路也瘡痘之出最要頭面稀少頭項無方是吉兆若頭面多者謂之矇頭諸陽獨亢五官俱廢神明失守精華自萎經云神去則機息氣止則化絶者此也頸項多者謂之鎖項內者難出外者難入上者不升下者不降經云一息不運則機緘窮一毫不續則霄壤判者此也故皆不治又五心有痘者重謂心窩及兩手足心也即勞宮湧泉二穴胸前頭面總宜疏手足雖多不用憂若是遍身都密甚卻愁氣血不能周陳氏文中曰痘瘡輕者作三四次出頭面稀少胸前無蓋頭面者諸陽之會胸者諸陽之所受氣此數處痘子宜少不宜多以清陽之分不可濁亂也手足雖諸陽之本乃身所役使卒伍卑賤之職非若頭面為元首也又居四末非若胸膈心肺之居神明之舍也故雖稠密不必憂也若頭面胸項手足稠密瑣細一樣者卻悉氣血衰微脾胃虛弱不能周流灌注起發不透收靨太遲而生他變矣最宜磊落如珠豆偏怕相黏聚作堆蠶殼蛇皮生不久蚤斑蚊迹死相隨凡痘瘡之出不論疏密而論磊落如珠如豆顆粒分明尖圓緊實雖密無妨此謂出盡無留毒也如黏聚成叢模糊作塊不分顆粒恰如紅瘤雖只一二處未可言疏此謂之伏出未能盡若待後者再出則先者或陷而復隱或癢而俱潰成壞瘡矣此猶淹延引日久而後斃若如蠶之殼蛇之皮此氣至而血不榮也謂之乾枯如蚤之咬蚊之嘬此血至而氣不充也謂之陷伏不能引日奄忽而死矣初出形來豔色嬌定知皮嫩不堅牢溶溶破損添愁緒個個成漿喜氣饒痘瘡初出與未病時皮色一般者善若瘡太赤根下皮色通紅此血熱氣不能管束也後必起發太驟皮嫩易破癢塌而不可救宜急解血分之熱四物湯十九加升麻地骨皮紅花紫草或消毒飲十六活血散十四合而飲之待色少淡急補氣分之不足四君子湯二十加黃耆防風木香或調元湯十八參苓白朮散二十三合而飲之仍用血氣二方相間而服若成漿不破損吉服藥不效反增瘙癢者凶也邑人胡近城次子庚午冬未痘先兩頰赤燥請豫八子邦靖視之豫謂靖曰傷寒論云面色緣緣赤者陽明熱也若不預解至出痘時此處必甚稠密而赤貫串難靨教以升麻葛根湯加防風牛蒡子連翹三服而紅色盡去痘出亦疏汪懷江次子五歲出痘甚密且紅豔懷江恐其不吉請豫四子邦治醫豫謂治曰險痘也氣實血熱可治也教用當歸梢赤芍藥生地黃防風荊芥穗牛蒡子連翹桔梗甘草以解其毒連進三劑紅色盡退猶未發透再教用黃耆防風甘草赤芍藥牛蒡子桔梗青皮山楂肉連翹調理十五日而靨最怕頭焦烏焠焠更愁皮嫩水溶溶膚中寒粟工知避皮上針頭治罔功痘瘡初出有四善紅活明潤緊實堅厚尖圓布散磊落稀疏蓋痘子賴血以潤之血活則其色如丹砂如雞冠若毒凝血滯則遂成黑色今頭焦黑者乃榮血不能流行內外毒氣壅遏此症甚危其人必大小便祕喘急煩躁宜用柴胡飲子九十九當歸丸一通關散一一五三乙承氣湯三十看輕重緊慢用之以解里之急得利後以紫草飲六十三加味四聖散六十四調無價散七十三以解表之毒仍用胭脂塗法七十六瘡變紅活以漸起發者吉若更乾黑者凶莊氏云斑瘡倒靨而黑色者謂之鬼瘡痘子賴氣以束之脾胃強氣實而肌肉厚皮膚堅今痘皮嫩薄溶溶如淫濕之狀乃脾胃氣虛其人必少食或自利宜用十全大補湯三十八去生地黃加防風白芷外用天水散九十四蜜水調拂瘡上以解表之濕熱瘡若起發成漿者吉漸變癢塌者凶聞人氏云痘瘡作癢深為可慮能調和愛護勿令有此乃為上策痘子初出不成顆粒但皮膚間濟濟簇簇如寒風粟子之狀或出形與針頭相似稠密無縫此皆惡候良工避之勿與施治也痘瘡初出解咽喉喉痹咽瘡毒火饒只恐後來封管籥鎖喉聲啞治徒勞凡瘡疹未有咽不痛者心胃有熱上攻於咽乾澀而疼宜於發熱初出之時預解之甘桔湯七加牛蒡子甚者東垣涼膈散一四七附方加牛蒡子令毒火解散不停留於咽喉之間致生他變也若初時陷忍不即解之以致毒留咽喉發而為瘡腫脹潰爛水穀不入呼吸不能聲啞難言卻欲呼醫悔無及矣所以甘桔湯七瘡出之後常宜飲之利咽喉寬胸膈清肺金解毒火也如無口舌生瘡齒浮齦腫者宜甘桔湯七合黃連解毒湯八十九加牛蒡子水漿不入者射干鼠黏子湯六十加桔梗荊芥穗山豆根已上症候須能食臟腑亦熱方可用如上焦雖熱卻覺小便清大便溏飲食不進者只用甘桔湯七不須加牛蒡子蓋其性涼為瘡疹所宜服者能透肌出癰瘡是以瘡疹易出也大便利則不可服英山馬四衢一子五歲出痘痘不起發延豫視之豫曰此順痘也馬氏兄弟曰不起發何如曰毒甚者則頭面腫毒微者則頭面不腫非不起發也又呼咽痛四衢憂之豫曰此痘家常病喜喉舌無瘡頸項間痘稀不足怪也乃以甘桔湯加牛蒡子水煎細細咽之咽痛即止飲食無阻十三日安四衢曰問吾小豚咽痛服藥輒效何神也豫曰痘疹者火毒也火氣上熏咽喉豈不作痛故用桔梗之苦以開其結甘草之甘以瀉其火牛蒡子之辛以解其毒是以效也若喉舌有瘡則壅塞潰爛頸項多痘則封鎖熏炙必為嗆水失聲之症令嗣無之故曰不足怪也馬氏稱善若恐斑瘡入眼中古方護目有神功眼多眵淚睛多赤急瀉心肝免毒攻痘瘡方出之時使不入目以神應膏六十六塗眼四周或只以胭脂取汁塗之或傳以水調黃柏末或以白芥子末水調塗足心此皆養護之良法也若眼中流淚或多眵或目中紅赤此肝火太旺宜早解之洗肝明目散九十五加蟬蛻又有忌食之法如濃厚滋味牛雞鵝鴨皆不可食往往食雞鵝鴨卵未有不為目害者但令食淳淡之物或少入鹽亦無害如湫隘之家不可煮雞鵝鴨卵其氣相襲亦能損目不可不知痘瘡只出一般奇夾疹夾斑都不宜消疹化斑令毒解若還不解勢傾危錢氏云痘瘡只出一般者善凡痘初出其間碎密若疥子者夾疹也皮肉紅腫成片者夾斑也疹由心熱斑由胃熱宜急解其毒消疹用黃連解毒湯八十九合消毒湯十六化斑用人參白虎湯二十四合消毒散或只用升麻葛根湯一夾疹者加防風荊芥穗木通麥門冬黃連夾斑者加石膏人參大青玄參淡竹葉如疹散斑解現出正痘疏密停勻者吉痘被疹斑夾雜不能起發者凶蘄水羅良制妻魯氏年二十七出痘遍身紅斑如蚊迹衆醫視之皆曰不治請豫往豫觀其神識精明語言清亮診其六脈調勻問其飲食如常大小便調不煩不渴但遍身紅斑稠密無縫色且豔豫曰此夾斑痘症也魯畏死乞救甚哀豫曰此病非吾不能治斑痘相雜故難識耳解去其斑則痘自現汝切勿憂亟作荊防敗毒散加玄參升麻作大劑一服次早視之則斑迹不見痘粒可摸矣再進一服其痘起發調理半月而安蘄水汪白石婢方二歲出痘遍身紅點大小相雜無有空處白石曰此女難治豫曰此夾斑夾疹夾痘症也乃教吾次男邦孝以升麻葛根湯加防風荊芥玄參連翹牛蒡子淡竹葉木通一服減十之三再服減十之七三服痘磊落明白白石曰先生神術也熱病相傳發疱瘡須臾周匝盡成漿見而便沒為膚疹相類斑瘡折後殃聞人氏云傷寒熱邪在表里未能作汗或當汗不汗熱鬱於肌膚故發疱瘡色白或赤如火丹頭作漿白膿者輕根下紫色隱隱在肌肉者重甚者五內七竅皆有之其形亦如痘小兒肌肉嫩薄尤多此症非正瘡痘也又曰六腑屬陽有熱則易出是以作膚疹一出即遍身肌皮之上如痱瘡細疱子見而便沒其所受氣淺故也五臟屬陰有熱則難出其為瘡痘在肌肉血脈之間必先發紅斑而後如豆故名瘡痘其所受氣深故也大抵暴熱而便出者必膚疹久熱而難出者必是正瘡痘膚疹非正瘡痘也愚按瘡痘初出五臟不同肝水疱其色微青而小肺膿疱其色微白而大心為斑色赤而小脾為疹色赤黃而淺及五七日之後不問其初出自何臟悉成血疱血疱成膿疱正如豆樣膿疱之後結痂疕則愈此方是正瘡痘也或人疑之曰肺既為膿疱而血疱之後又成膿疱者何也蓋膿疱之出於肺者言其初時淡淡如膿其色白而非黃俗稱白痘者是也若血疱之後所結膿胞則是其瘡已熟譬諸果之成實飽足充滿包裹黃膿其色黃而非白也熱熱紅斑出復收曾將形症細推求若無變症無他苦折過天瘡不用憂人有恆言自少至老有不出痘者乃天赦日生不出也豫初不信豈有天赦日生便不出痘者痘乃胎毒一名百歲瘡謂其自少至老不能免也或在痘疹大亂中曾發熱來但見一二三四粒而不覺也此痘之最輕者近見有出紅斑者數日盡收痘亦不出更無陷伏惡痘癰疥餘毒自後痘瘡再不出者或是之類歟蓋胎受之毒在心為斑在脾為疹在肝為水痘在肺為膿痘惟腎無病故斑疹水痘膿痘俱同一類但受毒甚者四病悉具受毒微者平生只見一病矣本邑各衙出痘先二衙一子一女出長子後發熱見紅斑豫疑是夾斑症三四日後其斑盡收熱退身涼痘不出四衙小男女正出痘一子發熱亦出紅斑亦無恙乃信人有不出痘者或發斑或發疹或發水痘皆可折過也必在正出痘時方論熱甚從來出亦難平和湯劑解煩冤莫將辛熱輕催併猛虎何當有翼添瘡痘本因熱而出熱勢甚則其出愈難故斑點未見之時惟當用平和藥如升麻葛根湯一參蘇飲三東垣鼠黏子湯一七惺惺散一四等解利之或有不問虛實便以辛熱之劑大發之施之虛者猶庶幾焉若盛實之人熱毒瀰漫榮衛閉塞里毒甚者大便不通小便如血是謂郁毒不散毒氣無所從出反攻臟腑表毒甚者瘡凹而不起遂成倒陷或為潰爛或為癰瘡當此之際不能解利至於斃者多矣是陽盛熱熾無陰氣以感之也用消毒飲十六柴胡飲子九十九得毒氣解散榮衛流通痘將自起矣痘子依稀略見形渾身瘙癢苦難禁皮膚拂鬱宜疏解莫作肌虛一類評凡痘瘡初出之時便身癢爬搔不寧者此毒火留於肌肉之間應出不出遊散往來故作癢也與傷寒太陽證身癢汗不出者同論桂枝葛根湯五加荊芥穗牛蒡子主之不可作肌肉虛癢也英山鄭斗門一子出痘將見形作癢不能禁亟請豫治迎謂曰吾只此子今痘作癢奈何豫曰起發時作癢者逆也貫膿時作癢者逆也將靨時作癢者險也險者可治逆者不可治也出見便癢經傳中原無是症待吾思之頃之豫謂之曰吾思仲景傷寒正理論云太陽經病身癢者此邪在表欲出不得出也桂枝麻黃各半湯陽明經病皮中如蟲行者此肌肉虛也建中湯令嗣身癢正是痘欲出不得出與太陽症同非陽明肌肉虛症也乃以各半湯方內去桂杏加升麻葛根牛蒡子一服而癢止痘出甚密留豫守治半月而安斗門謝曰非公達仲景之妙安能有此子也夾斑夾疹利清水妄見妄言摸床被煩渴唇裂眼珠紅不遇明醫病不起此險痘也夾斑夾疹眼紅唇裂者表熱也煩渴利清水妄見妄言循被摸床者裡熱也其利清水者內有燥屎所飲之水自腸中滲泄而下也譫妄摸床神識不清也表裡俱熱不與發表攻裡其病難痊雙解散四不去加芒硝主之若增悶亂足冷腹脹氣喘決不可治吾第七子婦徐患痘大熱大渴眼紅唇裂自利清水妄見妄語循衣摸床遍身紅斑俱如蚊迹皆逆症也人皆危之豫議曰此毒在三焦表裡俱熱非大發大下之劑不可救也乃以通聖散全料大劑與之才一劑而前症悉去痘即出現甚密復用十全大補湯去桂加防風金銀花連翹桔梗調理愈其痘自下收起亦奇事也發熱過期痘未彰紅斑隱隱肉中藏忽然大汗人昏倒冒痘誰知是吉祥凡發熱至五六日痘應出而不出以燈照之只皮膚中隱隱有紅點其人色脈平和精神爽暢雖煩不躁雖渴不消雖腹痛而不苦雖便實而不硬忽然眩冒大汗出者此名冒痘症也毒氣一齊從汗而出再無壅遏之患乃吉兆也出痘時辨生死訣痘出時心腹大痛不止口中出臭氣瘡出紫黑色黯者決死勿治痘出色白皮薄而光根窠全無紅色或根下帶一點紅三五日後如緑豆樣此痘決不能成膿只成一泡清水抓破即死勿作好痘治之痘出色紅帶豔皮膚盡紅者必不能成膿癢塌而死勿治痘出瘡頂焦黑根窠枯燥者必不能起發四五日死勿治痘出全不起頂如湯潑及燈火焠者六七日後決癢塌死勿治痘出都是紫黑血疱者即死勿治痘出不快乍見乍隱口臭血出者即死勿治痘出就是清水皮薄腳太紅者五六日後癢塌而死勿治應出不出只見紅斑如蚊迹者即死勿治痘出都是空殼不成膿水者死勿治痘出便是黑斑如痣大又肌肉有成塊黑者即死勿治痘未出胸背手足後有一塊紅腫如癰者即死勿治
