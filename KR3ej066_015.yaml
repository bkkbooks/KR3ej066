body:
  text: 卷之十五起發症治歌括凡三十五首五六日間起發時俗師計日豈曾知不分虛實論輕重偏執方書只補脾痘瘡之症熱三日出三日後方起發此常論也蓋先出者先起後出者後起痘疏毒輕氣稟厚者自易出易發易靨痘密毒重氣稟薄者自難出難發難靨未可拘定日數時師不知虛實補瀉之理但於起發初便用補脾果內氣不足少食者用之允當若內實便祕能食之人寧不黨邪為惡乎非徒無益而反害之蘄水羅野松年十六出痘其父月湖延豫視之豫往先有張醫在張之言曰凡出痘者春夏為順秋冬為逆今冬出痘時逆也痘起發頭面要腫今被寒氣鬱遏毒不得出故頭面不腫證逆也奈何豫曰不然春夏為順秋冬為逆非以時言以痘症言也蓋春夏者發生長養之令也秋冬者收斂閉藏之令也痘本陽毒自出現而起發自起發而成膿如苗而秀秀而實故曰春夏為順如應出不出應發不發謂之陷伏故曰秋冬為逆頭面不腫者順痘也頭面浮腫者險痘也頭面預腫者逆痘也今痘本磊落尖圓堅實其毒輕微故起發而頭面不腫若頂平根闊肌肉鮮紅此為毒甚不待起發而頭面先腫矣張曰起發太遲由虛寒始宜服溫補豫曰痘無病不須服藥吾觀此痘紅潤鮮明表氣實也大小便調理氣實也無熱無渴無他病也於此補之謂之實實公且止吾計十數日必收靨矣果未嘗進一刀圭藥也大抵瘡標只要稀毒輕瘡少不須醫若逢稠密毒邪甚解毒和中早燭機凡痘瘡疏則無毒密則有毒痘疏毒少者邪不勝正其氣和其勢順不須服藥痘疏密布散邪正相持其氣病其勢險此宜抑邪扶正使邪氣亟奪不為正氣之賊痘稠密無縫正不勝邪其氣乖其勢逆善治者十可救二三不善治者束手待斃而已故順者不必治逆者不可治險者貴治此以下專言險逆者之痘治也幾多先密後稀疏便有先疏後稠密不是良工曾見慣他將怪變問師巫凡看瘡痘有先密後疏者此夾斑夾疹也初出看之一片紅點斑疹相雜難以分辨至起發時斑疹盡散惟痘獨在故先似密而後實疏也有先疏後密者此一順一逆也痘科云輕者作三四次出大小不一等故先似疏而後漸密此順痘也吉若初出看時只見面上胸前有三五處顆粒模糊根腳腫硬待至起發則一齊湧出故先雖疏而後尤密此逆痘也凶先後大小盡出齊以漸起發適如期尖園紅活都光壯表裡無邪福所歸痘子輕者作三四次出大小不一等其起發亦先後循次大小分明不相連串顆粒尖圓根窠紅活光壯肥澤此表無病飲食如常小便清大便潤此里無病大吉之兆不須服藥起發如期貴適中太遲大驟類成凶誰知驟發亦驟陷發若遲時毒復壅痘子起發只以出勻為期不可拘定日數瘡出以漸其發亦以漸謂之適中若以一齊湧出便皮肉虛腫一齊焮發者此表氣虛毒氣奔潰而出表虛不能收斂必生癢塌或成潰爛急宜救表十宣散三十七調無價散七十三活血散十四合消毒散十六相間服之若出已盡當起不起或起不透此裡氣虛毒氣留伏壅遏而不出必增煩躁腹滿喘促若後為癰毒急宜救里十全大補湯三十八合勻氣散十三或參苓白朮散三十調無價散三十七服之痘子如今出已勻可知形狀重和輕莫將湯液求奇中治不乖方藻鑑明痘瘡之出有重有輕觀其形狀即可知之如一發便出盡者必重也痘夾疹者半輕半重也出稀者輕裡外肥紅者輕外黑裡赤者微重也外白里黑者至重也瘡端里黑點如針孔者勢劇也青乾紫陷昏睡汗出煩躁熱渴腹脹啼喘大小便不通者困也善用藥者能使輕者易安重者不至大困斯可謂之十全矣變輕變重轉移間莫道人為不勝天堪笑愚夫多不曉空談氣數蓋前愆古人云輕變重重變輕輕者指出稀者裡外肥紅者人見其輕遂生怠忽之心不避風寒不節飲食不慎禁戒不擇醫巫以致感風則生外熱傷飲食則生內熱熱氣熏蒸或翻生痘瘡稠密者或痘後目盲發癰或腹脹或煩躁或吐利犯禁戒則為瘙癢為潰爛醫之誤則補所不當補瀉所不當瀉巫之誤則咒水灑之以傷其表令之飲水以傷其里往往變成重疾設有不幸歸之氣數抑何愚哉重者指出密者外黑裡赤者外白里黑者人知其重能存憂懼之心適其溫寒慎其飲食禁戒必守醫巫必擇自然易發易靨故能變為輕也如此者非人能勝天乎聞人氏云稟氣實者夏酷暑而不甚畏熱冬嚴寒而不甚畏冷稟氣怯者易寒易熱天寒陰雨則感寒濕而濡瀉天氣稍炎則伏熱中暍是故先知節候者能辨陰陽寒暑之盛衰經云陽盛人耐冬不耐夏陰盛人耐夏不耐冬此亦知人稟受之不同且自立夏氣變純陽萬物盛大治藥者用熱遠熱如桂枝麻黃之輩必加知母升麻石膏等服之立冬氣合純陰治藥者用寒遠寒如用諸涼劑中病即止不必盡劑又如冬溫暖則虛者安而實者病夏寒涼則實者安而虛者病冬溫暖夏寒涼非節之氣來暴而去速在人將攝之如何耳錢氏云凡痘疹當乳母慎口不可令飢及受風冷聞人氏云凡人一日不食則飢觸風冷則病況小兒當瘡痘之際正欲賴穀氣以助其內避風寒以護其外苟穀氣虧少風寒侵襲則為患可勝言哉乳下嬰兒宜常令其母飲食充足居處避風能食童子專令老成耐事人時時管顧雖然事亦貴得其平或者以失飢冒風寒為戒遂致過飽極溫非徒無益而又害之瘡痘之家宜備知之聞人氏云瘡痘之出蓋熱邪內外蒸發其有當熱作之時忽遇天氣大寒熱氣方運出而暴寒折之外寒為內熱拒而不得入內熱為外寒閉而不得出毒氣壅於肌皮之間如隱疹如痣點或青或紫俚俗云鬼捻青者是也壯年出者皮膚厚肉理密多有此症凡是卻寒溫肌透表之劑皆可選用也凡冬春之間常有暴寒忽為寒氣所侵其痘色變或灰白或青頑木凝凍不能起發者桂枝葛根湯五麻黃湯六十七去杏仁石膏合服待痘略起再以十宣散三十七發表托裡也外用胡荽酒七十四凡春夏久雨為寒濕之氣所害不能起發者五苓散二十八加蒼朮防風主之多服更佳聞人氏云嬰兒童子必竟純陽當瘡痘未出之先或遇天氣暄熱當與疏利庶幾起發之日其熱必輕疏利之説非是轉下疏者疏散熱氣利者滑利九竅使無壅遏之患而已疏利用輕清之劑彼轉下者非猛浪不可疏利轉下相去遠甚不可不辨凡夏秋之間常有酷熱忽為熱氣所蒸其痘色變或大赤焮發或糜嫩不堅實先以五苓散二十八合黃連解毒湯八十九或升麻葛根湯一合人參白虎湯二十四以解其熱次以調元湯十八加麥門冬五味子以補其氣外用天水散九十四合百花膏九十八遍塗之凡傷冷水沙糖西瓜紅柿菱芡柑橘水梨一切生冷之物腹痛者丁香脾積丸三十三原物湯下有瀉者錢氏異功散四十四加丁香訶子主之如傷肥甘油膩糕粽一切熱物腹痛者備急丸九原物湯下此上二症得利後並用四君子湯二十加陳皮木香或錢氏異功散調之四十四凡食過飽稍覺不快者木香大安丸主之九十一損谷則愈不可妄下錢氏云惟用溫涼藥治之不可妄下及妄攻發又云瘡痘始出未有他症不可妄下也此言常候戒人猛亂若有前外傷內感之症安可徇常聞人氏云木得桂則枯雌黃遇胡粉則黑柑得脯則壞物之相畏有如此者痘瘡之畏穢惡雜氣其理亦如是也仲景云瘡痘欲出之間宜燒蒼朮豬甲二物仍令人謹伺門戶勿使生人輒入亦忌勞力人狐臭人若行房觸犯最為大害婦人經水適來尤當回避床帳左右前後宜挂胡荽以酒噴之或燒乳香尤妙蓋榮衛得香則運行甚速或可使瘡毒易出苟防備一不如法則禍患踵至欲出者使之不出已出者斑爛成片甚者瘡黑陷伏加以爛臭痛如刀剜悶亂而死其中縱得安者亦令瘢痕經年黑色或反成疥癬不可不戒凡病瘡起發即當禁戒房事室中常燒闢穢香九十三令煙不絶更多燒硬石以水澆之若有觸犯瘡或色變或作癢者以茵陳熏法解之八十一徽人吳印墩子出痘胡三溪邀豫同往視之磊落紅活順痘也其兒脾胃素弱起發略遲復請醫萬世喬見不起發謂其氣虛妄投陳氏木香散一劑痘轉平不起又投陳氏異功散一劑其家驚懼再請豫同三溪視之曰噫死矣蘄水一屠家子出痘正灌膿時請一巫者誦咒噀水解厭後忽加瘙癢痘形容塌其色青白而氣腥臭豫往視之曰此犯房室穢氣也急令買膠棗三斤燒煙燻之瘡轉紅活而癢亦止問其故老巫他往而子代之有房事瘡痘起發辨形色人身之中惟氣血虛實寒熱此中求仔細消祥行補瀉痘瘡之毒必氣以詬之血以濡之而後可得成熟也故於起發之時光壯者氣有餘也肥澤者血有餘也氣血有餘表裡俱和不須服藥如形長大如色枯燥者此氣至而血不榮也宜四物湯十九加人參麥門冬色紅潤而形平陷者此血至而氣不充也宜四君子湯二十加黃耆官桂川芎形平陷色枯萎者此氣血俱不足也宜十全大補湯三十八合無價散七十三主之色灰白者氣虛也四君子湯二十加黃耆當歸官桂色紅紫者血熱也四物湯十九加紅花地骨皮牡丹皮起發遲遲頂又平色多灰白氣虛論紫紅血熱須清解枯萎還從不足云凡痘瘡起發遲滯頂平色灰白者氣虛也其人平日食少脾胃不足人參白朮散去乾葛加桂二十三十全大補湯三十八去地黃加木香主之如曾有吐瀉以致氣弱者四君子湯二十合益黃散四十五主之瀉未止者四君子湯二十吞肉豆蔻丸四十三甚者陳氏木香散主之二十五若紅紫色掀腫者血熱也四物湯十九合消毒散飲十六加紅花外用胭脂塗法解之七十六乾枯者血虛也四物湯十九加人參麥門冬地骨皮外用胭脂塗法七十六水楊湯浴法七十五瘡痘起發視根窠紅活充肥血氣和若是乾枯青紫黯急宜養血莫蹉跎起發之時根窠紅活形見潤澤者此血隨氣行灌注諸瘡自然紅活肥澤不須服藥如雖起發乾枯無水謂之不肥澤帶青紫黯色謂之不紅活其變為黑陷乃血虛也四物湯十九加人參麥門冬紫草紅花間進調無價散七十三或吞奪命丹十七外用胭脂塗法七十六漸長尖圓厚且堅其形光壯色紅鮮氣充血旺無虧欠平陷浮囊氣不全起發之時不徐不疾以漸長大尖圓磊落光壯堅實根腳紅活此氣充足載血而行透徹諸瘡自然尖圓光壯不須服藥如雖紅活頂平中陷不成尖圓色嫩皮薄不能堅厚其變為癢塌為留伏壅遏乃氣虛也四君子湯二十合勻氣散十三加黃耆官桂或人參白朮散二十三加黃耆官桂防風或調元湯十八加官桂防風白芷荊芥穗或十全大補湯三十八去地黃加防風白芷或十宣散三十七皆可選用若瘡皮薄色嫩嬌淫淫而濕者此氣不勝血宜補氣涼血四君子湯二十四物湯十九去川芎地黃加官桂黃耆防風荊芥穗如浮囊虛起殼中無水者此氣不依血血不附氣其變為癢塌為癰腫十全大補湯三十八去白朮加大力子連翹防風燒人屎邑人胡半峰子五歲出痘起發時頂平而陷請豫視之豫曰順痘也凡出痘者以氣血和平為主尖圓堅實者氣也紅活明潤者血也紅活平陷者血至而氣不足也圓實而色白者氣至而血不足也平塌灰白者氣血俱不足也掀腫紅綻氣血俱有熱也令嗣痘出既密時日未到氣血未周以漸起發得其常也故曰順痘不須服藥已果然四圍沸起陷居中胃氣虧虛發未通外白中心成黑點是名鬼痘急宜攻痘瘡起發尖圓為貴如四圍起中心平陷者此有二種有血化成水四圍高起中心略低凹者俗呼為茱萸痘此中氣不足發未透徹故耳能食者至養漿之時盡充滿而起矣不能食者宜扶中氣人參白朮散二十三主之有四圍沸起中心落陷無起尤是死肉其形如錢宜急攻之若待漸變黑點不可為矣此名鬼痘四君子湯二十合九味順氣散一百零二加燒人屎或紫草飲六十三或紫草飲子一百一十七連進服之外更用胭脂塗法七十六中心凸起四沿平外黑裡紅一例論此是表邪多壅遏疏邪發表令調勻痘疹起發有中心凸起四圍干平無水者或里紅外黑者此由平日感受風寒皮膚堅木以致痘毒鬱而不散宜桂枝葛根湯五十宣散三十七以散表邪外用水楊湯浴之七十五發時磊落最堪誇三五黏連便不佳若是糊塗成一塊切防瘙癢又來加痘瘡起發貴於顆粒分明如痘彼此相串皮腫肉浮或於本痘四旁旋出小痘攢聚胖長漸成一塊此候最重宜以快斑湯十五合消毒飲十六加燒人屎服之更宜禁忌以防毒犯自此常宜大便堅如常調潤更清安莫將湯劑輕投試偏熱偏寒變易生痘瘡自起發之後大便常宜堅實緣小兒脆弱身熱而大便不通者則易實大便自利者則易虛雖四五日不大便無憂也不能食者聽其自便賴舊穀氣為養至四五日後則膿化毒消解利之劑可用也能食者三日後不通不腹滿不裡急後重則亦不必攻之可用膽導法五十一導之不通以當歸丸一令微潤過使氣道升降無壅遏之患不可妄下其人能食素脾強大便雖溏也不妨切莫湯丸將峻補反增裡熱作餘殃凡能食者大便喜潤賴新谷以為養而舊垢之不留自然臟腑流利血氣和平不可妄用溫補反增裡熱忽然暴泄勢堪驚毒入大腸亦有因勿待內虛成倒陷上工治病貴能迎胃主腐熟水穀大腸主傳送已化之物故食多少可以知人穀氣之虛實大便滑澀可以知人臟腑冷熱大便如常是亦痘疹之一順也如起發之時忽然泄瀉此宜急止之恐腸胃虛真氣脫也須辨冷熱虛實如泄瀉而手足冷面色青白瘡不紅綻者冷症也理中湯丸三十四肉豆蔻丸四十三益黃散四十五甚則陳氏木香散二十五異功散二十六皆可用也瀉下之物黃又酸臭渴手足心熱面赤瘡紅綻掀發者熱症也黃芩湯四十一五苓散二十八主之脾胃怯弱精神慢而不食者為虛當溫養之益黃散四十五身熱中滿渴而不食者為實當清利之五苓散二十八其人或臟氣自脫或因服寒藥致令瘡毒陷於大腸瀉下如豆汁或便膿血或便黑汁口內臭氣唇焦目閉加腹脹者必亡也起發時常驗手足發如不透多反復此宜脾胃弱中求尚怕差遲作癰毒痘瘡起發欲透惟四肢稍遠不宜均齊必脾胃素強能食多者不須慮此若脾胃素弱又食少者手足上瘡常發不透蓋脾主四肢脾虛則不能行其津液灌溉四肢所以發遲以補脾為主快斑越脾湯一一九如不令透其後手足必作癰毒又手足痘瘡多發水泡者此肝乘脾也先瀉肝羌活湯十加柴胡後補脾人參白朮散二十三去葛根加桂如見而復隱越而復塌色紫黑者此腎乘脾不可治蘄水汪沙溪子痘出膿成時頭面腹背皆飽滿惟手足自肘膝至掌指猶未起發豫驚曰脾主四肢此子脾胃何甚弱也祖母葉氏曰吾孫生三日母即死是吾嚼粥飯養大也豫用建中湯加黃耆防風只一服而疹盡起腫作膿矣時沙溪夫婦信奉魯湖黑神於家此子寄名於神未出痘先神降童云壇保吾老黑承管只要痘出得少至是痘甚密豫等朝夕笑玩以計逐之使去頭面斑瘡總屬陽升生浮長類相常微微漸腫瘡紅潤驟腫瘡平可預防頭面屬陽痘瘡亦屬陽以類相從故出現起發收靨自頭面始升生浮長陽之性也痘瘡起發頭面以漸腫大升生浮長之性不須憂恐只要瘡子磊落紅活光壯肥澤待至成膿之後毒化結痂而腫亦漸消矣如瘡黏連通串模糊成餅者又要紅活潤澤以快斑湯十五消毒飲十六合而飲之或消毒化斑湯八十四以解其毒更以甘桔湯七加牛蒡子相間與之以利咽喉寬胸膈令飲食無阻也又以神應膏護目六十六若灰白青黃乾燥瘡面膚起者皆死症也其頭面腫有不閉目者毒淺而輕有閉目者毒深而重亦待瘡熟腫消而目自開若瘡未成腫消目開者此陷也勿治詳見後頭面預腫條凡痘將起發頭面預腫者此時行疫癘之氣名大頭瘟其毒最酷急用羌活救苦湯八十三解之起發之初未試漿口唇瘡色早焦黃如斯惡候無人識待得收時作禍殃口唇者脾之外候人以脾胃為本不宜受傷如初發熱唇焦裂者此毒發於脾便宜解之瀉黃散一百零九不知早治痘子之出叢集於唇及至起發其瘡先熟內帶黃漿此惡候也待諸痘成漿此瘡已靨唇皮揭脫漸變嘔食嗆水昏睡而沒矣起發瘡頭帶白漿不知何處便非祥謾誇國手移天力空自叨叨説驗方痘瘡由紅斑而水泡水疱而膿疱膿疱而結痂有自然之序若初起發瘡頭便帶白漿者不分何處並非佳兆不特口唇為然也出形未定先㴠水起發之初便戴漿膿水未成收靨急不堪有此命終亡痘瘡初出一點血血化為水水化為膿膿成毒解此自然之序也若初出之時半是水疱或才起發便有戴漿者或未成膿即干收者火性躁急失其自然之序不應至而至所謂早發還先萎也此毒火所為倏急之間焰息氣盡而死矣蘄水李望松在監時其子一歲在家中出痘請吾往視之起發時都是水痘豫曰痘乃胎痘五臟各具一症肝為水疱肺為膿疱心為斑脾為疹腎為黑陷此乃肝臟之症喜皮厚肉堅而色蒼蠟若皮薄色嬌不可治也乃以四君子湯加黃耆防風牛蒡子母子同服十三日安邑令君梁厚村公子出痘起發時多成膿疱請豫治之豫告曰此險痘也治太晚矣公曰但盡爾術二日瘙癢作而殞英山鄭雨川子九歲出痘起發時額上兩頰皆成水疱吾曰逆痘不可治也痘症自有次序初出一點血化為水水化為膿膿成而毒解矣有如苗而秀秀而實今方苗而秀吾恐早發還先萎也七日後再論未及七日大癢而死最愛尖圓成個個生憎堅硬作堆堆非瘤非核非癰腫怪事令人嘆幾回凡痘瘡起發之時磊落分布者乃表裡疏通上下發泄而毒氣解散順痘也若顆粒叢聚根窠堅硬者乃氣血凝滯肌肉敗壞而毒氣鬱積逆痘也瘤者丹瘤也似瘤之紅而不痛核者結核也似核之堅而不動痛者癰疽也似癰之腫而不潰此榮血不流之病十無一生不出四五日必瘙癢悶亂而死起發渾如湯火傷黏連成疱水洋洋皮膚潰爛真元散鶴唳猿啼到北邙凡痘瘡初出細密模糊不成顆粒至於起發之時盡成大疱清水虛癢此衛氣不斂之病逆痘也不出二三日皮脫肉乾悶亂而死此上二症乃惡毒之氣須於出現起發之時候之若到成膿則無之矣起發一齊如錫面皮膚浮腫形容變其人能食乃為佳食減氣虛作凶斷痘瘡最要以漸起發磊落紅活如一發都起無復顆粒模糊串連不紅活帶灰白色面上浮腫如錫餅形此惡候也其人能食大小便如常無他症候者吉若食頓減或原不能食者凶一男子年二十餘出痘甚密起發時腫異常面如錫餅形狀可畏人皆危之豫所喜者飲食如常大小便調安靜而睡一醫欲投木香散豫曰痘疹無疾不須服藥色白者痘出太多氣血未能周遍也數日之後自然收靨矣果二十餘日而安一小兒出痘甚密不甚起發面如錫餅食少而渴一醫欲投木香散豫曰此兒無吐瀉裡虛之症不可用也乃以保元湯加當歸赤芍防風桔梗牛蒡子調理而安一婦人二十四五出痘甚密面腫甚身無完膚七八日後眉心唇上有成白漿者或謂正當作膿之時豫曰未也面瘡帶赤猶是血色未曾化水遽爾成膿此惡候也後必潰爛而死果然熱有大小治不同古人取譬似蒸籠不知邪氣分深淺妄治何能得適中錢氏云有大熱則當利小便小熱者當解毒大熱謂身熱脈實大小便祕結而渴懼其變生他疾故利小便八正散四十六通關散一一五大便祕者連翹湯八十八導赤散三十五加人參麥門冬使心火有所導引則雖不用冷藥熱亦自減去矣瘡痘不至熱過不為冷誤甚為良法小熱解毒之説謂小熱不解大熱必生利其小便則慮損氣故但可解毒而已甘桔湯七加牛蒡子荊芥穗發熱痛癢是何因痛實癢虛理自明大凡痛者終多吉諸癢曾無一吉云經云癢為虛痛為實內快外痛為外實內虛內痛外快為內實外虛又曰諸寒為痛痘瘡起發痛者有二一則毒邪欲出氣血隨之肌肉弸急而痛九味順氣散一二合活血散十四主之一則皮膚厚肉理密為外寒相搏而痛桂枝葛根湯五主之身癢亦有二症一則氣血不足其癢為虛十全大補湯三十八主之一則能食淡以致蟬蛻膏一五主之凡痘瘡作癢深為可慮一小兒起發作癢豫曰諸癢為虛此非虛也乃火邪也人以湯沃之火炙而癢可以例推乃用升麻葛根加防風荊芥紫背浮萍只一服而癢止一小兒痘起發時痘瘡作痛而呻吟豫曰痘脹作痛者佳膿成痛自止矣今痛太甚者血熱也升麻葛根湯加紅花連翹牛蒡子忍冬花服之即止腹脹之候最不佳痘瘡有此可傷嗟氣和自爾無煩滿毒氣壅留勢漸加痘瘡起發而腹脹者有二症一則陰陽不和蓋痘瘡正發熱毒方盛必生煩滿宜以葛根解毒湯二十人參麥門冬散二十二人參白朮散二十三之類與之不知此理或飲冷過多或誤投涼劑熱為冷所激欲出而不能冷熱相搏毒不發越故令腹脹且傷於冷者必不能食大小便利腹中虛鳴此傷冷陰陽氣不和也急當以溫中藥疏逐冷氣冷氣散則腹脹自消益黃散四十五去甘草加薑製厚朴甚者氣喘發厥瘡白而無血色多至不救陳氏木香散二十五聖方也昧者反用峻下之藥致令重困死一則毒氣陷伏入里必有他症相雜或煩躁大渴或大小便祕或啼哭不止但用溫平解毒快氣之劑紫草飲子主之一一七若腹脹而目閉口中如爛肉臭者其症為大惡出盡方將起發期箇中乾黑令生疑此為黑陷休輕視漸變加多不可為凡痘瘡以起發光壯紅活肥澤為順若將起發之時中間有乾黑不起者須急治之不可因循以致傳變加多不可藥救矣邑令君朱云閣公子出痘至起發時項後手背有二痘變黑者摸之則痛此痘疔也急取胭脂數貼水浸取汁塗之盡汁而止次日視之已紅瑩起發矣邑人汪我溪子出痘起發時有變黑者豫以云閣公子之事語之教取胭脂汁塗其內周氏不聽豫謂我溪曰不用吾言蔓延不可為也後果一身盡成黑痘而塌復出一層又塌如此者三而卒王思泉子出痘起發時漸變黑急請豫治已蔓延一身矣其兄少峰議曰吾聞痘瘡變黑歸腎者不治公謂何如豫曰黑痘有二症一則乾枯變黑者此名倒陷乃邪火太熾真水已涸故曰歸腎不治一則痘色變黑未至干塌此疫毒之氣所謂火發而曛昧者也令侄之痘正是此類吾能治之乃用當歸梢生地黃赤芍藥酒紅花以涼血黃耆人參生甘草以瀉火補元氣酒炒芩連牛蒡子連翹升麻以解毒防風荊芥以疏表每劑入燒人屎一錢連進十三劑痘色轉紅膿成而收靨矣少峰曰吾未見能治黑痘者人奪天巧信哉李良臣子出痘至起發時變黑而干急延豫治乃問其大小便何如乳母答曰自初發熱到今未大便曰此熱盛於內宜急解之因制一方用麻黃酒蜜拌炒焦黑紅花子紫草人中黃連翹酒蒸大黃燒人屎水煎服外用膽導法取下燥屎痘轉紅活後以四物湯去川芎加紫草木通枳殼生甘草調理收靨而安陷伏惡候古今傳變黑誰知有數般痘疹不宜輕見此徒誇五色大還丹痘疹自內不出謂之伏自外伏入謂之陷痘瘡黑陷當分四症一則感風寒肌竅閉塞血凝不行必身痛四肢微厥斑點不長或變黑色或變青紫隱疹此為倒伏也宜溫肌發散桂枝葛根湯五加麻黃蟬蛻或以紫草飲六十三吞奪命丹十七外用胡荽酒噴之七十四水楊湯浴法七十五須令溫散寒邪然後熱氣伏行則其斑自長矣二則毒氣太盛內外蒸爍毒氣入里必心煩狂躁氣喘妄言如見鬼神大小便祕渴而腹脹此為倒陷伏也病邪輕者宜利小便解毒連翹湯八十八通關散一一五甚者以百祥丸五十二牛李膏五十三以瀉膀胱之毒令陽氣復還脾胃溫暖服之身溫欲飲水者可治是脾強勝腎陷者當復出矣若加以寒戰身冷汗出耳尻反熱死然百祥丸太峻今以宣風散九十二三乙承氣湯三十棗變百祥丸一二六代之外以水楊湯浴之七十五三則內虛而不能使陽氣以副榮衛者出而覆沒斑點白色或黑色其人必不能乳食大便自利或嘔或厥此胃虛而不出謂之陷伏也宜用溫中之劑令其胃暖榮衛復行則當自出矣宜調元湯加丁香官桂十八理中湯三十六加黃耆官桂甚則陳氏木香散二十五異功散二十六皆可用也外用胡荽酒噴之七十四或因誤下之後毒入里而黑陷者則宜溫養而表出之先以理中湯三十四溫養其里後以桂枝葛根湯五疏解其表也不出再加麻黃四則被房室等雜穢惡氣沖觸而黑陷者則宜熏解之內服紫草飲子一一七外用胡荽酒噴之七十四茵陳熏法八十一痘疔治法果多方只要疏通解散良不使毒邪當伏陷得行權處勿泥常痘疹之毒自內而出衝突氣血發散腠理初出一點血乃身中氣血被毒驅逐見於皮膚之外其成形者氣也成色者血也毒火太甚煎熬氣血先至之氣則削矣血則枯矣氣削血枯腠理反閉毒不得出未免復入於底遂成陷伏時人以黑瘡子為痘疔又曰鬼痘者深惡而畏之詞也此乃毒氣鬱遏非外感風寒內虛吐利雜氣觸犯者可比古人立方如大小便祕腹脹煩躁者則下之但大小便祕者則利小便解毒自利者以瀉膿血為順水穀為逆卻不立方以毒雖入腹皆瀉出也攻之則無所攻補之則不可補昏悶不醒者用龍骨膏一五以去心中之邪枯黑不起者或內用無價散七十二以解在內之邪或外用水楊湯七十五四聖散七十二胭脂塗法七十六以解其表使邪氣得出皆良法也為工者合下即下合利即利合發即發或解其里或解其表應變出奇勿泥常法可也蘄水汪白石出痘方八歲請豫往治起發時有黑枯者豫曰此痘疔也乃用四聖散胭脂汁調銀簪撥開痘頭塗之即轉紅活亦不延蔓數日後應收不收問之不更衣七日矣知其腸內燥結其家信佛事禁殺豫強取豬肉爛煮和汁與食果腸潤便通痘旋收靨英山鄭鄫子三歲出痘請豫往治起發時肩膊腰臀間有數個乾黑者急以胭脂汁調四聖散銀簪撥開痘頂入藥於中須臾起發紅活亦不延蔓時鄫叔鄭斗門善醫同在調理因問豫曰痘瘡變黑有可治者不可治者何也豫曰痘瘡變黑其症為逆治之貴早不可緩也緩則延蔓傳變倏出倏沒迤邐而死矣治此症者亦有數法如四圍有水中心黑陷者只用胭脂塗法須頻頻作之直待轉紅起胖而止如痘子乾黑概括腳堅硬者可用四聖散即今之治法也若皮肉不活根腳不腫者決死勿治若起發有水頂平而黑者宜內服涼血解毒藥加燒人屎外用胭脂塗法若大便不通者此裡熱熏蒸得之宜內服四物三黃湯外用膽導法得利後而變紅活也若泄瀉者此虛寒也宜用保元湯加木香桂如盡乾黑煩躁悶亂者決死不治斗門拱手稱謝曰名下無虛士敬受教幾經發疱多凶惡原有瘡瘢休認錯痘集成叢肌肉敗色多青紫宜敷藥痘瘡發疱亦與黑陷相類外內出入雖不同而毒氣壅鬱則一也或發水疱或發血泡或赤或紫或黑但見此症十無一生然亦有似是而非者不可不辨其人身上原有灌瘡或破傷未痊或雖痊瘢痕尚嫩一旦痘出則瘡瘢四圍痘必叢集者物從其類之理也發生之後必然作泡者腐敗皮肉氣色先變宜與完膚有別也治此者先以針刺破吮出惡血後以胭脂塗法七十六合百花膏九十八敷之此瘡又易作癢起發之後常宜以茵陳熏法八十一熏之勿令抓傷若被爬搔則反復灌爛淹延不愈變為疳蝕壞瘡以致不治者多矣瘡多平陷發未透時日已過增煩躁啼哭呻吟不忍聞何堪譫妄又狂叫瘡痘起發欲透磊落尖圓光壯肥澤者上也根腳橫開皮起水漲者次也頂皮不起根腳不開猶是先出之形不見新生之水此謂起發不透審察症候如氣本實者必曾感風寒以桂枝葛根湯五合奪命丹十七發之如氣本虛必不能食或吐利以人參白朮散二十三合奪命丹十九以補中氣而發表邪如欲成陷伏者依前四法治之若時日已多發猶不透或煩躁不安者此毒熱在裡心惡熱以導赤散三十五送服牛黃清心丸三十六以解散熱毒導此心火也或啼哭者凡人五臟平和則神宇安靜今五臟蘊毒內外蒸郁神不安舍以導赤散三十五送服安神丸四十七通關散一一五使鬱熱解散神宇清快也若譫言妄有見聞時狂叫者此五臟熱毒蘊積陽氣獨盛無陰氣以和之退火回生丹一四附方大便必不利以當歸丸一微利之再行膽導法五十一使無留滯易快利也甚則防風通聖散主之四若昏不知人腹脹喘呼死症也發熱推來幾日經時時煩躁未曾停如狂屎黑知瘀血不爾還為燥屎論凡痘瘡出不快發不透靨不齊有煩躁者此有二症如面黃大便色黑煩躁喘渴或如狂或喜忘腹脹或痛此為有瘀血在裡也宜當歸丸一百或四順清涼飲二十七並加桃仁酒紅花甚者桃仁承氣湯主之如便血下黑糞而又睡不醒者心為血之主睡不醒則心之神昏矣玄參地黃湯六十五加木通麥門冬若無面黃屎黑如狂喜忘之症只大小便不通煩躁腹脹者此有燥屎也此卻真狂譫妄以三黃丸八四順清涼飲二十七三乙承氣湯三十當歸丸一百膽導法五十一看病輕重擇而用之如偏執不可下之説以致陷伏而死者醫之咎也口中氣出臭沖人飲食俱難又失聲寒戰咬牙多悶亂體寒嘔瀉總歸冥凡起發之時痘瘡稠密又見陷伏煩躁狂叫之症或口中出臭氣者此毒火熏煎肺爛胃敗之氣也或不飲食失聲者此咽喉腫爛也寒戰咬牙者邪傳腎也或悶亂者神已喪也或體寒者陽脫也或嘔或瀉者腸胃俱敗也經云五臟氣絶於內者利不止六腑氣絶於外者手足厥凡見以上諸症者皆不治也痘瘡起發腫為奇頭面預腫又不宜五臟精華從此散真人獨跨綵鳳歸凡痘瘡起發時頭面不腫者毒微上吉之兆也痘以漸長頭面以漸腫待至膿成收靨而後腫漸消者常候也如痘未起發頭面先腫皮光色豔如瓠瓜之狀此惡毒之氣上侵清虛之府與大頭瘟病同況五臟精華皆聚於頭面而泥丸宮者又元辰真人出入之處也惡毒上侵則五精俱喪元辰亦忘精喪神亡其後必癢塌而死矣初腫之時急以羌活救苦湯八十三多服有效痘瘡起發辨生死訣起發時根窠太紅頭面皮肉紅腫如瓠瓜之狀者七日之後死勿治起發時遍身痘頂皆黑其中有眼如針孔紫黑者三日後死勿治起發時兩腮虛腫成塊肩膊腰臀皆有成塊堅硬者五日死勿治起發時有痘變黑乾枯者延及遍身俱乾黑者七日後死勿治起發時先出痘形以漸不見者三日內死勿治
