body:
  text: 卷之十六成實症治歌括凡三十四首痘瘡成實作膿窠只要膿成飽滿多根腳紅鮮色蒼蠟刻期收靨保元和痘瘡初出一點血只成小小血疱起發則漸長大血化成水為水疱至水疱轉作膿疱始成實矣成實之時卻要個個成膿肥澤飽滿根腳紅活又蒼蠟色如此者可以刻定日數而知收靨之期陷起平尖根腳紅窠囊血水盡成膿自然表裡無邪毒莫使湯丸又妄攻瘡痘初出或中心陷下者或頂平者或根窠白色者其人能食或治不乖方以致起發之後陷者盡起平者復尖白淡者變紅活窠中血水以化為膿夫陷起平尖起發可謂透矣紅活飽滿氣血可謂足矣水化為膿毒亦解矣表無癢痛之症里無吐瀉之症是表裡又無病矣如此坐視收靨不可妄投湯劑一面起發如初出一面成膿有後先發已透時膿又熟毒隨膿化病除根痘子輕者常作三四次出有大小有先後起發亦作三四次先出者先起後出者後起大者自大小者自小亦如初出之樣待至養漿則先長者先作漿後長者後作漿大小亦如之磊落分明不相黏連者上也痘子密者長大胖壯以至作漿未有不相串只要陷者盡起無起不透轉成膿漿次也膿成之後毒氣已解無復留伏矣痘熟渾如果熟形外無嬌色內多津膿漿飽滿回蒼蠟可許如期結靨成凡痘瘡發熱三日出現三日起發三日養膿三日結靨三日共三五一十五日乃大率常數也惟痘密毒甚者常過其期痘稀毒微者常不及期雖不可以日期計亦當以常數為定則也初出見時其形小其色紅乃是一點血至起發其形圓其色紅白乃血化為水也養膿則其形大而堅其色紅而黃乃水化為膿也結靨則其形大而軟其色紅而黑謂之蒼蠟此膿熟欲靨之狀如果之熟自然外皮軟而內肉爛也假如十日以後正當成膿結靨之時其形平陷其色紅紫外不胖壯內無膿水此名生痘血至而氣不至乃倒陷也不出十日內腹脹氣喘悶亂而死李廷讓子四歲出痘十日後豫視之見其痘頂平陷根窠紅紫昏睡不食豫曰不可救也次日死起發圓圓不作膿一身郛郭總成空如斯空痘真凶險若不傷殘也發癰痘瘡起發小者漸大平者漸高陷者漸起外帶紅色內涵清水以至養膿則皆胖壯紅潤膿漿飽滿此順痘也若形色灰白膿水清淡者險痘也雖不傷殘亦發癰毒外若虛脹內無水漿此名空痘氣至而血不至亦倒靨之類乃逆痘也不出十三日必癢塌而死待到成漿卻要漿切防清水及空囊囊空無水邪猶伏清水非漿癢莫當凡痘瘡出欲盡發欲透至於養膿便要成膿飽滿者膿已成也渾濁者膿之形也黃白者膿之色也若當作膿之時猶是空殼此氣載毒行血不附氣毒在血也血既不至則毒猶伏於血中而不出四物湯十九合紫草飲六十三加蟬蛻主之如已成水清淡灰白不能作膿此氣血俱虛所有之水乃初時一點血氣解而為水非自內潮起之水十全大補湯三十八此二症者為癢塌為癰毒不可不知也張月山妹出痘起發只空殼延豫視之豫曰此氣有餘而血不足也則在肝經用四物湯小柴胡湯服之雖作膿亦未飽滿而收豫曰凡痘瘡不成膿或膿少者皆發癰毒此足厥陰肝病必發頂疽已果然痘瘡只說待膿成誰曉成膿未足憑飽滿堅牢誠可喜濕淫軟薄又堪驚人言痘瘡只到成膿則毒氣化解便稱無患不知膿亦有凶有吉如瘡皮堅厚膿漿渾濁約束完固無少破損此真吉兆若瘡皮軟薄膿水清淡滲漏淫濕易於破損此尤凶也惟瘡久熟時日已過當靨不靨者則膿復化為水皮亦易破勿依此論正作膿時不作膿此於黑陷理相同但將四症分虛實那得多方指聵聾痘瘡起發後正待作膿卻不成膿者此與不起發而黑陷者分四症同論如感風寒則當溫散桂枝葛根湯五加黃耆白芷防風毒氣盛則宜托裡解毒利小便紫草飲子一一七連翹湯八十八相間服之大便祕者宣風散九十二內虛宜溫里十全大補湯三十八陳氏木香散二十五觸犯宜熏解內服紫草飲子六十三外用茵陳熏法八十一若煩躁昏悶者龍腦膏一五膿漿方作謹看承勿比初時一例論毒氣從今將解散病人到此減精神痘瘡起發之初當避風寒遠人物節飲食守禁戒也到此養漿之時比之起發尤加謹焉可也蓋前此人病未久氣血猶強足以御乖戾之變至此則氣耗血虧精神減損少有乖戾不能任之況瘡始成就尤易觸犯不可不加謹矣如天大熱則撤去衣被令常清涼但謹門窗帷帳勿使邪氣透入天大寒則添厚蓋復令常溫暖更用親人左右夾之房室中可明亮勿絶燈火常燒闢穢香九十三加乳香令香氣襲人日夜常用人看視互相更代勿令疲倦恐或作癢為之撫摩莫使誤破以致潰爛結痂不美遍身痘瘡欲成漿只要其人脾胃強食少便堅中氣足便清能實卻無傷痘瘡已長膿漿欲成之時專以脾胃為主脾胃強則氣血充實自然膿漿易成飽滿堅厚不須服藥脾胃弱則氣血衰少不能周灌於身使之作漿虛軟清淡雖有漿亦水而已宜十全大補湯三十八去地黃加木香或人參白朮散二十三去葛根加黃耆官桂多服佳然脾胃強弱於食多少大便堅利求之食少大便堅者脾胃之氣猶足也若泄瀉則脾胃益虛四君子湯二十送下肉豆蔻丸四十三利止復以人參白朮散二十三去葛根加黃耆官桂服之便清能食不能食者亦依上法如能食大便堅數日未更衣者用膽導法五十一通之使氣得疏通榮衛和暢不致斑爛也先時泄瀉總非佳到此非佳尤可佳津液已衰脾胃弱豈堪泄痢又來加痘瘡出形起發並不宜泄瀉恐裡氣虛毒邪不出反成陷伏故以泄利非佳兆也若成漿之時尤不宜泄比之於前又甚焉蓋前此為病未久脾胃尚強足以任之今則病久津液已衰脾胃已弱若復泄瀉則僅存之氣重竭於內方張之毒不能成於外或為癢塌或為倒靨或寒戰咬牙虛憊而死輕則人參白朮散二十三去葛根加木香官桂黃耆甚則陳氏木香散二十五異功散二十六肉豆蔻丸四十三並進豫長子邦忠三歲出痘先君年八十始得一孫與先母珍愛甚篤至膿成將靨時忽作泄瀉瘡變灰白先君曰此虛寒症命作木香散服之未盡其劑泄止瘡復紅活時鄰居曾顯榮長子出痘密甚將靨亦泄瀉痘變灰白又作癢亟來請藥先君即以前未盡劑姑與服之泄亦止而瘡轉紅活不癢矣泄瀉古人原有別腸垢鶩溏分冷熱痘中泄水泄血膿勿使湯丸輕止澀經云協熱而下痢者其腸必垢協寒而痢者其溏似鶩寒則溫之澀之熱則通之清之此古人治法也痘瘡養膿收靨之時有泄瀉者此為大忌恐中氣虛而毒復陷也故專以溫補止澀之法為正然有痢清水者有痢膿血者又不可與虛寒者袞袞同論治也蓋痢清水者曾有大渴飲水過多蓄積於中漬灌腸胃今乃作痢此蓄水泄也水去盡則止痢膿血者因痘不收以成倒靨中氣充實毒不得留乃自大便而下此倒靨泄也泄盡膿血自愈若不知此二症待其自愈若妄投止澀之劑則根蒂未除枝蔓滋長源泉欲塞決潰更多吾見其誤死者多矣郡別駕壬峰肖公女七歲出痘先請杜近林治之連服保元湯公因瘡密憂甚延豫視之豫曰表裡俱實雖密順痘也不必服藥公江西永豐人彼處出痘者專食雞豫以裡實告雞不可食公不聽日取大雞爛煮以汁飲之至膿成將靨時忽大泄日夜五六次所下皆清水公命止之全曰裡氣太實正須泄耳次日泄益甚豫視其痘飽滿紅潤不與藥服公怒曰吾女好痘莫有失也豫曰保無他杜亦惑欲進肉豆蔻丸豫止之至第三日大泄水一行豫告公曰泄止矣公問未服藥何以止豫曰此坐飲雞汁太多汁水留薄腸胃之中今泄者名蓄水泄也水盡泄自止與四君子湯加陳皮調理而安公甚稱服失氣原來足太陰腸中噴響足陽明相同泄瀉休差誤穀氣消亡大限臨按靈樞經足太陰脾經是動則病得後與失氣則怏然而衰足陽明胃經是動則病腹脹噴響可見失氣者脾敗而穀氣下脫也腸鳴者胃敗而中氣下陷也病痘之人不宜有此與泄瀉同皆是死症泄瀉者水穀糟粕之物腸鳴失氣腸胃生養之氣也痘瘡手足最宜溫熱甚須知毒亦深若是四肢多厥逆此為惡候必歸冥痘瘡手足和平為貴養漿之時手足發熱手足必有汗此毒熱鬱於中必大小便不通脈滑沉數疾宜利之三乙承氣湯三十去芒硝主之手足厥逆者此陽氣欲脫必自利不止或吐脈沉細微弱或浮大而虛急溫之理中湯丸三十四加熟附子或陳氏異功散二十六服藥後手足和暖者生厥者死若大小便祕煩躁狂妄腹脹喘渴脈沉滑數瘡不起者此陷伏之症為陽厥百祥丸五十二三乙承氣湯三十主之漿成毒解貴安寧臟腑平和神宇清煩躁不眠何以辨但從瘡痘認分明痘瘡始終貴於安靜膿成之時毒已化解臟腑平等神宇爽快尤宜安靜也若忽加煩躁不得眠者但就痘子上辨之如膿多清淡尚不滿足此毒猶在裡未得盡出也龍腦膏主之一五如膿已成又飽滿因發熱干漿而煩者此宜利小便導赤散主之三十五如痘太密膿成之後心血虧虛虛煩不得眠者四物湯十九去川芎加人參麥門冬梔子仁又酸棗仁湯一二一主之幾見成漿飲食難鎖喉嘔穢病相干語言清亮終須吉暴喑無聲療莫痊凡痘瘡密咽中亦有之成漿之時咽瘡早熟肉虛皮薄易致破損瘡瘢新嫩觸之即痛痂皮黏滯痰涎纏裹所以堵塞飲食難入勉強吞咽則為疼痛所苦痰涎所格是以水入則嗆谷入則嘔也如語言清亮者可治甘桔湯七加牛蒡子天花粉利咽膈化痰涎惟多飲之自然平愈若聲啞嗄言語不出者咽喉潰爛不可治矣一小兒痘本輕疏因傷食腹痛而嘔用平胃散加砂仁藿香葉煨生薑而嘔止一小兒因食生冷傷脾胃而嘔痘變灰白用錢氏異功散加砂仁丁香官桂而嘔止一小兒痘密甚喉舌都是將靨時嗆水嘔食雜膿血痂皮痰涎而出用甘桔湯加牛蒡子頻呷之調理而安一小兒膿成漿靨忽作乾嘔雖不飲食常自嘔噦豫視其痘不作膿不滿頂曰此逆痘也乃誦木陳葉落弦絶聲嘶之言以告之後失聲悶亂而死痘瘡皮嫩色嬌紅待到成膿癢又攻調理勿令今有此除非腫灌痘重重凡痘瘡皮嫩色嬌者到成膿時多生瘙癢先當調理勿令有此可也若失於早治而發癢者內服消風化毒湯八十二外用茵陳熏法八十一破者以白龍散七十九敷之大抵痘瘡作癢乃是惡候吉少凶多如其人能食或大便堅抓破之處復灌成膿原無痘處續出大小不等雖盡癢破可內服十全大補湯三十八苦參丸七十七間與之外以滅瘢救苦散七十八合百花膏九十八塗之若瘙癢之時其人顛倒悶亂抓破之處不復腫灌或成坑窟或即乾黑或皮自脫又加以嗆水嘔食水漿不入或泄瀉或寒戰或咬牙或失聲或手足厥逆或狂叫皆死症也待到成膿結靨時最嫌瘙癢又相催苗而不秀空惆悵雨打梨花落樹枝痘瘡始終所忌者瘙癢也到得成膿將靨十分凶險已過大半若無瘙癢可計日求安矣如作瘙癢吉凶猶未可知必視其所發觀其所因察其情狀以施治法以決生死可以謂之良工也視其所發者或發於手足或發於胸背拂之則止禁之則聽者吉若發於正面瘙癢不止皮脫肉乾者凶觀其所因者或因吐瀉少食脾胃既弱氣血不榮者虛癢也可用陳氏溫補之法則癢可止或因穢惡之氣觸動邪火者暴癢也惟用熏解之法即止或因痘瘡之熟邪氣盡解正氣漸生氣血調和而癢者此美疾也不須服藥若無所因自生瘙癢者原是惡痘不得善成察其情狀者如瘙癢之時乍作乍止精神清爽不自抓搔欲人撫摩者生若瘙癢無時神識昏沉胡抓亂舞搖頭扭項者決死勿治胡三溪女七歲出痘初發熱兩手如捻物狀時喻正甫亦在豫曰此肝病也經云其為病也握宜平其肝以瀉青丸方去大黃加甘草柴胡青皮一服而握止豫欲再進一劑其母匡氏不喜喻順其情呼曰好痘勿藥豫曰噫凡肝病者多水疱而作癢吾欲止之未發之前既不聽七日後再議豫但言用心守護果至第六日夜面瘡盡抓破矣匡乃大哭請豫治之喻亦嘆曰何變之速耶豫曰向欲預防此變爾等不信今何嘆惜哉請勿憂豫能治之乃用保元湯加防風白芷一服癢止再服著痂而瘡亦平正面諸瘡不可傷略傷一處便非祥當時即止渾無忌破盡須教日下亡凡視痘瘡以正面為主五臟精華皆萃於面故也身上瘡有癢者或至抓破不能為害惟正面瘡不可犯動苟於眉目鼻面之間抓破一處此肺有熱也急用甘桔湯七十加牛蒡子以解之其癢既止乃佳兆也若癢不止津淫漸開氣愈泄而癢愈急必滿而抓破死額上瘡如沸水澆溶溶破爛不堅牢漸涎面頰都如是泄盡元陽限倒頭凡痘瘡起發養漿之時額上瘡如火燒湯澆之狀潰爛破壞無復完膚或兩頰之旁亦如是樣不待抓搔而自破爛者以漸而開沙崩之勢莫之能御谷焦水去似靨非靨陽氣脫而死準頭唇上與眉心耳畔諸瘡不可輕膿未得成先黑靨莫將干較與時人痘瘡作漿之初面上諸瘡未盡成膿或鼻準頭瘡先干如橘子色者或眉心瘡自乾黑者或唇上瘡自焦黑者或兩耳上瘡自收者或兩頰瘡如餅中間干陷者此名倒陷乃死之候不可認作正收對人妄言邑庠生吳近濱二女出痘請豫調治長女順吉次女將養膿面上有干靨者犯倒陷逆症原無治法乃主一方用黃耆人參甘草節當歸赤芍藥生地黃金銀花牛蒡子連翹麻黃蜜酒拌炒黑紅花子水煎調穿山甲末且告之曰此藥服後若瘡先乾者復起作膿未乾者胖壯飽滿痘空地上再出小痘上也痘不作膿不補空或發癰腫次也否則無可為汁矣連進三服已乾者不腫未乾者飽膿空中補痘不多手足發癰後以十全大補湯加金銀花連翹調理而安蘄水邱蓮塘季子出痘正作膿瘙癢煩哭亟請豫往見其面痘磊落紅綻膿漿未熟兩頰先干皮肉木硬因其珍愛難以凶告但曰左頰屬木肝也肝主血藏魂右頰屬金肺也主氣藏魄兩頰木硬氣血不榮魂魄不靖所以煩哭也蓮塘固請用藥豫辭不能治欲解其毒則中氣反傷欲補其中則邪火正盛故告退是夕加煩而死手足諸瘡要飽漿充肥蒼蠟喜脾強淡清虛癟多灰白縱得干收有後殃手足痘瘡最要膿漿飽滿乃脾胃強氣血足也若灰白色或清淡水或虛餒鱉癟此脾胃弱快斑越脾湯主之一一九如此者縱得收靨後必手足腕膝及關節之處發癰毒也兩臀肩背諸瘡子展轉揩摩最受虧惟有正瘡能耐久不然黏著便無皮痘瘡初出起發邪氣雖旺正氣亦強足以任之至於成漿則氣血漸耗精神漸弱有不勝之狀起止艱難多喜仰臥惟肩膊背臀之瘡展轉摩迭最受虧苦若痘好者自然堅厚耐久不破其次則收靨稍遲膿自潰最可惡者如湯火之疱水去皮脫又瘡自破清水非膿黑䵟乾焦是不治之症才試漿時未飽囊瘡頭有孔漏膿漿依然團聚封瘡口泄去真津毒氣藏痘作膿窠之時最要皮厚包裹完固若膿未成忽然瘡頭有孔其水漏出或結聚成團堆於孔外者或水去窠空自乾黑者俗名漏瘡必死若膿熟之後窠皮亦熟漿水拂出因而結靨此頭額正面之間多有之俗謂之堆屎收不可以漏瘡例論蓋痘瘡膿未成堆屎收膿過熟也遍身瘡痘作膿窠涕唾稠黏咯吐多強忍直當收靨後自然毒解得平和痘瘡者每至作膿窠之時咯唾痰涎稠黏膿結或有膿血夾雜者咽喉不利飲食亦少此肺受火邪津液不足故多黏痰喉舌牙齒之間瘡潰血出惟用甘桔湯七加牛蒡子天花粉清肺化痰利咽膈直待收靨之後自然和平不可妄用大涼之劑瘡痘膿漿賴血成幾何津液受熏蒸舍空血耗神明亂睡里呢喃喚不醒痘內之膿皆身中之血熏蒸而成瘡痘稠密膿血周遍津液消耗心主血血虛則舍空故心熱者虛煩不得眠酸棗仁湯主之一二一心虛者喜睡夢中呢喃如與人言多怪誕之事喚之不醒安神丸主之四十七若昏悶甚者先以龍腦膏一五開其心竅後以安神丸四十七人參麥門冬湯送下蘄水徐桂山子文禎年十七出痘請豫調治至膿成將靨時忽發狂妄語起舞或毆人罵人皆平日仇恨者一身之瘡盡迸破父母恐有魘咒亟延田巫禳之田盡其術病者不少寧乃問豫豫曰信巫不信醫待巫無驗吾方治之田亦自知非魘乃告豫曰請用藥勿相拘也豫用安神丸一百粒作二次服良久始省問其所為夢也起發成膿未失期渴而飲水不須疑氣虧血少無津液潤燥生津法更奇痘瘡之出全資血氣之養以致成就今痘出太密取用過多氣不期而自虧血不期而自少故津液不足咽乾膈焦而渴也法宜養氣生血益津潤燥人參麥冬散二十二葛根解毒湯二十主之切不可以冷水西瓜紅柿梨蔗菱藕生冷之物及寒涼之藥損其胃氣則津液不生煩渴不止而變生焉麻城鄒漬溪子出痘至養膿時大渴不止豫議用人參麥門冬散傅醫即依本方修合豫謂曰此乃瘡出太甚津液不足之症白朮燥津液茯苓滲津液皆所禁也豫借古方而行己意教以本方去白朮升麻加生地黃天花粉知母淡竹葉一服渴止邑孝廉萬賓蘭子出痘至養膿時大渴不止豫用人參麥門冬散去白朮升麻加生地黃天花粉作大劑代湯飲之一服渴止膿窠已作中無毒腹痛多因燥屎攻若是便清曾受冷好將湯散急溫中痘瘡初出腹痛者毒在裡也桂枝大黃湯二十九起發不透腹痛者陷伏也三乙承氣湯三十宣風散九十二作膿腹痛者毒已出又無陷伏其人不大便者必燥屎也當歸丸一百膽導法五十四以通之便清者必受冷也急與理中湯三十四加肉桂或黃耆建中湯三十一加木香主之表裡無邪一向安忽然腹痛又加煩痘瘡色變成灰木此候曾因飽食干痘瘡其出已盡其發已透其膿已成表無邪也能食小便清大便潤里無邪也一向平安忽然腹脹作痛煩躁喘促痘瘡色變如灰木之狀此必傷食得之先以丁香脾積丸三十三原物湯下去其宿食後以人參白朮散二十三去葛根加青皮橘皮與養胃丸一六相間調之蘄水李宅一女出痘至膿成將靨時忽腹脹且痛氣喘呻吟請豫治之豫視其病瘡既胖壯膿又飽滿診其脈弦滑豫曰此非痘毒乃傷食也因問曾食雞肉糯米飯豫曰急下之女之祖知醫乃曰痘瘡首尾不可下恐虛其里不靨也豫曰病不執方藥貴對症有是病則投是藥下之無妨遂以原物作湯吞丁香脾積丸得利而安英山金宅一子出痘成膿時忽腹脹作痛氣喘煩悶延豫視之其痘光壯飽滿非毒也必曾傷食問之果因麵食過飽乃用原物湯送下丁香脾積丸得利病稍定再用錢氏異功散加青皮山楂一服而愈未得成膿先潰爛此候得之輕發散除非脾胃本來強曾見幾人成倒陷夫痘瘡膿熟潰爛者常候也若未成膿先即潰者此名斑爛斑爛之由病當發散而不發散則毒氣閉塞喘促悶亂不當發散而誤發散則熱毒隨陽氣暴出遍身皮肉潰爛此不善發表之過治之宜調脾進食令大便得所安養榮衛生肌解毒解之不至於冷調養不至於熱方為良法宜十全大補湯三十八去桂加防風荊芥穗多服佳大便祕以膽導法五十一潤之膿水不幹以敗草散八十襯之斑爛作膿痛甚者以天水散九十四和百花膏九十八塗之又有發表過甚外為斑爛而內虛陽氣不守臟腑自利此又急當救里解表陳氏木香散主之二十五厥陰者異功散二十六邑丞雷省齊次孫五歲出痘延豫四子邦治視之此孫嘗拜醫萬世喬為恩父世喬恃熟專恣無忌邦治用藥必力阻之其孫衣以厚綿圍以厚被日夜向火任其飲酒未七日而靨豫聞日期未足其收太急親往視之見其自面至腰潰爛平塌無作痂者乃告曰此非正收是倒靨也亟用托裡解毒之藥減去衣被再勿近火飲酒可保無事因立一方以黃耆白芷排膿托裡防風蟬蛻以疏表青皮桔梗以疏里牛蒡子甘草以解毒只一服而潰瘡腹脹大便膿涎此毒氣中外無留矣豫辭歸又告曰勿再服藥恐生他病也痘瘡磊落本無多到得成膿不結窠不是脾虛常食少定知陷伏認差訛曾見痘瘡初出磊落起發亦透只待結膿窠之時卻不作膿往往變為壞症者或因其人不能食脾胃虛又自利不知調理者或出未勻發未透毒氣陷伏妄談稀疏者此皆人事之不修非干時毒而然也失聲四症要端詳肺濁心微聲不揚哭語無聞因腎怯啞嗄不出是咽傷失聲之症痘瘡所忌當於養膿收靨時候之有吉有凶不可一概作凶斷也此有四症如聲濁不清響者此火毒上熏肺先受之肺主五聲肺熱則脹孔竅閉塞命書云金空則鳴金實無聲是也甘桔清金散主之七附方如聲小氣短近聽則聞者此心火太亢血槁氣消故雖有聲而不遠揚叔和云聲言爽氣清是也導赤通氣湯三十五附方此上二症可治若啼哭無聲而見其淚出語言無聲而見其口動者腎敗也其聲啞嗄如破如硬者此喉潰爛也此上二症不治豫長子邦忠婦李氏年十八歲出痘至成膿時經水忽行所下血塊且多吾妻錢氏以告未逾日婦猝失聲問之但搖頭垂淚自知必死家人懼甚豫思痘瘡變黑歸腎宜有猝失聲之症今痘已成膿飽滿紅潤何以有是逆症也沉吟良久亟呼邦忠曰勿亂吾得之矣內經云婦人重身九月而啞者少陰之脈不榮於舌也夫少陰者心也心主生血諸瘡皆屬於心瘡毒之火內起於心迫血下行故經血來也舌者心之苗血去則心血虛不能上榮於舌故舌萎縮而猝失聲不能言也乃以生血散去五味子加當歸身生地黃服之良頃之愈後以十全大補湯加麥門冬調理而起蘄水肖家一子三歲出痘請吾長子邦忠治將靨時忽然失聲邦忠以問豫豫乃示以四症忠曰啼哭有聲但言語重濁不清響也豫曰此肺熱也教以甘桔清金散服之而安寒戰咬牙雖不祥養膿結靨更宜防能將形症分凶吉可許嬰童司命長痘瘡所忌者寒戰咬牙二症也單見且凶況雙見乎養膿結靨之時尤不可見然亦有凶有吉不可不辨也如掀腫紅紫大小便祕煩渴飲水此表裡俱實之症戰者瘡痛而振搖也咬牙者忍痛而咬其牙也乍作乍止宜四順清涼飲二十七加連翹木通金銀花主之如青乾黑陷大小便不通煩躁大渴不止者此純陽無陰之症宜防風通聖散四合棗變百祥丸主之一二六若腹脹氣喘譫妄足冷者倒陷也不治如潰爛灰白泄瀉不止者此純陰無陽之症宜陳氏木香散二十五異功散二十六主之若瘙癢悶亂腹脹氣喘足冷者倒陷也不治邑人胡玉峰子出痘甚密請豫調治豫曰此兒脾胃素弱當用補胃之劑便氣血旺而痘易成就也玉峰不聽至成膿後過期不靨遍身潰爛寒戰咬牙失聲悉具玉峰恐不祥三倩匠合木而吾三逐之玉峰問故豫曰戰者變身潰瘡坐臥艱難不能自任非鼓頷寒戰也咬牙者齦瘡相癢相戛而鳴非神昏鬥齒也失聲者欲得肉食公不與日夜啼哭得之非咽爛嗆水也公不用吾言以致此極若肯進補脾之藥則即靨矣乃從吾言豫用調元湯加防風白芷暗入熟附子一片連進三劑而安咳逆原知有幾般此名惡候古今傳若逢嘔噦須同論莫作尋常小病看咳逆嘔噦三者皆惡候也諸病深者不宜有此況痘疹乎咳逆者如噎食噫氣之狀俗呼吃逆者是也咳逆之聲小且短其氣似入而非入嘔噦之聲大且長其氣似出而非出嘔者聲清噦者聲濁皆有聲無物也大抵諸病之症曰火曰痰曰虛惟痘瘡專主火主虛也經曰木陳者葉必落弦絶者聲必嘶病深者聲必噦由此觀之其為死症明矣邑庠生餘光庭十九歲出痘延豫與韓鳳岐治之十日後膿成將靨忽作咳逆診其脈促而代豫謂韓曰咳逆者惡症也促代者怪脈也痘瘡順症飽滿明潤何以得此脈症也韓亦憂疑豫思咳逆三症一曰胃寒二曰水逆三曰胃敗皆不相干經曰諸氣逆沖皆屬於火此火氣炎上之象乃問其大便何如曰自出痘到今七日未更衣豫曰燥屎壅塞下竅不通毒火炎上出於上竅故咳逆也促代之脈得之咳逆氣逆脈亦逆也又取豬胞導之取下燥屎咳逆即止而脈亦調勻也隨起痘瘡正色喜紅鮮到得膿成又不然曰白曰蒼皆正色若猶紅嫩轉成愆邵堯夫曰東赤南白西黃北黑此正色也驗之於曉午暮夜之時見之矣此一陽之氣色色之遞變也故東赤者乃一陽發生之氣如木之始萌也遞而變南白者乃長養之氣如火之大明也謂之白者非素白之白乃潔白之白也遞而變西黃者乃收斂之氣如金之從革也遞而變北黑者乃閉藏之氣如水之潛伏也若痘瘡初出一點血東赤也血化為水南白也水化為膿西黃也膿干為痂北黑也亦一陽之氣色色遞變皆正色也假如痘瘡膿成將靨之時猶帶紅鮮之色反為逆症故以為灰白蒼蠟為得秋冬正氣也蘄水徐淑道十三歲出痘請先君菊軒醫治一日歸家而嘆全問曰有何事先君曰蘄水徐生出痘父喪母寡今不可治矣全問其症先君曰痘已成膿只待收靨今變黑歸腎故不可治全曰全能治之乃往視之見其痘磊落膿漿飽滿神識清爽語言清亮自告豫曰先生救我問其大便五日未通全告先君曰此痘正宜收靨裡實熱蒸故潰爛也其色蒼黑亦正色也但解其里即靨矣先君問以何方全曰四順清涼飲與之一服下燥屎二十餘枚痘隨收靨而安先君問全曰汝未習醫何以知其變色為正氣色非歸腎也全曰此在邵子皇極經世中乃誦其東赤南白西黃北黑之言而詳解之先君喜曰汝以儒為醫矣邑人汪汝愚乃大賓次子大川之侄也大賓早被雷厄有三子長子幼子皆死於痘汝愚痘將靨灰白潰爛神昏不醒大川亟請豫往謂此侄之病與前相似幸而得生吾弟有後但恐不可治也豫視之曰無傷不必服藥但與公同守三日收靨也川問曰若不服藥何以能痊豫曰瘡白者乃熱太過而白如果熟潰爛之狀非虛也神昏者乃邪盡正回否極泰來之兆非昏瞀也再待三日則正氣復而病痊矣果然痘瘡養膿決生死訣養膿時只是清水皮薄如水疱者三四日後決瘙癢抓破而死設不癢塌亦發癰死勿治養膿時乾枯無水都是空殼決作瘙癢或發癰死勿治養膿時未成膿漿猶似血水忽然干收者決死勿治養膿時忽然作癢正面抓破皮脫肉乾黑者決死勿治養膿時忽然泄瀉日夜無度湯丸不效足冷者決死勿治養膿時或瘡色青紫或帶灰白寒戰咬牙失聲者決死勿治養膿時腹脹氣喘足冷悶亂者決死勿治
