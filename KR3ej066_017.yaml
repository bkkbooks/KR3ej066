body:
  text: 卷之十七收靨症治歌括凡十九首膿窠結就正鮮肥瘡頂微焦欲靨時漸次干收無急慢痂皮圓淨轉春暉痘瘡成膿之後鮮明肥澤飽滿堅實以手拭之瘡頭微焦硬者此欲靨也大小先後以漸次靨不失太急不失太緩已靨者痂殼周圓無有突凸陷凹者乾淨無淫濕破濺者此為正靨否極泰來之象也痘瘡收靨有真訣面上身中要合格面上吐漿頂聚珠身中結痂堅如墨凡痘瘡收靨之時面上是一樣收身上是一樣收謂之合格乃正靨也面上痘瘡收格痘頂吐膿結聚如珠子樣滿面皆然磊落可觀惟兩耳與身上同身上痘瘡收格皮膿乾結如螺靨樣緊淨堅厚易自脫落收靨如將日數拘幾曾等得不差殊但憑本痘分疏密更向其人論實虛俗謂幾日發熱幾日出形幾日起發幾日作漿幾日收靨此大略之言耳痘有疏密毒有微甚人有虛實豈可一切拘以日數如瘡本疏者其毒微其人中氣實又能食自然易出易靨固不待於旬日者如瘡本密者其毒甚其人中氣實又能食榮衛調和內外無諸傷犯至十二三日可以刻期收靨也若其人中氣虛食少或內外曾有傷犯或遇氣修乖變因而難靨豈可必拘以日數哉痘瘡收靨已無邪不疾不徐乃更佳太疾卻防餘毒壅太遲潰爛不成痂凡痘瘡收靨之時毒邪已解只要先後有次疾徐得中如收太急者毒邪未盡煎熬津液以致速枯必為目病為癰毒為諸怪疾甚至橫夭宜微利之以徹其毒當歸丸主之一如收太遲者中氣已虛脾胃太弱不能榮養肌肉使之完就以致潰爛內服十全大補湯二十八外用敗草散八十襯之英山沈翰女年十九出痘其婿請予視之起發未透膿漿未成收靨太急非正靨也適佔得渙之巽予曰病既逆卦象又凶不可為矣果死一子十歲出痘將靨亦與其姊症同及卜亦得渙之巽人皆懼予曰勿憂此可治也其婿曰同一病固一卦象有可治不可治何也予曰以病言之令正收靨太急面無完瘡故曰不治令舅面瘡半靨膿腫尚存故曰可治以卦言之先以夫占妻用財為主卦中無財兄弟發動又克妻財所以凶也後以父占子用子為主子孫旺相兄弟發動能生其子所以吉也已而果然瀚曰公何但神醫亦神卜也當收不收瘡潰爛內外審候是何變以法求之要著痂痂不得成為倒靨痘瘡過期不收遍身潰爛者此與斑爛不同乃熱太過也其候不同或於天寒失於蓋復使瘡受凍而不收者宜服五積散八十六外用乳香燒煙於被內熏之或因天熱過求溫暖使瘡被蒸而不收者宜內服人參白虎湯二十四或五苓散二十八外減去衣被令少清涼以天水散九十四撲之大便秘結內外極熱毒氣散漫無陰氣以斂之而不收者宜內服宣風散九十二或三黃丸八四順清涼飲二十七外用膽導法五十以敗草散八十襯之或泄瀉氣虛脾胃弱津液少肌肉虛而不收者宜內服陳氏木香散二十五外用敗草散八十或渴飲冷水過多以致水漬脾胃濕淫肌肉而不收者內服五苓散二十八或因食少氣虛而不收者人參白朮散二十三去葛根加桂主之已上諸症以法治之已潰者結薄痂未潰者結痂方為佳兆若痂皮俱不結者成倒靨矣邑文學胡小山長女未嫁出痘甚密膿成過期不靨請予調治此女平日脾虛食少性不肯服涼劑予乃以錢氏異功散加木香青皮煉蜜作丸米飲送服調理而愈小山子胡仁山幼時出痘甚密膿成不靨漸至潰爛請予調治予問自起發以來未得大便裡實熱蒸故不成痂議欲下之小山曰此子素弱恐不可下之時有一術士王克廉符水甚驗乃書一符焚而服之少頃腹中鳴而利下清水眾皆稱謝予亦喜之但思久未更衣豈無燥糞至次日痘亦潰爛予作膽導法取下燥糞十四枚後皆溏糞始行痘亦收盡而安一小兒因渴飲水過多濕傷脾胃不能收靨以四君子湯以人參補中白朮燥濕茯苓滲水甘草解毒加防風以勝皮毛之濕白芷以逐肌肉之水桂以利關節而去寒水之邪砂仁以溫胃止渴調理而安一小兒大便不通熱蒸於內而生其濕以致浸淫不能成痂用當歸梢生地黃以涼血麻子仁以潤燥酒大黃以瀉熱開結生甘草以和中得利而安一小兒泄瀉不止食少此裡虛不能收靨用陳氏木香散合肉豆蔻丸服之愈遍身潰爛少完膚膿血淋漓勢已痡坐臥不能惟用襯瘢痕欲滅卻宜敷痘已成膿之後過期不靨以致潰爛膿汁淋漓不可著席黏惹疼痛者用敗草散八十或蕎麥粉一二三以絹袋盛於身體上撲之更多布席上襯臥尤佳面上欲成瘢鼾者用滅瘢散七十八和百花膏九十八敷之邑人蔡承盛子出痘甚密先延甘大用襯膿成後過期不靨面瘡潰腫起止呻吟嗆水吐食語音不清甘謂不治而去復請予予視其病面瘡腫起正在灌膿遍身皆然非倒靨也嗆水嘔食者口唇腫硬吞嚥不便非咽喉潰爛也語音不清者鼻中壅塞氣不得通非失音也瘡毒盡出表病里和可治也乃制一方用苦參酒浸牛蒡子白蒺藜何首烏荊芥穗各等分為細末酒糊為丸淡竹葉煎湯下調理一月起時鄰居一小兒病症相同亦請予視予曰不可治也或問何故予曰症不同也彼痘過期痘熟宜靨此痘猶生未得成膿不宜靨者一也彼痘腫脹猶灌膿血此則面平目開皮脫肉乾二也彼痘喉舌無瘡此則咽舌潰爛嗆水失聲三也彼傢俬與蔡氏求藥服之無效死胡三溪長女十二歲出痘甚密延喻南麓視之以參耆大補之劑服之二十日後過期不靨予往視見其瘡已潰爛幸非倒靨乃犯溫補藥多里邪盡出表毒不解急宜解表勿使皮肉腐爛喻猶強執為是又過五日不收復請吾長子邦忠予教用防風荊芥升麻以解表勝濕白芷以蝕膿逐水連翹牛蒡子甘草以解其鬱蒸之毒肺主皮毛因參耆之補肺熱且甚時值夏火正旺用黃芩酒炒以瀉肺中之火解時令之熱調理一月而安但到收時膿自干收藏斂束貴周圓莫教潰爛痂皮嫩至此還將倒靨看痘子初出磊落成個後來長大作膿始相連串外雖相串皮下猶一個是一個至於結痂腫消膿干現出初來本形所以收藏斂束要完全堅厚覆成個數為貴或根腳相通皮肉盡串者結痂之時亦要乾淨無有淫濕及濺破者次也若未成痂者潰爛已成痂者只是嫩皮此倒靨也蘄水董希周女十九歲辛丑十二月中旬出痘請江萬吉治延至歲終不得收靨精神已昏飲食俱廢江不能治而去予往視之僵臥如死人任其開衾詳看無所知及診其脈洪實調勻其祖父廷憲在素知醫者予告曰此痘倒靨逆症也不可治惟脈洪實調勻不疾不徐予今棄症從脈治之若得壞瘡復起新痘復出人事清爽飲食如常則無事矣乃用升陽散火湯加黃耆當歸木香青皮連進三劑初三日復出一層新痘舊者盡干初五日出盡周匝一身病者亦漸蘇省能言語求飲食依期起發養膿至十三日靨後以十全大補湯調理希周父子拱手謝曰此病皆曰不可為非公神手何以生此女耶予曰痘倒靨必歸於腎今幸愈尤當慎目疾也宜預解之希文又不聽半月後右目痛不能開果喪明痘臭須知有幾般時師莫把混同談養膿有覺為凶兆結靨才知作吉看難經云心之臭焦肝之臭臊脾之臭香肺之臭腥腎之臭腐五臭皆屬於心故曰臭從火化也內經云諸痛癢瘡瘍皆屬心火故痘瘡之症心火主之凡論痘瘡到結靨時才有臭者此痘子成熟之氣邪氣自內而出也吉若養漿之時即有臭者此毒火薰蒸之氣積於中而見於外也凶又或瘙癢抓破及潰爛腫灌之時其臭焦者心火盛者危其臭臊者肝火盛也死其臭腥者肺火盛也危其臭腐者腎火旺也對為腐痘之氣必死不治惟臭香者脾也水穀之府無所不受故吉收靨原來貴整齊臭腥潰爛事生疑過期見此還為順未及收時作逆推痘瘡收靨圓淨堅厚如螺靨者上也頭穿膿出堆聚成痂如雞屎者次也皮破膿出痂薄如紙者又其次也皮爛膿潰不成痂皮膿汁腥臭者期為下矣如已過期譬如瓜果熟久則爛此造化之常還作順看若未及期則為斑爛乃逆候也變倒靨而死邑文學盧半默妻李氏出痘甚密未及成膿面瘡自破皮腫膿聚氣多腥臭過期不靨飲食漸少鎖喉嗆水請予視之曰形症俱惡恐不得痊延二十餘日殞倒靨誰知毒入里死中求活治得理便秘腹脹急下之自利則將來物取痘毒當靨不靨復入於裡者謂之倒靨此死症也元氣素怯又不食常自利者陳氏木香散二十五異功散二十六死中求活聖藥也如原無泄瀉大便久秘今添腹脹喘呼此毒之盛薄蝕元氣復入於裡宜急下之排毒散一二二若不急下則腸胃不通榮衛不行益加喘滿燥悶而死矣若毒入里忽自利者此人脾胃素強毒氣難留故自利之須看利下之物如利痂皮膿血者毒氣得出為順不可止之待利盡膿血自愈如利水穀者此毒氣反驅水穀脾虛不能制之其症為逆不可治也原瘡潰爛覆成瘡痘出重重漸作漿此候未曾成倒靨便堅能食得為良如痘瘡破損潰爛者復腫灌作瘡不致乾枯原無痘瘡處復出一層如初出之狀亦以漸起發作膿者此裡氣充實毒不得入猶在於表未成倒靨逆中之順症也但瘡子重出一番必其人能食大便堅足以勝其再作之毒如食少大便潤者用十全大補湯三十八人參白朮散二十三相問服之自利者陳氏木香散二十五異功散二十六肉豆蔻丸四十三主之蓋病久氣虛惟利溫補不可再解毒也一小兒痘靨後復出一層小痘其家驚憂請予視之曰佳兆也痘科云輕者作三四次出大小不一等重者一齊湧出此痘最輕且無餘毒發已盡矣其人大悅邑人吳若泉子三歲出痘請予長男邦忠視之予偕往予曰毒氣有餘穀氣不足此兒食少故不靨也間服何藥予謂邦忠曰無藥可解能食則生不能食則死次日思食所食且多予聞嘆曰死急矣邦忠亦疑曰能食而曰死急何也予曰謂之能食者久不食而今思食自少加多胃氣復也今忽多食乃胃敗火盛邪火殺穀名曰除中況膏之將滅必大明而後滅死在旦夕間矣次日果死痘將靨忽作泄瀉口渴飲水小便短少其痘胖壯紅潤此內熱也用五苓散加黃芩芍藥煎調益元散服之愈痘起膿成能食一向溏泄未止用錢氏異功散加木香訶子肉服之愈痘成膿面部將靨因渴引飲過多以致自利用白朮散服之渴瀉俱止愈痘成膿少食忽作泄瀉不止痘變灰白用木香散豆蔻丸服之愈滑泄不止食少腹脹足冷痘灰白色脈細無力此犯五虛不治必死靨時表解里當和忽爾通腸泄奈何不是裡虛元氣脫必然倒靨毒邪多痘子初出以來表裡俱病收靨之時表邪已解裡氣當和大便宜潤小便宜清忽爾洞泄水穀者此中氣暴虛不能禁固水穀或毒氣乘虛入里欲作倒靨並宜陳氏木香散二十五異功散二十六肉豆蔻丸四十三主之利止者佳利不止者陽脫而死潰瘡最毒面居先陽毒從陽心火炎能使便調無別苦可投良劑保傷殘痘瘡潰爛先傷於面者面乃諸陽之會痘乃純陽之毒以類相從如水就濕火就燥也又心之華在面諸瘡皆屬於心心火上炎之象如面瘡已破腫消目開者此不著痂先以乾燥病為倒靨死在旦夕如已破復灌滿面成餅焦裂濺起膿血淋漓食谷則嘔飲水則嗆咯唾黏涎語音啞嗄口中氣臭者此臟腑敗壞故諸症盡見也淹延悶絕而死如瘡潰腫飲食無阻大小便調更無他苦如上症者此則可治內用十全大補湯三十八升陽解毒湯一二四相間服之外用滅瘢救苦散七十八百花膏九十八合而敷之陰陽界限在人中任督分來上下通宜向此間漸收靨陰陽相濟得和同人中為任督交會之衢督乃陽脈自人中而上任乃陰脈自人中而下故自準頭至印堂與項至鳩尾相應印堂至髮際以上與膝以下相應痘瘡收靨但觀面上收到之處則知身上收到之處矣凡痘自人中上下左右先出先靨者吉陰陽變合相濟之理也若自額角先靨者孤陽不生足下先靨者孤陰不長皆凶兆也蘄水柴大愚妻周氏甘七歲出痘甚密膿成時請予治之予見鼻準先干曰此凶症也不可治矣或問此痘將收而不治公誤耶予曰起發未透膿漿未熟不當靨也況痘瘡收靨自有次第形色亦殊先自口唇兩旁收起漏漿堆膿面瘡皆然自項而下則成癟殼今痘未熟而靨乃倒陷也自鼻先收失其序也不漏漿者乾枯也予不能治辭去後三日死陰陽相濟得相成陰寡陽孤勢不行不信但看頭與足痘瘡難靨自分明造化之理生於陽者陰成之生於陰者陽成之痘瘡收靨頭自發際以上陽氣獨盛謂之孤陽足自膝以下陰氣所聚謂之寡陰所以諸瘡皆靨之後此二處難靨乃造化自然之理不可作倒靨論曾見傷犯灌成瘡待到收時不靨漿膿汁淋漓多痛楚急宜治療免殘傷痘瘡結膿窠之先或曾傷犯破損者灌爛成瘡至於收靨此獨不靨膿汁不幹更多痛楚若不急治漸成疳蝕瘡損骨傷筋以致橫夭宜內服十全大補湯三十八外用滅瘢散七十八和百花膏九十八敷之幾個頑瘡不肯收無時痛楚血常流此成疳蝕難調理日久堪嗟一命休痘以成疳蝕瘡者若在肢節及諸虛怯軟弱血氣俱少之處色青紫黑腫痛潰爛以漸延開血自出者難治若所生之處在於陽分不痛不爛色不變血不出者以綿繭散一二五主之一向渾身只溫暖忽加煩熱減精神干漿焦靨宜如是只怕生來內外因痘瘡常宜溫暖有熱不可盡去如一向身溫今又發熱者俗名干漿此亦常候只怕內傷飲食外感風寒以致發熱又當別論然病久氣虛不敢輕用汗下因外傷者桂枝葛根湯五加人參因內傷者木香大安丸九十一主之並宜用連翹湯凡痘出太密身有壯熱可嫌者連翹湯聖藥也八十八待到渾身膿水乾紛紛時俗怠心生不知禁忌多翻變一簣難成九仞山收靨之時人心怠忽居處飲食不知禁忌以致變生異症滔滔皆是也痘靨辨生死訣痘靨時面上遍身臭爛不可近目無神采者死勿治痘靨時遍身瘙癢抓破無水皮捲起如豆殼乾者決死勿治痘靨時兩腮乾硬按之如石者決死勿治痘靨時泄瀉不止遍身潰爛足冷者決死勿治痘靨時瘙癢不止寒戰咬牙失聲者決死勿治痘靨時嗆水失聲乾嘔者決死勿治痘靨時痂皮不脫不思飲食昏憒悶亂者決死勿治
