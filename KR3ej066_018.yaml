body:
  text: 卷之十八落痂症治歌括凡一十一首瘡痂自脫痘瘢明無凹無凸皮肉平容貌不殊原未病泰來否去一番新收靨之後其痂亦先後以漸自脫其瘢鮮明光潤平整無赤黑無凸凹容顏依舊五官四肢並無傷殘此大順吉者人生過此又一番新也滿面天黥黑皯添形容變盡發毛更旁人乍見應難識恰似重來生一般靨後痂落滿面瘢痕或赤或黑五官廢缺四肢傷殘毛髮盡脫形容大改此險中得生者如再生一般也落痂之後瘢赤黑愛養能教瘢自滅突起還將風熱論凹陷卻因虛里得瘡痂落後其面瘢或赤或黑者用四白滅瘢散一二七臨睡以清蜜水調搽面上至曉以水滌去之自然白瑩脫去更宜愛護不得早見風日經年不滅如瘡瘢突起成凸者此熱毒未盡解毒防風湯一百零一主之外更用蜆子肉水摩之如陷下成凹者此脾胃虛不能長肌肉也人參白朮散二十三加黃耆主之靨後痂皮令自脫日久不脫脾胃弱莫教撏掐又傷膚番覆成瘡膚似剝痘瘡收後其痂自脫者佳不脫以百花膏潤之九十八令其速脫稍遲則乾硬深入肌肉經久方脫遂成瘢痕然久而不脫者脾胃虛也人參白朮散二十二加黃耆官桂主之不可撏剝去若不禁手反傷皮膚復灌作瘡番復潰爛一時難愈其後多成疥癩也一小兒靨後痂皮不脫問豫豫曰此脾肺二經不足也蓋肺主皮毛脾主肌肉其氣不足故痂難脫乃用錢氏異功散加黃耆桂服之愈一小兒痘後一身盡靨痂皮盡脫惟頭與足不靨其家甚憂延豫治之豫曰此常候也何勞治蓋天地間物以陽濟陰以陰濟陽陰陽相濟而成造化人之一身諸陽皆聚於頭乃陽中之陽謂之孤陽諸陰皆會於足乃陰中之陰謂之寡陰孤陽不生寡陰不育所以頭瘡不收者孤陽無陰也足瘡不收者寡陰無陽也久當自痊但遲遲耳不須服藥亦無方也請者喜而退痂皮不脫日時深陷入肌膚必作瘢胸背四肢由自可面顏豈可著瘢痕凡瘡痂日久當脫不脫者胸背手足無妨惟面上不脫必成瘢陷未脫者以百花膏潤之九十八令其易脫脫盡之後瘢痕黑黯者以四白滅瘢散塗之一二七痂脫瘢痕黑暗多勸君未可許無疴毒邪歸腎誰知得只要其人表裡和凡痘瘢頭面渾身並黑暗者未可便説無事猶恐目前未甚作膿收靨太急此倒靨歸腎也但察其表裡如壯熱大渴未除煩悶昏睡少食或大便不通或自利此真倒靨歸腎也若身溫暖爽快食漸加大小便調者此瘡瘢本色無慮也一小兒痂落後其瘢白色或問豫豫曰此氣虛也肺為氣之主其色白當用參耆大補之劑否則有變其人曰痘已收完何變之有一月後大喘而死收靨遲遲不脫痂神昏喜睡此無他只因氣弱神先倦緩治求痊不必嗟如收靨既遲瘡痂不落昏昏喜睡者此邪氣已退正氣未復脾胃虛弱宜調元湯十八加麥門冬合安神丸四十七或只用酸棗仁湯一二一緩緩調理待氣血平復榮衛和暢而安矣脫痂胃氣未全舒飲食安能便有餘若使食多休浪喜胃中邪熱不曾除瘡痂既落中氣暴虛多不能食必藉人參白朮散二十三去葛根加陳皮木香以調養之其間或有瘡痂起而能食者是胃中宿有蘊熱放也蓋胃熱則消穀所以能食其人必大便稍祕或難當用三黃丸八利之否則恐胃熱不去郁為口臭齒腐生風之症流散四肢則發為癰疽腫毒然有一等脾胃素壯實者平素能食大便亦不至有祕結之患此又不可一概論也凡痘自成膿後先四五日未大便者最惟膽導法五十一痂起渾身一掃空瘢痕凸腫盡成膿依然個個如先樣形症輕微卻不同痘瘡收靨後痂皮盡脫曾見瘢痕凸起復作膿窠依舊結一層疕子者或因收靨太驟毒氣未盡或因誤服溫補之藥或多啖肥甘之物飲酒喜食煎炒辛熱或因出風太早榮衛鬱而不通皆能覆成此症亦與前日一般但無苦耳若此者毒邪外散決無留毒之患邑丞雷省齋次孫出痘落痂後月餘面瘢凸腫今始發泄也凡毒自內而外者吉乃用當歸梢赤芍藥防風荊芥連翹牛蒡子玄參蟬蛻升麻作散淡竹葉煎湯調服安一小兒落痂後瘢內凸起且作癢請豫豫曰此風熱也用人參敗毒散加防風荊芥一服安後有患此者用荊芥敗毒散加人參服之外浴水楊湯皆效一小兒落痂後瘢毒不平人問豫豫曰痘家戒食薑恐靨不齊瘢不平也問之果然一小兒落痂後瘢腫覆成瘡久不愈請豫治豫曰此痘毒瘡也由犯手撏掐不得自脫故皮肉受損而復作瘡以苦參丸與服而愈瘡痂起處落紛紛幾處猶然膿水浸硬疹蓄膿原毒壅空囊停水裡肌平痘瘡潰爛不結痂者此倒靨也或三五處腫潰爛不結痂者疳蝕瘡也若已正靨痂起自脫或面上或手足成片結硬瘡頭雖焦中蓄膿漿者此是原出痘子之初其處太密糊塗成片無復顆粒所以毒壅於裡不能起發作膿結痂也但用滅瘢救苦散七十八和百花膏九十八塗之待膿盡痂起自愈或手足腕膝之間瘡窠連串作大一塊膿化作水停蓄於中恰如囊袋皮不破水不出日久只如是者此裡面肌肉已好原日瘡皮剩於外也宜用針決去其水自干脫矣差後心虛氣未平便宜調護保安寧皮膚嫩薄風寒襲腸胃殘傷水穀停痘瘡新差之後氣血未復視之未靨尤加調護可也蓋痂皮起落肌肉新嫩不宜澡洗增減衣服則表已虛寒暑之氣易襲也瘡毒內作臟腑俱傷毒雖外散腸胃已弱不宜飲冷傷飢過飽則裡氣虛飲食之物易傷也時俗不知此理謂之已痊再無他變怠玩縱弛致生後災一旦病生悔之晚矣
