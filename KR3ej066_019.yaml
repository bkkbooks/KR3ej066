body:
  text: 卷之十九痘後餘毒症治歌括三十六首痘瘡靨後喜無邪人漸清寧食漸加若此痘中還更苦莫言無事便矜誇或問痘後餘毒可前知乎曰痘未靨時毒氣未除正氣未舒如蟺在湯如蚓在灰之狀痘已靨後毒氣已盡正氣將復如困魚入水囚鳥出籠之狀但察其身無熱口不渴大小便調腹中無痛精神漸壯飲食漸加此真安樂之時豈有餘毒哉若身熱而渴腹痛吐瀉或小便赤澀大便堅祕精神昏憒四肢倦怠飲食減少坐臥不安此有餘毒伏藏必生後災以此決之可前知也痘瘡輕者自無乖逆重從來有後災不是毒邪根里得或自調治誤中來凡痘瘡輕者其本疏其毒微其症順自然易靨無餘毒也重者其本密其毒盛其症險自然難出難靨有餘毒也逆者或伏或倒陷或倒靨幸脾胃素強調治又早不至大困亦作餘毒錢氏云其病有三一者瘡二者癰三者目赤以症求之尚不止此亦有出已盡發已透靨已齊者復作餘毒此由溫補之過飲食之失而得之故治痘後餘毒或補或發散或解利要在分表裡論虛實不可一概妄投湯劑也痘瘡靨後難調理表裡俱虛勿縱施此與傷寒復同病補虛為本而已矣痘瘡之後表裡俱虛要避寒暑戒頻洗以養其表節飲食遠房室以養其里傷寒賦云勞食再復病名內傷言其虛也又云諸食皆復飲酒則甚諸勞皆復御女必死言犯其虛者不可治也如小兒則在父母調護大人宜自保而勿失焉治其病者惟以補虛為本所因之病以末治之古云痘毒只三門自我推求未足憑五臟有邪皆有症各隨形症審來因痘科云痘後餘毒一者疥二者癰三者目赤夫疥者心病也癰者脾病也目赤者肝病也胎毒之發五臟各有一名如心為斑脾為疹肺為膿疱肝為水疱腎為黑陷是也發熱之初五臟各具一症如呵欠驚悸屬心項急頓悶屬肝噴嚏咳嗽屬肺吐瀉昏睡屬脾耳涼足涼屬腎是也何以餘毒只心肝脾三臟有之乎以三臟之症又不止於此乎或者舉其重而言之欲人推廣之耳如毒歸於心則為斑疹為驚悸為癢痛為壯熱為咽乾而渴為汗為丹瘤毒歸於肝則為悶亂為水泡為腰痛為目病為卵腫為乾嘔為手足拘攣為吐蛔為寒戰咬牙毒歸於肺則為咳為喘為衄血為瘡乾燥皺揭為肩臂痛毒歸於脾則為吐為瀉為腫為脹為腹痛為唇瘡破裂為舌本強為手足病為不食毒歸於腎為黑陷為猝失聲為手足逆冷為咽中干痛為飢不欲食為多睡毒歸於腸胃為泄為利膿血為腸鳴失聲為大便不通毒歸於膀胱為小腹滿痛為溺血為遺尿為頭腫痛為目上視已上五臟之症略舉其概臨病之工不可不審郡別駕壬峰肖公女乙丑冬出痘請全調治緣嬌惜太過非雞與煎熬厚味不食而彼處風俗有病者必服附子食雄雞灸關元全請戒之不聽全告曰不肯慎口他日蓄毒作病必費調理公不肯信自丙寅年後兩目出淚眼弦赤爛全曰此毒發於肝肝火旺也公曰目上下弦屬脾脾有熱乎全曰此因淚淚不止浸淫爛潰也乃用瀉青丸方去大黃加柴胡黃芩密蒙花煉蜜為丸服半年後而目不出淚眼弦平復丁卯夏又小便如靛青點滴著肉處皆爛成瘡疱全曰此亦肝火也公曰膀胱之熱全曰肝色青乃肝移熱於膀胱也又用瀉青丸方去大黃加柴胡木通車前子煉蜜為丸服之安公曰悔不早聽佳論耳痘後留邪作腫癰或為結核論相同但將毒氣分深淺莫使餘邪透骨縫此下二條言癰毒也皆由毒氣留藏經絡故於肌肉虛變或關節動搖處紅腫而成癰又或既平之後失於解利餘毒太盛外不得泄於皮膚內不得入於臟腑聚而不去遂為之癰如毒氣淺者止生結皆腫毒瘡癤而已甚者至頭項胸脅手足肢節盡掀腫作痛但發一二處或根淺者可治若流注起伏根深蔓引者小則潰筋脫骨必為殘廢之疾甚則綿延日久死邑文學胡近濱長女出痘不甚密亦不十分光壯飽滿與藥點滴不入口蓋平生不肯服藥也收靨時一片薄殼逆痘也足膝發癰毒與藥一飲而盡近濱夫婦喜豫曰勿喜病不可為也近濱問故豫曰脾主味開竅於口經云口和則知五味矣令愛素不肯服藥今肯服藥且盡是不知味而脾敗矣況膝臏之處脾實主之脾敗則亦不能成膿及請方士蔡谷陽針之果皆清水次日死蘄水夏佐南長子痘後手足發癰請豫視之見其面色黧黑精神疲困飲食且少豫曰令嗣之痘未得起壯收靨太急今發癰毒乃倒陷歸腎症也必不能成膿而死果然一小兒痘後發癰即請豫治之豫用十全大補湯加連翹金銀花治之愈蓋其癰已潰故用是方凡潰癰者以是治之未有不愈者一小兒痘後發癰即請豫治豫用解毒內托散調理愈黃岡蔡丹泉子痘後卵腫吾子邦正視之作厥陰肝經病是也丹泉不自安使人問豫豫曰非癰乃厥陰肝病因寄一方用小柴胡湯加青皮木通山楂肉調理愈看在何經用引經腫時不與潰時論補中托裡分虛實決毒排膿視淺深凡治痘癰先看在何經絡分氣血多少用引經藥如太陽經羌活防風陽明經升麻白芷少陽經柴胡少陰經獨活太陰經防風厥陰經柴胡若初紅腫硬痛者以針刺之口吮去惡血以拔毒膏九十七敷貼解毒內托散一二二附方氣實能食大便堅者用排毒散一二二疏利之氣虛食少者用十宣散三十七或流氣飲一二八毒泄而小者只內服小柴胡加生地黃湯一二九外用神功散或拔毒膏貼之九十七此治腫瘍之法也若已成膿而未潰者以鈹針決去其膿勿使內潰已潰者用十全大補湯主之三十八此治潰瘍之法也大抵痘毒發癰在手肘腕足膝膕中者多若在手腕發者屬手太陰肺經在足膕發者屬足太陰脾經並用解毒內托散主之一二二附方遍身疥癩候何寧敗面殘形亦可矜撏掐膚傷為毒淺薰蒸肉爛受邪深此一條言疥毒也痘後遍身瘡癬如疥如癩膿血浸淫皮膚潰爛日久不愈此毒氣瀰漫散於皮膚宜升麻葛根湯一解毒防風湯一一苦參丸七十七主之若因撏掐成瘡者只以百花膏九十八塗之疳蝕頑瘡亦可嫌時時流血不曾干穿皮銷肉成瘢陷腐骨傷筋作夭殘此毒在脾也痘後疳蝕瘡者毒壅肌肉內透筋骨外連皮膚時痛出血日久不痊亦惡候也內服十全大補湯三十八外以綿繭散貼之一二五毒敗皮膚有幾般或為癮疹或成丹丹瘤凝結從深論癮疹分疏作淺看此毒在心肺二經也痘後毒氣散於皮膚肌肉者病有數般或為癮皮上起如疙瘩瘙癢抓搔更多內服解毒防風湯一一外以簞衣湯一三洗之或為疹皮上如蚊蟲所咬之迹或如小疥子即麻子也升麻葛根湯一加防風荊芥穗主之熱甚渴者與以人參白虎湯二十四相合服之或為丹瘤紅腫作痛手不可近流移上下過心腎者即死宜內服小柴胡加生地黃湯一二九外用蜞針法吮去惡血自消一三一或用砭法若但紅不腫不痛者斑也人參白虎湯又名化斑湯二十四加玄參大青葉生地黃主之眼中膜翳忽遮睛癮澀難明若霧云但用湯丸頻解毒勿輕點洗反傷明此下二條言目病毒在肝也瘡痘毒氣之為目翳也蓋自臟而達外治之法但活血解毒而已活血不致於熱解毒不致於冷五臟平和則翳當自去不可輕用點藥反致損睛宜蟬蛻散九十六四物湯十九加柴胡暗中強視淚盈腮略見陽光不敢開此是羞明差別法莫將膚翳混同猜痘後目閉淚出不敢見明者此羞明症也唯於黑暗處則能開才見明則陽光爍之淚自溢出癮澀難開宜洗肝明目散九十五加密蒙花目中赤者洗肝明目散九十五主之邑丞雷省齋一孫出痘七日倒靨豫往視發出雷公問曰再服何藥豫曰痘既發出毒猶太甚欲解其毒中氣素虛恐傷中氣又致倒靨欲補其中恐助毒火又傷其目不如節飲食適寒溫以待自安時萬世喬欲進補中藥聞豫言止偶因傷食發熱豫不在世喬言於衆曰昔欲用藥密齋力阻今亟矣奈何公怒乃作參耆溫補劑服之韓觀岐與吾子邦治不敢止豫聞之往問曰勸勿服藥恐其傷目何求效速耶雷公曰但得生雖帶疾何妨蓋謂必不得生也豫又告曰令孫必無事他日損目須記吾言今果兩目俱盲雷公始悔不用豫言遽疏世喬邑司訓月山王公公子痘後兩目畏明豫曰肝火太旺宜服瀉肝散加柴胡蟬蛻黃芩初一劑用酒製大黃公子畏苦藥果成內障目盲邑人徐少柳子痘後兩目不開吾兒邦治醫不效乃請豫視之豫曰兩胞高腫而不流淚決非痘翳乃脾經濕熱也遂制一方用蒼朮童便浸黃連酒炒防風升麻生甘草為末蜜水調服愈邑人肖天秩一子痘後目有白翳延豫視之曰此痘瘢也治之無功果盲蘄水徐淑道出痘不靨先君命全治之肖桂屏再請團風李醫視之用陳氏木香散一服豫曰誤也必損目矣果損一目蘄水周望峰女出痘後目閉不開豫曰令愛痘順無餘毒必羞明症也乃試之向暗則開目目不赤嚮明則閉又不流淚此肝經火邪未除耳乃用羌活防風當歸梢川芎柴胡蔓荊子密蒙花生甘草淡竹葉一服而目開遍身痘瘢腫凸而起再用四物湯加防風荊芥人參連翹生甘草服之愈吾邑多雲山周宅一小兒九歲痘後出外忽頭腫兩目不開請甘大文視之大文問豫豫曰此非痘毒乃風熱也口授一方用羌活防風升麻柴胡當歸川芎藁本蔓荊子細辛甘菊花黃芩酒炒往治之愈熱毒乘虛入腹中大腸乾澀便難通如逢熱結膀胱里溲不來時又病癃此言毒在大腸膀胱也痘後毒入腹中熱氣並於小腸則小便不通並於大腸則大便不通如前後部俱不通者熱勢愈甚小便不通者五苓散二十八導赤散三十五大便不通者三黃丸八四順飲二十七三乙承氣湯三十大小便俱不通者八正散四十六通關散一一五斟酌用之凡靨後餘毒未盡有諸熱症者並宜大連翹湯八十八多服佳而今泄利又何如治法難將一例拘能食渴多知是熱脈微食少又為虛此下皆毒在腸胃症也痘後泄瀉其症有二如能食而渴脈盛者此熱入大腸也渴者內熱也食能多者邪熱殺穀也脈盛而數熱症諦也宜黃芩湯四十一加黃連如食少不渴脈微小者此裡氣虛不能禁固水穀也宜四君子湯二十加訶子肉豆蔻或理中湯丸三十四加熟附子甚者以肉豆蔻丸止之四十三泄利頻頻見膿血此是大腸多蘊熱莫將倒靨一般論只宜解毒不宜澀痘後便膿血者此熱毒入大腸也宜四物湯十九加黃芩黃連枳殼荊芥穗或黃連解毒湯八十九加生地黃勿作倒靨及用劫澀藥也邑人張國重子痘靨時面瘡潰腫膿水浸淫泄下膿血後重不食先請聞延南作噤口痢治不效請豫治之豫察其症乃是倒靨非痢也在痘科中利下膿血痂皮者生水穀不化者死在傷寒厥陰經病論則曰熱蓄於裡當便膿血勿治利盡膿血自愈豫思此疾不死不可亟治乃買藥製藥故延緩以待之數日後度其膿血將盡乃用四君子湯加白芍藥枳殼黃連木香一服後重除利稍止再服而能食三服而痘靨胃家有熱難留食胃冷無緣納水漿若是痘家多屬熱嘔家聖藥是生薑此言毒在胃也胃主納而不出大小腸主出而不納痘後嘔吐者是餘毒在胃也然有冷熱二症如心煩作渴食乳甚急聚滿於胸中然後吐出如射其人面色帶赤手足心熱居處喜涼此熱毒也如乳食水漿隨吐面色青白手足冷大小便自利此冷吐也熱吐者橘皮湯四十九加黃連竹茹冷吐者益黃散四十五痘後餘毒多是熱邪但聞食臭即吐不能食木香大安丸九十一或養脾丸一百零六並用生薑湯下有飲水而吐者必吐清水名水逆五苓散主之二十八一向蒸蒸熱未除治宜詳審勿差殊便難煩渴方為實清便飢疲本是虛此毒在心經也痘瘡自初以來一向發熱至於差後猶不少減者此有虛實二症如大便難小便赤能食而煩渴者此實熱也三黃丸八或四順飲二十七先解利裡熱後用升麻葛根湯一加地骨皮解表熱也蓋升麻葛根湯治瘡疹未發之先已發之後身熱藥也如大便不祕小便不赤坐立振搖飲食不甚進者此虛熱也以調元湯十八加知母麥門冬虛甚者加炒乾薑或熟附子少許以調之一小兒痘後發熱大小便難瘡瘢帶赤他醫言虛欲用保元湯豫曰不可此實熱也因食辛熱之物得之果因食雞而得以連翹飲服之愈一小兒痘後發熱不止食少喜睡延豫視之瘡瘢黑黯乃知痘毒有陷也豫問此兒痘瘡膿水必清痂皮必薄否其家答曰果然不成膿不結痂但水出皮脫而干也豫告之曰凡痘出初壯熱昏睡常候也痘既收後則邪氣已盡正氣當復熱漸退食漸加精神漸爽亦常候也今皆不然吾恐術無用矣遂辭歸半月後忽昏冒死邑染匠徐姓者一子痘後發熱諸醫或用小柴胡湯或用竹葉湯或用黃連解毒湯皆不效熱益甚請豫治之豫用保元湯加當歸炒黑乾薑一服熱去遍身青黑色非常口噤涎潮身反張手足時時頻瘈瘲不逢識者少安康此毒在肝經也此中風也痘瘡方愈榮衛正弱不知避忌忽遇節令氣交八方不正之氣乘虛而入故為此症宜消風散一三二二錢入蟬蛻末一錢分為三服投生薑薄荷汁及酒各數點溫湯進之連進二三服或作癮疹或再出膚疹而愈後以抱龍丸調理四十搐搦非時俗曰驚只因熱毒內歸心若有傷食增潮熱腹滿多煩乃食蒸此毒在心肝二經也痘後非時搐搦者有二症一則心熱留而不去熱甚生風風火相搏其人必喉中有痰目直上視面赤引飲居處喜冷宜導赤散三十五瀉青丸一一清心瀉肝後以抱龍丸四十調之一則病後多食胃弱不能勝谷謂之食蒸發搐其人必潮熱大便酸臭祕泄不調或嘔吐腹痛先以備急丸九丁香脾積丸三十三利之彼用木香大安丸九十一錢氏異功散四十四調理取愈不如只用抱龍丸四十更佳手足拘攣不得伸起居艱苦只呻吟要知養血真良法莫誤終身作廢人此毒在肝脾二經也痘後手足拘攣屈伸不便者乃血耗氣虛不能榮養於筋宜十全大補湯三十八去地黃白茯苓加川續斷多服佳氣虛者少加川烏炮過行經不可誤作風治妄行發散反耗陰血也邑令君唐肖峰以公子十二歲戊辰正月出痘時唐公要吾偕入京乃延豫四子邦治八子邦靖同韓鳳岐醫治痘靨後右肩發一紅腫非癰也韓以針刺之其手不能舉三月末肖峰北歸至上蔡聞之甚憂豫慰之曰勿憂及至察之其手不痛但軟弱無力不能自舉必用左手持之乃能舉唐公問故豫曰此肝熱氣虛也蓋肝主筋資血以養寒則縮熱則張惟補氣養血則病自痊乃制一方用人參黃耆當歸川芎白芍藥川續斷甘草節白朮桔梗木香薏苡仁防風共為細末山藥作糊為丸服至半月而愈終日昏昏似醉人口中妄語若邪侵誰知熱入心包絡解毒安神泰宇清此毒在心也痘後昏昧不解識人口中常妄語如邪祟狀此熱移入心包絡宜導赤散三十五吞安神丸四十七也待醒後以調元湯十八加麥門冬生地黃四物湯十九加石菖蒲木通山梔仁相間服之以抱龍丸調理而安四十卒然昏睡不知人飲食俱忘喚不醒邪毒從今都解散精神自此漸和平此差後虛病也痘後卒然喜睡狀如眩暈身無熱口中無妄語其人痘出必重又少食今毒氣已解正氣未復故邪退而喜睡乃否極泰來之象不須妄治逡巡蘇醒矣用抱龍丸四十調理蘄水汪元士子癸丑四月出痘靨後忽然悶絶目閉口合一家大哭豫曰勿哭吾固知有此病也乃命吾次子邦孝作調元湯加麥門冬濃煎汁斡開口少與咽之又令煮粥湯相間進之須臾平復如故元士曰神哉先生之術敢問何以預知有此豫曰正氣素弱邪氣方盛壯火食氣氣益弱矣今邪氣既退正氣將生乃否極泰來之兆所以戒勿擾亂待其自蘇人不知此意卒見悶絶便將抱動呼喚號哭神氣一散其不救者多矣時有二醫在側周醫云嚮者起病日犯太乙天符尚恐有變豫曰運氣之論岐黃之祕旨專論其年非謂起病日也況主客之氣勝復之變一歲之中難以預料豈可以是料病吉凶也信如爾言太乙天符日起病者凶然則太乙天符年有病者皆不可治也向醫曰尚有餘毒豫笑曰取錢氏小兒書來痘後餘毒有樣一者疥二者癰三者目赤未嘗言有昏瞀也蓋痘瘡或出不盡發不透靨不齊或空殼無水或清水非膿此則有餘毒也今此痘起發胖壯膿水飽滿有何餘毒哉一朝手足冷如冰蓋覆重加不得溫痘正盛時為逆症病今差後作虛論厥逆者痘疹逆候也若在正盛之時十無一生今病已愈氣血久虛脾胃大困宜有此厥逆也用調元湯十八加當歸身熟附子以主之咳嗽時多不得安更兼涕唾盡稠痰莫拘死局輕調理好把權宜用散丸此下皆毒在肺症也咳嗽者痘疹常症也有寒有熱有虛有實不可拘泥一定之法如自初出咳嗽到今未愈者此肺中餘邪未盡也宜甘桔湯七合瀉白散五十四加牛蒡子馬兜鈴主之如咳而熱大便難小便赤者此熱毒也宜黃芩瀉肺湯五十五主之大便潤者人參白虎湯二十四合甘桔湯七主之如咳而大便溏小便清無大熱渴者此虛也宜人參清膈散六十一主之如咳而血出者甘桔湯七加牛蒡子軟石膏茅根汁主之如向不咳今始咳者此風寒外感也麻黃湯六十七主之黃岡陶前墩子出痘將靨時咳嗽喘急吾子邦正醫用甘桔湯加牛蒡子麥門冬服之未效請豫視之豫謂邦正曰汝用方是此症肺有火邪火鬱宜發之即如前方去麥門冬加紫蘇地骨皮服一劑即效咳嗽之時兩脅疼陰陽左右被邪干不能升降多壅滯解毒平和病早安經云左右者陰陽之道路左右兩脅之謂也瘡疹後咳嗽脅疼由余毒在中陰陽之氣不能升降也脅居一身之左右陰陽二氣之所行也脅痛是氣不能升降之故但解毒毒氣去則真氣行所苦自平宜小柴胡加枳桔湯一三三服之未出腹疼斑毒攻而今解毒已無壅不因燥屎或傷食必是中虛要建中此毒在脾也疹瘡未出而腹痛者乃斑毒內攻也今毒已解無復壅遏腹中痛者一則因大便未通燥屎作痛備急丸九主之一則因食過多胃虛不能消穀腹痛者便祕丁香脾積丸三十三便利木香大安丸九十一主之但燥屎痛者病在下焦傷食痛者病在上焦手不可按若原食少大便常潤忽爾作痛此虛寒症也病在中焦用手按摩黃耆建中湯三十一主之餘毒留居心胃中膈焦咽燥渴來攻若是脾虛津液少自然形症不相同此毒在心胃也痘家作渴亦是常事如痘後不宜有渴忽然渴欲飲水心胃二經受邪熱故也其人必能食大便祕小便赤舌燥咽乾宜人參白虎湯二十四加黃連主之若食少大小便自調雖好飲湯咽舌不燥此脾胃虛津液不足也宜人參白朮散三十三不愈人參麥門冬散二十二加天花粉主之病後那堪猝失音語言不出意沉沉咽傷苦痛痰多結心熱留邪舌不榮此毒在腎也痘後失音有二咽痛不能言者此毒氣結於咽喉之間痰壅作痛而不能言天花散一三主之心熱不能言者心中邪熱未徹腎虛不能上接於陽雖有聲而不能言四物湯十九去川芎加麥冬白茯苓主之正氣將回食漸加緣何惡食卻堪訝不因食壅脾重因或食中虛病未差此下毒在脾經也痘後邪氣盡退正氣將復脾胃略舒宜漸能食也若原不食今日喜食太過或原能食今又驟加以致惡食不食者此皆內傷有餘症也宜木香大安丸九十一主之如向未食今猶不喜食者此脾胃中氣不足宜人參白朮散二十三去葛根加陳皮木香研末取二兩另用糯米二兩緑豆二兩各炒研末相和棗子湯調服稍能食更兼進養脾丸一六抱龍丸四十寒熱往來形似瘧不問早晚如期作只因調護少疏違故惹風寒相擊搏痘後忽發寒熱如瘧狀至後如期即發者此脾虛氣弱失於將息重感風寒宜先以柴葛桂枝湯八十五發去新受表邪後以調元湯十八加當歸陳皮白朮調之面目虛浮忽改形腹中脹滿喘聲頻邪風入肺疏通去宿垢傷脾解利行此毒在脾肺二經也痘後面目虛浮或久則一身皆腫者此表氣不足出風太早風邪乘虛而入其治在肺宜五皮湯一三四先加桂枝微汗之後只服本方若遍身皆腫以胃苓湯一三六合五皮湯一三四主之痘後腹虛腫脹滿或氣喘粗者此有宿垢在裡不問餘毒食積蓄水並宜先利之以塌氣丸一三五利後以胃苓湯一三六去甘草加人參黃耆大腹皮調之其治在脾如因新食作脹不腫者只木香大安丸九十一一小兒痘後洗浴面目一身盡腫請豫治豫曰此水氣也用四君子湯以補脾去濕加黃耆以實表防風以勝肌表之濕麻黃以逐皮間之水一服而腫減後以錢氏異功散加豬苓澤瀉調理而安漐漐渾身汗未休膚濡發潤亦堪憂衛中氣弱榮中熱若到亡陽治不瘳此毒在心也痘後自汗盜汗皆衛氣弱榮血熱肌肉虛也宜調元湯十八當歸六黃湯六十八相間並調敗蒲散七十服之如汗出甚再用溫粉撲法撲之六十九若渾身如水發潤者或汗出如珠者皆亡陽症不治血在身中怕妄行火邪迫血血離經鼻中衄出堪調理便溺中來禍非輕此毒在心肝二經也痘後失血症乃餘毒熱邪迫血妄行也自鼻出者玄參地黃湯六十五主之外用梔子炒焦黑研末吹之自溺出者八正散四十六主之自大便出者桃仁承氣湯一二主之此與上自汗症同為熱也上是熱在衛故汗出此是熱在榮故血出二症大便祕者並與四順清涼飲二十七主之蛔動如從吐利中必然腸胃熱邪沖若聞食臭蟲才出此症虛寒勿妄攻此毒在肝也痘後或吐蛔者皆熱毒入里也熱在胃則吐蛔熱在腸則利下蛔利者黃芩湯四十一加桃仁艾葉吐者黃芩半夏湯四十二加烏梅川椒若不吐利但聞食即吐蛔者此胃久虛蟲無所食故聞食臭即吐食已易飢宜理中湯丸三十四加烏梅肉黃連川椒主之狐惑之症聲啞嗄唇口生瘡誠可訝齦根潰爛疳蝕瘡息臭血出名走馬此毒在腎也痘後吐利蛔出者此蟲為熱所蒸而為蛔厥若不吐利內蝕臟腑者為狐惑狐惑之症其人好睡默默不欲食上唇有瘡蟲蝕其肝下唇有瘡蟲食其臟其聲啞嗄上下不定故名狐惑此候最惡麻疹後尤多化𧈟丸一三九主之如大便結者以桃仁承氣湯一二加槐子利之或只牙齒齦肉潰爛者此痘疕脫去痰水浸漬為疳蝕瘡用綿繭散一二五敷之若氣臭血出者又名走馬疳瘡內以黃連解毒湯八十九加雄黃為丸竹葉湯下外以馬鳴散敷之一三八或口舌生瘡者並宜洗心散一三七已上諸症大便祕者並用四順飲二十七利之痘後宜行解利良勿令熱毒得為殃若逢餘毒為諸症緩藥安能得早康痘疹後須當解利勿使餘毒或在表或在裡變生諸症也解利之劑如三黃丸八四順飲二十七之類若失於解利致生諸症須當用切中病源之藥急治之不可緩恐令病勢滋蔓反害人也今人不能究其病因一概用不急之藥如四君子之類其意但欲逃差謬耳何嘗實能究其致病之由而藥之耶急治之中惟在識其虛實苟稟受既實榮衛充壯病後有熱者即與解利緩治不可也所稟怯弱病後榮衛大虛坐立振搖飲食少者卻宜和緩之藥以扶持之候其飲食如故榮衛既充然後微微解利未為之晚或至虛之人不必解利可也能醫惡瘡是良工不宜怪異及虛驚若然乍見成凶兆枉請師巫禱鬼神禎祥者福之基妖孽者禍之萌出痘之家最宜內外肅靜大吉之兆也若有鴉鳴鼠鬧虛響火光蝙蝠入室蔥蒜撲人夜生怪夢病見死人是皆不祥之兆也苟非積善之家方興之世鮮能免其禍者矣胡松山子出痘在母黃氏懷中半夜後此兒卻在地下肖楚梧子出痘日中時忽聞一陳蒜氣過胡三溪子出痘有鴉日日聒噪胡叔卿子出痘近夜時樓上忽聞桌倒聲視之無他王來樓子出痘有蝙蝠飛入室後皆凶
