body:
  text: 卷之二十疹毒症治歌括凡二十六首疹為胎毒發於心肺與相連熱毒侵咳嗽鼻中清涕出且觀雙目淚盈盈痘疹皆胎毒所發毒者火也故痘子大而掀腫者少陽三焦火也陽道常饒故大而腫疹子小而碎密者少陰心火也陰道常乏故小而密三焦水穀之道路脾胃主納水穀治痘專以脾胃為主心肺屬陽而位乎上心火旺則肺受之治疹先以肺為主觀其咳嗽者火炎則肺葉焦舉也鼻流清涕者鼻為肺之竅以火爍金而液自流也目中淚出者肺熱則移於肝肝之竅在目也或手掐眉目唇鼻及面者肺熱症也凡遇冬溫最不祥民多疫癘發瘡瘍或逢斑疹相傳候可用湯丸最解良春溫夏暑秋清冬寒此四時之主氣也冬應寒而反溫陽氣暴泄火令早行人感之者至於來春必生瘡疥未出痘疹者必感而出雖曰胎毒未有不由天行者故一時傳染大小相似但見痘疹之出宜先服消毒保嬰丹十三代天宣化丸十二以預解之可使毒散不為已甚也斑疹須明歲氣先勿輕汗下作傷寒察人虛實施方法莫犯天和損壽元痘瘡之症其初發熱與傷寒相似但疹子則面頰赤咳嗽噴嚏鼻流清涕目中淚出呵欠喜睡或吐瀉或手掐眉目鼻面宜用升麻葛根湯一不可作傷寒妄用汗下也汗之則增其熱為衄為咳血為口瘡咽痛為目赤痛為煩躁為大小便不通下之則虛其里為滑泄為帶下經曰必先歲氣毋伐天和言不可妄汗下也如手足稍微冷惡寒而無汗面色青慘而不舒左額有青紋者傷寒之熱也手足稍微溫發熱有汗面赤而光者傷風之熱也並宜惺惺散一一四發散之目胞腫而右頰有青筋發熱而頭額腹肚最甚或兼嘔吐腹疼者傷食之熱也備急丸九下之面色青紅額正中有紋手掌心有汗時作驚惕手絡脈微動而發熱者此驚熱也瀉青丸一一牛黃清心丸三十六主之身熱而倍能食唇紅頰赤大小便祕脅下汗者此風熱也宜宣風散九十二已上諸熱久而不去內外感發則所蘊瘡疹之毒亦能乘間而出矣疹喜清涼痘喜溫能知疹痘不同論疹苗痘實無人解謹始慮終用意斟疹喜清涼痘喜溫暖此法人皆知之然疹子初出亦須和暖則易出所以發苗之初只要發出得盡則毒便解若痘必苗而秀秀而實而後毒解也痘子成實之時若太溫熱則反潰爛不收是痘之後亦喜清涼也故治痘疹者無過熱無過寒溫涼適宜陰陽自和是為得之疹毒從來解在初出形毒解卻無憂腹中脹痛邪猶伏喘促昏沉命必殂疹子只怕不能得出若出盡則毒便解故治疹子者發熱之時當察時令寒暄以藥發之如時太寒以桂枝葛根湯五發之太熱以升麻葛根湯一合人參白虎湯二十四發之不寒不熱以荊防敗毒散七十一發之如兼疫癘之氣以人參敗毒散二發之如盡一劑不出再作本湯發之外用胡荽湯七十四以苧麻蘸酒遍身戛之務令亟出如三四作更不出加腹中脹痛氣上喘促昏悶譫妄者必死症也邑人胡道松四歲病疹先請甘大文視之三日疹不出煩躁甚乃請豫文又作荊防敗毒散豫止之曰此皆發熱之藥無解毒之用況天大熱又無時令之藥一二味在內則陽愈勝陰愈虧陰陽不和此疹所以不出也吾作東垣涼膈散加玄參升麻一服疹出三日起過期不出勢淹延毒伏身中出現難急用透肌休怠玩豈堪臟腑受熬煎發熱六七日已後明是疹子卻不見出此皮膚堅厚腠理閉密又或為風寒襲之曾有吐利乃伏也急用托裡發表之劑麻黃湯六十七去杏仁加蟬蛻升麻外用胡荽酒七十四散麻刮之如一向未更衣者毒甚於里伏而不出河間涼膈散加牛蒡子一四七主之發之解之再不出者死症也甘大文從吾學醫長男發熱豫見之曰疹也三日不出身涼神倦坐臥不寧豫謂大文曰汝子疹毒不出外涼內熱毒火內伏故煩而坐臥不安也不急治且危文泣求醫豫乃用葛根湯加麻黃石膏以發之一服疹盡出色白不紅豫曰此血虛也用四物湯加防風一服色變紅遂愈蒸蒸發熱咳聲頻目脹面浮氣上行坐臥不安痰唾少肺焦葉舉熱邪蒸疹子初發熱時未見出現咳嗽百十聲不已上氣喘急面浮目胞腫時臥時起此毒火內蒸肺葉焦舉宜甘桔湯七合人參白虎湯二十四去人參加牛蒡子薄荷葉主之火熱熏蒸汗潤身毒邪並迫血違經汗多衛表邪從散血去榮中毒少輕疹子發熱或自汗出或鼻衄者不須止之亦發散之義故汗者毒從汗散衄者毒從衄解但不可太過如汗太多人參白虎湯二十四合黃連解毒湯八十九主之衄太多玄參地黃主之六十五發熱之時吐利並任他所出不須驚胞胎蓄毒從今解腸胃停汙自此清疹子發熱吐利純是熱症不可作寒論乃火邪內迫上焦出吐下焦多利中焦吐利並多自利宜黃芩湯四十一吐利宜黃芩加半夏湯四十二自利裡急後重者宜黃連解毒湯八十九合天水散九十四主之毒火熏蒸氣上炎咽喉自此正煩疼從來痘疹多咽痛莫作尋常喉痹看痘疹咽痛亦是常候乃毒火上熏而痛也勿作喉痹同論妄用針刺喉痹內作癰腫故宜針決去惡血痘疹只是咽乾作痛宜甘桔湯七加牛蒡子或射干鼠黏子湯六十細細咽之痘疹如焚引水饒炎邪未許一杯澆咽喉乾燥心家熱津液枯虛胃脘焦疹子渴喜飲水純是火邪肺焦胃干心火內亢故也初發熱渴者升麻葛根湯一加天花粉麥門冬渴甚者人參白虎湯二十四合黃連解毒湯八十九主之一齊湧下莫驚惶頃刻渾身朱錦裝似痘出時隨又沒如斑紅處卻成瘡痘瘡貴三四次出謂出勻麻瘡貴一齊湧出謂出盡麻子只要得出便輕減以火照之遍身如塗朱之狀此將出之兆出形細密與痘瘡密者相似但疹子粒粒成瘡非若斑之皮紅在片如蚊咬之迹也痘瘡赤豔癢來攻疹子紅鮮毒得松白疹血虛猶可療黑斑候惡莫相逢疹痘之色不可同論大抵痘怕太紅皮嫩易破必生瘙癢疹喜通紅疹發於心紅者火之正色也若疹色淡白者心血不足養血化斑湯一四一主之色太紅焰或微紫者血熱也或出太甚者並宜大青湯一四一主之黑者死症也疹子出沒合陰陽出以溫和沒以涼連出不收陽氣盛遲遲間出是陰強疹子出沒常以六時為準假如子後出午時即收午後出者子時即收乃陽生陰成陰生陽成造化自然之數也凡此旋出旋收者輕若一出連綿三四日不收者乃陽毒太盛宜大青湯一四一解之逡巡不出者乃風寒外束皮膚閉密也宜荊防敗毒散七十一疹出渾身似火燒毒邪壅甚急難消解肌只許皮膚暖救里宜令便溺調瘡疹非熱不出疹子欲出則遍身發熱或煩躁或頭眩或身拘急及既出則身便涼諸病悉解此一層疹子隨收矣如疹子既出熱甚不減此毒壅遏宜大青湯解其表一四一便澀者以黃連解毒湯八十九合化斑湯二十四或大連翹湯八十八解其里大便不通者河間涼膈散加牛蒡子一四七疹瘡出盡得安寧邪未盡時氣未平拂拂熱煩邪尚熾頻頻嘔泄毒猶蒸凡疹子只要出得盡則毒邪解散正氣和平如拂拂發熱煩悶不寧如蛇在灰如蚓在塵之狀或嘔吐或注泄此毒邪壅遏尚未出盡煩熱者黃連解毒湯八十九嘔泄者柴胡橘皮湯一四二並外用胡荽酒七十四以苧麻蘸酒遍身戛之待疹出盡則煩熱自出嘔泄自止矣疹毒餘邪最作殃幾經惡候致張皇時行癘氣傳相似疫鬼勾魂赴北邙疹子欲出未出之時宜早發散以解其毒則無餘災若不預解使之盡出以致毒蓄於中或為壯熱日久枯瘁或成驚癇或為泄痢或咳血喘促或作疳蟲而死此雖一時癘氣之染未有不由於人事之未盡者疹後流連熱不除蒸蒸烙手發毛枯肉消骨立成疳瘦得遇良工病可蘇疹子收後身有微熱者此虛熱也不須施治待氣血和暢自然退去若熱太甚或日久不減以柴胡麥門冬散五十七甚則以黃連解毒湯八十九合人參白虎湯二十四與前方相間服之如發枯毛豎肉消骨立漸漸羸瘦者柴胡四物湯一四三主之發熱無休神漸昏忽然瘈瘲事堪驚莫將風癇同調治小便宜多患早寧疹後熱不除忽作搐者不可與急驚風同論用導赤散三十五加人參麥門冬送服安神丸四十七小便清者可治短少者不可治宜抱龍丸四十疹毒流殃走馬瘡牙齦潰爛食難嘗唇瘡聲啞成狐惑漏頰穿喉旦夕亡凡疹後牙根黑爛肉腐血出臭息沖人者曰走馬疳馬鳴散一三八主之若面頰浮腫環口青黑頰漏齒脫唇崩鼻壞者死症也如唇口多瘡其聲嗄啞者曰狐惑以化𧈟丸一三九主之更煩躁昏悶失聲者死症也疹毒漸成休息痢晝夜不停多窘急勿輕劫澀圖霸功切忌噤口成惡疾疹後泄利日久不已者曰休息痢不可妄施澀劑以成霸功宜黃芩湯四十一合天水散九十四與香橘丸五十相間治之若嘔吐不能食者多噤口更腸滑不止或下鮮血或如塵水者皆死症也鄖陽楊舉人子疹後利下鮮血豫授一方用當歸梢生地黃白芍藥條芩炒黃連炒人參生甘草枳殼烏梅肉調理而愈時郡中出疹但病利血者楊公授此方皆效疹後連綿上氣咳發作百聲終不歇胸高肩息目虛浮擺手搖頭泉下客疹子收後微咳者此肺氣未平也不須調治若咳轉甚喘氣逆氣發則連綿不已者此肺中伏火金虛葉焦故咳也宜人參清膈散六十一主之身熱者麥門冬清肺湯一四四主之若咳久不止面浮目胞腫胸高而喘息則聳肩血自口鼻出面色青或赤鼻燥昏悶搖頭擺手者皆死症也郡人周小川族人一小女疹後咳嗽失聲豫授一方以甘桔湯加炒牛蒡子炒枯芩天花粉作散薄荷葉湯調再煎一沸服之愈疹家禁忌法須防鹽醋雞魚不可嘗欲莫從心終是福物多爽口定為殃疹家通禁雞魚炙煿鹽醋之類直過七七之後方可食之惟宜食淡不可縱口致生他疾也瘡疹收還幸平復飲食如常無臲卼心腹絞痛忽傾亡還是氣虛中惡毒曾見痘疹收後動止出入飲食如常忽然心腹絞痛而死者還是元氣怯弱乘以疫癘之氣正不能勝邪伏於中外若無病內已虧損故一中而死謂之中惡嬰稚初離胎殼中遍身斑駁似硃紅胎中熱毒皮中現莫作時行斑疹同凡小兒初生未滿月者遍身紅點俗呼奶麻子是也此由胎中受熱故生下發見於皮膚不可作時行疹子論妄用湯劑蓋臟腑嬌脆氣血怯弱不能勝湯丸也宜用溯源解毒湯一八與乳母服之發熱蒸蒸便已硬皮紅似錦是名斑莫將疹毒雷同論笑煞時人醜類看凡天行若病大便硬結熱留胃中故發斑不可以疹子同治妄用發散之劑反增危劇宜人參白虎湯二十四去人參加大青玄參生地黃主之大便祕者以三黃丸八微利之
