body:
  text: 卷之二十一婦人痘疹症治歌括凡一十二首婦人痘疹最難醫陰質從來血已虧待得疹瘡將發日只愁天癸有當期正理論云嬰兒女子益以滋甚以女人陰質血常不足也痘疹始終以氣血為主一或不足則變生焉故女子十四已後有出瘡疹者常恐天癸之行血走氣虛而成陷伏也發熱經行非正時火邪迫血血奔馳急須涼血停為美莫待中虛悔卻遲痘疹發熱經水忽行卻非天癸之期此毒火內蘊擾亂血海迫經妄行月事不以時下以玄參地黃湯六十五或四物湯十九合黃連解毒湯八十九以涼血為主必欲其止如久不止中氣虛弱致生陷伏者有之發熱期逢經水行毒邪行解免煩蒸過期不止須當慮補氣溫經令出勻發熱之時經水適來如期此積汙得去毒亦輕解不須治之若過四五日猶不止者此熱邪乘血室之虛迫血妄行宜先服小柴胡加生地黃湯一二九以清血室之熱後用十全大補湯三十八以補氣血之虛令其出勻易發易靨也發熱適逢經水斷血室空虛防他變若然譫妄神不清熱入血宮治勿緩發熱之時經水適斷宜早服柴胡四物湯一四三加桂枝以防血室空虛毒邪乘虛而亦致生他疾也若已增寒壯熱神識不清妄誕見聞言語錯亂此為熱入血室血室者衝脈是也肝主之肝藏血肝為血海天癸之後血室既空熱乘而入宜四物湯十九合導赤散三十五加麥門冬與安神丸四十七相間服之女子居經日已賒豈堪瘡疹病來加卻愁血海停汙垢更怕胞門伏毒邪女子經閉謂之居經滿而不瀉病在心脾經云二陽之病發心脾女子不月瘡疹之毒屬於心又以脾為主心脾先病血室不行衝任之間已多積垢一旦瘡疹之火鬱於命門胞戶之中當出不出毒邪留伏致生乖戾者有之故發熱之初即當滌除停垢桃仁承氣湯一二主之後以四物湯十九合勻氣散十三加紅花木通治之崩漏無時血已枯瀉而不滿臟中虛豈堪當此天行病濟弱扶危救幻軀女子一向崩漏未止氣血已虛若當天行瘡疹必不能任其毒惟宜大補氣血為主十全大補湯三十八瘡出灰白平陷難發難靨者更加熟附子一二片起發疱漿忽動經血虛氣弱事堪驚食多氣壯無他慮不用須防陷伏臨痘子出現已後最宜表裡俱實飲食能多若當起發疱漿之時天癸忽動人但知恐被穢氣觸動正氣不知自身之血不足為靨但血出而氣亦虛毒邪乘虛陷入於裡惟元氣素壯又能食者必無是變如氣虛食少之人未有不成陷伏者宜十全大補湯主之三十八虛甚加熟附子經行暴喑猝無音血出津枯舌不榮養血通心言語出一朝身價重千金女子種痘經水忽行暴喑不能言語者心主血舌乃心之苗血去則心虛心虛則少陰之脈不能上榮於舌故猝失音不語也先以當歸養心湯一四五養心血利心竅待其能言以十全大補湯三十八調之月事如行變壞瘡內虛陷伏已乖常藥靈中病終須吉症逆違師倏忽亡月事大行其瘡不起發不光壯不飽滿不紅活頂平陷色灰白或青乾黑陷者此裡虛之候瘡復陷入也宜十全大補湯三十八奪命丹十七相間服之其瘡胖脹紅綻或瘡空中再出一番者大吉之兆若加腹脹喘促譫妄悶亂寒顫咬牙手足厥逆者必死也妊娠瘡疹治應難惟有安胎法最先不可令胎輕觸動胎元觸動命將殘孕婦出痘始終以安胎為主不可犯動其胎其初發熱以參蘇飲三發之瘡出現後多服安胎飲為佳一百四十六渴者人參白朮散二十三泄者黃芩湯四十一合四君子湯二十加訶子色灰白起發收較遲者十全大補湯三十八去桂邑文學程文達一女年二十出痘且有娠五月矣請予治之診其脈男胎也惟以清熱解毒和中安胎為主乃用黃芩白朮為君人參生甘草當歸身生地黃白芍藥紫蘇葉佐之自初出至成漿無他苦予聞家中被盜而歸適有蘄水郭醫至進藥一服胎墮果男胎也亟請予至痘變灰白平塌成倒陷也裡虛故耳詢所用方乃獨聖散予曰噫穿山甲麝香皆墮胎藥胎去氣血益虛瘡毒內陷不可救也遂辭歸三日卒瘡正甚時正臨產幾人束手功莫展滌除惡露相時行補益元神休忌憚孕婦出痘正當甚時忽臨正產蓐者只以大補氣血為主十全大補湯三十八若腹中微痛此惡露未盡也宜去之四物湯十九用熟地黃去芍藥加乾薑桂心木香黑豆產後如逢出疹瘡此時胎去免憂惶只憑補益收功效莫犯寒涼生氣傷婦人產後出痘瘡者只以大補氣血為主十全大補湯三十八白芍藥用桂酒炒用不可妄用寒涼恐損發生之氣
