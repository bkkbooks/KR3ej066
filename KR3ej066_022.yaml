body:
  text: 卷之二十二古今經驗諸方凡八十五方一升麻葛根湯解發痘疹之良方葛根升麻白芍藥甘草各等分上銼細片水一盞煎七分去滓溫服無時二人參敗毒散解疫癘發痘疹之良方又主腰痛四時通用羌活獨活前胡柴胡川芎白茯苓枳殼桔梗人參各等分甘草減半上銼細末加生薑三片水盞半煎一盞去滓溫服無時一方加薄荷少許附方柴葛敗毒散疑似傷寒以此解發柴胡葛根人參羌活防風紫蘇葉荊芥桔梗甘草生薑三片水煎服附方香蘇散毒散疑是傷食以此解發香附子紫蘇葉蒼朮厚朴青皮甘草山楂肉生薑一片水煎服附方升陽散火湯升麻葛根獨活羌活防風柴胡人參甘草赤芍藥水煎服三參蘇飲解發痘瘡之良方人參三分紫蘇葉桔梗乾薑前胡各四分陳皮茯苓各五分枳殼三分半半夏二分木香一分半上銼細末加生薑三片水一盞煎七分去滓溫服無時四雙解散即防風通聖散益元散二方也痘瘡表裡俱實非此不解防風川芎當歸白芍藥大黃薄荷葉連翹各五分石膏桔梗黃芩各八分白朮桂枝荊芥穗各三分滑石二錢四分甘草一錢上銼細末加生薑三片水二盞煎一盞去滓溫服無時五桂枝葛根湯葛根桂枝赤芍藥升麻防風甘草各一錢上銼細末加生薑三片淡豆豉一錢水一盞煎七分去滓溫服無時六連翹升麻湯連翹二錢升麻葛根桔梗甘草各七分白芍藥五分薄荷葉少許上銼細末加淡竹葉燈心水盞半煎一盞去滓溫服無時七甘桔湯解咽喉之良方甘草二錢桔梗一錢上銼細末水一盞煎七分去滓食後溫服附方甘桔清金散治肺熱聲不清響者桔梗一兩甘草五錢牛蒡子炒七錢連翹去心五錢訶子皮五錢共為細末每服一錢薄荷葉少許同煎服八三黃丸解毒裡實者可用黃芩五錢黃連大黃各二錢半上為細末雪水搗丸緑豆大硃砂為衣每服五七丸食前燈心湯下九備急丸木香二錢半大黃牽牛末各五錢上為細末神麯糊丸緑豆大每服五七丸食前山楂煎湯下十羌活湯解發痘瘡兼治肝熱羌活川芎防風山梔仁龍膽草當歸各等分甘草減半上銼細末加薄荷葉少許淡竹葉水一盞煎七分去渣溫服無時十一消毒保嬰丹纏豆藤或黃豆緑豆根上纏繞細紅絲者於八月福生生𪸓日採之陰乾聽用一兩五錢黑大豆三十粒赤小豆七十粒新升麻七錢半山楂肉一兩荊芥連穗五錢防風去蘆五錢生地黃酒浸焙一兩川獨活五錢甘草生五錢當歸酒洗五錢赤芍藥七錢半黃連去枝梗五錢桔梗五錢辰砂另研水飛一兩牛蒡子炒一兩老絲瓜隔年經霜者取連藤蒂五寸燒存性二個上十七味各研細末和勻用淨沙糖拌丸如李核大每服一丸濃煎甘草湯化下其藥味味預備須待春分秋分或正月十五日七月十五日十月十五日灑掃靜室至成修合忌婦人並孝服人貓犬見之合畢焚香叩齒日出時望東吸氣一口吹布藥上向太陽密咒曰神仙真藥體合自然嬰兒吞服天地齊年吾今奉太上老君急急如律令敕一氣七遍十二代天宣化丸即韓氏醫通五瘟丹甘草甲巳年為君土黃芩乙庚年為君金黃柏丙辛年為君水山梔丁壬年為君木黃連戊癸年為君金連翹佐山豆根佐牛蒡子佐先視其年所屬者為君次四味為臣君藥倍用臣藥減半佐視臣又減半共為細末於冬至日修合取雪水煮升麻汁打麵糊為丸辰砂為衣淡竹葉煎湯下嘉靖甲午春痘毒流行病死者十有八九乃一厄也時有預服三豆子湯絲瓜辰砂散者凡方書所載預解痘毒之法靡不用之未見效者豫竊思痘疹疫癘之毒因歲運災眚之變難以藥解而人事未盡又不可諉之天數也於是檢閲上方乃於韓氏醫通得五瘟丹以五運為主喜曰此解毒神藥也依方修合施售與人但服之者莫不輕疏人皆神之因命之曰代天宣化丸十三勻氣散木香青皮各五錢山楂肉二錢半上為細末每服一錢甘草湯調服十四活血散即芎歸湯當歸川芎各等分上為細末每服一錢紅花湯調下十五快斑湯治起發遲人參五分當歸防風木通各一錢甘草三分木香紫草蟬蛻各二分上銼細末水一盞煎七分去渣溫服無時十六消毒飲解痘毒牛蒡子連翹甘草緑升麻山豆根紫草各等分上銼細片水一盞煎七分去渣溫服不拘時十七奪命丹麻黃酒蜜炒焦升麻各三錢山豆根紅花子大力子連翹各二錢半蟬蛻紫草人中黃各三錢上研細末酒蜜和丸辰砂為衣薄荷葉煎湯下附方神應奪命丹辰砂擇牆壁鏡面者白紗囊盛之用升麻麻黃紫草連翹四味同紗囊放沙罐內入新汲水以桑柴火煮一晝夜取出辰砂研細仍將煮砂藥汁重紙濾去渣水飛取末待乾聽用二錢麻黃不去根節酒蜜拌炒焦黑色八分蟬蛻水洗淨去足翅三分紫草酒洗五分紅花子五分穿山甲酒炙拌五分真蟾酥三分上藥共研細末用醋酒拌丸分作十粒周歲者半丸二歲者一丸服至三丸熱酒化服厚蓋取汗汗出痘隨出也擇天醫生𪸓日修合此方與三酥餅同十八調元湯即保元湯痘科良方氣壯實者不宜人參二錢黃耆三錢甘草一錢上銼細加生薑一片水一盞半煎一盞去渣溫服不拘時十九四物湯養血當歸川芎芍藥地黃上銼細片水一盞煎七分去渣溫服無時二十四君子湯補氣人參白朮茯苓甘草上銼細末水一盞煎七分去渣溫服不拘時二十一葛根解毒湯痘中止渴良方葛粉天花粉麥門冬生地黃升麻各等分甘草減半上銼細片取糯米泔水一盞煎七分去渣入茅根自然汁一合服之二十二人參麥門冬散治痘中渴麥門冬葛粉各二錢人參甘草升麻各等分白朮上銼細片加糯米一合淡竹葉七片水一盞煎米熟去滓溫服二十三人參白朮散又名參苓白朮散治痘泄渴人參白朮藿香木香甘草白茯苓各一錢乾薑二錢上銼細加生薑一片水一盞煎七分去渣溫服無時二十四人參白虎湯又名化斑湯解斑疹良方人參一錢知母三錢甘草一錢石膏五錢糯米一合上銼細水二盞煎待米熟去渣溫服無時二十五陳氏木香散治虛寒證純陰無陽者木香大腹皮人參肉桂半夏青皮炒赤茯苓前胡訶子肉煨炙甘草丁香各等分上銼細加薑一錢三分水一盞煎如虛加黃耆等分糯米一撮同煎二十六陳氏異功散治虛寒症純陰無陽者木香當歸茯苓各三錢半肉桂二錢人參陳皮肉豆蔻丁香半夏各二錢半白朮厚朴附子各一錢半上銼細每服三錢加生薑三片棗二枚煎先服去附子亦可若裡虛瀉甚又不可無附子量兒歲數加減服之四十七四順清涼飲治裡熱症大便結當歸白芍藥大黃甘草上銼細片水一盞煎七分去渣食前服二十八五苓散治表裡有熱小便不利澤瀉一錢半白朮赤茯苓豬苓各一錢肉桂五分上銼細加生薑一片棗一枚水一盞煎七分去渣溫服二十九桂枝大黃湯治腹痛大便不通良方桂枝白芍藥各二錢半甘草五分大黃一錢半上銼細薑一片水一盞半煎一盞去渣食前溫服三十三乙承氣湯治實熱症純陽無陰者大黃厚朴枳實各一錢升麻五分上銼細水一盞加薑一片煎七分去渣食前服三十一黃耆建中湯治裡虛腹中痛黃耆人參桔梗白芍藥甘草各等分上銼細加薑三片棗二枚水一盞煎五分去渣溫服三十二化毒湯治痘未出腹痛者肉桂五分白芍藥甘草各一錢青皮木香枳殼各七分山楂肉連翹各五分上銼細水一盞煎七分去渣溫服不拘時三十三丁香脾積丸治痘中傷食三稜去毛醋浸煨莪朮去皮加土製各五錢丁香木香各五錢青皮去穰烏梅燒存性豬牙皂燒存性各三錢巴豆去殼取肉四十九粒上為細末醋調神麯糊為丸如緑豆大每服五七丸原物湯送下三十四理中湯丸治虛寒人參白朮甘草乾薑各等分上銼細水二盞煎一盞去渣溫服若欲為丸研細末煉蜜為丸如彈子大每服一丸白湯送下三十五導赤散治心熱發搐生地黃木通甘草炙各等分上銼細加淡竹葉七片水一盞煎七分去渣溫服一方加人參麥冬附方導赤通氣治心虛聲不揚者木通生地黃甘草人參麥門冬石菖蒲當歸身燈心作引水煎服三十六牛黃清心丸治心熱神昏黃連生五錢黃芩山梔仁各三錢鬱金二錢辰砂一錢半牛黃二分半共研細末臘雪調麵糊丸如黍米大每服七八丸燈心湯下三十七十宣散一名十奇散一名托裡十補散治痘癰黃耆人參當歸各二錢厚朴桔梗川芎防風甘草白芷各一錢桂心三分上為細末每服一錢或二錢木香湯調下附方真人解毒湯治痘母忍冬花半斤甘草節一兩木通防風連翹各三錢分作三劑用酒水各半煎服以腫消痘出為度三十八十全大補湯補養氣血痘科良方黃耆人參當歸白芍藥白朮生地黃白茯苓各一錢川芎甘草各五分官桂三分上銼細加薑三片棗一枚水一盞半煎一盞去渣溫服不拘時三十九寧神湯人參當歸身生地黃麥門冬各一錢山梔仁甘草炙黃連炒各五錢石菖蒲三分辰砂末一分上銼細加燈心半錢水一盞煎七分去滓調辰砂末攪勻食後溫服四十抱龍丸又名琥珀抱龍丸治痘驚真琥珀天竺黃白檀香人參白茯苓各一兩半粉草去節三兩枳殼麵炒枳實麵炒各一兩辰砂水飛五錢山藥去黑炒熟一斤牛膽南星一兩金箔一百片各取細末再篩和勻每藥一兩取新吸水一兩重入乳鉢內杵勻丸如皂角子大陰乾勿用日曬則燥裂矣每服一丸薄荷煎湯化下四十一黃芩湯治協熱而利黃芩一錢半甘草炙一錢白芍藥六錢上銼細加大棗二枚水一盞煎七分食前溫服四十二黃芩加半夏湯即前黃芩湯內加半夏二錢生薑一錢四十三肉豆蔻丸治協寒而利木香砂仁白龍骨訶黎勒各五錢赤石脂白枯礬各七錢半肉豆蔻五錢上為末麵糊丸黍子大一歲服三五十丸米飲湯下四十四錢氏異功散補脾胃人參白茯苓白朮甘草陳皮各等分上為末每服二錢生薑五片棗二枚水一盞煎七分去渣食前服四十五益黃散補脾虛寒陳皮一兩青皮訶子肉甘草炙各五錢丁香一錢共為末每服二錢水一盞煎六分去渣服四十六八正散大小便不通滑石瞿麥大黃木通萹蓄車前子梔子仁各一錢甘草五分上銼細加燈心一錢水一盞煎七分食前服四十七安神丸黃連當歸身麥門冬白茯苓甘草各半兩硃砂一兩龍腦二分半上為末湯浸蒸餅和獖豬心血搗勻丸黍米大每服十丸燈心湯下四十八茱連散治乾嘔黃連半兩吳茱萸二錢青竹茹一團上二味同炒研細末每服半錢生薑湯調服四十九橘皮湯橘皮半留白半去白炒二錢半夏一錢白茯苓一錢半上銼細加薑五片水一盞煎七分去渣服五十香連丸一名香橘丸黃連以吳茱萸五錢同炒去吳茱萸不用一兩木香半兩石蓮子肉二錢半陳皮半兩上為細末醋調神麯糊為丸如麻子大每服二三十丸陳倉米湯下五十一膽導法此通大便祕結之良法也不損中氣強如用藥用大豬膽一枚以鵝翎筒兩頭截齊一頭入膽中錢牢扎定吹令氣滿納入穀道中直待氣通取去又豬胞導法用豬尿胞一個以竹管插放胞口中吸起又取豬膽汁生蜜清油各半杯攪勻灌入胞中又吹起以線扎定如上膽導法尤捷此因治余先庭新立法也五十二百祥丸一名南陽丸紅牙大戟不拘多少漿水煮極軟去骨日中曬乾復內原汁中煮汁盡焙乾為末水丸如粟米大每服一二十丸研末芝麻湯下五十三牛李膏一名必勝膏牛李子不拘多少取汁石器中熬成膏牛李子野生道邊至秋結實黑丸成穗每服皂子大煎杏膠湯化下此上二方治痘瘡黑陷便祕裡實症五十四瀉白散又名瀉肺散治肺熱而喘桑白皮地骨皮各一兩甘草炒半兩上為末每服一二錢加粳米一百粒水一盞煎六分食後服五十五黃芩瀉肺湯治肺熱裡實症黃芩梔子枳殼甘草炙薄荷連翹杏仁去皮尖大黃桔梗炒水煎食後服五十六前胡枳殼湯前胡枳殼茯苓大黃甘草各五錢上銼細每服三錢水煎如身溫脈微瀉者勿服五十七柴胡麥門冬散柴胡五分龍膽草三分麥門冬分分甘草二分人參玄參各五分上銼細水煎服五十八葛根麥門冬散治斑疹毒大熱而渴乾葛麥門冬各半錢石膏升麻赤芍藥甘草茯苓人參各五分上銼細加淡竹葉七片水一盞煎七分去渣服五十九生地黃散治斑疹肺熱喘咳生地黃一錢麥門冬五分杏仁款冬花陳皮各八分甘草上銼細水煎服一方加桔梗五分六十射干鼠黏子湯治咽喉痛鼠黏子炒香四兩甘草升麻射干各一兩上銼細片每服二錢水一盞煎服六十一人參清膈散治肺熱鼻乾涕唾稠黏人參柴胡當歸白芍藥知母桑白皮白朮紫菀茯苓黃耆炙甘草地骨皮桔梗各五分黃芩二分半石膏七分滑石七分半上銼細加薑三片水一盞煎七分食後服六十二仙聖散治痘疹不起發因內實者紫草木通甘草黃耆炙枳殼各等分上銼細加糯米一百粒水一盞煎待米熟去渣服六十三紫草飲治痘疹黑陷不起紫草芍藥麻黃當歸甘草各等分上銼細水一盞煎不拘時服六十四加味四聖散治痘瘡黑陷倒陷紫草木通木香黃耆炙川芎甘草人參各等分蟬蛻十個上銼細加糯米一百粒水一盞煎服六十五玄參地黃湯治痘疹衄玄參生地黃牡丹皮梔子仁甘草升麻各一錢半白芍藥一錢上銼細加炒蒲黃半錢水一盞煎七分去渣服六十六神應膏護目方黃柏一兩真緑粉一兩半甘草四兩紅花二兩上為末用胭脂水和蜜水調塗兩眼四畔之瘡痘上六十七麻黃湯麻黃杏仁甘草各等分石膏倍用上銼細加臘茶葉一錢水一盞煎七分去渣不拘時服又方去石膏加桑白皮附方清金散火湯此上二方治痘疹初發熱而喘麻黃炒蘇葉桔梗甘草牛蒡子炒水煎服如腹脹加川厚朴大腹皮大小便祕加葶藶炒梔子仁炒六十八當歸六黃湯治自汗盜汗當歸生地黃熟地黃黃耆炙各一錢黃芩黃連黃柏各五分上銼細水一盞煎服六十九溫粉撲法治汗出太多不止黃連牡蠣粉貝母各半兩粳米粉一升上為細末敷於身上七十敗蒲散又名止汗散止汗用敗蒲扇燒灰每服三錢溫酒調服不拘時七十一荊防敗毒散治痘疹之發散藥也柴胡甘草人參桔梗川芎荊芥穗茯苓枳殼前胡羌活獨活防風各等分上銼細加薄荷五葉水一盞煎七分去渣溫服七十二四聖散凡痘不起發變異而痛者痘疔也一名鬼症此下二方治痘疔緑豆豌豆俱燒存性各四十九粒珍珠一分油頭髮燒存性一分上為末胭脂汁調先以銀簪撥開黑瘡此塗之附方治痘疔雄黃一錢紫草三錢上為細末胭脂汁調銀簪挑破黑疔入藥在內七十三無價散治黑陷疫毒良方用人貓豬犬糞臘月內燒為灰沙糖水調服七十四胡荽酒治倒陷胡荽四兩切以好酒二盞煎一二沸入胡荽用物蓋定再煎勿令泄氣放冷每吸一口微噴從背至足遍勿噴頭面病人常令聞荽氣七十五水楊湯治倒陷良方水楊即忍冬藤也春冬用枝秋夏用枝葉銼斷用長流水一大釜煎六七沸先將三分中一分置浴盆內以手試不甚熱亦不可太溫先服宜用湯藥然後浴洗漸漸添湯以痘起發光壯為度無次數七十六胭脂塗法治黑痘良方先以升麻一味煎濃湯去渣卻用胭脂於湯內揉出紅汁就以本綿蘸湯於瘡上拭之七十七獨聖散治痘瘡倒陷牛蒡子炒五錢白殭蠶二錢半上味入紫草三莖同煎連進二服七十八苦參丸治痘後潰爛成疥苦參一兩白蒺藜何首烏牛蒡子荊芥穗各一兩半共為末酒調面為丸竹葉湯下七十九滅瘢救苦散治爛痘以此敷面如誤抓破者用之敷貼最良密陀僧滑石各一兩白芷半兩上為細末濕則乾擦之干則好白蜜調敷八十白龍散治爛痘及抓破者用干黃牛糞在風露中多久者火煅成灰取中心白者為末薄絹囊裹於瘡上撲之八十一敗草散治爛痘及不成痂者用此鋪攤被席多年屋上爛茅草擇淨者為末擦之牆上爛草亦佳以多受風露之氣故能解痘瘡毒八十二茵陳薰法治痘瘡瘙癢用干茵陳研末搗棗膏和丸如雞子大曬乾烈火燒煙燻之八十三消風化毒散防風黃耆白芍藥荊芥穗桂枝牛蒡子升麻各等分甘草減半上銼細加薄荷七葉水一盞煎七分去渣溫服無時八十四羌活救苦湯羌活白芷川芎蔓荊子防風桔梗黃芩連翹升麻大力子人中黃各等分上銼細加薄荷葉七片水一盞煎七分去渣食後溫服八十五消毒化斑散升麻柴胡桔梗甘草龍膽草牛蒡子連翹防風蟬蛻密蒙花各等分上銼細加淡竹葉十片水一盞半煎一盞食後服八十六柴葛桂枝湯柴胡葛根甘草桂枝防風人參白芍藥各等分上銼細加生薑三片水一盞煎七分去渣溫服不拘時
