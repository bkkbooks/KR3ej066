body:
  text: 卷之三發熱瘡疹發熱與傷寒相似但傷寒只見一經形症若雜疹則面燥腮赤呵欠頓悶乍涼乍熱多睡咳嗽噴嚏驚悸吐利手足稍冷骩涼耳涼也然發熱者瘡疹常候也不可盡除之但熱微毒亦微熱甚毒亦甚初發熱時精神清爽唇鼻滋潤更無他症者此熱在表其痘必疏不須施治初發熱時渾身壯熱然熇熇不渴清便自調此邪在表拂鬱於皮膚之間宜以輕揚之劑發之升麻葛根湯主之一甚則羌活湯主之十初發熱時其熱烙手目赤鼻乾唇燥小便赤大便閉煩悶不安此表裡俱熱毒氣壅遏宜發表攻裡雙解散主之四初發熱時表不大熱其人煩躁不安此熱在裡也以三黃丸微利之八初發熱時腹中痛者此毒氣與穀氣相併宜利之去菀陳莝使毒氣得泄穀氣得消備急丸主之九初發熱時咳嗽甚者參蘇飲主之三初發熱時或乘疫癘之氣人參敗毒散主之二初發熱時或為風寒所襲出不快者桂枝葛根湯五雙解散四去大黃主之如瘡既出其熱便退瘡本必疏若一向熱不衰者此瘡必密急解其毒連翹升麻湯六代天宣化丸十二主之如瘡已出但微發熱不須治之蓋瘡疹屬火非熱不能成就也如瘡漿膿已成毒氣已盡又復發熱者俗呼為干漿者是也不須施治如結痂之後其熱不退者此邪氣未盡正氣未復熱微者不須治之熱甚者當視其虛實渴瘡疹渴者裡熱也蓋三焦者水穀之道路津液者水穀之精華變化流行以灌溉乎三焦也瘡疹之火起之於內銷爍水穀不得以變化津液灌溉臟腑故渴也又瘡本稠密津液外泄化為膿漿不能滋養真氣亦渴也小渴者常病也不須治之大渴者視其虛實以法治之切不可以冷水紅柿梨橘西瓜等物與之恐損脾胃致生災異也如發熱時便大渴者此熱在裡也葛根解毒湯二十一主之如能食而渴者肺熱也經曰心移熱於肺傳為膈消由心火上炎乘於肺金熏蒸焦膈搏耗津液故渴也治在上焦人參白虎湯二十四加黃連如不能食而渴者脾虛也叔和云口乾饒飲水多食亦肌虛由脾素弱不能為胃行其津液故渴也治在中焦參苓白朮散二十三主之如自利而渴邪傳腎也正理論云自利而渴者屬少陽虛故引水自救蓋腎主五液其脈絡於肺系舌本邪傳於腎則開闔不司故自利自利則津液不足腎水乾不能上潤於舌故大渴也治在下焦宜溫之陳氏異功散二十六主之如渴而大便秘者宜利之四順清涼飲二十七主之腰痛瘡疹發熱先腰痛者最宜忌之經曰腰者腎之府也又曰太陽所至為腰痛蓋足太陽膀胱經為十二經首其脈俠脊入循膂絡腎瘡疹之毒起於右腎之下循足太陽膀胱散於諸經乃邪由里傳表也如初發熱其腰即痛此邪由膀胱直入於腎故關節不利而腰痛亟解毒以瀉少陰之邪發表以通太陽之經使邪氣不得以深入瘡雖稠密或可愈也治若以緩則太陽之邪由表以傳於陽少陰之邪由里以傳於陰表裡受病陰陽俱傷榮衛之脈不行臟腑之氣皆絕或為黑陷或為癢塌終莫能救凡發熱便腰痛者先服人參敗毒散三次服五苓散加獨活主之二十八腹痛內經腹痛皆屬於寒惟有一症為熱瘡疹腹痛皆屬毒熱也訣云發熱肚中痛斑瘡腹內攻發多防不透發少更防癰是也或有兼食積者如初發熱便腹痛者此毒氣內攻須急治之不可逡巡以貽後悔便調者四君子湯二十去白朮加青皮木香山楂肉枳殼便秘二三日未行者承氣湯三十主之如發熱腹痛大渴煩躁大便秘狂妄者三乙承氣湯二十主之如發熱腹痛大便如常者化毒湯三十二主之如發熱腹痛大便自利者黃耆建中湯主之三十如瘡已出至收靨時原無腹痛忽然作痛此必有飲食也消息審問曾因飲冷水者五苓散主之二十八或用黃耆建中湯加白朮乾薑人參三十一曾傷食者問傷何物丁香脾積丸主之三十二用原物湯送下如瘡已出至收靨原無腹痛忽然作痛亦未傷飲食但觀其大便何如若便秘者此燥屎也以三黃丸八微利之大便自利者此虛痛也黃耆建中湯三十一主之如因寒而痛者理中湯三十四加白芍藥桂主之如發熱時心腹絞痛煩悶叫呼或瘡陷伏脹滿疼痛喘促者此惡毒之氣攻刺腸胃燔灼臟腑必不可治驚狂驚者口眼喎邪手足搐搦隨發隨止狂者手足擾亂言語乖越發而不止驚者心主火而惡熱肝風而善動瘡疹之火內生於心心移熱於肝風火相搏故發為驚搐也此其常候俗呼驚痘最吉者以牽引伸縮骨節開張腠理疏解中存發散之義瘡出而驚即止若一向發而不已此則可惡乃毒內伏於心故耳狂者心為火而主神腎為水而主志火起於內濁亂擾動心神不守腎志不寧故發為狂也有大便秘硬而狂者此謂有燥屎為陽明經但數日不更衣是以難經所謂重陽者狂也如昏不知人起臥不安又為不治之症如初發熱驚搐者導赤散三十五加辰砂兼羌活湯主之十若發熱不休小便利者可治小便不利者難痊以導赤散三十五牛黃清心丸三十六相兼治之如瘡疹收靨之後又發驚者此真氣虛弱火邪內攻宜急治之恐久成癇以貽終身之害寧神湯三十九抱龍丸四十主之如初發熱大便自調狂亂者五苓散二十八加辰砂主之如大便秘者輕則三黃丸八甚則承氣湯三十主之譫妄譫者多言也妄虛妄也譫妄者妄有見聞而語言無倫也皆邪氣熾盛正氣虛弱神識不清之所致夫言為心聲心熱則多言睡中呢喃者熱之微也寤而語言差謬熱則甚矣亦有胃熱而譫語者大便必硬數日不更衣方是妄有聞見而譫語者其候難治蓋腎主志開竅於耳在目為瞳子毒邪入腎則志喪志喪則耳目妄有聞見故曰失志者死難經云脫陽者見鬼初發熱時譫語者毒邪犯心心為熱冒其神浮越宜瀉火鎮神導赤散三十五牛黃清心丸三十六兼而治之如腸中有燥屎三五日未更衣者宜滌腸解毒宜四順清涼飲二十七三黃丸八主之如起發成漿欲靨之時忽然神昏譫語此由瘡本稠密精血外耗不能養神宜養血瀉火安神丸四十七主之如昏不知人語言無倫者死經曰衣被不斂言語不避親疏者神明之亂也故不可治如初發熱便妄有見聞狀如見鬼而畏怖者不治此症自始至終皆不可有乃神志俱喪軀殼徒存不過引日而已吐利瘡疹吐利常候也經曰諸嘔吐暴注皆屬於熱蓋三焦為水穀傳化之道路熱火內迫則傳化失常而吐利並作火性燥動迅欻故也邪在上焦但吐而不利邪在下焦但利而不吐邪在中焦則上吐下利又裡氣上逆而不下則吐氣下而不上則利瘡症初發熱時有吐利者不可驟止令邪氣上下得出也吐利久不止方可治之更宜消息如初發熱自利青綠水或黃色者皆熱也黃芩湯四十一主之兼吐者黃芩加半夏湯主之四十二不可誤用理中湯反增內熱也如初發熱自利一日夜只三四行者此不必治痘出利自止矣如初發熱自利清白色者此里有寒也理中湯三十四主之如自利久不止此有濕也宜分利小便固澀腸胃恐虛里氣致生陷伏也以五苓散二十八豆蔻丸四十六相兼治之如初發熱暴吐不止此火氣上逆也茱連散四十八主之嘔吐噦仲景云聲物兼出為嘔物獨出為吐聲獨出為乾嘔干猶空也明其無物也然乾嘔與噦皆聲之獨出者乾嘔其聲輕小而短噦其聲重大而長嘔吐噦瘡疹最惡候也蓋胃為水穀之海上通乎咽內而不出如初發熱有是症此火邪犯胃其氣上逆治之則易見上條若自出現以致收靨有是症者乃瘡集於咽門攻於胃脘吞嚥不利治之則難由於不知預解咽喉之法漸變為失音嗆水而不救矣如因飲水過多而嘔吐者此水逆也五苓散二十八主之如因傷食而嘔吐者以丁香脾積丸微利之三十三如無上症而嘔噦者人以胃氣為本胃者土也土敗則木來侮之今木俠相火之勢上乘乎胃其氣自臍下直犯清道上出於賁門胃上口也微則乾嘔甚則噦土敗之相也太素曰弦絕者其聲嘶敗木陳者其葉落病深者其聲噦短針無取毒藥無攻謂不治也泄利凡瘡未出而利者邪氣並於里腸胃熱甚而傳化失常也治見上文瘡已出而利者邪氣並於表正氣方逐邪氣主乎表而不主裡則裡氣虛不能停納水穀故亦自利也宜從氣虛而治瘡疹所忌內虛泄瀉凡覺腹疼或漉漉響趨小腹者皆欲作利宜先以法治之治之不止此開腸洞泄惟二劑可以收之聖濟經曰滑則氣脫欲其收者是已如服澀劑而利不止經曰倉廩不藏者是門戶不要也金匱要略曰六腑氣絕於外者手足寒五臟氣絕於內者利不止五奪之中此為最甚但正氣內脫者淹延而死邪氣內陷者煩渴而死此為異耳自起發以至收靨大便常宜堅實忽然自利者理中湯丸三十四主之如因飲冷水自利者所謂濕勝則濡泄也宜溫中利小便以理中湯丸三十四理中氣勝水寒五苓散二十八利小便去水也如因傷食自利者所出必酸臭乃飲食自倍腸胃乃傷也宜先去積以丁香脾積丸三十三後補脾胃益黃散四十五主之如利久不止先服陳氏木香散二十五兼豆蔻丸主之四十三更甚者陳氏異功散主之二十六此藥太峻不可猛浪如結痂時暴泄不止者消息所出之物痂皮膿血者順水穀不分者逆如利膿血不止者熱毒下流也香連丸主之五十大小便秘凡病瘡疹者小便欲其流而長大便欲其潤而實則邪氣不伏正氣不病經曰小便數大便必硬雖二三日不更衣無苦也如覺小水少則病增進蓋心主瘡而屬火心移熱於小腸小腸移熱於膀胱膀胱為津液之府氣化則出氣為火食不能傳化而津液不出故小便秘也瘡疹發熱大便欲潤若二三日不行宜急利之恐傷胃不通榮衛不行瘡出轉密也惟瘡起發之後大便卻宜堅實如能食而大便常行者不須忌若過四五日不行則熱盛生濕其瘡難靨亦宜微利之設使大小便俱不通則邪毒內蓄三焦阻絕經曰一息不運則機緘窮故大小便不通者死凡瘡疹小便少者熱微導赤散三十五加山梔仁熱甚八正散主之四十六如發熱時大便不行熱微者三黃丸八甚則承氣湯主之如發熱至收靨大小便不行者用膽導法五十一不可通用利藥但瘡乾黑陷大便秘煩躁者百祥丸五十二牛李膏五十三主之如無此藥以承氣湯代之三十咳嗽肺主氣其變動為咳咳者肺症也瘡疹發熱之初便有咳嗽者肺為五臟之華蓋瘡疹之火挾君相二火之熱上熏乎肺肺氣焦舉故氣逆而咳也瘡疹既出其咳更增者此喉嚨有瘡淫淫如癢習習如梗故咳也瘡疹收後而咳者此衛氣虛弱腠理疏開風寒外襲肺氣逆而不收故亦咳也如初發熱咳嗽甚者先以參蘇飲發之二次以甘桔湯七合瀉白散五十四加牛蒡子治之如瘡已出咳甚者甘桔湯七加牛蒡子主之如瘡先壯收靨身熱咳甚者人參清膈散主之六十一如瘡已靨咳嗽者不問形寒飲冷所致宜人參清膈散主之六十一如斑瘡咳嗽身熱而渴者生地黃散主之五十九喘急諸喘皆屬於火肺者臟之長也為心華蓋心火炎上則肺焦葉舉氣逆不利而喘也有因風寒而喘者有因傷食而喘者惟疹瘡之喘獨屬於火若加泄利腹脹煩躁者則不可治如初發熱便喘者前胡枳殼湯主之五十六大便秘者可用服此不止以葶藶丸治之如喘大便自利者黃芩湯四十一加五味子人參主之如瘡正盛忽然喘急者此惡候也當詳審如因傷食穀氣蒸而為熱上乘於肺作喘者宜利之丁香脾積丸主之三十三食去熱除喘自定矣如因感冒風寒而喘者麻黃湯主之六十七如泄瀉內虛腹脹而喘者陳氏木香散主之二十五利止喘定者生滑利不禁喘滿增盛者氣脫候也如瘡內伏不出或出復陷腹脹悶亂而喘者必死自汗自汗者不因發散而自然汗出也衛氣者衛護皮膚肥實腠理禁固津液使不得妄泄也瘡疹之火由里達表干於衛氣皮膚為之緩腠理為之疏津液外泄故自汗也凡病自汗不宜遽止之瘡疹自汗實為美症乃陰陽氣和榮衛通暢邪氣不留易出而解也又心主汗諸瘡皆屬於心自汗出者毒氣外泄也雖然熱之甚者亦為汗解身腹清涼此毒散也若汗出不止其熱反劇此邪氣並於陽而陽虛宜斂汗固表清熱解毒使衛氣充實無癢塌潰爛之患如瘡已收較痂皮脫落自汗者此氣虛也宜補陽救陰使氣無泄睡中汗出心有熱也其汗上至頭下至頸不過胸者乃六陽虛汗也不須治之上至頸下至臍者此胃虛也手足漐漐者胃熱也宜止之如汗出如油發潤如洗喘不休者此為肺絕之候如汗大出不止身壯熱者當歸六黃湯主之六十八如瘡收後汗出不止者十全大補湯主之三十八若更不止調敗蒲散七十同服外用溫粉撲法六十九胃虛自汗者調元湯十八不止調敗蒲散同服七十胃熱手足自汗多者人參白虎湯二十四加黃連主之失血氣為陽血為陰陽主動陰主靜人身之血不可妄動也經曰陽絡傷則血外溢血外溢則衄血陰絡傷則血內溢血內溢則後血今瘡疹之火熏灼於裡迫血妄行血亦隨火而動陽絡傷則血從上焦出或衄血或嘔血陰絡傷則血從下焦出或溺血或便血陰陽俱傷血上下出也諸失血惟從鼻出者或有可治之理其餘皆死症也亦有痘疹灌爛不能收較出血不止者此陽瘡出血亦不可治凡瘡疹衄血內熱也玄參地黃湯主之六十五衄血者佳一向不止者勿治煩躁煩者擾擾而煩躁者憒躁之躁合而言之煩躁皆熱也析而分之煩陽也熱之輕者躁陰也熱之甚者難知集曰火入於肺煩也火入於腎躁也瘡疹煩躁須宜忌之若吐利厥逆腹脹喘促而煩躁者昏不知人譫妄狂擾而煩躁者謂之悶亂皆不治之證如肺熱而煩者至臥不安審於何時若初發熱便煩者此毒火內郁人參白虎湯二十四加梔子仁主之若瘡發見猶煩者此毒伏於內未盡出也消毒飲十六奪命丹十七合而服之若瘡出盡又皆起發猶煩者此內熱也牛黃清心丸主之二十八如腎熱而躁者必曾自利輕則陳氏木香散二十五甚則陳氏異功散二十六主之如揚手擲足欲去衣被者此熱甚於表也羌活湯主之如神識昏迷反復顛倒者此熱甚於里也導赤散三十五牛黃清心丸三十六合而治之龍腦膏甚妙吐利不食而煩躁者正氣虛也陳氏木香散二十五主之如六七日不大便腹滿而煩者內實有燥屎也輕則用三黃丸八微利之甚則承氣湯三十下之如晝日煩躁夜則安靜者此陽甚於晝至夜則陽氣退而安靜也人參白虎湯加梔子仁主之二十四如晝日安靜夜則煩躁者此陽陷入於陰夜則陰盛陰陽交爭故煩躁也四物湯十九加梔子仁主之夾疹疹一名麻子君火所為也或曰脾為疹經曰少陰所至為瘍疹在人則心火主之夫心火亢甚則制己所勝焚灼肺金肺主皮毛故疹毒見於皮膚之間如蚊蚤所咬之狀瘡痘只出一般者善若與疹毒並出謂之夾疹其候極惡惟痘本稀疏而夾疹者庶乎可治瘡本稠密與疹並出彼此相混瑣碎莫辨急用辛涼之藥發而解之如疹毒漸消瘡本磊落者亦可治也疹痘相併毒不少減此危惡之疾孰能料其生乎瘡出夾疹者荊防敗毒散主之七十一疹毒消者可治如瘡收靨後復出疹者此餘毒解散之兆不須治之夾斑活人書云傷寒下之太早熱氣乘虛入胃發斑下之太遲熱留胃中發斑胃爛亦發斑斑者乃熱毒郁遏煎熬陰血血得熱而不解浮於肌肉為斑足陽明胃主之痘疹初出皮肉紅腫片片如錦紋者此夾斑也以辛涼之藥解之其斑漸退瘡本堅實者吉否則皮膚斑爛瘡易瘙癢所謂皮嫩易存者是也如赤斑成塊其肉浮腫結硬者又名丹瘤其毒最酷瘡未成就此先潰爛工不可治瘡出夾斑者荊防敗毒散主之七十一斑退可治痘疔痘疔者熱毒蓄積氣血腐壞而成也狀有數種乃疫毒之氣最為惡候宜謹察之有肌肉微腫狀如堆粟不分顆粒者此氣滯血凝毒氣鬱結也有初出紅點漸變黑色其硬如石者此肌肉已敗氣血中虛不能戴毒而出反致陷伏也有中心黑陷四畔突起戴漿者此血隨毒走氣不為用也有中心戴漿四畔干陷焦黑者此氣附毒出血不為使也有頭戴白漿自破潰爛者此氣血不充皮膚敗壞也有為水泡溶溶易破者此火濕並行氣血不能斂束也有為血泡色紫易破者此血熱妄行不能自附於氣也有瘡頭針孔漿水自出者此衛氣已敗其液外脫也此數症者於五六日間候之但見一症即不可治凡痘瘡及發之時但見乾燥其痘焦黑者即內服奪命丹十七外用四聖散七十二塗之如原有瘡疹或灌瘡未愈或瘡將靨較瘢嫩者至痘出之時其處痘本攢聚形色黑潰急以針刺破之吮出毒血外以四聖散七十二塗之內服加味四聖散六十四調無價散七十三並奪命丹七十主之如瘡焦黑渾身皆是者看大便何如若大便秘者內服承氣湯三十調無價散七十三外用水楊湯浴法七十五大便利者內服十全大補湯三十八陳氏木香散二十五調無價散七十三合奪命丹十七外用水楊湯浴法七十五痘癩痘癩者熱毒拂鬱氣血虛弱肌肉敗壞經云熱勝則肉腐者是也正理論曰脈浮而大浮為風虛大為氣強風氣相搏必成癮疹身體為癢癢者名為泄風久則為大癩凡氣血充實者外無虛風內無強邪必無是病惟氣血素虛者不能榮衛於身易感天地肅殺之氣皮肉之內虛風居之兼以痘疹疫癘惡氣擊搏燔灼流散四布隨空而出所以瘡本稠密身無完膚瘙癢難任肌肉潰亂而痘爛成矣急用大補氣血清熱解毒之法庶可求全若得敗面墮鼻唇崩目盲肢體傷殘不至殞命亦為廢人矣凡瘡破成癩者用十全大補湯三十八苦參丸七十七合而服之外用滅瘢救苦散塗之七十八癢塌訣云虛則癢實則痛此大概言之痘瘡之癢其候不同有方出而身癢者初見紅點遍身作癢此邪氣欲出皮膚閉密其火遊移往來故癢也與傷寒太陽經病身癢者同論可發之使皮膚縱緩腠理開通邪氣得泄瘡出而癢云所謂火鬱則發之者是矣有將收較而癢者其膿已成其瘡將回邪氣散而正氣復榮衛和暢故癢也與癰癤將痊而癢者同論不須服藥但謹護之勿令撏掐以致腫灌所謂美疾者是已有起壯泡漿而癢者當血以化水水未成膿之時其毒未化渾身瘙癢爬搔不寧此惡候也與傷寒陽明經病皮中如蟲行者同論所謂虛風外搏邪氣內強癢而不止為泄風者是已此視瘡之乾溼以風藥佐之必令癢去方為佳兆若癢甚不休瘡壞皮脫其毒復陷謂之癢塌必不能治矣大抵出形而皮肉紅豔起發而皮嫩多水者其後常致塌也如初出身癢者可發之桂枝葛根湯五加制麻黃牛蒡子主之如起發養漿而癢者通用十全大補湯三十八加防風牛蒡子主之如瘡干而癢者宜養血潤燥以四物湯十九合消風化毒湯八十二奪命丹十七主之外用茵陳熏法八十一如瘡濕而癢者宜養氣去濕以四君子湯二十合消風化毒湯八十二奪命丹十七主之外用茵陳熏法八十一如瘡癢潰爛黏衣被席難任者以十全大補湯三十六加防風合奪命丹十七主之外用敗草散八十如瘡將收而作癢誤犯破損不肯幹較者用白虎散貼敷七十九陷伏伏者毒蓄於裡而不出也陷者毒出而復陷入也此皆惡候伏為一症陷有數種伏候於見形之時其人瘡出熱不少減煩渴悶躁此皆伏毒未得盡出也陷則見形之後其血漸干而變黑者謂之黑陷漿水未成破損癢塌者謂之倒陷膿成復化為水不肯結痂者謂之倒靨亦陷類也其瘡黑色皆謂之黑陷凡斑疹黑色皆不治之以腎為水其色黑乃腎之真臟色見也粗工不知變黑歸腎之理妄謂腎不可實欲瀉腎而使之虛不知人之一身大言陰與陽小言心與腎即方家所謂真水真火也瘡疹之火發於中賴此一點真水以制其亢苟欲瀉之則火無所制本先拔矣豈治之要哉然謂腎者以腎主骨髓又主閉藏也蓋痘疹穢毒由骨髓而達於筋肉皮毛之間乃自內而外其毒得泄今既陷伏則自外而復入於骨髓謂之歸腎也又初出形之時春氣發生之令也出形而黑是春行冬令矣起壯之時夏氣長養之令也起發而黑是夏行冬令矣養漿之時秋氣成實之令也膿干而黑是秋行冬令矣故皆謂之逆結痂之時冬氣閉藏之令也此腎之症候若不著痂膿水浸潤此冬行春夏之令亦謂之逆惟知造化之機可以語歸腎之說其色黑者火化也觀物之乾者其色黑出於火者色亦黑豈可謂之水乎經曰火發而曛昧知此可以語黑陷矣凡瘡伏而不出者雙解散主之四如倒陷者看其六腑何如大小便秘四順清涼飲二十七合奪命丹主之十七泄利氣弱者十全大補湯三十八合奪命丹主之十七並外用胡荽酒八十四水楊湯七十五如將起發瘡亦有水但色黑黯者以十全大補湯三十八調無價散七十三主之或以快斑湯十五奪命丹十七合而服之如倒靨者亦視其大便何如大便秘宜利之三黃丸八四順清涼飲二十七泄利宜補之輕則十全大補湯三十八甚則陳氏木香散二十五並外用敗草散八十主之壅腫經曰熱勝則腫大抵毒之盛者必腫毒微者不腫凡瘡出盡應期起發頭面以漸浮腫者此毒火發起聚於三陽之分欲作膿血故宜皮肉焮腫也設當起發之時頭面不腫者必瘡本磊落毒氣輕淺雖爾作膿根不佔處所以不腫不須治之如瘡本模糊起發不腫者此毒伏於內不即發泄不可以毒輕論也如起發腫大皮肉如常瘡尖而圓粒粒分明者此佳兆也若皮色鮮紅瘡本成串黏聚平塌者若瘡色灰白成餅如錫面者若瘡焦紫無水者皆凶兆也有先起發頭面預腫者此兼疫毒之氣名大頭瘟者是也腮頤預腫者此名蛤蟆瘟也須兼疫氣而治多凶少吉大凡瘡腫者直至干漿結痂之時毒化而腫消矣故應腫不腫應消不消者謹提防之凡瘡腫脹面浮目閉者急與解毒護目救咽喉相兼治之內用消毒化斑湯八十四外用神應膏六十六護目凡瘡腫脹初防瘙癢正面之中不可少有破損者苟生癢破沙崩之勢漸不可為邪氣內傷真氣外泄腫消而死矣但得破者復灌消者復腫飲食如常大小便自調者變凶為吉用十全大補湯三十八苦參丸七十七合而治之如瘡色灰白面腫如錫餅者但看其人臟腑何如若能食大便調小便長無他苦者多吉若不能食吐利並作或生瘙癢者多凶如頭面預腫或腮頰預腫者此時行疫毒也並用羌活救苦湯主之八十三潰爛痘瘡所貴者堅實不破圓淨成痂也其有潰爛者火勝也經曰熱勝則腐肉火之為用猛虐峻暴近之則燥癢不寧迫之則焦痛難忍灼之則糜爛成瘡故敗物者莫如火也火生於空非虛不燃乘之以風其焰益烈痘瘡潰爛由肌肉素虛邪風侵襲風者善行數變行諸脈俞散於榮衛之間一旦毒發於里風應於表風火相扇肌肉憤䐜皮膚決裂而瘡壞矣如膿成而潰則毒已化但黏衣漬度不能幹較古方以敗草散主之誠良法也膿漿未成其毒未化癢破潰爛者則衛氣暴泄津液不榮譬草木剝削其皮枯萎而死矣經云根於中者命曰神機神去則機息根於外者命曰氣化氣止則化絕此之謂也厥逆逆者四肢逆而不溫也厥者冷也又甚於逆四肢者諸陽之本常宜和暖如指頭微寒者陽氣衰也陽氣起於十指之端足心冷者陰氣勝也陰脈集於足下而趣於足心如瘡焦黑煩渴頓悶促而厥逆者此陽毒內陷熱氣逆伏手足為之冷所謂熱深厥亦深火極似水者如瘡本灰白泄利而厥逆者此元氣虛憊陰陽不相順接而手足為之冷也瘡疹之候頭常欲涼足常欲溫故頭溫足冷者不治厥逆乃瘡家惡症也如因熱深而厥者大便不通三乙承氣湯三十主之瘡黑者百祥丸五十二牛李膏主之五十三如因泄利氣虛而厥者陳氏木香散三十五陳氏異功散二十六主之但十指頭痛寒者四君子湯二十理中湯三十四並加桂主之如瘡始出手足便冷者其人先有吐利四肢者皆稟氣於胃脾胃氣弱不得至經理中湯三十四加桂主之寒戰咬牙戰者森然若寒振振然搖動也咬牙者上下片牙相磨而鳴也經曰諸風振掉皆屬肝木寒戰而振振搖動風之象也火氣衝物亦然錢氏曰肝主風虛則咬牙多欠又曰上竄咬牙心熱也然則寒戰咬牙心肝二臟主之或以寒戰為氣虛咬牙為血虛或以咬牙為齒槁謂精液不足者皆不知此意痘疹所惡者寒戰咬牙或單見一症或二症並見若瘡已壞加之喘促悶亂死無日矣如瘡初出寒戰者此邪氣將出外與正爭故振振搖動火之象也瘡出乃定柴胡桂枝湯主之八十五如瘡出稠密焮發腫痛經脈動搖時時振動者不可謂之寒戰待膿成痛去而解有筋惕肉瞤者經絡之血為瘡所耗不能榮養肌肉主時筋脈故惕惕然而手足自跳瞤瞤然而膚肉自動也不可謂之寒戰但養其氣血十全大補湯三十八主之咬牙呵欠者肝虛也肝屬木臨官於寅寅為相火火盜木氣故肝虛之症形焉陽引而上陰引而下則呵而欠也陽上極而下陰下極而上則合而齧也十全大補湯主之三十八上竄咬牙者心熱也諸瘡皆屬心火上竄者火炎上之象也咬牙者火氣動搖之象也導赤散三十五加酒炒黃連牛蒡子主之如寒戰咬牙並作者則少陰專主之觀其痘本密如瘡出潰爛寒戰咬牙者此手少陰心火也經曰熱勝則肉腐寒戰咬牙火氣動搖之象也如瘡本焦黑寒戰咬牙者此足少陰腎水也腎色黑為主蟄封藏之本乾黑者真臟色見也腎氣寒在變動為慄寒戰者腎本病也腎主骨牙者骨之餘寒戰則鼓頷而兩牙相軋咬牙者腎寒所發也此二症者在心熱則清之在腎寒則溫之其病已壞治之何益暴啞失聲痘瘡最要語聲清朗若有猝失音者凶兆也先哲有言曰瘡已出而聲不變者形病也瘡未出而聲變者氣病也瘡出而聲不出者形氣俱病也其候有三須要識得有心刑肺而失音者肺屬金主聲中有二十四空凡發諸語言者皆其空中之氣鼓動也五行金空則鳴實則啞瘡疹之火起於心上熏於肺肺氣脹郁故竅塞而無聲也以導赤散三十三合甘桔湯七加炒牛蒡子主之或甘桔湯加炒牛蒡子天花粉蘇葉主之有心虛而語聲低小不出者叔和心臟歌云聲言爽氣清蓋心主血痘瘡稠密其瘡都要貫串得到血為虧損故也血去舍空故聲不揚以導赤散三十五加人參麥門冬石菖蒲主之有毒歸腎而失聲者經曰足之少陰上繫於舌絡於橫骨終於會厭會厭者音聲之戶也舌者意志之機也橫骨者神氣所使主發舌者也瘡黑陷伏則毒入腎邪氣上客於厭則厭不能發發不能出開闔不利故猝啞也有喉舌潰爛而失聲者咽喉者所以司呼吸納飲食發音聲猶管龠也毒火上熏咽喉先受賁門會厭舌齶之位皆瘡所聚初出之時失於調治以致咽喉腫塞管龠窄狹舌本強硬呼吸不能飲食不入意志不出矣此上二症治之則難嗆水吐食難經云會厭為喉門胃為賁門病痘之人毒火上熏於肺灼於胃肺與胃之上口皆有瘡而傷矣水入則嗆者賁門傷則水不得入溢於會厭會厭掩而不內故氣逆噴出而嗆也食入則吐者賁門傷則門戶隘塞食物不能直奔於胃緩則汩汩而下急則阻而吐出矣此其惡候鮮有生者其或舌上有瘡爛破如蜂窠之狀舌痛強硬不能為用延納水穀亦使水入則嗆食入則吐待舌瘡平則安矣
