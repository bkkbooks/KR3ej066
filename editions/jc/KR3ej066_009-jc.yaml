body:
  text: 卷之九治痘凡例凡四十三條凡發熱疑似之間宜用人參敗毒散一劑二以發之是與不是一發便明大抵瘡疹只要發盡不使伏留於中也凡初發表要看天時如天時大寒則腠理閉密氣血凝澀防其發泄得遲有毒氣壅遏之變以辛熱之藥發之宜桂枝葛根湯五五積散八十六去乾薑主之如天時太熱則腠理開張氣血淖澤防其發泄太急有潰爛之變以辛涼之藥解之宜升麻葛根湯一雙解散四主之如不寒不熱天氣溫和只人參敗毒散二甚佳凡初發熱二三日間有驚搐者以導赤散三十五羌活湯十辰砂散八十七主之大便秘者三黃丸八微利之小便澀少者導赤散三十五渴甚者葛根解毒湯二十一腹中痛者桂枝大黃湯二十九腰痛者人參敗毒散二自利者黃芩湯四十一吐利者黃芩加半夏湯如脾胃素弱自利清白者理中湯丸三十四或四君子湯二十肉豆蔻丸四十三合而服之凡痘子出現疏則毒輕不可妄治密則毒甚卻要磊落大小分明不相黏連略與托裡解毒之劑快斑湯十五消毒散十六主之使之易發易靨如出太密黏連模糊其毒猶甚托裡解毒之劑宜多飲之以防癢塌黑陷之變更察外症可治則治不可治則勿治凡痘子出形皮肉如常根苗明潤此毒輕也不可妄治如皮肉昏黑或赤腫根苗乾枯青紫成灰白者此毒甚也以消毒散十六奪命丹十七合服凡痘子已出自放膘之日算起如當起發不應有漿先有戴漿者如當作漿不應收靨便有干收者此皆惡候治之無功凡痘子之出最要唇潤舌潤紅鮮如常其毒則輕如唇焦破裂舌燥有芒為毒火太甚表裡郁遏急宜解之黃連解毒湯八十九加大力子東垣涼膈散一四七更妙凡痘已出頭面要稀疏磊落頸項上宜少不宜多胸前要少而疏如此其毒則輕如面上模糊一片未發先腫纏項稠密胸前亦密此毒甚也慎勿治之凡痘子初出磊磊落落似稀疏之狀其後旋加日多一日此毒伏於裡裡氣虛弱不能使之即出要大補兼解毒或十可救其二三也十宣散三十七加無價散七十三主之凡痘子初出便自手足先出者他處未起而手足先起他處未收而手足先收者此陽火太旺宜用解毒抑陽扶陰之劑四物湯十九合黃連解毒湯八十九主之如他處俱起而手足起遲他處俱收而手足不收者此脾胃虛弱不能行其氣血達於手足宜補脾胃十全大補湯三十八桂枝芍藥湯九十主之凡痘子出盡正將起發其中有發血疱者此毒伏於心即死有發水疱者此毒伏於肝旋見癢塌而死凡痘子始出須問咽喉痛與不痛但有微痛急與解之令得疏通甘桔湯七加牛蒡子主之大抵痘家要以解咽喉為急務不知此義以致失聲乾噦水穀不入噴吐而出悔無及矣凡痘子不渴者里無熱也不須妄治渴者有熱此亦常候切不可與冷水瓜梨柑柿糖蜜之屬恐損脾胃致生他變小渴者以炒米湯與之大渴者人參麥門冬散二十二主之痘子稠密津液少者補中用十全大補湯三十八解毒用葛根解毒湯二十一相間服之自利而渴輕則白朮散二十三甚則陳氏木香散二十五主之凡痘子要大小便自調則裡氣和無留邪也故小便宜長而清如小便赤澀導赤散三十五小便短少八正散四十六痘出太密小便不通者連翹湯八十八蓋瘡子發熱不可驟去惟利小便以折其鬱如痘稠密小便少者此氣血衰少津液虛耗非熱也不可利之反損真陽之氣十全大補湯三十八主之能食者大便宜潤有入必有出也不能食者大便宜實存舊穀氣以養氣血也如四五日不行大便結燥者用膽導法五十一導之不通以三黃丸微利之如大結腹脹者以三乙承氣湯三十下之如大便泄瀉即止之蓋痘瘡要裡氣實恐瀉得脾胃虛也輕則理中湯丸三十四益黃散四十五豆蔻丸四十三甚則陳氏木香散二十五異功散二十六主之凡痘子大便出血看其血來何如又看是何時如瘡子正壯大便數日未嘗行血從糞出者此肛門傷血出也如瘡已收大便膿血者此倒靨之血也非此一類但溺血便血者乃臟腑敗壞陰血妄行必死之候凡痘子腹中常宜寬舒為里無邪若腹脹滿須審其傷食否及大小便何如如曾傷食微滿不痛者木香大安丸九十一脹滿腹痛甚者脾積丸三十三小便不通者百祥丸五十二大便不通者宣風散九十二主之此上諸症皆實脹者也故宜利之若自利腹脹乃虛脹也陳氏木香散二十五主之凡痘子手足常宜和暖頭宜涼故頭熱手足冷者不治如因泄瀉手足冷者此脾胃虛弱也陳氏木香散二十五異功散二十六聖藥也如大熱渴大便秘煩躁手足冷者此陽極似陰也三乙承氣湯主之三十凡手足冷者惡候也手足諸陽之本陽脫故冷凡痘家能食者不問稠密皆吉不能食雖疏亦難發難靨瘡密者危蓋人絕水穀則死表裡皆病則困也有欲食而不能食者必喉舌有痘作痛艱於吞嚼也宜以爛粥米飲頻頻與之以助脾胃之氣更以甘桔湯七加牛蒡子以解咽喉利胸膈也凡痘瘡飲食之間毋令太飢毋太飽毋太寒毋太熱以損脾胃但與糜粥爛飯淡薄滋味以養之切忌肥甘煎炒五辛一切動風動火之物凡痘子出得稀疏者自然易發易靨不可妄治若瘡稠密常患其發不能透宜細視之但紅活不甚長大者氣不足也用四君子湯二十合芍藥散十三加燒人屎治之如不潤澤而干此血弱也用活血散十四加消毒飲十六與之如不起發不紅活者平灰白者此氣血俱虛也用十全大補湯三十八加燒人屎牛蒡子與之如有青乾者內服快斑湯十五加燒人屎合奪命丹十七與之外用四聖散七十合胭脂塗法七十六或用胡荽酒七十四或用水楊湯浴法七十五務求光壯紅而後已如中間有成水疱者防其癢塌宜先補脾胃疏風瀉火使肌肉實不作癢可也十全大補湯三十八加防風大力子主之凡痘子貴在調養如天大寒蓋覆常宜溫暖勿使受寒恐毒氣為寒所觸而不得出也如天大熱不可蓋覆卻宜清涼勿使客熱與毒相併致增煩躁使瘡潰爛也如時有迅雷風烈暴雨之變宜謹帷帳添蓋覆多燒闢穢香九十三以避一時不正之氣勿掃房屋勿動溝渠勿起溷廁恐穢臭觸瘡而增癢痛也勿燒諸香恐其動火也其門戶常須關閉伏事之人選其謹厚潔淨者無狐臭者使之看守保護內者勿出外者勿入恐有不潔觸犯其瘡也痘家所忌男女房事及屍氣最毒其他則婦人月事酒氣五辛之氣遠行染帶之氣皆宜避如夜房室中有虛響此不祥之兆也其病者臥處常要無風又要通明切忌幽暗夜靜不斷燈火不離親人看守恐有癢痛與之撫摩或有飲食一時得具恐他人未必盡心也凡痘子膿成漿熟或癢誤犯破者恐復灌爛不能成痂若膿漿未成之時不可犯破半個必然癢塌而死凡痘子勢重者以脈候之脈洪實者吉浮數虛小者凶故云脈靜身涼者生脈躁身熱者死又陽病得陰脈者死凡痘子瘙癢者須於形色上詳審如瘡一向起發紅活光壯肥滿忽然瘙癢者此穢氣所觸也宜內服十全大補湯三十八外用茵陳蒿熏法八十一甚破者以白龍散敷之七十九如瘡本乾枯又添瘙癢者火甚也如瘡厚帶水皮肉嫩薄又癢者此溫熱也擺頭搖項手動作昏悶者死症也凡痘子已熟忽作瘙癢抓破者此脾胃虛弱不能榮養肌肉也內服四君子湯二十加黃耆官桂外以敗草散八十主之如因自利脾胃虛致癢塌者陳氏木香散二十五異功散二十六主之凡痘子出盛咳嗽者此肺中有火或咽喉有瘡作癢也只用甘桔湯七加牛蒡子多服良如唾涎帶血此咽中瘡或齒縫中出也不須妄治凡痘子黑陷古方用穿山甲者取其穿腸透膜而善走也用人齒者取牙齒乃骨之餘腎主骨可以入腎也此二物者但借為嚮導解毒之劑以施治則可若單用之何濟於事哉有用燒人屎者蓋屎大解疫毒痘乃時疫所發故宜用之若加入發表和中解毒湯尤良凡痘子已出之後最怕泄瀉恐脾胃虛裡氣弱不能助瘡成就反致倒陷以理中湯三十四肉豆蔻丸四十一合而治之如泄久不止瘡癢塌手足冷寒戰咬牙者陳氏木香散二十五異功散二十六主之凡痘子寒戰咬牙足冷者惡候也急用陳氏之法救之瘡壞者勿治凡病痘者瘡本稠密轉動之間身體振搖者此一身被瘡所困不能支持轉動艱難之狀斷不可便作寒戰妄投熱藥也有隻咬牙者此心肝二經火旺也蓋肝虛咬牙心熱者亦咬牙勿便作不治論凡痘子已熟不肯結痂潰爛者其人必不能食或曾吐瀉脾胃虛弱也內服十全大補湯三十六外用敗草散八十主之如大便不通此內熱也用膽導法五十以去其結糞外以天水散九十四蜜水調刷以解肌表之熱凡痘子收後目癮澀羞明或淚出者此肝火虛旺也洗肝明目散主之九十五如目中翳膜遮睛者蟬蛻散九十六主之凡痘子收後發癰毒者要分經絡論氣血多少而治不可妄用利藥宜大補氣血蓋此時氣血已虛十全大補湯三十六忍冬草主之外用敷貼敗毒膏九十七主之凡痘子用藥須分氣血虛實毒氣盛微而治故灰白者不起發者癢塌者吐利者寒戰咬牙者手足冷者皆氣虛也宜用補氣之劑瘡乾者不紅活者膿水少者皆血虛也宜用補血之劑稠密者掀腫者皆毒甚也宜用解毒之劑陷伏者氣血解毒兼治凡用補氣宜四君子湯如瘡帶濕或有自利用之可也若瘡乾者白朮燥津液茯苓滲津液或便秘實者不可用凡用補血宜四物湯如瘡干或色太嬌用之可也若能食者生地泥膈白芍收斂腸胃必不可用也凡解毒不過黃連黃芩黃柏梔子連翹牛蒡子升麻之屬俱用酒製恐其寒涼反損脾胃也若欲行表須少加桂枝他如紫草山豆根葛根之類則不必用酒製矣凡用解毒藥要別臟腑分陰陽而治之如黃連解心火黃芩解肺火梔子解肝火黃柏解腎與三焦火石膏解脾胃火木通解小腸火黃柏又解大腸火連翹牛蒡子解瘡毒火山豆根紫草解痘毒火升麻解疫毒火各有主治不同也又歲半已上屬陽心肺主事宜黃柏梔子多用之凡治痘子要識症候如症稀疏根窠紅潤不瀉不渴乳食不減四肢溫和身無大熱如此候者不須服藥惟善調護以待成就而已若癢塌寒戰咬牙渴不止痘紫黑色喘渴不寧灰白色頂陷腹脹頭溫足冷悶亂飲水氣促泄瀉渴如此候者不必服藥雖強治之亦無功也凡治痘瘡善攻不如善守表裡無邪不須妄治有若貪利之人不分虛實妄投湯丸謂曾治某病治其病貪天功以為己有者以致虛虛實實致生變異誤人性命此醫之罪也時俗出痘子者謂是天瘡不肯請醫看治但謂僧道咒水解厭習以成風毒之輕者能食者幸以痊愈設或變症一出不可救療諉之於命而不知省此時人之罪也
