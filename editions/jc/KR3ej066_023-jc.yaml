body:
  text: 卷之二十三古今經驗諸方八十六玉積散冬月痘出不快用此發之白芷川芎各二分桔梗一分半芍藥甘草炙茯苓當歸桂枝半夏各二分陳皮枳殼麻黃各五分蒼朮一錢厚朴四分上除桂枳二味別為粗末外十二味銼細慢火炒令轉色攤冷次入二味末令勻水一盞半姜三片煎一盞去滓溫服不拘時八十七辰砂散預解痘毒好辰砂一錢絲瓜近葉三寸連子燒灰存性此物發痘瘡最好上研末密水調服尤佳八十八連翹湯此解裡熱良方痘疹通用連翹防風瞿麥荊芥穗木通車前子當歸柴胡蟬蛻赤芍藥黃芩白滑石山梔子甘草各五分上銼細加紫草五分水一盞半煎一盞去滓食前溫服八十九黃連解毒湯此解火毒痘疹通用黃連黃芩黃柏梔子各等分上銼細水一盞半煎一盞去渣熱服九十桂枝芍藥湯桂枝白芍藥防風黃耆炙甘草各等分上銼細加棗二枚水一盞半煎七分去滓溫服九十一木香大安丸治傷食木香二錢黃連陳皮白朮各三錢山楂肉萊菔子炒枳實連翹神麯炒麥蘖炒砂仁各一錢半上為末神麯糊為丸陳倉米湯下附方補中順氣湯人參當歸木香青皮山楂肉厚朴甘草炙上銼細水煎服九十二宣風散治黑陷裡實以代百祥丸牛李膏檳榔二個陳皮甘草炙半兩牽牛四兩用半生半熟取頭末一兩上為細末二三歲蜜湯調下半錢已上一錢食前服九十三闢穢香痘家常宜焚之蒼朮一斤大黃半斤上銼細研末放火爐中燒之不可間斷九十四天水散治痘乾燥而痛白滑石四兩甘草一兩共為細末白湯調服或用塗痘甚佳以蜜水調刷之九十五洗肝明目散治痘後目疾當歸川芎羌活防風山梔仁龍膽草柴胡木賊密蒙花各等分上銼細共為末每服一錢淡砂糖水調服九十六蟬蛻散治痘後目疾良方蟬蛻密蒙花黑豆蔻望月沙各等分共為細末每用一錢以豬羊肝一片批開入藥末在內用苧麻扎定米泔煮熱頻與食肝飲湯九十七拔毒膏一名必勝膏治痘癰馬齒莧杵汁豬膏脂石蜜生綠豆末赤小豆末上以三味共熬為膏徐腫處如干以水潤之九十八百花膏治痘燥以痂皮濺起作痛石蜜不拘多少略用湯和時時以鵝翎刷之瘡痂亦易落無痕九十九柴胡飲子治痘瘡表裡俱實良方防風當歸白芍藥柴胡黃芩炒人參甘草大黃各等分渭石倍用生薑一片水煎服一當歸丸治便堅三五日不通者當歸半兩黃連錢半炒大黃二錢半甘草炙一錢紫草三錢先以當歸紫草熬成膏以下三味研為細末以膏和為丸如胡椒大三歲以下兒服十丸七八歲兒服二十丸食前米飲下漸加以和為度一一解毒防風湯防風一錢地骨皮生黃耆白芍藥荊芥穗鼠黏子各五分上銼細水煎服或加升麻五分一二九味順氣散又名勻氣散白朮白茯苓青皮白芷陳皮烏藥人參各半錢甘草二分木香二分上銼細水一盞煎七分去滓溫服一三馮氏天花散治痘失聲天花粉桔梗白茯苓訶子肉石菖蒲甘草各等分上為細末用水調半匙在碗內外以小水竹七莖黃荊七條縛作一束點火在碗內煎臨臥服一四如聖湯芍藥升麻乾葛各一錢甘草紫草木通各五分上銼細加姜一片水一盞煎七分去渣溫服不拘時解毒快斑湯羌活防風升麻葛根柴胡川芎白芷紫草桔梗甘草麻黃炒上銼細生薑蔥白作引水煎服取汗解去熱毒則痘自易出易靨也附方尤膽安神丸治痘中昏悶譫妄良方水辰砂一錢龍腦五釐牛黃五釐共研為細末取獖豬心中血小豬尾尖血和丸如綠豆大每服一丸新汲水化下燈心煎湯亦可附方退火回生丹治痘中狂妄神方滑石一錢辰砂一錢冰片三釐共為細末冷水調一分服得睡少時神安氣寧痘轉紅活矣一五蟬蛻膏蟬蛻去毒當歸防風甘草川芎荊芥穗升麻白芍藥人參共為末煉蜜丸如芡實大每服一丸薄荷湯下一六養脾丸人參白朮當歸川芎各一錢半木香青皮黃連陳皮各一錢砂仁山楂肉神麯炒麥芽炒五分共為細末水調神麯糊為丸如麻子大每服三五十丸陳倉米飲湯送下一七東垣鼠黏子湯鼠黏子炒香當歸身甘草炙各一錢柴胡連翹黃耆黃芩各一錢半地骨皮共銼細水一大盞煎六分去渣溫服腹空服藥畢日休與乳食一八解毒湯又名溯源解毒湯解胎毒良方當歸身川芎生地黃白芍藥甘草生人參連翹黃連陳皮木通各等分共銼細加淡竹葉十片水一盞煎半盞去滓溫服無時一九瀉黃散一名瀉脾散治脾熱藿香葉七錢山梔仁一兩石膏半兩甘草七錢半防風二兩共銼細用蜜酒微炒香為末每服二三錢水一盞煎七分溫服一一瀉青丸一名瀉肝丸治肝熱作搐良方羌活大黃炒川芎當歸防風山梔仁龍膽草各等分上為末煉蜜丸雞頭子大每服半丸至一丸竹葉湯同沙糖水化下一一一粉紅丸一名溫驚丸牛膽南星四兩硃砂一錢半天竺黃半兩坯子胭脂一錢龍腦五分共為末用牛膽汁和丸雞頭子大每服一丸小者半丸沙糖溫水化下一一二實表解毒湯黃耆人參當歸梢生地黃白芍藥甘草柴胡地骨皮酒片芩玄參升麻共銼細加薄荷葉少許淡竹葉十片水煎溫服無時一一三托裡快斑湯當歸黃耆川芎木香青皮牛蒡子紫草連翹木通防風桂枝蟬蛻共銼細加淡竹葉十片水煎溫服不拘時一一四惺惺散解發痘疹良方桔梗人參甘草炙白茯苓白朮瓜蔞根各等分細辛少許共為末每服二錢水一盞入薄荷葉五片煎七分溫服不拘時一方有防風川芎一一五通關散此藥通心經利小便良方山梔仁大黃炒各一分木通甘草炙赤茯苓車前子炒瞿麥滑石人參各二分萹蓄炒五分共銼細水一盞燈草十根煎半盞溫服一一六蟬殼明目散治痘後目疾蟬蛻去足翅地骨皮黃連牡丹皮白朮菊花蒼朮米泔浸切焙各一兩龍膽草五錢甜瓜子半斤共為末每服一錢半荊芥煎湯調下食後及臨臥時各一服治時疾後餘毒上攻眼目甚效忌熱面炒豆醋醬等物一一七紫草飲子治倒陷腹脹大小便秘紫草茸人參山楂肉蟬蛻枳殼穿山甲土拌炒木通各等分共銼細水一盞煎五分作三四次溫服一一八經驗方治痘眼白菊花綠豆皮穀精草去根各半兩共為細末每服抄一大錢乾柿一個生粟米泔一盞熬米泔盡將柿去核食之一日可食三枚無時病淺者二十日遠者一月必效一一九快斑越脾湯治痘瘡手足不起發者黃耆炙白芍藥桂枝防風甘草炙上銼細加生薑一片棗一枚水煎不拘時服一二桃仁承氣湯桃仁二十個去皮尖研泥勿煎大黃二錢官桂研末勿煎紅花各一錢甘草五分上三味研細水一盞煎七分去滓入官桂末桃仁泥化開食前服一二一酸棗仁湯酸棗仁去殼取仁甘草炙生地黃梔子仁麥門冬人參當歸身各等分共銼細如燈心水一盞煎七分去渣不拘時服一二二排毒散治痘毒發癰大黃一兩白芷沉香木香各半兩穿山甲上炒焦卷七片當歸梢一兩上為細末看虛實大小加減長流水煎沸調服附方解痘內托散治痘癰金銀花黃耆當歸防風甘草節赤芍藥荊芥連翹木通水煎入酒少許服一二三蕎麥粉治痘瘡潰爛蕎麥一味磨取細面痘瘡破者以此敷之潰爛者以此遍撲之絹袋盛撲以此襯臥尤佳一二四升麻解毒湯當歸升麻柴胡桔梗牛蒡子甘草蟬蛻連翹防風密蒙花荊芥各等分上銼細水一盞煎七分去渣食後溫服一二五綿繭散治痘後疳蝕瘡出蛾綿繭不拘多少白礬搗碎入繭內以炭火燒令礬汁盡共研極細末每用干貼疳瘡口內一二六棗變百祥丸此可代百祥丸牛李膏用紅牙大戟去骨不用白者一兩青州棗去皮核三十個上用水一盞同煎水盡為度去大戟不用將棗搗爛為丸從少至多木香湯吞以利為度一二七四白滅瘢散治痘後面瘢以此敷之白芷白附子白殭蠶鷹矢白密陀僧各等分共研極細末以水調搽面䵟神效一二八流氣飲治痘癰川芎當歸梢白芍藥防風人參木香黃耆紫蘇葉甘草節桂心桔梗白芷厚朴烏藥枳殼雞心檳榔各四錢共銼細末水一盞煎七分服氣血虛而自利者加熟附片大便實者加大黃一二九小柴胡加生地黃湯治痘癰柴胡人參黃芩各三錢甘草炙二兩生地黃半夏湯泡七次薑汁拌炒各二兩共為粗末每服三錢水一盞生薑三片棗一枚煎半盞去渣溫服一三篳衣湯治癮疹疙瘩作癢炊飯篳衣煮水洗癮起疙瘩者神效如無以炊篳煮湯亦好一三一蜞針法治痘癰及丹瘤取水蛭大者五六條放腫處吮去惡血可以消丹瘤可以消癰腫附方砭法治丹瘤用細瓷器擊碎取有鋒鋩者以箸一根劈開頭夾之用線縛定兩指輕捉箸梢令瓷鋒正對患處懸寸許再用箸一根頓擊箸頭今毒血遇擊刺之皆出一三二消風散人參羌活川芎甘草炙防風荊芥穗白茯苓蟬蛻去毒厚朴白殭蠶炒陳皮去白藿香葉各半兩共為末每服二錢清茶調下一三三小柴胡加枳桔湯柴胡一錢半夏甘草各半錢人參黃芩各三錢枳殼桔梗各一錢共為粗末每服三錢水一盞姜一片煎六分服一三四五皮湯治痘後面腫桑白皮地骨皮生薑皮大腹皮五加皮各等分共銼細取長流水一盞燈心十二莖煎七分溫服一三五塌氣丸治腹脹木香半兩雞心檳榔白者一隻黑牽牛二兩半生半炒取頭末一兩共為末神麯糊為丸如黍米大薑湯下一三六胃苓湯治痘後遍身浮腫豬苓澤瀉白朮白茯苓蒼朮厚朴紫油者薑汁炒陳皮桂心甘草共銼細水一盞煎七分去渣溫服不拘時一三七洗心散治口舌生瘡良方當歸生地黃木通黃連麻黃大黃薄荷葉各等分共銼細水一盞加燈心引煎七分去渣溫服一三八馬鳴散治走馬牙疳良方人中白即溺桶底白垢也以物刮取用新瓦盛之火煅過如白鹽乃佳半兩馬鳴退即蠶退紙也火燒過二錢半五倍子生一錢另用一錢同礬煅枯白礬二錢捶碎另取五倍子一錢入礬於內以火煅枯共為極細末以米泔濃汁浸洗以此敷之一三九化䘌丸黃連半兩蜀椒去閉目者用開口者炒去汗二錢苦楝根白皮陰乾二錢共為末用烏梅肥者七個艾湯浸去核搗爛和丸艾湯下一四養血化斑湯治白疹當歸身生地黃紅花蟬蛻人參各等分共銼細水一盞姜一片煎六分去渣溫服無時一四一大青湯解斑疹火毒良方大青玄參生地黃石膏知母木通甘草地骨皮荊芥穗各等分共銼細水一盞淡竹葉十二片煎七分去滓溫服無時一四二柴胡橘皮湯柴胡橘皮黃芩半夏人參白茯苓各等分共銼細加竹茹一團生薑一片水一盞煎七分去渣無時服一四三柴胡四物湯治疹後餘熱柴胡人參黃芩當歸身川芎生地黃白芍藥地骨皮麥門冬知母淡竹葉共銼細水一盞煎七分去渣溫服不拘時一四四門冬清肺湯治疹後咳嗽不止天門冬麥門冬各去心知母貝母桔梗款冬花杏仁去皮尖炒研馬兜鈴甘草地骨皮各等分共銼細水一盞煎七分去渣溫服一四五當歸養心湯當歸身麥門冬升麻炒甘草炙人參生地黃酒洗共銼細加燈心十二莖水一盞煎七分去渣食後服一四六安胎飲娠婦痘疹常宜用之條實黃芩沉水者二錢白朮當歸身白芍藥人參各一錢川芎陳皮大腹皮黑豆水浸酒洗淨各八分甘草紫蘇葉八分連殼砂仁炒研五分共銼細水一盞半糯米一撮煎一盞去渣溫服無時一四七河間涼膈散解痘疹表裡俱熱純陽無陰之痘大黃朴硝甘草各五分連翹一錢梔子黃芩薄荷各二分半淡竹葉五片共銼細作一服水一盞煎八分去渣入蜜一匙和勻服附方東垣涼膈散解痘疹裡熱良方即前方去大黃朴硝加桔梗
